dı? 3. Brief'i yazılı olarak netleştir ve müşteriden onay al. 4. İç brief hazırla: Strateji, kreativ, medya ekiplerine dağıt. 5. Kick-off toplantısı: Herkes aynı sayfada mı?`,levelDiff:{junior:`Brief'i okur ve göreve odaklanır. Belirsiz noktalara soru sormayı ve yazılı teyit almayı öğreniyor.`,mid:`Brief'i okur, eksik noktaları tespit eder ve soru sorar. Müşteriyle doğrudan konuşma güvenini geliştiriyor.`,senior:`Brief'i müşteriyle birlikte yeniden yazar. 'Bu hedefe bu bütçeyle ulaşmak mümkün değil, alternatif önerim şu' diyebilir.`},keyPoints:[`Brief'te en önemli iki şey: başarı kriteri ve hedef kitle tanımı. Bunlar net değilse kampanya başlamadan kaybolmuş demektir.`,`Her brief'te 'neden?' sorusunu sor. Müşteri 'awareness artır' diyorsa, neden awareness? Arka planda ne var? Lansman mı, rakip baskısı mı, sezon mu?`,`Brief onayı yazılı alınmalı. Sözlü onay = belirsizlik. E-posta veya Slack mesajı bile olsa kayıt altında olmalı.`,`İç brief dış brief'ten farklıdır. Müşteriye verdiğin brief ozet, ajans içine verdiğin brief teknik ve detaylı olmalı.`,`Brief değişirse süreç yeniden başlar. Scope creep (kapsam kayması) ajans-müşteri ilişkisinin en büyük problemlerinden biridir.`],quiz:[{id:`q-1-1-1`,type:`concept`,question:`Bir brief'te mutlaka olması gereken iki kritik unsur hangisidir?`,options:[`Bütçe ve kreatif konsept`,`Başarı kriteri (KPI) ve hedef`,`Timeline ve marka renkleri`,`Rakip analizi ve medya kanalları`],correct:1,explanation:`KPI ve hedef kitle olmadan kampanya yönü belirsiz kalır. Bütçe önemli ama KPI ve hedef kitle stratejinin temel taşlarıdır.`},{id:`q-1-1-2`,type:`scenario`,question:`Puma'dan brief geldi: 'Yeni koşu ayakkabısını tanıt, gençlere ulaş.' Sıradaki adımın ne olmalı?`,options:[`Hemen kampanya planlamaya başla`,`Brief'i netleştir: 'Gençler' kaç yaş? Tanıtmak ne`,`Kararı yöneticiye bırakarak soruyu ona yönelt`,`Rakip kampanyalarını takip etmek için kullanılır`],correct:1,explanation:`Belirsiz brief = belirsiz kampanya. 'Gençler' 18-24 mü, 25-35 mi? 'Tanıt' awareness mı satış mı? Bunlar netleşmeden strateji kurulamaz.`},{id:`q-1-1-3`,type:`comparison`,question:`Dış brief (müşteriye) vs iç brief (ajans içi) farkı nedir?`,options:[`İkisi de müşteri için hazırlanır, fark yoktur`,`Dış brief: müşteriye yönelik, özet ve iletişim odaklı`,`İç brief daha kısa, dış brief daha uzun olmalıdır`,`Dış brief yalnızca kreatif ekip için hazırlanır`],correct:1,explanation:`Müşteri teknik detay görmek istemez. Ajans içindeki ekipler ise çalışmak için teknik detaya ihtiyaç duyar. İki brief ayrı yazılmalı.`},{id:`q-1-1-4`,type:`scenario`,question:`Müşteri toplantıda sözlü olarak brief değişikliği istedi. Ne yaparsın?`,options:[`Hemen değişikliği uygula`,`Toplantıdan sonra değişikliği e-posta ile`,`Kararı yöneticiye bırakarak soruyu ona yönelt`,`Müşteri talebini reddedip mevcut planı koru`],correct:1,explanation:`Sözlü onay ileride anlaşmazlık çıktığında seni korumaz. Her brief değişikliği yazılı kayıt altına alınmalı.`},{id:`q-1-1-5`,type:`concept`,question:`Scope creep nedir ve neden tehlikelidir?`,options:[`Bütçe limitinin aşılmasından kaynaklanan maliyet sorunu`,`Brief dışında ek iş talepleri birikmesi`,`Kreatif içeriğin kalite düşüşünden kaynaklanıyor`,`Reklam platformunun kendi teknik hatası`],correct:1,explanation:`Scope creep yavaş gelişir: 'bir de şunu ekler misin?' cümleleri birikerek projeyi çıkmaza sokar. Her ekstra iş brief'e yansıtılmalı.`}]},{id:`lesson-1-2`,title:`Medya Planı ve Ajans-Marka Dinamiği`,duration:`14 dk`,what:`Medya planı, hangi kanalda ne kadar bütçeyle, hangi dönemde, hangi hedef kitleye reklam yapılacağını gösteren stratejik belgedir. Ajans bu planı hazırlar, müşteri onaylar, sonra uygulama başlar.`,why:`UM gibi global bir ajanda medya planı sadece 'şu kanal şu bütçe' değildir. Neden o kanal, neden o dönem, neden o format — her kararın savunması olmalı. Yöneticinin önünde bunu açıklayabilmek seni güçlü kılar.`,realExample:`H&M yaz koleksiyonu kampanyası. Medya planı: Meta 40% (visual, geniş kitle), Google Search 25% (marka aramaları + kategori), YouTube 20% (koleksiyon tanıtım videosu), TikTok 15% (genç kitle, trend içerik). Neden bu dağılım? H&M geniş kitleye hitap eder, Meta'nın visual gücü koleksiyon için ideal. Google arama zaten niyetli kitleyi yakalar. YouTube koleksiyon hikayesi anlatır. TikTok 18-25 segmenti için olmazsa olmaz.`,howItWorks:`1. Hedef kitle analizi: Kim? Nerede? Ne zaman online? 2. Kanal seçimi: Her kanalın güçlü yönü var — Meta (visual/hedefleme), Google (intent), TikTok (genç/organik reach), DV360 (premium inventory). 3. Bütçe dağılımı: TOFU/MOFU/BOFU mantığıyla (awareness/consideration/conversion). 4. Flight planı: Hangi hafta hangi kanal ön planda? Lansman haftası awareness heavy, son hafta conversion heavy. 5. KPI atama: Her kanala farklı KPI (Meta: reach + frequency, Google: conversion, TikTok: video view). 6. Müşteri sunumu: Neden bu plan, alternatifler neler, risk nedir?`,levelDiff:{junior:`Medya planını alır, platforma uygular. Planın stratejik gerekçesini zamanla sorgulamayı öğreniyor.`,mid:`Medya planını analiz eder, eksiklikleri fark eder. Alternatif öneri sunma ve savunma becerisini geliştiriyor.`,senior:`Medya planını müşteriyle birlikte kurar. 'Bu dağılım bu hedefe ulaştırmaz, şunu öneririm' diyebilir ve savunabilir.`},keyPoints:[`Her kanal için ayrı KPI belirle. Meta'dan conversion beklemek ile Google Search'ten conversion beklemek farklı şeylerdir.`,`Flight planı sezon ve kampanya fazına göre değişir. Lansman = awareness, son dönem = conversion. Bütçe buna göre kayar.`,`Ajans-marka ilişkisinde güven = şeffaflık. Kötü giden bir kanalı müşteriden saklamak kısa vadeli rahatlatır, uzun vadede güven kaybettirir.`,`Medya planı yaşayan bir belgedir. Haftalık performansa göre güncellenir. Başta yapılan plan sona kadar aynı kalmak zorunda değildir.`,`UM gibi ajanlarda medya planı strateji ekibi tarafından hazırlanır, execution senden geçer. Stratejistlerle iyi iletişim = daha iyi kampanya.`],quiz:[{id:`q-1-2-1`,type:`concept`,question:`Medya planında TOFU/MOFU/BOFU mantığı ne anlama gelir?`,options:[`Üç farklı reklam platformunu tek çatı altında toplayan yapıdır`,`Top of Funnel (awareness), Middle of Funnel`,`Üç farklı bütçe türünü bir arada kapsayan esnek bir modeldir`,`Üç farklı hedef kitle segmentini kapsayan bir kampanya yapısıdır`],correct:1,explanation:`Funnel mantığı kampanya kaynaklarını doğru aşamaya yönlendirir. Awareness için reach, conversion için intent kanalları önceliklidir.`},{id:`q-1-2-2`,type:`scenario`,question:`Levi's kampanyasında Meta ROAS beklenin altında, Google Search ROAS çok iyi. Medya planında ne yaparsın?`,options:[`Hiçbir şey yapma, plan değişmez`,`Google Search bütçesini artır`,`Kampanyayı analiz etmeden tamamen durdur`,`Müşteriyi bilgilendirme`],correct:1,explanation:`Medya planı dinamiktir. Performansa göre kaydırma yapmak, sadece mevcut planı uygulamaktan daha değerlidir. Ama nedenini de anlamak şart.`},{id:`q-1-2-3`,type:`comparison`,question:`Meta Ads vs Google Search — temel fark nedir?`,options:[`Meta daha ucuz, Google daha pahalı`,`Meta = interrupt reklam (sen kullanıcıya`,`Google her zaman daha iyi dönüşüm verir`,`İkisi de tamamen aynı kullanıcı segmentine hitap eder`],correct:1,explanation:`Bu iki kanalı yanlış aşamada kullanmak bütçe israfıdır. Meta awareness ve discovery için güçlü, Google Search conversion için güçlü.`},{id:`q-1-2-4`,type:`scenario`,question:`Müşteri medya planını görmek istiyor ama sen henüz hazırlamadın. Yönetici de meşgul. Ne yaparsın?`,options:[`Toplantıyı iptal edip planı sıfırdan tamamla, sonra yeni toplantı kur`,`Hazırladığın taslağı paylaş, eksik kısımlar için net bir tamamlama tarihi ver`,`Müşteriye henüz hazır olmadığını söyle ve toplantıyı ertele`,`Yönetici müsait olana kadar müşteriyi beklet, toplantıyı ertele`],correct:1,explanation:`Şeffaflık güveni artırır. Yarım da olsa dürüst paylaşım, hiç paylaşmamaktan iyidir. Müşteriyle iletişimi koparmamak kritik.`},{id:`q-1-2-5`,type:`concept`,question:`Flight planı nedir?`,options:[`Uçak içi yayın reklamcılığı formatı`,`Kampanyanın zaman içindeki`,`Platform seçim belgesi`,`Brief türü değeri kullan`],correct:1,explanation:`Flight planı kampanyanın zamansal stratejisidir. Lansman haftası awareness heavy, son hafta conversion heavy gibi farklı fazlar olabilir.`}]}]},{id:`module-2`,phase:1,icon:`📊`,title:`Performance Marketing Temelleri`,description:`Funnel mantığı, doğru metrik seçimi, attribution modelleri ve gerçek KPI belirleme`,xpReward:100,lessons:[{id:`lesson-2-1`,title:`Funnel Mantığı ve Doğru Metrik Seçimi`,duration:`15 dk`,what:`Marketing funnel (huni), potansiyel müşterinin markayı tanımaktan satın almaya kadar geçtiği aşamaları tanımlar: Awareness → Consideration → Conversion → Retention. Her aşamada farklı metrik, farklı kanal, farklı mesaj işe yarar.`,why:`Yanlış aşamada yanlış metriği ölçmek seni yanıltır. Awareness kampanyasından ROAS beklemek, conversion kampanyasından sadece reach beklemek gibi hatalardır. Yöneticinin sorusu her zaman şu olacak: 'Bu metrik bu hedefe ne kadar katkı sağladı?'`,realExample:`Maje yeni koleksiyon lansmanı. Hata: Awareness kampanyasında ROAS 0.3x çıkıyor, müşteri panikliyor. Doğru yaklaşım: 'Bu kampanya awareness fazındaydı, KPI'ımız reach 2M ve frequency 3+. Bunu %127 aştık. Conversion fazındaki retargeting kampanyası ROAS 4.2x getirdi.' Funnel aşamalarını karıştırmamak müşteriyle sağlıklı iletişimin temelidir.`,howItWorks:`1. TOFU (Awareness): KPI = Reach, Frequency, Video View Rate, Brand Recall. Kanal: YouTube, TikTok, Display, Meta Reach. 2. MOFU (Consideration): KPI = CTR, Time on Site, Add to Cart, Engagement Rate. Kanal: Meta Traffic, Google Display Retargeting, TikTok. 3. BOFU (Conversion): KPI = ROAS, CPA, Conversion Rate, Revenue. Kanal: Google Search, Meta Conversion, Shopping Ads. 4. Retention: KPI = Repeat Purchase Rate, CLV, Email Open Rate. Her aşamada doğru metriği raporla, yanlış metrikle başarısız görünen kampanya aslında başarılı olabilir.`,levelDiff:{junior:`Performansı ROAS üzerinden değerlendirir. Farklı kampanya tiplerinin farklı başarı kriterlerine sahip olduğunu keşfediyor.`,mid:`Funnel aşamalarını iyi bilir. Bunu müşteriye net ve ikna edici biçimde anlatmayı geliştiriyor.`,senior:`Her kampanya için doğru KPI'ı müşteriyle birlikte belirler. Başarı kriterini önceden netleştirir, sonrasında tartışma olmaz.`},keyPoints:[`Her kampanyanın tek bir ana KPI'ı olmalı. 'Hem awareness hem conversion' isteyen müşteriyle önce funnel mantığını konuş.`,`CPM düşük = reach ucuz, ama bu kaliteli reach olmayabilir. Metrik kombinasyonlarına bak: düşük CPM + düşük CTR = yanlış kitle.`,`ROAS single-touch attribution yanıltıcı olabilir. Awareness kanalı conversion'a katkı sağlamış olabilir ama kredi almaz.`,`Vanity metrics (beğeni, takipçi) ile performance metrics (conversion, ROAS, CPA) arasındaki farkı müşteriye anlat.`,`Funnel aşamasına göre bütçe dağılımı: Yeni marka = TOFU ağır. Bilinen marka = BOFU ağır. Sezon kampanyası = MOFU + BOFU dengesi.`],quiz:[{id:`q-2-1-1`,type:`concept`,question:`TOFU aşamasında en uygun başarı metriği hangisidir?`,options:[`ROAS ve CPA metrikleri funnelın her aşaması için eşit derecede geçerlidir`,`Reach, Frequency ve Video View Rate`,`CTR ve Conversion Rate`,`Sepete ekleme oranı funnelın her aşamasını ölçer`],correct:1,explanation:`TOFU = marka bilinirliği. Henüz satış beklenmez. Reach ve frequency ile ne kadar kişiye kaç kez ulaştığın önemlidir.`},{id:`q-2-1-2`,type:`scenario`,question:`Sandro için awareness kampanyası yaptın. Müşteri 'ROAS 0.1x, kampanya başarısız' diyor. Cevabın ne?`,options:[`Haklı, kampanya başarısız`,`Bu kampanya awareness fazındaydı`,`ROAS'ı artırmak için bütçe artır`,`Kampanyayı analiz etmeden tamamen durdur`],correct:1,explanation:`Funnel aşamasına uygun metrik kullanılmalı. Awareness kampanyasından ROAS beklemek yanlış beklentidir. Bunu müşteriyle önceden netleştirmek gerekir.`},{id:`q-2-1-3`,type:`comparison`,question:`Vanity metrics vs performance metrics farkı nedir?`,options:[`Vanity metrics daha önemli, müşteriler bunu ister`,`Vanity metrics görünürlük gösterir (beğeni, takipçi)`,`İkisi aynı şeyi ölçer, sadece isim farkı vardır`,`Performance metrics yalnızca e-ticaret için geçerlidir`],correct:1,explanation:`Müşteri 'beğeniler çok arttı' diyebilir, ama satış artmadıysa bu iş değeri üretmemiştir. Performance marketingde sonuç odaklı metrikler önceliklidir.`},{id:`q-2-1-4`,type:`scenario`,question:`H&M kampanyasında CPM 5 TL, CTR %0.3. Bu ne anlama geliyor?`,options:[`Mükemmel görünüyor, hiçbir aksiyon gerekmez`,`Ucuz reach var ama kitle reklamla ilgilenmiyor`,`Her şey normal seyrediyor, beklemeye devam et`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Düşük CPM + düşük CTR = yanlış kitleye ucuza ulaşıyorsun ama ilgi görmüyor. İki metriği birlikte yorumlamak tek metrikten daha anlamlı.`},{id:`q-2-1-5`,type:`concept`,question:`Yeni bir marka lansmanında funnel bütçe dağılımı nasıl olmalı?`,options:[`Tüm bütçe conversion'a`,`Başlangıçta tüm bütçeyi TOFU'ya ver`,`Funnel aşamalarına bütçeyi eşit olarak dağıt`,`Yalnızca retargeting kampanyalarına odaklan`],correct:1,explanation:`Tanınmayan marka için conversion kampanyası açmak bütçe israfıdır. Önce awareness, ardından remarketing, son olarak conversion sıralaması daha verimlidir.`}]},{id:`lesson-2-2`,title:`Attribution Modelleri ve KPI Belirleme`,duration:`16 dk`,what:`Attribution (atıf), bir dönüşümde hangi reklam kanalının veya temas noktasının ne kadar katkı sağladığını belirleyen modeldir. Last-click, first-click, linear, time-decay ve data-driven attribution farklı sonuçlar üretir ve bütçe kararlarını doğrudan etkiler.`,why:`Hangi attribution modelini kullandığın, hangi kanalın 'başarılı' göründüğünü değiştirir. Sadece last-click bakıyorsan, farkında olmadan awareness kanallarını öldürürsün. Senior'lar doğru attribution modelini seçer ve müşteriye neden önemli olduğunu açıklar.`,realExample:`Lexus showroom form kampanyası. Last-click'e göre Google Search tüm krediyi alır: ROAS 8x. Ama müşterinin yolculuğu şöyle: YouTube video izledi (awareness) → Google Display retargeting gördü (consideration) → Google Search'te aradı (conversion). Last-click sadece son adımı görür. Data-driven attribution'da YouTube %30, Display %20, Search %50 kredi alır. Bu modelde YouTube bütçesini kesmek dönüşümleri azaltır.`,howItWorks:`1. Last-Click: Son temas noktası tüm krediyi alır. Basit ama yanıltıcı. 2. First-Click: İlk temas noktası tüm krediyi alır. Awareness kanallarını overvalue eder. 3. Linear: Tüm temas noktaları eşit kredi alır. 4. Time-Decay: Conversion'a yakın temas noktaları daha fazla kredi alır. 5. Data-Driven (Google'ın AI modeli): Gerçek katkıyı makine öğrenmesiyle hesaplar, en doğru model. GA4'te ve Google Ads'te mevcut. 6. Cross-channel attribution: Meta + Google + TikTok'u birlikte analiz etmek için Supermetrics veya third-party tool gerekir. 7. View-through attribution: Reklamı gördü ama tıklamadı, sonra convert oldu — Meta'da varsayılan 1 gün, ayarlanabilir.`,levelDiff:{junior:`Last-click veriye odaklanır. Farklı attribution modellerini ve kanalların funnel içindeki rolünü keşfediyor.`,mid:`Attribution modellerini kavramış. Bağlama göre doğru model seçimini ve müşteriye savunmayı geliştiriyor.`,senior:`Her müşteri için doğru attribution modelini belirler. Cross-channel attribution raporlamasını kurar. 'Bu kanal işe yaramıyor' değil, 'bu kanal funnel'da şu aşamada şu katkıyı yapıyor' der.`},keyPoints:[`Last-click attribution en yaygın ama en yanıltıcı modeldir. Awareness ve consideration kanalları haksız yere değersiz görünür.`,`Google Ads ve GA4'te data-driven attribution seç — yeterli conversion verisi varsa (aylık 50+) AI modeli en doğru sonucu verir.`,`Cross-channel attribution için tek platform yeterli değil. Supermetrics, Funnel.io veya CM360 ile kanallar arası görünürlük gerekir.`,`View-through attribution'ı dikkatli kullan. Meta'da 1 günlük view-through varsayılan — çok agresif olabilir, kampanya başarısını overstate eder.`,`Attribution tartışmaları müşteri toplantısında çıkabilir. 'Google mu Meta mı?' sorusunu attribution modeli üzerinden yanıtlamak daha profesyonel ve ikna edicidir.`],quiz:[{id:`q-2-2-1`,type:`concept`,question:`Data-driven attribution modeli neden diğerlerinden üstündür?`,options:[`Daha basit değeri kullan`,`Makine öğrenmesiyle her kanalın gerçek`,`Google tarafından tamamen ücretsiz sunulur`,`Her zaman last-click ile aynı sonuç verir`],correct:1,explanation:`Data-driven attribution, sabit bir kural uygulamak yerine gerçek kullanıcı yolculuklarını analiz ederek kanalların katkısını ölçer. Aylık 50+ conversion gerektirir.`},{id:`q-2-2-2`,type:`scenario`,question:`Puma kampanyasında last-click'e göre Meta ROAS 0.5x. Müşteri Meta bütçesini kesmek istiyor. Ne yaparsın?`,options:[`Müşteri haklı, Meta'yı kes`,`Önce attribution analizini`,`Hemen kes değeri kullan`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Last-click Meta'nın funnel katkısını göstermez. Meta kesilince Google'daki conversion'lar da düşebilir çünkü awareness azalır. Attribution analizini önce yap.`},{id:`q-2-2-3`,type:`comparison`,question:`Linear attribution vs Time-decay attribution farkı nedir?`,options:[`Linear daha doğru sonuç verir, her zaman tercih edilmeli`,`Linear: tüm temas noktalarına eşit kredi; Time-decay: dönüşüme`,`Time-decay yalnızca e-ticaret sitelerinde kullanılabilir`,`İkisi de aynı sonucu üretir, sadece hesaplama yöntemi farklıdır`],correct:1,explanation:`Uzun satın alma döngüsü olan markalarda (Lexus gibi) linear daha adil olabilir. Hızlı dönüşümlerde time-decay mantıklıdır.`},{id:`q-2-2-4`,type:`concept`,question:`View-through attribution nedir ve neden dikkatli kullanılmalı?`,options:[`Tıklama odaklı ölçümü tek gösterge olarak al`,`Kullanıcı reklamı gördü ama tıklamadı, daha sonra`,`Sadece video reklamlarda geçerli`,`Bu yöntemi hiç kullanma, devre dışı bırak`],correct:1,explanation:`View-through attribution gerçek bir katkıyı ölçer ama pencere çok geniş tutulursa reklam olmadan da olacak conversion'ları reklamın başarısı gibi sayabilir.`},{id:`q-2-2-5`,type:`scenario`,question:`Müşteri 'hangi kanal en iyi ROAS veriyor?' diye soruyor. Tek doğru cevap var mı?`,options:[`Evet, Google Search her zaman en iyi`,`Hayır — ROAS kanalın funnel pozisyonuna göre değişir`,`Evet, Meta her zaman en iyi`,`Evet, TikTok her platformdan daha düşük maliyetle çalışır`],correct:1,explanation:`Her kanalın funnel'daki rolü farklıdır. Tek ROAS metriğiyle kanal karşılaştırması yapmak, kanalların farklı aşamalardaki katkısını görmezden gelir.`}]}]},{id:`module-3`,phase:3,icon:`📈`,title:`GA4, GTM & Ölçüm Altyapısı`,description:`GA4 Exploration raporları, GTM DataLayer, Pixel vs CAPI, Gemius tracking — ölçüm olmadan optimizasyon olmaz`,xpReward:100,lessons:[{id:`lesson-3-1`,title:`GA4 Exploration, Audience ve BigQuery`,duration:`16 dk`,what:`GA4 (Google Analytics 4), event-tabanlı bir analitik platformdur. Universal Analytics'ten farklı olarak her kullanıcı aksiyonu event olarak kaydedilir. Exploration raporları özel analiz kurmanı, BigQuery bağlantısı ham veriyi SQL ile sorgulamanı sağlar.`,why:`Standart GA4 raporları yeterli değildir. Yöneticinin sorduğu sorular genellikle 'hangi sayfa en çok sepet terkine yol açıyor', 'hangi audience segment en yüksek CLV'ye sahip' gibi özel analizler gerektirir. Bunu yapabilmek seni veri odaklı, derinlemesine düşünen bir performans pazarlamacısı yapar.`,realExample:`Lila Kağıt web sitesinde sepet terki yüksek. Standart rapor: 'Sepet terk oranı %72.' Yeterli değil. GA4 Exploration funnel raporu kur: Ana sayfa → Kategori → Ürün → Sepet → Ödeme. Sonuç: %85 kullanıcı ürün sayfasından çıkıyor. Neden? Heatmap + GA4 kullanıcı flow raporu: Fiyat bloğuna scroll yapmadan çıkıyorlar. Çözüm: Fiyatı daha yukarı taşı. Bu insight'ı sadece standart rapor kullananlar göremez.`,howItWorks:`1. GA4 Event yapısı: event_name + parameters. Örn: purchase (transaction_id, value, currency). Custom event eklemek için GTM kullan. 2. Exploration raporları: Free-form (pivot table gibi), Funnel exploration (adım adım dönüşüm), Path exploration (kullanıcı yolculuğu), Cohort analysis (belirli günde gelen kullanıcıların davranışı). 3. Audience segmentasyonu: 'Belirli ürünü 2 kez görüp satın almayan kullanıcılar' gibi özel segment oluştur, bunu Google Ads'e aktar, retarget et. 4. BigQuery bağlantısı: GA4 Pro/360 için ham event verisi BigQuery'e akar. SQL ile sınırsız analiz. 5. Custom dimensions: GA4'e marka, ürün kategorisi, kullanıcı segmenti gibi ek boyutlar ekle.`,levelDiff:{junior:`Standart GA4 raporlarını takip eder. Exploration ve özel raporlama araçlarını öğrenme aşamasında.`,mid:`Funnel exploration kurar. Temel custom segment oluşturabilir.`,senior:`Custom dimensions tanımlar, BigQuery'e ham veri çeker, SQL ile özel analiz yapar, audience segmentini Google Ads'e aktarır ve doğrular.`},keyPoints:[`GA4 Exploration = direkt value. Standart raporlar sana ortalama gösterir, exploration spesifik soruyu cevaplar.`,`Funnel exploration kur ve her adımdaki drop-off'u bul. En büyük düşüşün olduğu adım en büyük optimizasyon fırsatıdır.`,`GA4 Audiences → Google Ads entegrasyonu güçlü silah. 'Ürünü 3 kez gören ama satın almayan' kitleyi Google Ads'te hedefle.`,`BigQuery bağlantısı GA4'ün gizli gücü. Standart UI'da göremediğin analizi SQL ile yapabilirsin. Junior bilmez, senior kullanır.`,`Event izleme doğruluğunu kontrol et. GA4 Realtime raporu açık, GTM Preview mode ile event'lerin gerçekten tetiklenip tetiklenmediğini doğrula.`],quiz:[{id:`q-3-1-1`,type:`concept`,question:`GA4 Funnel Exploration ne için kullanılır?`,options:[`Reklam metni yazmak için`,`Kullanıcının belirlenen adımlar`,`Kampanya bütçesini hesaplamak amacıyla kullanılır`,`Takipçi sayısını görmek için`],correct:1,explanation:`Funnel exploration, conversion yolundaki engelleri görünür kılar. Hangi adımda en çok kayıp var? Bu soru optimizasyon önceliğini belirler.`},{id:`q-3-1-2`,type:`scenario`,question:`H&M'in sitesinde ödeme sayfasından %65 terk var. GA4'te bunu nasıl analiz edersin?`,options:[`Standart overview raporuna bak`,`Funnel exploration kur: Ana sayfa → Kategori → Ürün`,`Nedeni araştırmadan direkt bütçeyi artır`,`Sorunlu kampanyayı düzeltmek yerine yenisini aç`],correct:1,explanation:`Spesifik soruya spesifik analiz. Funnel exploration hangi adımda sorun var gösterir, segment breakdown (device, traffic source) sorunun nedenini daraltır.`},{id:`q-3-1-3`,type:`comparison`,question:`GA4 standart raporları vs Exploration raporları farkı?`,options:[`Exploration raporları standart raporların basitleştirilmiş halidir`,`Standart raporlar önceden hazır metrikler sunar; Exploration özel`,`Standart raporlar daha doğru veri gösterir, Exploration yaklaşık değerdir`,`İkisi de aynı veriyi farklı görsellerle sunar`],correct:1,explanation:`Standart raporlar iyi bir başlangıç noktasıdır ama spesifik iş sorularını cevaplamak için exploration şarttır.`},{id:`q-3-1-4`,type:`concept`,question:`GA4'ten Google Ads'e audience aktarmak ne sağlar?`,options:[`Bütçeden tasarruf sağlamak amacıyla tercih edilen yöntemdir`,`GA4'te tanımladığın özel segmenti (belirli ürünü`,`Otomatik reklam oluşturma`,`Rakip kampanyalarını takip etmek için kullanılır`],correct:1,explanation:`GA4 + Google Ads entegrasyonu güçlü kombinasyon. Site davranışına göre oluşturulan segment, platform hedeflemesinden daha nüanslı ve conversion odaklıdır.`},{id:`q-3-1-5`,type:`scenario`,question:`Müşteri 'GA4'te takipçi sayısını görmek istiyorum' diyor. Ne yaparsın?`,options:[`GA4'te farklı raporlara tıklayarak bulmaya çalış`,`GA4 site analytics'i ölçer`,`GA4'ü kapatıp farklı bir araç kullan`,`Sosyal takip için ayrı bir tool satın al`],correct:1,explanation:`Her tool'un ölçtüğü şey farklıdır. GA4 = site analytics. Sosyal medya metrikleri platform içinde. Bu farkı müşteriye açıklamak da senin görevin.`}]},{id:`lesson-3-2`,title:`GTM DataLayer, CAPI ve Gemius Tracking`,duration:`15 dk`,what:`Google Tag Manager (GTM), web sitesine tag (piksel, event kodu) eklemeyi kod yazmadan yönetmeyi sağlar. DataLayer, site ile GTM arasındaki veri köprüsüdür. CAPI (Conversions API) ise tarayıcı yerine sunucu üzerinden dönüşüm verisi göndererek iOS ve cookie kısıtlamalarını aşar.`,why:`Tracking olmadan optimizasyon kördür. iOS 14 sonrası pixel bazlı tracking önemli ölçüde bozuldu. CAPI bu açığı kapatır. GTM'yi bilmeden tracking sorunlarını çözemezsin. Gemius ise Türkiye'deki ajansların kullandığı reach ölçüm aracıdır — yöneticilerin baktığı raporlarda sıkça çıkar.`,realExample:`Puma Türkiye sitesi: Meta pixel click conversion raporu 850 satış gösteriyor ama Shopify dashboard 1.200 satış gösteriyor. Fark neden? iOS kullanıcıları pixel'i bloke ediyor. Çözüm: CAPI kur — sunucu tarafı event gönder. CAPI devreye alındıktan sonra Meta'da ölçülen satış 1.150'ye çıktı. Optimization verisi iyileşti, ROAS görünür biçimde arttı.`,howItWorks:`1. GTM kurulumu: Site head'ine GTM container kodu eklenir. Artık her tag GTM'den eklenir, developer'a ihtiyaç azalır. 2. DataLayer: Site developer'ı önemli event'leri DataLayer'a iter (e-ticaret: purchase event, transaction_id, value, items). GTM bu veriyi okur, platforma gönderir. 3. GTM Preview Mode: Tag debug. Hangi tag tetiklendi, hangi değer gönderildi. Hata ayıklama için kritik. 4. Server-Side GTM: Tarayıcı yerine sunucu üzerinden tag çalışır. Cookie bypass, daha doğru veri, daha hızlı site. 5. CAPI Kurulumu: Meta Events Manager → Data Sources → Conversions API. Server event ile browser event eşleştirilir (event match quality kontrol et). 6. Gemius: Türkiye reach ölçüm standardı. Ajanslar Gemius tag'ini siteye ekler, campaign reach ve frequency'i ölçer. Tag GTM üzerinden eklenir.`,levelDiff:{junior:`GTM'yi tanır ve iş akışına dahil etmeye başlıyor. Tag yönetiminde bağımsızlaşma sürecinde.`,mid:`Temel GTM tag ve trigger kurar. DataLayer değişkenlerini okuyabilir.`,senior:`Server-side GTM kurar, CAPI entegrasyonunu yönetir, event match quality optimize eder, Gemius raporlarını yorumlar.`},keyPoints:[`GTM Preview Mode her tracking probleminin ilk adımıdır. 'Event gitmiyor mu?' → Preview'a bak, trigger'ı kontrol et.`,`CAPI kurulumu Meta'da zorunluluk haline geliyor. iOS kullanıcılarının önemli bir kısmı pixel'i bloke ediyor, CAPI bu veriyi kurtarır.`,`Event Match Quality (EMQ) skoru yüksek tut. Meta'da EMQ düşükse (6 altı) CAPI verisi optimizasyona katkı sağlamaz.`,`DataLayer debug: Site üzerinde F12 → Console → dataLayer yazarak ne var kontrol edebilirsin. Developer ile konuşmadan önce bunu yap.`,`Gemius tag'ini Türkiye kampanyalarında unutma. Reach raporlaması için yöneticiler Gemius verisi ister — tag yoksa rapor üretilemez.`],quiz:[{id:`q-3-2-1`,type:`concept`,question:`CAPI (Conversions API) neden önemlidir?`,options:[`Reklam kreatiflerini oluşturmak amacıyla kullanılır`,`iOS ve tarayıcı kısıtlamaları nedeniyle pixel'in`,`Kampanya bütçelerini yönetmek amacıyla kullanılır`,`Sosyal medya takipçi sayısını artırmak için kullanılır`],correct:1,explanation:`iOS 14+ sonrası pixel bazlı tracking önemli ölçüde bozuldu. CAPI bu açığı kapatır. Hem ölçüm doğruluğu hem optimizasyon kalitesi iyileşir.`},{id:`q-3-2-2`,type:`scenario`,question:`Meta'da 500 satış görünüyor, e-ticaret backend'inde 800 satış var. Fark neden olabilir?`,options:[`Backend yanlış sayıyor`,`iOS kullanıcıları ve AdBlocker kullananlar pixel'i`,`Meta platformunun hatalı dönüşüm sayımından kaynaklanıyor`,`Herhangi bir aksiyon almadan süreci bekle`],correct:1,explanation:`Pixel vs backend uyuşmazlığı yaygın bir sorundur. CAPI bu açığı önemli ölçüde kapatır. Event match quality ve attribution window da kontrol edilmeli.`},{id:`q-3-2-3`,type:`comparison`,question:`Browser-side GTM vs Server-side GTM farkı nedir?`,options:[`Server-side GTM yalnızca büyük e-ticaret siteleri için gereklidir`,`Browser-side: tag kullanıcının tarayıcısında çalışır`,`Browser-side her zaman daha doğru sonuç verir`,`İkisi de aynı veriyi üretir, sadece teknik kurulum farkı vardır`],correct:1,explanation:`Server-side GTM daha doğru veri ve daha iyi site performansı sağlar. Kurulumu karmaşık ama büyük e-ticaret sitelerinde fark büyüktür.`},{id:`q-3-2-4`,type:`concept`,question:`DataLayer nedir?`,options:[`Reklamları organize eden kampanya yönetim katmanıdır`,`Web sitesi ile GTM arasındaki veri köprüsü`,`Verileri depolayan bir veritabanı sistemidir`,`Sayfanın görsel tasarımını belirleyen stil katmanı`],correct:1,explanation:`DataLayer olmadan GTM'ye doğru veri gönderilemez. Örneğin satın alma event'inde ürün adı ve değeri DataLayer'dan okunur.`},{id:`q-3-2-5`,type:`scenario`,question:`Yeni kampanya açtın ama conversion takip etmiyor. İlk kontrol edeceğin şey ne?`,options:[`Nedeni araştırmadan direkt bütçeyi artır`,`GTM Preview Mode aç, conversion sayfasına git,`,`Sorunu düzeltmek yerine kampanyayı tamamen sil`,`Yöneticiye danışmadan direkt müşteriyi ara`],correct:1,explanation:`Tracking sorununun %80'i GTM Preview Mode ile teşhis edilir. Önce tag tetikleniyor mu kontrol et, sonra platforma veri gidip gitmediğini bak.`}]}]},{id:`module-4`,phase:2,icon:`🔍`,title:`Google Ads: Search & Shopping`,description:`Kampanya mimarisi, Smart Bidding, GMC feed optimizasyonu, Auction Insights, Editor ve Scripts`,xpReward:150,lessons:[{id:`lesson-4-1`,title:`Kampanya Mimarisi, Smart Bidding ve Auction Insights`,duration:`18 dk`,what:`Google Ads Search kampanyası mimarisi; hesap → kampanya → ad group → keyword → reklam hiyerarşisinden oluşur. Smart Bidding, Google AI'ının belirlenen hedefe (tCPA, tROAS, Max Conversions) göre otomatik teklif verdiği stratejidir. Auction Insights rakip analizi için güçlü bir araçtır.`,why:`Kötü hesap mimarisi = düşük Quality Score = yüksek CPC = bütçe israfı. Senior Google Ads yöneticisi hesap yapısını temelden doğru kurar çünkü sonradan düzeltmek çok maliyetlidir. Smart Bidding'i körü körüne açmak değil, ne zaman açacağını ve hangi hedefle açacağını bilmek kritiktir.`,realExample:`Lexus Türkiye arama kampanyası. Yanlış yapı: Tek ad group içinde 'lexus fiyat', 'lexus test sürüşü', 'lüks araba' aynı grupta. Sonuç: Genel kreatif, düşük CTR. Doğru yapı: Her intent için ayrı ad group — 'Lexus Marka' (marka aramaları, Max ROAS), 'Lexus Model' (ES/RX/NX model aramaları, tCPA 350 TL), 'Kategori' (lüks araba, rakip aramaları, manuel teklif). Auction Insights'ta Toyota ve BMW'nin impression share'i izlenir, fiyat savaşından kaçınılır.`,howItWorks:`1. Hesap yapısı: Kampanyalar hedef ve bütçeye göre ayrılır (marka/jenerik/rakip/ürün). 2. Ad group granülaritesi: SKAG (Single Keyword Ad Group) artık eskidi, tema bazlı gruplar önerilir. 3. Match type: Exact (sadece o arama), Phrase (içinde geçen), Broad (AI expand eder) — Broad + Smart Bidding güçlü kombinasyon. 4. Smart Bidding açma şartları: Min 50 conversion/ay, conversion tracking doğru kurulu, 2 hafta learning period bekle. 5. tCPA: Hedef dönüşüm başı maliyet. tROAS: Hedef reklam harcama getirisi. Max Conversions: Bütçe içinde max dönüşüm. 6. Auction Insights: Impression Share, Overlap Rate, Position Above Rate rakip analizi için — hangi rakip hangi keyword'de agresif?`,levelDiff:{junior:`Kampanyaları kurar ve yönetir. Yapılandırma best practice'lerini ve Smart Bidding zamanlamasını öğreniyor.`,mid:`Tema bazlı ad group kurar, Smart Bidding açar. Learning period yönetimi ve Auction Insights'ı derinlemesine kullanmayı öğreniyor.`,senior:`Hesap mimarisini stratejik kurar, Smart Bidding şartlarını doğrular, learning period korur, Auction Insights'tan rakip stratejisini okur ve teklif kararlarını buna göre verir.`},keyPoints:[`Smart Bidding açmadan önce şartları kontrol et: aylık 50+ conversion ve doğru tracking. Eksik veriyle AI kötü karar verir.`,`Learning period = dokunma. Smart Bidding açtıktan sonra ilk 2 haftada büyük değişiklik yapma — AI veri öğreniyor.`,`Auction Insights haftalık takip et. Rakip impression share artışı seni daha agresif bid'e zorlayabilir ya da yeni keyword fırsatı gösterir.`,`Broad match + Smart Bidding kombinasyonu düşünüldüğünden iyi çalışır — ama conversion tracking mükemmel olmalı, yoksa AI yanlış yönde öğrenir.`,`Quality Score 7+ hedefle. Düşük QS = yüksek CPC = same position için daha fazla para. QS artışı = aynı bütçeyle daha fazla trafik.`],quiz:[{id:`q-4-1-1`,type:`concept`,question:`Smart Bidding başlatmak için minimum şart nedir?`,options:[`Dönüşüm verisi olmadan da açılabilir`,`Aylık minimum 50 conversion ve doğru kurulmuş`,`En az 1.000 TL başlangıç bütçesi şart`,`Aktif bir rakibinin bulunması yeterli`],correct:1,explanation:`Smart Bidding makine öğrenmesiyle çalışır. Yeterli conversion verisi olmadan AI kaliteli sinyal alamaz ve hatalı teklif verir.`},{id:`q-4-1-2`,type:`scenario`,question:`Lexus kampanyasında Smart Bidding açtıktan 5 gün sonra CPA yükseldi. Ne yaparsın?`,options:[`Learning phase bitmeden hemen kapat, sıfırla`,`Learning phase'in 2 haftalık sürecini bekle`,`Nedeni araştırmadan direkt bütçeyi artır`,`Keyword listesinin tamamını silip yeniden oluştur`],correct:1,explanation:`Smart Bidding learning period boyunca daha yüksek CPA görebilir. 2 hafta beklemeden müdahale etmek süreci baştan başlatır ve daha uzun sürer.`},{id:`q-4-1-3`,type:`comparison`,question:`tCPA vs tROAS Smart Bidding farkı nedir?`,options:[`tCPA her zaman daha iyi sonuç verir, tROAS gereksizdir`,`tCPA: hedef dönüşüm başı maliyeti optimize eder`,`tROAS yalnızca e-ticaret sitelerinde kullanılabilir`,`İkisi de aynı algoritmayı farklı isimle kullanır`],correct:1,explanation:`Lexus gibi tek ürün odaklı lead kampanyasında tCPA mantıklı. H&M gibi geniş ürün yelpazesinde tROAS daha iyi çalışır çünkü yüksek değerli ürünlere öncelik verir.`},{id:`q-4-1-4`,type:`scenario`,question:`Auction Insights'ta rakibin impression share senden %20 fazla. Ne yaparsın?`,options:[`Hemen paniğe kapılıp karar ver`,`Rakibin üstün olduğu keyword'`,`Direkt bütçeyi 2x artır`,`Kampanyayı hemen durdur`],correct:1,explanation:`Impression share her keyword'de kazanmak zorunda değilsin. Öncelikli keyword'lerde güçlü ol, düşük değerli keyword'lerde rakiple savaşmak bütçe israfıdır.`},{id:`q-4-1-5`,type:`concept`,question:`Quality Score neden önemlidir?`,options:[`Sadece görsel kalitesi`,`Reklam alaka düzeyi + beklenen`,`Sosyal medya takipçi sayısını ölçen metrik`,`Video görüntüleme oranı`],correct:1,explanation:`Quality Score doğrudan bütçe verimliliğini etkiler. QS 7'den 9'a çıkarmak CPC'yi %15-20 düşürebilir. Reklam metni, landing page ve CTR'ı optimize et.`}]},{id:`lesson-4-2`,title:`Google Merchant Center, Editor ve Scripts`,duration:`17 dk`,what:`Google Merchant Center (GMC), e-ticaret ürün verilerini Google'a besleyen platformdur. Shopping kampanyaları GMC feed'ine dayanır. Google Ads Editor büyük hesapları offline yönetmek için masaüstü uygulamasıdır. Scripts ise Google Ads'i JavaScript ile otomatize eder.`,why:`GMC feed hataları Shopping kampanyalarını tamamen durdurabilir. 1000 ürünlü bir feed'i tek tek düzeltmek için Editor şarttır. Scripts ise rutin işleri otomatize eder — sabah 08:00'de bütçe biterse kampanya otomatik pause edilsin gibi. Bunları bilen senior, saatlerce manuel iş yapmak yerine sistemi çalıştırır.`,realExample:`Levi's Shopping kampanyası: 850 ürün GMC'ye yüklendi, 300'ü 'disapproved' oldu. Neden? 'price mismatch' — sitedeki fiyat feed'deki fiyatla uyuşmuyor. GMC feed'i supplementary feed ile güncellendi (Google Sheets bağlantısı, saatlik refresh). 2 saat içinde 280 ürün onaylandı. Script kuruldu: Aylık bütçenin %90'ı harcanınca otomatik uyarı gönderir, Slack mesajı atar. Otomasyon ve sistem kurma düşüncesi seni reaktif çalışmaktan proaktif çalışmaya taşır.`,howItWorks:`1. GMC Feed: Primary feed (tüm ürünler), Supplementary feed (güncellemeler). Zorunlu alanlar: id, title, description, link, image_link, price, availability, condition. 2. Feed hataları: Price mismatch (fiyat farklı), Missing required attribute (zorunlu alan eksik), Prohibited content. GMC Diagnostics'ten takip et. 3. Feed optimizasyonu: title'da anahtar kelime kullan ('Levi's 501 Original Fit Jeans Men Blue'), image kalitesi, structured data markup. 4. Google Ads Editor: Bulk import/export (CSV ile toplu değişiklik), offline çalışma, find & replace. 5. Google Ads Scripts: JavaScript tabanlı otomasyon. Bütçe kontrolü, otomatik pause/enable, performans alert, rapor oluşturma. 6. Rules (Automated Rules): Script bilmeden basit otomasyon — CPA X'in üstüne çıkarsa keyword pause gibi.`,levelDiff:{junior:`GMC'ye ürün yükler ve feed yönetimi yapabilir. Hata giderme ve Editor araçlarını kullanmayı geliştiriyor.`,mid:`GMC hatalarını kendisi çözer, supplementary feed kurar, Editor'de bulk değişiklik yapar.`,senior:`Feed optimizasyonunu stratejik yapar (title SEO, segment feed), Scripts ile otomasyon kurar, GMC ve Ads arasındaki akışı yönetir.`},keyPoints:[`GMC feed kalitesi = Shopping kampanya kalitesi. 'title' alanında anahtar kelime optimizasyonu CTR'ı direkt etkiler.`,`Supplementary feed güçlü silah. Ana feed'i değiştirmeden fiyat, stok, açıklama güncellemesi yapabilirsin. Google Sheets bağlantısı = gerçek zamanlı güncelleme.`,`Google Ads Editor büyük hesaplarda zorunlu. 500+ kampanya değişikliği için UI yetersizdir — Editor'de offline çalış, toplu değişiklik yap, gözden geçir, yükle.`,`Scripts alert kurulumu basit ama değerli. Bütçe bitişi, CTR düşüşü, conversion takip kopukluğu için otomatik e-posta veya Slack bildirimi kur.`,`GMC Diagnostics'i haftada bir kontrol et. Sessizce artan disapproval oranı Shopping kampanyasını yavaş öldürür.`],quiz:[{id:`q-4-2-1`,type:`concept`,question:`GMC'de 'price mismatch' hatası ne anlama gelir?`,options:[`Bütçe yetersizliği sorunu var`,`Feed fiyatı ile web sitesi fiyatı uyumsuz`,`Kreatif içerik sorunu var`,`Keyword listesindeki eksiklikten kaynaklanıyor`],correct:1,explanation:`Google kullanıcıyı doğru fiyatla buluşturmak için feed-site tutarlılığı şartı koyar. Price mismatch en yaygın GMC hatasıdır. Supplementary feed ile hızlı düzeltilir.`},{id:`q-4-2-2`,type:`scenario`,question:`Levi's için 1200 ürünlü Shopping kampanyasında toplu fiyat güncellemesi gerekiyor. Nasıl yaparsın?`,options:[`Her ürünü tek tek güncelle`,`Google Ads Editor'de bulk edit`,`Teknik sorunu çözmesi için developer'a ilet`,`Kampanyayı tamamen kapatarak dur`],correct:1,explanation:`Editor + supplementary feed kombinasyonu büyük ölçekli güncellemeler için doğru yaklaşım. Manuel tek tek güncelleme saat alır ve hata riskini artırır.`},{id:`q-4-2-3`,type:`comparison`,question:`Google Ads Automated Rules vs Scripts farkı nedir?`,options:[`Scripts her zaman daha iyi, Automated Rules yetersiz kalır`,`Automated Rules: kod gerektirmez, basit kural tanımı`,`Automated Rules daha güçlüdür çünkü Google tarafından yönetilir`,`İkisi de aynı işi yapar, sadece arayüz farkı vardır`],correct:1,explanation:`Basit otomasyon için Rules yeterli. Karmaşık senaryolar, raporlama veya dış entegrasyon için Scripts gerekir.`},{id:`q-4-2-4`,type:`concept`,question:`Shopping kampanyasında feed 'title' optimizasyonu neden önemlidir?`,options:[`Yalnızca görsel estetik açıdan önem taşır`,`Title, Google'ın arama eşleştirmesinde birincil`,`Ürün fiyatlandırmasını doğrudan etkileyen faktör`,`Ürün stok miktarını doğrudan etkileyen unsur`],correct:1,explanation:`Shopping'de keyword bidding yoktur — Google feed'den otomatik eşleştirir. Title ne kadar bilgi içerirse o kadar doğru sorguya çıkar.`},{id:`q-4-2-5`,type:`scenario`,question:`Sabah işe geldin, Shopping kampanyasının gece bütçe bittiğini fark ettin. Çözüm?`,options:[`Bütçeyi artır ve devam et`,`Kısa vadeli: bütçeyi artır`,`Herhangi bir aksiyon almadan süreci bekle`,`Kampanyayı tamamen kapatarak dur`],correct:1,explanation:`Reaktif değil proaktif ol. Script kurulumu bir kez yapılır, tekrar yaşanmasını önler. Senior bunu sistem olarak kurar, her sabah kontrol etmez.`}]}]},{id:`module-5`,phase:2,icon:`▶️`,title:`Google Ads: YouTube, Display & PMax`,description:`YouTube ad formatları, video bidding stratejileri, Performance Max asset groups ve audience signals`,xpReward:150,lessons:[{id:`lesson-5-1`,title:`YouTube Ad Formatları ve Video Bidding`,duration:`16 dk`,what:`YouTube reklamları TrueView (atlayabilir in-stream), Non-skippable in-stream, Bumper (6 sn), In-feed ve Masthead formatlarından oluşur. Her format farklı hedef için optimizedir. Video bidding stratejileri CPV (maliyet/izleme), CPM ve Target CPV içerir.`,why:`YouTube, Türkiye'de en çok izlenen video platformu. Lexus gibi premium markalar için hikaye anlatımı Google Search'te mümkün değil — video şarttır. Doğru format seçimi ve bidding stratejisi olmadan video bütçesi boşa gider.`,realExample:`Puma yeni sezon lansman. YouTube stratejisi: 1) Masthead (ana sayfada 1 gün, 15M impression) = lansman günü maksimum görünürlük. 2) Non-skippable 15 sn (yeni ürün hikayesi) = mesaj garanti iletimi. 3) Bumper 6 sn (hafta boyunca reminder) = frekans artışı. 4) TrueView for Action (ürün sayfasına yönlendirme) = intent kitlesi. Brand Lift Study kuruldu — kampanya sonrası marka bilinirliği +14 puan arttı.`,howItWorks:`1. TrueView In-Stream: 5 sn sonra atlanabilir. CPV ile çalışır — 30 sn izleyene ödeme yaparsın. İlk 5 saniye kritik. 2. Non-skippable: 15-30 sn, atlanamaz. CPM. Garantili izlenme — mesaj mutlaka iletilir. 3. Bumper: 6 sn, atlanamaz. CPM. Frekans artırma ve reminder için ideal. 4. TrueView for Action: CTA butonu + landing page. tCPA veya Maximize Conversions. Dönüşüm odaklı. 5. In-feed: YouTube arama sonuçları ve öneriler. Thumbnail + başlık önemli. 6. Brand Lift Study: Kampanyanın marka algısına etkisini ölçer — awareness, recall, favorability, purchase intent. 7. Video reach campaigns: Bumper + Non-skippable mix, frekans kap hedefi.`,levelDiff:{junior:`TrueView ile başlar. Video format seçimini ve performans metriklerinin anlamını öğreniyor.`,mid:`Format seçimini amaçla eşleştirir. Brand Lift Study kurar. Video retention raporuna bakar.`,senior:`Multi-format strateji kurar, Brand Lift ile marka etkisini ölçer, video hook analizini creative ekibiyle paylaşır, bütçeyi faza göre kaydırır.`},keyPoints:[`TrueView'da ilk 5 saniye hayati. Kullanıcı bu 5 saniyede atlar veya izler. Marka ve mesaj 5 saniyede verilmeli.`,`Bumper + Non-skippable kombinasyonu frekans için güçlü. Ayrı ayrı değil, birlikte planla.`,`Brand Lift Study, video kampanya ROI'unu kanıtlar. Müşteriyle 'YouTube işe yaradı mı?' tartışmasında en güçlü argüman.`,`Video retention raporu: İzleyicinin videonun hangi saniyesinde çıktığını gösterir. Düşüşün olduğu saniye = içerik problemi.`,`YouTube remarketing: Kanalı izleyenler, belirli video izleyenler. Bu audience Google Search veya Display'de kullanılabilir — video + search kombinasyonu güçlü.`],quiz:[{id:`q-5-1-1`,type:`concept`,question:`TrueView In-Stream reklamda ücret ne zaman ödenir?`,options:[`Her gösterimde ücret kesilir`,`30 saniye izlenince veya`,`Her tıklamada ücret kesilir`,`Video sonunda ücret kesilir`],correct:1,explanation:`TrueView'ın avantajı budur: ilgilenmeyenler atlarsa ödeme yapmıyorsun. Bu yüzden 30 saniyeye kadar izletmek kaliteli audience sinyali verir.`},{id:`q-5-1-2`,type:`scenario`,question:`Lexus için garantili mesaj iletimi gerekiyor, atlanabilir olmaz. Hangi format?`,options:[`TrueView In-Stream formatı bu amaç için idealdir`,`Non-skippable In-Stream (15-30 sn)`,`In-feed video formatı daha uygun seçenek`,`YouTube Masthead formatı en etkili seçenek`],correct:1,explanation:`Premium markalarda garantili mesaj iletimi önemlidir. Non-skippable format, Lexus gibi markalar için brand campaign'in çekirdek formatıdır.`},{id:`q-5-1-3`,type:`comparison`,question:`Bumper Ads vs TrueView for Action farkı ve kullanım amacı?`,options:[`Bumper ve TrueView aynı amaçla kullanılır`,`Bumper (6sn, atlanamaz) = frekans/reminder`,`TrueView her zaman daha düşük maliyetlidir`,`Bumper yalnızca mobilde çalışır`],correct:1,explanation:`Bumper awareness ve frekans için, TrueView for Action conversion için. Lexus kampanyasında: non-skippable hikaye + bumper reminder + TrueView for Action showroom formu.`},{id:`q-5-1-4`,type:`concept`,question:`Brand Lift Study nedir?`,options:[`Satış performansındaki artışı gösteren rapor türü`,`Google'ın video kampanyasının marka algısına`,`CTR raporu değeri kullan`,`Kampanya harcamalarını raporlamak için kullanılır`],correct:1,explanation:`Brand Lift, 'YouTube işe yaradı mı?' sorusunu cevaplar. Sadece view sayısı değil, gerçek marka etkisi ölçülür. Müşteriyle ROI tartışmasında kritik.`},{id:`q-5-1-5`,type:`scenario`,question:`YouTube videosunun %70'i 8. saniyede çıkıyor. Bu ne anlama gelir, ne yaparsın?`,options:[`Frekans normal aralıkta, değiştirme gerek yok`,`8. saniyede içerikte bir şey izleyiciyi`,`Nedeni araştırmadan direkt bütçeyi artır`,`Farklı audience segmenti deneyerek hedeflemeyi değiştir`],correct:1,explanation:`Video retention raporu creative optimizasyonunun en değerli kaynağıdır. Düşüşün olduğu saniye = izleyicinin ilgisini kaybettiği an. Bunu creative ekibiyle paylaş.`}]},{id:`lesson-5-2`,title:`Performance Max: Asset Groups ve Audience Signals`,duration:`17 dk`,what:`Performance Max (PMax), tek bir kampanyadan Google'ın tüm envanterinde (Search, Shopping, YouTube, Display, Gmail, Maps) otomatik reklam yayınlayan yapay zeka odaklı kampanya tipidir. Asset groups, Audience Signals ve Search Themes ile yönlendirme yapılır.`,why:`PMax 2023-2025 döneminde Google'ın en öncelikli kampanya tipi haline geldi. UM gibi global ajanlarda müşteriler PMax istiyor çünkü Google satıyor. Ama PMax körü körüne açmak bütçeyi yanlış kanallara dağıtabilir. Nasıl yönlendireceğini bilmek kritik.`,realExample:`H&M yaz koleksiyonu için PMax. Yanlış kurulum: Tek asset group, signal yok. Sonuç: Bütçenin %60'ı Gmail'e gitmiş (düşük conversion değeri). Doğru kurulum: 3 asset group (Elbise, Denim, Aksesuarlar), Her gruba ilgili görseller/metinler, Audience signal olarak 'site ziyaretçisi' ve 'sepete ekleyen' hedefleme, Search themes 'yazlık elbise' 'denim şort'. Sonuç: Gmail %8'e düştü, Shopping %45, Search %30, YouTube %17. ROAS 3.1x'ten 4.8x'e çıktı.`,howItWorks:`1. Asset Groups: Ürün/tema bazlı gruplar. Her grupta: başlıklar (15), açıklamalar (5), görseller (min 3 format), logolar, videolar. 2. Audience Signals: AI için başlangıç sinyali — kendi site ziyaretçileri, custom segment (web arayanlar), remarketing listesi. Signal zorunlu değil ama önerilir. 3. Search Themes: PMax'in Search ağında ne aratılanlar için çıkacağını yönlendirir. Max 25 tema. 4. Asset performance: Asset'lerin 'Best', 'Good', 'Low' performansı görülebilir. Düşük performanslı asset'leri değiştir. 5. Campaign priority: PMax vs Standard Shopping çakışması — PMax genelde öncelik alır. Belirli ürünler için Standard Shopping ayrı kur. 6. Insights: Arama term verileri sınırlı ama Campaign Insights sayfasında temalar görülür.`,levelDiff:{junior:`PMax kampanyalarını açabilir. Signal ekleme ve asset group optimizasyonunu öğreniyor.`,mid:`Çoklu asset group kurar, audience signal ekler. Bütçe dağılımını ve kanal optimizasyonunu analiz etmeyi geliştiriyor.`,senior:`Asset group stratejisini marka mimarisine göre kurar, search themes optimize eder, PMax vs Standard Shopping kararını verir, kanal dağılımını izler, asset performansını düzenler.`},keyPoints:[`PMax'te kontrol sınırlı ama Audience Signals ve Search Themes ile AI'ı doğru yönlendirme yapabilirsin.`,`Asset group = kampanya içinde mini kampanya. Her ürün kategorisine ayrı asset group, ilgili görseller ve metinler.`,`PMax'in en büyük riski bütçeyi yanlış kanallara dağıtması. Campaign Insights'tan kanal dağılımını izle, bütçenin nereye gittiğini bil.`,`Audience Signal ≠ hedefleme. AI, sinyalin dışına çıkabilir. Bu bir başlangıç noktasıdır, kısıtlama değil.`,`Standard Shopping + PMax birlikte kullanılabilir. PMax genel, Standard Shopping belirli öncelikli ürünler için. Priority ayarını doğru yap.`],quiz:[{id:`q-5-2-1`,type:`concept`,question:`Performance Max Audience Signal ne işe yarar?`,options:[`Audience hedeflemeyi tamamen kilitleyip sabitler`,`AI'a başlangıç sinyali verir`,`Kampanya bütçesini doğrudan etkileyen parametre`,`Google Search ağı gösterimlerini tamamen kapatır`],correct:1,explanation:`Audience Signal AI'ı yönlendirir ama kısıtlamaz. Site ziyaretçisi veya custom segment signal olarak eklemek öğrenme sürecini hızlandırır.`},{id:`q-5-2-2`,type:`scenario`,question:`PMax kampanyasında bütçenin %70'i Gmail'e gidiyor, conversion düşük. Ne yaparsın?`,options:[`Herhangi bir değişiklik yapmadan devam et`,`Asset group'lara daha iyi görseller`,`Kampanyayı tamamen kapatarak dur`,`Gmail'i ayrı kampanyaya taşı`],correct:1,explanation:`PMax bütçe dağılımını otomatik yapar. Signal ve asset kalitesi düşükse AI düşük değerli kanallara kayar. Signal güçlendirme ve asset optimizasyonu yönü düzeltir.`},{id:`q-5-2-3`,type:`comparison`,question:`PMax ile Standard Shopping birlikte kullanılırken doğru yaklaşım nedir?`,options:[`Sadece PMax kur; Standard Shopping artık rekabetçi değil`,`PMax genel catalog ve geniş hedefleme için; Standard Shopping yüksek marjlı veya kritik ürünlerin kontrolü için`,`Standard Shopping her zaman PMax'ten daha iyi dönüşüm oranı verir`,`İkisi aynı anda çalışırsa budget çakışması olur, biri kapatılmalı`],correct:1,explanation:`İkisi birlikte kullanılabilir. PMax genel catalog ve AI optimizasyonu için, Standard Shopping kritik ürünlerde tam kontrol ve görünürlük için. Priority ayarıyla PMax önce devreye girer; Standard Shopping spesifik ürün gruplarında ayrı çalıştırılabilir.`},{id:`q-5-2-4`,type:`concept`,question:`PMax Search Themes ne işe yarar?`,options:[`Search ağında negatif keyword listesi oluşturur`,`PMax'in Search ağında hedeflenmesini istediğin sorgu temalarını sisteme sinyal olarak iletir`,`Kampanya toplam harcamasını belirli bir limite kilitler`,`Rakip marka keyword'lerini otomatik olarak engeller`],correct:1,explanation:`Search Themes, PMax'in Search inventory'sinde doğru sorguları yakalamasını sağlar. Kısıtlama değil, yönlendirme sinyali verir — algoritmaya hangi sorgu temalarına yoğunlaşması gerektiğini bildirir.`},{id:`q-5-2-5`,type:`scenario`,question:`H&M için PMax'e 5000 TL bütçe verdik. Hangi asset group yapısı doğru?`,options:[`Tek asset group, tüm ürünler`,`En az 3 asset group: Kadın Giyim`,`100 farklı asset group oluşturarak test yap`,`Asset group ekleme, daha basit`],correct:1,explanation:`Tema bazlı asset group = her segmente özel mesaj = daha iyi relevance = daha iyi performance. Tek group ile AI her şeyi birbirine karıştırır.`}]}]},{id:`module-6`,phase:2,icon:`👥`,title:`Meta Ads Manager`,description:`Advantage+ Shopping, Events Manager, Custom Conversions, CAPI kurulumu, hook rate ve hold rate analizi`,xpReward:150,lessons:[{id:`lesson-6-1`,title:`Advantage+ Shopping, Events Manager ve CAPI`,duration:`18 dk`,what:`Meta Ads Manager'da Advantage+ Shopping Campaigns (ASC), AI'ın reklam hedeflemesini, yerleşimini ve teklifini minimum kısıtlamayla otomatize ettiği kampanya tipidir. Events Manager, Meta pixel ve CAPI üzerinden gelen dönüşüm verilerini yönetir. Custom Conversions ise standart event'lerin ötesinde özel dönüşüm tanımlamasına olanak verir.`,why:`Meta'nın algoritması veriyi sever. Kısıtladıkça kötüleşir. Advantage+ kampanyaları doğru veriyle çalıştığında manuel kampanyaları ROAS bazında geçebilir. iOS 14 sonrası CAPI kurmayan hesaplar kör uçuyor — optimizasyon verisi eksik, kampanya zayıflıyor.`,realExample:`Sandro e-ticaret hesabı. Yanlış: Dar hedefleme (25-40 kadın, moda interest, Türkiye), manuel placement (sadece Instagram feed). Sonuç: ROAS 2.1x. Doğru: ASC kuruldu, hedefleme AI'a bırakıldı, sadece ürün kataloğu ve Creative yüklendi. CAPI Events Manager'da 'Activate' edildi, event match quality 8/10. 3 hafta sonra ROAS 4.3x. AI Advantage+ ile keşfettiği audience: 35-55 kadın Ankara ve İstanbul, daha önce hiç hedeflemediğimiz segment.`,howItWorks:`1. Advantage+ Shopping: Kampanya hedefi = Sales. Ürün kataloğu bağla. Hedefleme: Sadece ülke seç, geri kalanı AI'a bırak. Creative: En az 5-7 farklı creative yükle. Budget: Günlük veya yaşam boyu. 2. Events Manager: Data Sources → Pixel veya CAPI. Event'leri kontrol et: ViewContent, AddToCart, InitiateCheckout, Purchase. Event match quality 7+ hedefle. 3. Custom Conversions: Standart event'lerin URL parametreleri veya event parametreleriyle özelleştirilmesi. 'Sadece X kategorisinden satın alma' veya 'belirli ürünü sepete ekleme' gibi. 4. CAPI kurulumu: Events Manager → Conversions API → Setup. Partner entegrasyonu (Shopify, WooCommerce) veya manuel API. Deduplication key ekle — aynı event iki kez sayılmasın. 5. Offline event mapping: Mağaza satışlarını Meta'ya aktar — fiziksel satışın hangi dijital reklamdan etkilendiğini gör.`,levelDiff:{junior:`Temel hedefleme kurulumlarını yapar. Audience genişletme stratejilerini ve Events Manager troubleshooting'i öğreniyor.`,mid:`ASC dener, CAPI kurar. Event match quality optimizasyonu ve custom conversion yönetimini geliştiriyor.`,senior:`ASC ile manuel kampanya hibrit stratejisi kurar (ASC genel, manuel retargeting), event match quality 8+ sağlar, custom conversion ile funnel aşamalarını ayrı ölçer.`},keyPoints:[`Advantage+ algoritmayı kısıtlamadan çalıştır. Çok dar audience, çok fazla kural = AI'ın potansiyelini yok eder.`,`Event Match Quality 7 altındaysa CAPI optimizasyon sağlamaz. EMQ'yu artırmak için email, phone number hash göndermen gerekir.`,`Custom Conversions ile farklı ürün kategorilerini ayrı ölç. 'Puma ayakkabı satışı' vs 'Puma aksesuar satışı' ayrı raporlanabilir.`,`CAPI browser pixel ile birlikte çalışmalı, biri yerine değil. Deduplication key olmadan aynı satış iki kez sayılır.`,`ASC test etmek için mevcut bütçenin %20-30'unu ayır, 2 hafta sonra mevcut kampanyayla karşılaştır. Veri konuşsun.`],quiz:[{id:`q-6-1-1`,type:`concept`,question:`Advantage+ Shopping Campaigns'in temel farkı nedir?`,options:[`Daha ucuz değeri kullan`,`AI'ın hedefleme, yerleşim ve teklif kararlarını`,`Yalnızca Instagram'da çalışır, diğer platformlarda geçerli değildir`,`Manuel kontrol daha fazla`],correct:1,explanation:`ASC'nin gücü AI'ın geniş alanda öğrenmesinden gelir. Dar hedefleme AI'ı kısıtlar. Doğru veri ve iyi creative varsa ASC manuel kampanyaları geçer.`},{id:`q-6-1-2`,type:`scenario`,question:`Events Manager'da Purchase event'inin match quality skoru 4/10. Nasıl artırırsın?`,options:[`Mevcut durumu değiştirmeden olduğu gibi bırak`,`CAPI'ye ek parametre gönder: email hash`,`Kampanyayı tamamen kapatarak dur`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Event Match Quality düşükse CAPI verisi optimizasyona az katkı sağlar. Kişisel veri hash'leri (email, telefon) EMQ'yu dramatik artırır.`},{id:`q-6-1-3`,type:`comparison`,question:`Meta Pixel vs CAPI — birlikte mi yoksa biri yerine mi kullanılmalı?`,options:[`Pixel tek başına yeterlidir, CAPI gereksiz karmaşıklık katar`,`İkisi birlikte: Pixel browser tarafı (hızlı ama kısıtlı)`,`CAPI yalnızca iOS14+ sorunu yaşayan hesaplar için gereklidir`,`İkisi birbirinin alternatifi, aynı anda kullanılmamalıdır`],correct:1,explanation:`Pixel + CAPI kombinasyonu en güvenilir tracking altyapısıdır. Biri olmadan eksik veri, AI'ın optimizasyonu zayıflar.`},{id:`q-6-1-4`,type:`scenario`,question:`ASC açtın, 2 hafta geçti, ROAS manuel kampanyadan düşük. Ne yaparsın?`,options:[`Learning phase bitmeden hemen kapat, sıfırla`,`En az 5-7 farklı kreatif format ekle ve optimize et`,`Nedeni araştırmadan direkt bütçeyi artır`,`Audience'ı daraltıp daha spesifik hedefleme kur`],correct:1,explanation:`ASC'nin öğrenme süreci 2-3 hafta alabilir. Erken karar vermek yanıltıcı. Creative çeşitliliği ve yeterli veri ASC'nin motoru.`},{id:`q-6-1-5`,type:`concept`,question:`Meta Custom Conversions ne zaman kullanılır?`,options:[`Her zaman standart event yeterli`,`Standart event dışında özel dönüşüm tanımlamak`,`Sadece büyük hesaplarda`,`Yalnızca iOS cihazlarını hedefleyen kampanya için`],correct:1,explanation:`Custom Conversion granülerlük sağlar. 'Puma 500 TL üzeri satın alma' vs 'genel satın alma' ayrı ölçülürse premium segment optimizasyonu yapılabilir.`}]},{id:`lesson-6-2`,title:`Creative Reporting: Hook Rate, Hold Rate ve Fatigue`,duration:`16 dk`,what:`Hook Rate, videonun ilk 3 saniyesini izleyen kullanıcı oranıdır. Hold Rate ise videonun tamamını izleyenlerin oranı. Bu iki metrik creative kalitesini ölçer. Creative Fatigue, aynı kitleye aynı reklamın çok gösterilmesinden kaynaklanan performans düşüşüdür.`,why:`Meta'da reklamın en kritik değişkeni içeriktir. Hedefleme, teklif, bütçe hepsini doğru yapsan bile zayıf creative kampanyayı öldürür. Hook rate ve hold rate bakmasını bilen performans pazarlamacısı creative ekibine somut feedback verebilir — bu beceri seni hem stratejik hem operasyonel düşünen bir performans uzmanı yapar.`,realExample:`Puma video kampanyası. 3 farklı kreativ: A — Ürün close-up, B — Sporcu koşarken, C — 'Bu ayakkabı neden farklı?' sorusuyla başlıyor. Hook rate: A %24, B %31, C %58. Hold rate: A %12, B %18, C %34. C açık fark lider. Neden? Soru başlığı merak uyandırdı, kullanıcı cevabı bekliyor. Creative ekibe feedback: 'Hook'ta soru veya dramatic claim kullanın.' Sonraki round: hook rate ortalaması %49'a çıktı.`,howItWorks:`1. Meta Ads Manager → Columns → Customize → Video metrikleri ekle: ThruPlay, 3-second video views, video average play time. 2. Hook Rate hesaplama: (3-saniye görüntülenme / Toplam gösterim) × 100. İyi hook rate: %25+ (story), %30+ (feed). 3. Hold Rate: (ThruPlay veya 75%+ izleme / 3-saniye izleme) × 100. İyi hold rate: %15+. 4. Creative Fatigue sinyalleri: CPM artıyor, CTR düşüyor, frequency 5+. Çözüm: Yeni creative ekle, mevcut creative rotate et, audience genişlet. 5. Creative test cadence: Her 2 haftada en az 2 yeni creative test et. Düşük performanslı pause et, iyiyi scale et. 6. Lexus için creative insight: Premium marka = yüksek prodüksiyon kalitesi önemli. H&M için: UGC (user generated content) style daha iyi hook verebilir.`,levelDiff:{junior:`Temel performans metriklerini takip eder. Video metrikleri ve creative performansı arasındaki bağı keşfediyor.`,mid:`Hook rate bakar, düşük performanslı creative pause eder. Kök neden analizini ve veri destekli creative kararlarını geliştiriyor.`,senior:`Hook rate + hold rate + CPM trendini birlikte analiz eder, creative ekibine spesifik brief verir, test cadence'ı yönetir, fatigue önlemek için rotasyon sistemi kurar.`},keyPoints:[`Hook rate %25 altındaysa creative problemi var. İzleyici ilk 3 saniyede ilgisini kaybediyor. İlk karede marka veya güçlü mesaj göster.`,`Hold rate düşükse (hook iyi ama hold düşük) = başlangıç iyi ama içerik vaat ettiğini veremiyor. İlk saniye ile video geri kalanı tutarlı olmalı.`,`Frequency 5 geçince fatigue sinyali güçlü. Aynı kitleye aynı kreativ 5+ kez göstermek CPM'i artırır, CTR'ı düşürür.`,`Creative feedback döngüsü kur: Data → insight → creative brief → yeni creative → test. Bu döngü haftalık veya 2 haftada bir çalışmalı.`,`UGC ve authentic content, özellikle genç kitlede (H&M, Puma) yüksek prodüksiyon değerine göre daha iyi hook rate verebilir.`],quiz:[{id:`q-6-2-1`,type:`concept`,question:`Hook Rate nasıl hesaplanır ve referans değer nedir?`,options:[`Tıklama sayısını gösterim sayısına böl`,`(3-saniye video görüntülenme /`,`Toplam izlenme / tıklama`,`ThruPlay'i tıklama sayısına oranla`],correct:1,explanation:`Hook rate, creativenin ilk 3 saniyesinin ne kadar ilgi çektiğini ölçer. %30 altındaysa kitle veya hook zayıf — her ikisi de kontrol edilmeli.`},{id:`q-6-2-2`,type:`scenario`,question:`H&M video: Hook rate %42 (iyi) ama hold rate %8 (çok düşük). Sorunu nasıl tanımlarsın?`,options:[`Her şey normal görünüyor, aksiyon alma`,`Başlangıç ilgi çekiyor ama video içeriği vaat`,`Farklı audience segmenti deneyerek hedeflemeyi değiştir`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`İyi hook + düşük hold = tease ediyor ama içerik tutmuyor. Bu spesifik insight creative ekibine değerli brief verir. Sadece 'creative kötü' değil, 'hold rate düşük, nedenini analiz et' de.`},{id:`q-6-2-3`,type:`comparison`,question:`Creative fatigue sinyalleri: CPM artışı vs CTR düşüşü — hangisi önce görülür?`,options:[`CTR önce düşer, CPM değişmez; ikisi birlikte görülmez`,`CPM önce: sistem yorgun audience'a ulaşmak için daha`,`CPM düşer çünkü sistem daha verimli hale gelir`,`İkisi de aynı anda görülür ama birbirini etkilemez`],correct:1,explanation:`Fatigue döngüsü: yüksek frekans → CTR düşüşü → kalite skoru düşüşü → CPM artışı. Frequency'i izle, 5 geçince yeni creative devreye al.`},{id:`q-6-2-4`,type:`scenario`,question:`Maje kampanyasında 3 creative var, hepsi 3 haftadır yayında, frequency 7.2. Ne yaparsın?`,options:[`Devam et değeri kullan`,`Yeni creative ekle (en az 2-3)`,`Audience'ı daraltarak daha spesifik hedefleme kur`,`Performansı daha fazla ölçmeden bütçeyi düşür`],correct:1,explanation:`Frequency 7 = kitle bu reklamı 7 kez gördü. Fatigue çok yüksek. Yeni creative öncelikli çözüm, audience genişletme ikincil.`},{id:`q-6-2-5`,type:`concept`,question:`Creative test cadence ne olmalı?`,options:[`Ayda bir kez creative yenilemek yeterlidir`,`Her 2 haftada en az 2 yeni creative test et`,`Sadece campaign başlangıcında`,`Her gün farklı bir creative yayına al`],correct:1,explanation:`Creative test ritmi kritik. Çok seyrek = fatigue birikir. Çok sık = veri toplanmadan karar verilir. 2 haftada bir en sağlıklı kadans.`}]}]},{id:`module-7`,phase:2,icon:`🎯`,title:`GMP: SA360, DV360 & CM360`,description:`UM gibi global ajansların kullandığı Google Marketing Platform: cross-engine search, programatik satın alma, ad serving ve merkezi attribution`,xpReward:150,lessons:[{id:`lesson-7-1`,title:`SA360 ile Cross-Engine Arama Yönetimi`,duration:`17 dk`,what:`Search Ads 360 (SA360), Google Ads, Microsoft Advertising (Bing), Yahoo ve diğer arama motorlarını tek platformdan yönetmeyi sağlayan enterprise search marketing aracıdır. Floodlight tag sistemi, cross-engine teklif stratejileri ve merkezi raporlama sunar.`,why:`UM gibi global ajanlarda Lexus gibi markalar sadece Google'da değil, Bing, Yahoo ve yerel motorlarda da arama yapan müşterilere ulaşmak ister. SA360 olmadan her motoru ayrı yönetmek hem zaman alıcı hem de tutarsız sonuçlar doğurur. Floodlight attribution sistemi ise cross-platform dönüşüm ölçümünde Google Ads'ten daha güçlüdür.`,realExample:`Lexus Türkiye arama kampanyası. SA360 öncesi: Google Ads 15 saat/hafta, Bing Ads 5 saat/hafta ayrı yönetim. Floodlight kurulmadan önce Bing'in Google'a assist katkısı görülmüyordu. SA360 sonrası: Tek platformdan tüm motorlar. Cross-engine Smart Bidding: Kullanıcı Bing'de 'lexus test sürüşü' arattı ama Google'da form dolduracak — SA360 bu yolculuğu görüp Bing teklifini buna göre optimize eder. Haftalık yönetim süresi %40 düştü.`,howItWorks:`1. SA360 Hesap Yapısı: Manager account → Advertiser → Engine account (Google, Bing, Yahoo). 2. Floodlight Tag: CM360'a bağlı universal conversion tag. Hangi platformdan gelirse gelsin aynı Floodlight kaydeder. Cross-engine attribution mümkün. 3. SA360 Bidding: Target CPA, Target ROAS, Budget bid strategies — tüm motorlarda tek strateji. AI cross-engine veriyi kullanır. 4. Bulksheets: Tüm hesaplarda toplu değişiklik. Google Ads Editor gibi ama tüm motorlar için. 5. Reporting: Cross-engine unified rapor — Google + Bing + Yahoo yan yana karşılaştırma. 6. Inventory Management: SA360 store visits, offline conversion import da destekler.`,levelDiff:{junior:`Google Ads'te kampanyalarını yönetir. SA360 gibi enterprise araçları keşfetme aşamasında.`,mid:`SA360'a erişimi varsa raporlara bakar. Bidding stratejisi kurmaz.`,senior:`SA360'da cross-engine campaign kurar, Floodlight attribution analiz eder, cross-engine Smart Bidding ile tüm motorları optimize eder, performans raporunu müşteriye sunar.`},keyPoints:[`Floodlight SA360'ın kalbidir. Google Ads conversion tag'ından daha güçlü — tüm motorlarda tek conversion ölçümü sağlar.`,`Cross-engine Smart Bidding, SA360'ın en değerli özelliği. Google Ads'te Smart Bidding sadece Google'ı görür, SA360'da tüm motoru görür.`,`SA360 UM gibi global ajanlarda standart. Müşteriyle toplantıda SA360 raporlarını gösterebilmek profesyonellik göstergesidir.`,`Bulksheets ile büyük ölçekli değişiklikler tüm motorlarda eş zamanlı yapılabilir. 1000 keyword bid güncellemesi 10 dakika.`,`SA360 ve Google Ads arasında veri farkı olabilir. Attribution model farklılıkları (Floodlight vs Google Ads conversion) — raporlamada hangisini kullandığını müşteriye söyle.`],quiz:[{id:`q-7-1-1`,type:`concept`,question:`SA360'ın Google Ads'ten en önemli farkı nedir?`,options:[`Daha ucuz değeri kullan`,`Multiple search engine yönetimi (Google+Bing+Yahoo)`,`Kullanımı kolay arayüzü nedeniyle tercih edilen platformdur`,`Yalnızca display formatında reklam göster`],correct:1,explanation:`SA360'ın core value'su cross-engine yönetim ve unified attribution. Sadece Google kullananlar için SA360'ın avantajı sınırlı, çok motorlu stratejide fark büyük.`},{id:`q-7-1-2`,type:`scenario`,question:`Bing'de Lexus aramaları var ama SA360 olmadan bu veriye bakamıyorsun. Müşteriye ne önerirsin?`,options:[`Bing kanalını tamamen görmezden gel`,`SA360 veya en azından Bing Ads +`,`Google Search bütçeyi artır`,`TikTok platformunu alternatif olarak dene`],correct:1,explanation:`Premium markalarda Bing genellikle değerli kitle taşır (daha yaşlı, daha yüksek gelir). Görmemek = yönetememek. SA360 cross-engine görünürlük sağlar.`},{id:`q-7-1-3`,type:`comparison`,question:`Floodlight tag vs Google Ads Conversion Tag farkı?`,options:[`Google Ads Conversion Tag her platformda çalışır, Floodlight yalnızca video için`,`Floodlight: CM360 bazlı, cross-platform evrensel dönüşüm takibi`,`İkisi de aynı dönüşümleri ölçer, teknik fark yoktur`,`Floodlight artık kullanımdan kaldırıldı, Conv. Tag kullanılmalı`],correct:1,explanation:`Floodlight GMP ekosisteminin birleştirici unsurudur. SA360 araması + DV360 display + CM360 banner'ı aynı dönüşüme katkı sağladıysa Floodlight bunu görür.`},{id:`q-7-1-4`,type:`concept`,question:`SA360 Bulksheets ne işe yarar?`,options:[`Otomatik kampanya raporları oluşturmak için`,`Tüm engine hesaplarında toplu değişiklik`,`Reklam kreatiflerini platforma yüklemek için`,`Hedef kitle segmentleri oluşturmak için`],correct:1,explanation:`Bulksheets, büyük ölçekli hesaplarda verimliliği dramatik artırır. 1000 keyword'ü tüm motorlarda güncellemek bir Bulksheet ile dakikalar alır.`},{id:`q-7-1-5`,type:`scenario`,question:`SA360 raporu ile Google Ads raporu arasında conversion sayıları farklı. Müşteri soruyor. Cevabın?`,options:[`SA360'ın hatalı veri çektiğini varsay`,`Attribution model farklılığından`,`Google Ads daha doğru`,`Kampanyayı analiz etmeden tamamen durdur`],correct:1,explanation:`Veri farkı teknik bir gerçek. Müşteriyle hangi veri kaynağını temel alacağınızı baştan belirleyin ve tutarlı kalın.`}]},{id:`lesson-7-2`,title:`DV360 Programatik Satın Alma ve CM360 Ad Serving`,duration:`18 dk`,what:`Display & Video 360 (DV360), Google'ın demand-side platform'udur (DSP). Premium publisher inventory'ye, Private Marketplace (PMP) anlaşmalarına ve open exchange'e erişim sağlar. Campaign Manager 360 (CM360) ise tüm reklam gösterimlerini yöneten, frekansı kontrol eden ve attribution yapan ad server'dır.`,why:`Standart Google Display ağı herkese açık düşük kaliteli inventory içerebilir. DV360 ile premium yayıncıların (Hürriyet, NTV, CNN Türk gibi) envanterini programatik olarak satın alabilirsin. CM360 olmadan farklı platformlardaki impression frekansını kontrol edemezsin — aynı kullanıcıya hem Google hem Meta hem DV360'tan 20 kez reklam gösterebilirsin.`,realExample:`Maje Türkiye marka kampanyası. Hedef: premium Türk yayıncılarında görünürlük. Google Display = Hürriyet.com garanti değil. DV360 PMP deal: Hürriyet, Milliyet ve NTV ile doğrudan PMP anlaşması yapıldı — garantili placement, brand safe environment. CM360 frekans kap: kullanıcı başına günde max 3 impression. Sonuç: Görünürlük kalitesi %68'e çıktı (open exchange'de %34'tü). Marka algısında anlamlı artış.`,howItWorks:`1. DV360 yapısı: Advertiser → Insertion Order (IO) → Line Item → Creative. IO = bütçe ve kampanya bazı. Line Item = hedefleme ve inventory. 2. Inventory types: Open auction (RTB), Private Marketplace (PMP — özel anlaşma), Preferred deals, Programmatic Guaranteed (PG — sabit fiyat, garantili impression). 3. Audience: 1st party (Floodlight), Google audience, custom list upload. 4. Brand Safety: Category exclusion, content filter, 3rd party verification (DoubleVerify, IAS). 5. CM360 kurulumu: Tüm reklam kanallarından gelen impressionları ve click'leri CM360 üzerinden serve et. Floodlight tag conversion ölçer. 6. Frekans yönetimi: CM360'ta cross-channel frekans kap koy — kullanıcı Meta'da 3, Google'da 2, DV360'ta 2 görür, toplamda 7 ile sınırlı.`,levelDiff:{junior:`Display ağlarını tanır. DV360 ve CM360 gibi programatik platformları öğrenme sürecinde.`,mid:`DV360'ta kampanya kurar, CM360'ı kullanır. PMP ve ileri düzey programatik stratejileri öğreniyor.`,senior:`PMP deal yönetir, brand safety ayarlarını kurar, CM360 ile cross-channel frekans yönetir, attribution raporu oluşturur, viewability optimize eder.`},keyPoints:[`DV360 premium inventory için güçlü ama pahalı. Open exchange vs PMP kararını marka hedefine göre ver.`,`PMP anlaşmaları güçlü: Premium yayıncıda garantili yer, brand safe environment, daha yüksek viewability. Ancak minimum spend taahhüdü gerektirebilir.`,`CM360 cross-channel frekans yönetimi gerçek değeri. Olmadan aynı kullanıcıya 20 kez reklam göstermek hem marka zararı hem bütçe israfı.`,`Viewability standardı: IAB göre görüntülenme = display için %50 px, 1 saniye; video için %50 px, 2 saniye. DV360'ta viewability filter koy.`,`Brand safety ihmal edilmez. DoubleVerify veya IAS entegrasyonu premium markalarda (Lexus, Maje) zorunlu — marka içeriğin yanında zararlı içerikte görünmesi telafisi güç hasardır.`],quiz:[{id:`q-7-2-1`,type:`concept`,question:`Private Marketplace (PMP) nedir?`,options:[`Ücretsiz reklam alanı`,`Belirli yayıncıların`,`Google'ın kendi envanteri`,`Sosyal medya reklamı`],correct:1,explanation:`PMP, premium yayıncılarla doğrudan ama programatik ilişki kurmayı sağlar. Open exchange'in kazara kötü sitede görünme riskini elimine eder.`},{id:`q-7-2-2`,type:`scenario`,question:`Lexus kampanyasında DV360 brand safety filter'ı kurulmadı, reklamlar uygunsuz içeriklerin yanında göründü. Müşteri şikayet ediyor. Önce ne yaparsın?`,options:[`Kampanyayı durdur ve üzgünüm de`,`Kampanyayı hemen pause`,`Özür dile ve geç`,`Sadece özür dile`],correct:1,explanation:`Brand safety sorununda hızlı aksiyon ve şeffaf iletişim kritik. Pause et, düzelt, önlemi belgele, müşteriyle paylaş. Premium markalarda bu tür sorunlar ciddi.`},{id:`q-7-2-3`,type:`comparison`,question:`DV360 vs Google Display Network farkı nedir?`,options:[`DV360 yalnızca video kampanyalar için kullanılır`,`GDN: Google'ın kendi display ağı, kolay kurulum`,`GDN her zaman DV360'tan daha iyi performans verir`,`İkisi de aynı envantere erişir, sadece arayüz farklıdır`],correct:1,explanation:`GDN başlangıç seviyesi için yeterli. Büyük bütçeli veya premium markalarda DV360'ın inventory genişliği ve kontrol seçenekleri çok daha güçlü.`},{id:`q-7-2-4`,type:`concept`,question:`CM360'ın temel işlevi nedir?`,options:[`Reklam oluşturma`,`Ad server: Tüm kanallardan (DV360`,`Keyword araştırma`,`Kampanya bütçesini hesaplamak için kullanılır`],correct:1,explanation:`CM360 GMP'nin merkezi hub'ıdır. Tüm kanalları birbirine bağlar, impression ve conversion'ı tek noktadan ölçer, frekansı yönetir.`},{id:`q-7-2-5`,type:`scenario`,question:`Sandro kampanyası: Meta 4 frekans + DV360 5 frekans = kullanıcı reklamı 9 kez görüyor. Nasıl yönetirsin?`,options:[`Frekans normal aralıkta, değiştirme gerek yok`,`CM360'ta cross-channel frekans kap kur:`,`Sadece Meta'yı durdur`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Cross-channel frekans yönetimi CM360'ın en kritik özelliğidir. Aşırı frekans marka yorgunluğu yaratır. 5-7 toplam cap iyi başlangıç noktasıdır.`}]}]},{id:`module-8`,phase:2,icon:`🎵`,title:`TikTok Ads Manager`,description:`TikTok algoritması, Spark Ads, Topview, içerik odaklı satın alma mantığı ve performans optimizasyonu`,xpReward:150,lessons:[{id:`lesson-8-1`,title:`TikTok Algoritması, Spark Ads ve Audience Targeting`,duration:`16 dk`,what:`TikTok, interest ve behavior bazlı algoritmasıyla kullanıcıya kişiselleştirilmiş içerik sunar. TikTok Ads Manager'da Spark Ads, organik bir post'u reklam olarak yükselten format'tır. Audience targeting'de interest, behavior, custom audience ve lookalike seçenekleri bulunur.`,why:`TikTok Türkiye'de 18-35 yaş için en büyük platformlardan biri. Puma, H&M, Levi's gibi genç hedefli markalar için TikTok'u bilmemek büyük eksik. TikTok'un mantığı Meta'dan farklı — content-first, interrupt değil. Bunu anlamayan kampanyalar para yakar.`,realExample:`Puma yeni spor ayakkabı lansmanı. Meta kampanyası ROAS 2.1x. TikTok'ta denendiğinde ilk 2 kampanya başarısız: 'normal reklam' gibi çekilen videolar düşük view rate aldı. Sonra strateji değişti: TikTok creator ile Spark Ads — creator kendi hesabında Puma ürünü kullandığı organik görünümlü video paylaştı, biz bunu Spark Ads ile güçlendirdik. Sonuç: View rate %2'den %18'e, CPC %40 düştü, TikTok ROAS 3.4x'e çıktı. İçerik TikTok native olduğunda algoritma destekliyor.`,howItWorks:`1. TikTok kampanya yapısı: Campaign → Ad Group → Ad. Hedef: Awareness, Traffic, App Install, Conversions, Shopping. 2. Spark Ads: Organik post'u yetkilendirmeyle reklam olarak kullan. En iyi TikTok reklam formatı — native görünüm, algoritmik destek. Creator hesabından da çalışır. 3. Audience targeting: Interest (Spor, Moda, Teknoloji), Behavior (video izleme, içerik etkileşimi), Custom Audience (pixel, CRM upload), Lookalike. 4. Pixel kurulumu: TikTok Pixel Events Manager. İzlenecek eventler: ViewContent, AddToCart, Purchase. CAPI (TikTok Events API) da mevcut. 5. Smart+ Campaigns: TikTok'un Advantage+ eşdeğeri — hedefleme ve creative otomasyonu. 6. TikTok Creative Center: Trend analizi, top performing ads araştırması. Rakip creative'leri incele.`,levelDiff:{junior:`TikTok Ads Manager'ı kullanmaya başlar. Platforma özgü native içerik mantığını öğreniyor.`,mid:`Spark Ads kullanır, temel targeting yapar. Creative brief hazırlamayı ve TikTok Creative Center'ı kullanmayı öğreniyor.`,senior:`Creator partnership yönetir, Spark Ads stratejisi kurar, TikTok native brief hazırlar, Smart+ ile test eder, Creative Center'dan trend analizi yapar.`},keyPoints:[`TikTok'ta 'reklam gibi görünen reklam' başarısız. Native, organic görünen content kazanır. Brief: 'TikTok'a özel çek, normal reklam stüdyo videosu kullanma.'`,`Spark Ads en iyi format. Organik içeriği güçlendirmek hem görünüm hem algoritmik avantaj sağlar — native içerik daha yüksek rank alır.`,`İlk 3 saniye TikTok'ta daha kritik. Autoplay başlar, 3 saniyede ilgi çekilmezse swipe up. Hook: visual çarpıcı, ses çekici, metin büyük.`,`TikTok'ta ses önemli. %80 kullanıcı sesli izler (Meta'nın tersine). Trending müzik veya ses efekti engagement artırır.`,`TikTok Creative Center'ı haftalık kontrol et. Sektörde hangi video formatları trend? Rakip ne yapıyor? Bu veri brief'i beslemelidir.`],quiz:[{id:`q-8-1-1`,type:`concept`,question:`Spark Ads nedir ve neden avantajlıdır?`,options:[`Standart video reklam`,`Organik bir TikTok`,`Sadece product catalog için`,`Masaüstü reklamı`],correct:1,explanation:`Spark Ads TikTok'un en güçlü reklam formatıdır. Native görünüm kullanıcıyı daha az rahatsız eder, algoritma organic içerik gibi davranır.`},{id:`q-8-1-2`,type:`scenario`,question:`H&M için TikTok kampanyası açtın, normal marka videoları kullandın, view rate %1.8. Ne yaparsın?`,options:[`Nedeni araştırmadan direkt bütçeyi artır`,`TikTok native içerik test et: stüdyo videosu yerine`,`Kampanyayı tamamen kapatarak dur`,`Farklı audience segmenti deneyerek hedeflemeyi değiştir`],correct:1,explanation:`Düşük view rate genellikle creative sorunundan gelir. TikTok'ta native görünen içerik, polished marka videosu yerine daha iyi performans gösterir.`},{id:`q-8-1-3`,type:`comparison`,question:`TikTok targeting vs Meta targeting temel farkı?`,options:[`İkisi aynı hedefleme yapısına sahip`,`Meta: demographic+interest granüler hedefleme`,`TikTok her platformdan daha iyi dönüşüm sağlar`,`Meta her zaman daha geniş kitleye ulaşır`],correct:1,explanation:`TikTok algoritmasi içeriği kişiye göre dağıtır. Çok dar targeting AI'ı kısıtlar. Geniş bırak, iyi içerik yap — TikTok doğru kişiye götürür.`},{id:`q-8-1-4`,type:`concept`,question:`TikTok'ta sesin önemi neden Meta'dan farklıdır?`,options:[`İki yaklaşım arasında anlamlı bir fark bulunmuyor`,`TikTok kullanıcılarının %80+ sesli`,`TikTok'ta ses önemsiz`,`Sadece müzik için geçerli`],correct:1,explanation:`Meta için alt yazı, TikTok için ses. TikTok altyapısı ses üzerine inşalı. Trending ses kullanmak organik keşfedilebilirliği artırır.`},{id:`q-8-1-5`,type:`scenario`,question:`Levi's için TikTok creator Spark Ads denedin, conversion tracking çalışmıyor. İlk kontrol?`,options:[`Creator'ı değiştir`,`TikTok Pixel Events Manager'a git`,`Kampanyayı analiz etmeden tamamen durdur`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`TikTok conversion kampanyasının motoru pixel'dir. Pixel sorununda önce Events Manager debug et, sonra GTM kontrol et.`}]},{id:`lesson-8-2`,title:`TikTok Creative Best Practices ve İçerik Stratejisi`,duration:`15 dk`,what:`TikTok'ta başarılı reklam içeriğinin anatomisi: İlk 3 saniye hook, ses tasarımı, metin kullanımı, video uzunluğu, trend kullanımı ve marka tone'unu TikTok diline çevirmek. H&M, Puma gibi markaların TikTok creative stratejisi.`,why:`TikTok'ta en büyük hata mevcut Instagram veya YouTube içeriğini TikTok'ta kullanmak. Platform native içerik olmadan TikTok algoritması seni desteklemez. Creative brief yazma becerisi, hangi içeriğin TikTok'ta işe yarayacağını bilmek — bu senior'ın görevi.`,realExample:`Levi's denim kampanyası. A/B test: A — Profesyonel model çekimi (stüdyo), B — Genç kullanıcı evde Levi's giyerek 'Hayatımın en rahat denimini aldım' söylüyor (UGC style). A: View rate %6, engagement rate %1.2. B: View rate %22, engagement rate %4.7. B'nin ROAS'ı 3.1x, A'nın 1.4x. Insight: Authenticity TikTok'ta her şeydir. Levi's global ekibi bu bulguyu creativeyi yeniden brief etmek için kullandı.`,howItWorks:`1. Hook anatomisi: İlk kare çarpıcı görsel (renk, hareket, yüz). İlk söz merak uyandırmalı. Text overlay: kalın, büyük, anlaşılır. 2. Video uzunluğu: 15-30 saniye optimal performans. 60 saniye mümkün ama hold rate düşer. 3. Trend kullanımı: TikTok Creative Center → Trending sounds, hashtags. Markayla uyumlu trend seç. 4. CTA yerleşimi: Video sonunda veya ortasında net CTA ('Hemen al', 'Linke tıkla'). 5. Ses tasarımı: Trending müzik veya organik ses. Voiceover'lı içerik (ürün açıklaması) e-ticaret için iyi çalışır. 6. Brand voice TikTok uyarlaması: Lexus = sofistike ama erişilebilir TikTok dili. H&M = eğlenceli, trend, genç. Puma = enerjik, sporcu. Her markanın TikTok brief'i farklı.`,levelDiff:{junior:`Farklı platformlar için içerik üretir. Her platformun kendine özgü içerik dilini keşfediyor.`,mid:`TikTok native format dener ve platform dinamiklerini kavrar. Etkili creative brief yazmayı ve net yön vermeyi öğreniyor.`,senior:`Platform-specific brief yazar: hook önerisi, ses seçimi, trend bağlamı, uzunluk, CTA. Creator'a net yön verir. A/B test kurar.`},keyPoints:[`TikTok brief'i Instagram brief'inden ayrı yaz. Platform, format, dil, ses, uzunluk — hepsi farklı. 'TikTok'a özel çek' yeterli bir brief değil.`,`Authenticity conversion getirir. Aşırı prodüksiyonlu içerik TikTok'ta geri tepiyor. UGC style, gerçek kullanıcı görüntüsü, doğal ses — bunlar kazandırıyor.`,`TikTok Creative Center'ı kullan: Sektörde hangi format, müzik, hashtag trend? Rakip ne yapıyor? Bu veri brief'i ve creative kararlarını besler.`,`Hook test et: Aynı videonun farklı openinglerini test etmek (split test) hook rate'i artırmanın en etkili yolu.`,`TikTok'ta ses = yaratıcı element. Müzik seçimi marka algısını şekillendirir. Trending müzik reach artırır ama marka uyumu kontrol et.`],quiz:[{id:`q-8-2-1`,type:`concept`,question:`TikTok'ta optimal video uzunluğu nedir?`,options:[`60-90
