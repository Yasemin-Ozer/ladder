+ iade çıkarıldıktan sonra gerçek kâr hesaplanır. ROAS 6 olsa bile bu maliyetler geliri aşıyorsa zarar edilir.`}]},{id:`lesson-p1-1-2`,title:`Platform Seçim Mantığı — Hangi Kanal, Neden?`,duration:`12 dk`,what:`Her dijital reklam platformunun farklı bir gücü ve farklı bir kullanıcı profili vardır. Google Ads arama niyetini yakalar, Meta ilgi ve davranışa göre hedefler, TikTok gençlere organik tarzda ulaşır, LinkedIn B2B profesyonellere hitap eder. Platform seçimi kampanyanın başarısını doğrudan etkiler.`,why:`Müşteri sana 'dijitale 50.000 TL bütçe var, ne yapayım?' diyecek. Bu soruya 'hepsine koy' dersen müşteri kaybedersin. Platform mantığını anlayan biri 'senin hedefin X, o zaman Y platform Z yüzden' diyebilir. Bu fark seni ajanda değerli kılar.`,realExample:`Bir hukuk bürosu vasiyetname hizmeti satmak istiyor. Hedef: 55+ yaş, yüksek gelir, İstanbul. Google Search (vasiyetname avukatı arayanlar — niyet net), Facebook (55+ demografik, ciddi içerik), LinkedIn (işadamları, miras planlaması) seçilebilir. TikTok? Hayır — kitle yanlış. Pinterest? Hayır — niyet yok. Platform seçimi hedef kitlenin nerede olduğu ve ne niyetle orada olduğuyla başlar.`,howItWorks:`Her platformun funnel'daki yeri farklıdır. Google Ads alt huni — kullanıcı zaten arıyor, satın almaya hazır. Meta orta/üst huni — keşfetme ve değerlendirme aşaması. TikTok üst huni — eğlence ararken keşfeder. LinkedIn B2B orta huni — profesyonel karar verme. Criteo alt huni — siteye gelmiş, çıkmış, geri getirme. Doğru platform seçimi için 3 soru sorulur: Hedef kitlem nerede? Hangi niyetle orada? Kampanya hangi funnel aşamasını hedefliyor?`,comparisonTable:{headers:[`Platform`,`Funnel Aşaması`,`Güçlü Olduğu Alan`,`Dikkat Edilecek`],rows:[{label:`Google Search`,values:[`Alt huni`,`Satın alma niyeti olan kullanıcı`,`Rekabet yüksekse CPC pahalı olabilir`]},{label:`Meta (FB+IG)`,values:[`Orta/Üst huni`,`Görsel marka, kitle yaratma`,`Satın alma niyeti düşük, dönüşüm sabır ister`]},{label:`TikTok`,values:[`Üst huni`,`18-35 yaş, viral potansiyel`,`Eğlenceli kreatif şart, ciddi tonla çalışmaz`]},{label:`LinkedIn`,values:[`Orta huni B2B`,`Profesyonel karar alıcılar`,`CPC pahalı, ama kaliteli lead`]},{label:`Criteo`,values:[`Alt huni`,`Siteye gelmiş kullanıcıyı geri getirme`,`Yeni müşteri için zayıf`]},{label:`DV360`,values:[`Üst/Orta huni`,`Geniş envanter, premium yayıncılar`,`Büyük bütçe gerektirir`]}]},levelDiff:{junior:`Müşteri taleplerini uygular. Stratejik soru sorma ve alternatif önerme becerilerini geliştiriyor.`,mid:`Platform mantığını bilir, veri destekli alternatif önerir. Müşteriyi ikna edici şekilde yönlendirmeyi geliştiriyor.`,senior:`Platform seçimini veriye dayalı savunur. 'Şu veriye göre Google Search'e gitmeseydik %30 daha az dönüşüm alırdık' diyebilir.`},keyPoints:[`Platform seçimi hedef kitlenin niyetiyle başlar — aktif arayan mı (Google), pasif keşfeden mi (Meta/TikTok)?`,`Bütçe kısıtlıysa tek platformda derin git, hepsine yayma. Dağılan bütçe hiçbir yerde yeterli değildir.`,`Her platform kendi metriğiyle ölçülür — Meta'daki başarı Google'da aynı metrikle ölçülmez.`,`Müşteri 'TikTok istiyorum' dese bile hedef kitlesi 50+ ise bunu nazikçe sorgulamak senin işin.`,`Platform ekosistemi sürekli değişiyor — bugün güçlü olan yarın değişebilir (X/Twitter bunu gösterdi).`],quiz:[{id:`q-p1-1-2-1`,type:`scenario`,question:`Bir diş kliniği için acil randevu almak isteyen kişilere ulaşmak istiyorsun. Hangi platform?`,options:[`TikTok değeri kullan`,`Pinterest değeri kullan`,`Google Search`,`LinkedIn değeri kullan`],correct:2,explanation:`Acil randevu = aktif arama niyeti. Google Search'te 'diş ağrısı acil' arayan kullanıcı tam hedef kitledir. TikTok'ta kimse diş ağrısıyla reklam beklemez.`},{id:`q-p1-1-2-2`,type:`comparison`,question:`Criteo'nun diğer platformlardan temel farkı nedir?`,options:[`Criteo hem yeni hem eski kullanıcılara ulaşır, fark yoktur`,`Criteo: siteyi ziyaret etmiş kullanıcılara dinamik ürün reklamı gösterir`,`Criteo yalnızca e-ticaret sitelerinde çalışır, diğer sektörler için uygun değil`,`Criteo Google Ads'in bir alt ürünüdür, bağımsız platform değildir`],correct:1,explanation:`Criteo retargeting odaklıdır. Sitenizi ziyaret edip almayan kullanıcıları diğer sitelerde takip eder. Yeni müşteri kazanımında değil, mevcut ilgiyi satışa çevirmede güçlüdür.`},{id:`q-p1-1-2-3`,type:`concept`,question:`500 TL bütçen var. Google Search'e mi koyarsın, hepsine dağıtır mısın?`,options:[`Hepsine dağıt — görünürlük için çok platform şart`,`Google Search'e odaklan — küçük bütçeyi dağıtmak hiçbir`,`Meta'ya ver — daha geniş kitleye düşük CPM'le ulaşırsın`,`TikTok'a ver — organik büyüme viral etkiyle gelir`],correct:1,explanation:`Küçük bütçeyi dağıtmak hiçbir platformda etkisiz kalmanı sağlar. Dönüşüme en yakın platformda derinleşmek — genellikle Google Search — daha verimlidir.`},{id:`q-p1-1-2-4`,type:`scenario`,question:`B2B yazılım şirketi CFO'lara ulaşmak istiyor. Hangi platform?`,options:[`TikTok`,`LinkedIn`,`Pinterest`,`Google Display`],correct:1,explanation:`CFO = profesyonel karar alıcı. LinkedIn iş unvanı ve şirket büyüklüğüne göre hedefleme yapar. CPC pahalıdır ama kitlesi tam oturmaktadır.`},{id:`q-p1-1-2-5`,type:`comparison`,question:`Meta ile Google'ın funnel'daki temel farkı nedir?`,options:[`Google hem üst hem alt hunide Meta'dan üstündür`,`Meta: üst-orta huni, farkındalık ve ilgi yaratır`,`Meta yalnızca B2C markalar için faydalıdır`,`İkisi de tam funnel'ı kapsadığı için aynı işlevi görür`],correct:1,explanation:`Google = demand capture (talep yakalama). Kullanıcı zaten arıyor. Meta = demand generation (talep oluşturma). Kullanıcı ürünü aramamış, keşfediyor. İkisi birbirini tamamlar.`}]}]},{id:`module-p1-2`,phase:1,icon:`🎯`,title:`Google Ads Temeli`,description:`Kampanya yapısı, anahtar kelimeler, match types, bütçe ve reklam metni — ajansın ilk haftasında bilmen gerekenler`,xpReward:100,practicalAssignment:{title:`Doğal Sabun Markası — Kampanya Planı`,scenario:`Günlük 200 TL bütçesi olan bir doğal sabun markası için Google Ads Search kampanyası kuruyorsun. 10 anahtar kelime listesi, her birinin match type'ı, 3 negatif kelime ve bir reklam metni (başlık + açıklama) hazırla.`,deliverables:[`10 anahtar kelime + match type`,`3 negatif kelime + gerekçesi`,`Reklam metni (headline + description + CTA)`,`Günlük bütçe dağılımı mantığı`]},lessons:[{id:`lesson-p1-2-1`,title:`Kampanya Yapısı, Keyword ve Match Types`,duration:`16 dk`,what:`Google Ads üç katlı bir yapıya sahiptir: Kampanya (Campaign) → Reklam Grubu (Ad Group) → Reklamlar (Ads). Kampanya hedef ve bütçeyi belirler. Reklam grubu anahtar kelimeleri ve reklamları gruplar. Reklamlar kullanıcının gördüğü başlık, açıklama ve URL'den oluşur.`,why:`Kampanya yapısını bilmeden Google Ads hesabı açsan bile ne yaptığını anlamazsın. Ajanda senden bir hesabı incelmeni isteyecekler — kampanya yapısını okuyabilmek ve sorgulamak seni hesabı gerçekten anlayan bir operatör yapar.`,realExample:`Bir spor ayakkabı markası için yapı şöyle kurulur: Kampanya: 'Kadın Koşu Ayakkabıları — Satış' (günlük bütçe 300 TL, hedef: dönüşüm). Ad Group 1: 'Beyaz Spor Ayakkabı' (kelimeler: 'beyaz spor ayakkabı', 'kadın beyaz sneaker'). Ad Group 2: 'Koşu Ayakkabısı' (kelimeler: 'koşu ayakkabısı kadın', 'maraton ayakkabısı'). Reklamlar: Her ad group'ta anahtar kelimeyle uyumlu başlıklar. Neden ayrı gruplar? Çünkü 'beyaz spor' arayan ile 'koşu ayakkabısı' arayan farklı niyet taşır — farklı reklam metni görmeleri daha iyi dönüşüm sağlar.`,howItWorks:`Anahtar kelime eşleşme türleri Google'a 'bu kelimeyle ne kadar geniş eşleş' komutunu verir. Broad Match: en geniş, benzer anlamlı aramaları da tetikler (sabun → organik sabun, sabun markası). Phrase Match: tırnak içinde, kelimenin sırasını korur, etrafına kelime eklenebilir ('doğal sabun' → 'en iyi doğal sabun fiyatları'). Exact Match: köşeli parantez içinde, sadece tam o kelime veya çok yakın varyant ([doğal sabun] → 'doğal sabun'). Negatif kelimeler: reklamın gösterilmesini istemediğin kelimeler — 'ücretsiz', 'nasıl yapılır', 'kendin yap' gibi.`,comparisonTable:{headers:[`Match Type`,`Yazımı`,`Tetiklediği Aramalar`,`Ne Zaman?`],rows:[{label:`Broad Match`,values:[`doğal sabun`,`organik sabun, sabun markası, el sabunu`,`Yeni kampanya, trafik keşfi`]},{label:`Phrase Match`,values:[`"doğal sabun"`,`en iyi doğal sabun, doğal sabun fiyatı`,`Kontrollü hedefleme`]},{label:`Exact Match`,values:[`[doğal sabun]`,`doğal sabun (sadece)`,`Dönüşüm odaklı, net niyet`]},{label:`Negative`,values:[`-ücretsiz`,`Hariç tutar: ücretsiz doğal sabun`,`Bütçe koruması`]}]},levelDiff:{junior:`Keyword listeleri kurar ve kampanyaları yayına alır. Match type seçimi ve negatif keyword yönetimini öğreniyor.`,mid:`Match type'ları stratejik seçer. Negatif kelime listesini düzenli günceller. Performansı match type bazında analiz eder.`,senior:`Her ad group için ayrı match type stratejisi kurar. Search Terms raporunu haftalık inceler, yeni negatifler ekler, yeni fırsatlar bulur.`},keyPoints:[`Kampanya yapısı ne kadar düzenliyse optimizasyon o kadar kolaylaşır — karmaşık yapı = kör nokta.`,`Broad Match çok trafik getirir ama çok para yer — başlarken dikkatli kullan.`,`Exact Match az ama kaliteli trafik getirir — dönüşüm odaklı kampanyalar için ideal.`,`Negatif kelimeler bütçenin bekçisidir — her hafta Search Terms raporuna bakıp güncelle.`,`Her ad group'taki reklam metni o grubun anahtar kelimesiyle uyumlu olmalı — Quality Score artar, CPC düşer.`],quiz:[{id:`q-p1-2-1-1`,type:`concept`,question:`Google Ads kampanya yapısının doğru sırası hangisidir?`,options:[`Yapı Reklam → Ad Group → Kampanya sırasıyla ilerler`,`Kampanya → Ad Group → Reklam`,`Ad Group → Kampanya → Reklam`,`Reklam → Kampanya → Ad Group`],correct:1,explanation:`Kampanya en üst seviyedir (hedef + bütçe). Ad Group ortadaki katmandır (kelimeler + reklamlar). Reklam en alt katmandır (kullanıcının gördüğü içerik).`},{id:`q-p1-2-1-2`,type:`scenario`,question:`'koşu ayakkabısı' kelimesini Phrase Match olarak ekliyorsun. Hangi arama bunu TETİKLEMEZ?`,options:[`en iyi koşu ayakkabısı`,`kadın koşu ayakkabısı fiyatı`,`ayakkabı koşu modelleri`,`ucuz koşu ayakkabısı`],correct:2,explanation:`Phrase Match kelimenin sırasını korur. 'koşu ayakkabısı' için 'ayakkabı koşu' — sıra bozulmuş — tetiklemez. Diğerleri sırayı koruyarak ek kelimeler içeriyor.`},{id:`q-p1-2-1-3`,type:`concept`,question:`Quality Score'u etkileyen 3 ana faktör nedir?`,options:[`Bütçe, kampanya süresi, hedefleme`,`CTR (beklenen), reklam alaka düzeyi, landing page`,`Anahtar kelime sayısı, reklam sayısı ve bütçe birlikte belirlenir`,`Match type, negatif kelime sayısı, impression`],correct:1,explanation:`Quality Score = beklenen CTR + reklam alaka düzeyi + landing page deneyimi. Yüksek QS → düşük CPC. Reklam metnin anahtar kelimeyle uyumlu ve landing page'in iyi olması şart.`},{id:`q-p1-2-1-4`,type:`scenario`,question:`'ücretsiz sabun' aramalarında reklam çıkmamasını istiyorsun. Ne yaparsın?`,options:[`'ücretsiz' kelimesini pozitif ekle`,`'ücretsiz' kelimesini negatif ekle`,`Kampanyayı duraklat`,`Performansı daha fazla ölçmeden bütçeyi düşür`],correct:1,explanation:`Negatif kelime 'ücretsiz' eklenirse bu kelimeyi içeren aramalarda reklam gösterilmez. Bütçe korunur, dönüşüm almayacak tıklamalar engellenir.`},{id:`q-p1-2-1-5`,type:`comparison`,question:`Yeni bir kampanya açıyorsun ve hangi kelimelerin işe yarayacağını bilmiyorsun. Hangi match type ile başlarsın?`,options:[`Exact Match — en kesin sonucu verir`,`Broad Match — geniş veri`,`Hepsini aynı anda ekle`,`Phrase Match her zaman en iyisi`],correct:1,explanation:`Yeni kampanyada Broad Match ile başlamak kullanıcıların hangi kelimelerle aradığını gösterir. Search Terms raporundan yeni kelimeler ve negatifler öğrenilir. Sonra daha spesifik match type'lara geçilir.`}]},{id:`lesson-p1-2-2`,title:`Bütçe, Teklif Stratejileri ve Reklam Metni`,duration:`15 dk`,what:`Google Ads'te bütçe kampanya düzeyinde günlük olarak belirlenir. Teklif stratejisi ise Google'a 'nasıl optimize et' komutunu verir: manuel kontrol mü, akıllı otomatik mı? Reklam metni kullanıcının gördüğü yüzüdür — başlık, açıklama ve URL birlikte çalışır.`,why:`Ajansın müşterisine '3.000 TL bütçeyle ne yapabiliriz?' sorusunu cevaplamak zorunda kalacaksın. Bütçeyi nasıl dağıtırsın, hangi teklif stratejisini seçersin, neden — bunları bilmeden öneri yapamazsın. Reklam metni yazmak ise en sık yapılan işlerden biri — iyi metin CPC'yi düşürür.`,realExample:`Bir estetik klinik 15 günlük kampanya açacak, toplam 3.000 TL bütçesi var. Günlük bütçe: 200 TL. İlk 7 gün Manuel CPC ile başlıyorlar — veriye ihtiyaçları var. 50 dönüşüm toplandıktan sonra Hedef CPA'ya geçiyorlar: 'Bir randevu için en fazla 150 TL öde.' Reklam metni: Başlık 1: 'Güvenli Estetik Uygulamalar' / Başlık 2: 'Uzman Doktor, Gizli Muayene' / Açıklama: 'İstanbul merkezli kliniğimizde ücretsiz ön görüşme. Hemen randevu alın.' CTA net: randevu al.`,howItWorks:`Teklif stratejileri iki kategoride: Manuel ve Akıllı (Smart Bidding). Manuel CPC'de her anahtar kelimeye ne kadar vereceğini sen belirlersin — kontrol sende ama Google'ın algoritmasını kullanmıyorsun. Smart Bidding'de Google'a hedef verirsin, o optimize eder. Hedef CPA: 'bir dönüşüm için en fazla X TL.' Hedef ROAS: 'harcadığım paranın Y katını gelir olarak getir.' Maksimum Dönüşüm: bütçeyle olabildiğince çok dönüşüm al. Smart Bidding için minimum 30-50 dönüşüm gerekir — veri olmadan çalışmaz. Reklam metni için: başlıkta anahtar kelime olmalı, açıklama faydayı anlatmalı, CTA net olmalı.`,comparisonTable:{headers:[`Teklif Stratejisi`,`Ne Zaman?`,`Avantajı`,`Dezavantajı`],rows:[{label:`Manuel CPC`,values:[`Yeni kampanya, düşük veri`,`Tam kontrol`,`Algoritma yok, emek ister`]},{label:`Hedef CPA`,values:[`50+ dönüşüm sonrası`,`Maliyet kontrolü`,`Learning phase uzun sürer`]},{label:`Hedef ROAS`,values:[`E-ticaret, gelir takibi`,`Kârlılık odaklı`,`Gelir takibi şart`]},{label:`Maks. Dönüşüm`,values:[`Trafik artırma dönemi`,`Basit, hızlı`,`Maliyet kontrolü yok`]}]},levelDiff:{junior:`Kampanyaları açar ve temel bid yönetimi yapar. Proaktif optimizasyon ve bid stratejilerini öğreniyor.`,mid:`Smart Bidding'e ne zaman geçileceğini bilir. Learning phase'i anlar, erken müdahale etmez. Reklam metnini A/B test eder.`,senior:`Teklif stratejisini kampanya hedefine, veri miktarına ve sektör sezonalitesine göre seçer. Bid adjustment'larla (cihaz, konum, saat) optimizasyon yapar.`},keyPoints:[`Smart Bidding veri olmadan çalışmaz — 50 dönüşüm toplamadan Hedef CPA'ya geçme.`,`Learning phase'de (ilk 1-2 hafta) erken optimizasyon algoritmanın öğrenmesini engeller — sabırlı ol.`,`Reklam metninde başlıkta anahtar kelime olması Quality Score'u yükseltir, CPC'yi düşürür.`,`CTA (call to action) net olmalı: 'Hemen Al', 'Ücretsiz Dene', 'Randevu Al' — belirsiz CTA = düşük CTR.`,`Bütçeyi günlere dağıtırken sadece böl değil — hangi günler ve saatler daha iyi dönüşüm veriyor, ona göre ayarla.`],quiz:[{id:`q-p1-2-2-1`,type:`scenario`,question:`Kampanya yeni açıldı, sadece 5 dönüşüm var. Hangi teklif stratejisi?`,options:[`Hedef CPA — en iyi sonucu verir`,`Hedef ROAS — geliri optimize eder`,`Manuel CPC — veri topla, sonra geç`,`Maksimum Dönüşüm — otomatik çalışır`],correct:2,explanation:`Smart Bidding için minimum 30-50 dönüşüm gerekir. 5 dönüşümle algoritma öğrenemez. Manuel CPC ile veri topla, yeterli dönüşüm gelince Smart Bidding'e geç.`},{id:`q-p1-2-2-2`,type:`concept`,question:`Reklam metni yazarken başlığa ne koyulmalı?`,options:[`Marka adı her zaman başta olmalı`,`Anahtar kelime başlıkta olmalı`,`En uzun metni yaz — daha çok bilgi`,`Fiyatı başlığa koy`],correct:1,explanation:`Kullanıcı ne aradıysa onu başlıkta görünce tıklama ihtimali artar. Anahtar kelimeyi başlıkta kullanmak Quality Score'u iyileştirir, CPC'yi düşürür.`},{id:`q-p1-2-2-3`,type:`scenario`,question:`3.000 TL bütçen var, 20 gün kampanya sürecek. Günlük bütçen ne olur ve ne zaman değiştirirsin?`,options:[`150 TL — hiç değiştirmezsin`,`150 TL ile başlarsın, performans`,`Hepsini ilk gün harcarsın`,`Kararı yöneticiye bırakarak soruyu ona yönelt`],correct:1,explanation:`3.000 / 20 = 150 TL günlük. Ama sabit kalmak zorunda değil. İlk hafta veriye bak, CPA hedefin tutuyorsa bütçeyi artır. Kötü gidiyorsa azalt veya durdur.`},{id:`q-p1-2-2-4`,type:`comparison`,question:`Manuel CPC ile Hedef CPA arasındaki temel fark nedir?`,options:[`Hedef CPA her zaman Manuel CPC'den daha iyi sonuç verir`,`Manuel CPC: her tıklama teklifini sen belirlersin`,`Manuel CPC artık kullanımdan kaldırılmaktadır`,`İkisi de aynı algoritmayı kullanır, sadece arayüz farkı vardır`],correct:1,explanation:`Manuel CPC = sen kontrol edersin. Hedef CPA = Google'a 'bir dönüşüm için en fazla X TL harca' diyorsun, o optimize ediyor. Smart Bidding veriye ihtiyaç duyar.`},{id:`q-p1-2-2-5`,type:`scenario`,question:`Reklam metnine 'En İyi Ürünlerimizi Keşfet' yazıyorsun. Ne sorun var?`,options:[`Çok uzun, değerlendir`,`CTA belirsiz — ne yapması`,`Başlık olarak yanlış`,`Fiyat yazmıyor olarak değerlendir`],correct:1,explanation:`'Keşfet' belirsiz bir eylem çağrısı. Kullanıcı ne yapacağını tam bilmiyor. 'Hemen Sipariş Ver', 'Ücretsiz Kargo İncele', 'Bugün %20 İndirim Al' gibi net CTA'lar CTR'ı artırır.`}]}]},{id:`module-p1-3`,phase:1,icon:`🗺️`,title:`Dijital Reklam Ekosistemi`,description:`Tüm platformlar bir arada — kim ne yapar, hangi ekosistemde yer alır, neden önemli`,xpReward:80,practicalAssignment:{title:`Platform Haritası — Gerçek Senaryo`,scenario:`Bir e-ticaret müşterisi var: orta segment kadın giyim, 35-50 yaş hedef kitle, aylık 50.000 TL bütçe. Platform ekosistemini belirle: hangi platformları kullanırsın, her birine ne kadar bütçe, neden?`,deliverables:[`Platform seçimi + bütçe dağılımı tablosu`,`Her platformun funnel'daki rolü`,`Hangi platformu kullanmazsın ve neden?`]},lessons:[{id:`lesson-p1-3-1`,title:`Platformlar Ailesi — Kim Ne Yapar?`,duration:`13 dk`,what:`Dijital reklam ekosistemi sadece Google ve Meta'dan ibaret değil. Arama, sosyal, programatik, native, retargeting, e-ticaret reklam ağları ve video streaming — her birinin farklı güçlü yönleri var. Ajansda hangi platformun ne işe yaradığını bilmek seni konuşmada güçlü kılar.`,why:`Müşteri toplantısında 'neden DV360 kullanıyorsunuz, Google Ads yetmez mi?' sorusu gelir. Ya da 'Criteo ne yapıyor, Meta'dan farkı ne?' diye sorulur. Bu sorulara net cevap verebilmek için ekosistemi harita gibi kafanda taşıman lazım.`,realExample:`UM Worldwide gibi bir medya ajansı büyük bir otomotiv markası için şu ekosistemi kullanır: DV360 (premium yayıncılarda programatik display), YouTube (lansman videosu, awareness), Google Search (marka + kategori aramaları), Meta (hedef kitle yaratma, retargeting), Criteo (web sitesini ziyaret edip çıkanlar için retargeting), SA360 (tüm search kanallarını tek panelde yönetme). Her platform bir rol oynar — birbirinin alternatifi değil, tamamlayıcısı.`,howItWorks:`Ekosistemi 6 kategoride düşün: 1) Arama Ağı: Google Ads, Microsoft Ads — niyet bazlı, arama yapan kullanıcı. 2) Sosyal Medya: Meta, TikTok, LinkedIn, Pinterest, Snapchat — ilgi ve davranış bazlı. 3) Programatik: DV360, The Trade Desk, Xandr — otomatik medya satın alma, geniş envanter. 4) Native: Taboola, Outbrain — içerik akışına gömülü reklamlar. 5) Retargeting: Criteo, RTB House — siteyi ziyaret etmiş kullanıcıları geri getirme. 6) E-ticaret: Trendyol Ads, Hepsiburada, Amazon — kendi pazaryerinde öne çıkma.`,comparisonTable:{headers:[`Kategori`,`Platformlar`,`Güçlü Olduğu Alan`,`Tipik Müşteri`],rows:[{label:`Arama`,values:[`Google Ads, Microsoft Ads`,`Satın alma niyeti`,`Her sektör`]},{label:`Sosyal`,values:[`Meta, TikTok, LinkedIn`,`Kitle yaratma, etkileşim`,`D2C, B2B, moda`]},{label:`Programatik`,values:[`DV360, The Trade Desk`,`Büyük ölçekli awareness`,`Otomotiv, finans, FMCG`]},{label:`Native`,values:[`Taboola, Outbrain`,`İçerik tüketimi sırasında`,`Medya, e-ticaret`]},{label:`Retargeting`,values:[`Criteo, RTB House`,`Satışı kapatma`,`E-ticaret, seyahat`]},{label:`E-ticaret`,values:[`Trendyol Ads, Amazon`,`Pazaryerinde öne çıkma`,`Marketplace satıcıları`]}]},levelDiff:{junior:`Google ve Meta platformlarında kampanya yönetir. Diğer platformları ve araçları öğrenme sürecinde.`,mid:`Tüm kategorileri bilir, hangisini ne zaman önereceğini söyleyebilir. Bütçe dağılımını veriyle savunma becerisini geliştiriyor.`,senior:`Ekosistemi müşterinin KPI'ına göre kurgular. 'Bu platforma neden bütçe veriyoruz?' sorusunu veriyle yanıtlar. Synergy planlar.`},keyPoints:[`Google ve Meta tüm dijital reklam bütçelerinin yaklaşık %65'ini alıyor — ama tek seçenek değiller.`,`Programatik (DV360, The Trade Desk) büyük bütçeli markaların aracı — küçük bütçeyle verimli değil.`,`Criteo yeni müşteri kazandırmaz — mevcut ilgiyi satışa çevirir. Yeni kitle için Meta/Google gerek.`,`Taboola ve Outbrain içerik keşfi içindir — doğrudan dönüşüm beklemek gerçekçi değil.`,`Trendyol Ads Türkiye'deki e-ticaret için büyüyen bir güç — Türk müşterilerinde es geçilmemeli.`],quiz:[{id:`q-p1-3-1-1`,type:`concept`,question:`Criteo'nun temel işlevi nedir?`,options:[`Yeni kitleye ulaşmak`,`Siteyi ziyaret edip`,`Video reklam yayınlamak`,`B2B hedefleme yapmak`],correct:1,explanation:`Criteo retargeting uzmanıdır. Sitenize gelmiş, ürünü incelemiş ama almamış kişilere diğer sitelerde o ürünü gösterir. Yeni müşteri kazanımında değil, satışı kapatmada güçlüdür.`},{id:`q-p1-3-1-2`,type:`scenario`,question:`Küçük bir e-ticaret sitesi DV360 kullanmayı düşünüyor. Ne söylersin?`,options:[`Harika fikir, hemen başla`,`DV360 büyük bütçe gerektirir`,`DV360 her zaman en iyisi`,`Önce Criteo kullan`],correct:1,explanation:`DV360 kurumsal ölçek gerektirir. Minimum bütçe, teknik kurulum ve yönetim karmaşıklığı küçük işletmeler için uygun değil. Google Ads ve Meta daha erişilebilir ve ölçeklenebilir.`},{id:`q-p1-3-1-3`,type:`comparison`,question:`Taboola ve Google Search arasındaki temel fark nedir?`,options:[`Taboola Google Search'ten daha iyi dönüşüm oranı sağlar`,`Google Search: kullanıcı aktif arar, niyet bazlı`,`İkisi de aynı kullanıcı niyetine hitap ettiği için fark yoktur`,`Google Search yalnızca marka aramaları için etkilidir`],correct:1,explanation:`Google Search = kullanıcı aktif arıyor. Taboola = kullanıcı haber okurken 'bunları da okuyabilirsiniz' alanında gösterilen içerik. Niyet çok farklı, dönüşüm beklentisi de farklı olmalı.`},{id:`q-p1-3-1-4`,type:`scenario`,question:`Trendyol'da satış yapan bir marka için hangi platform kombinasyonu en mantıklı?`,options:[`Tüm bütçeyi yalnızca Google Ads platformuna ver`,`Trendyol Ads + Meta kombinasyonu ile başla`,`Sadece Criteo platformuyla retargeting yap`,`Tüm bütçeyi yalnızca Meta kampanyalarına yönlendir`],correct:1,explanation:`Trendyol Ads kullanıcı satın almaya hazırken öne çıkmanı sağlar. Meta marka bilinirliği ve yeni kitle yaratır. Criteo siteyi ziyaret edip almayan kişileri geri getirir. Üçü farklı aşamaları kapsar.`},{id:`q-p1-3-1-5`,type:`concept`,question:`The Trade Desk nedir?`,options:[`Google'ın reklam platformu`,`Meta'nın B2B çözümü`,`Bağımsız bir DSP`,`Retargeting platformu`],correct:2,explanation:`The Trade Desk bağımsız bir Demand Side Platform (DSP). Google'ın DV360'ına alternatif olarak, Google ekosistemi dışında programatik envantere erişim sağlar. Büyük ajanslar çeşitlendirme için kullanır.`}]},{id:`lesson-p1-3-2`,title:`Retargeting, Native ve E-ticaret Reklamcılığı`,duration:`11 dk`,what:`Retargeting (yeniden hedefleme) siteyi ziyaret etmiş ama satın almamış kullanıcıları geri getirme stratejisidir. Native reklamlar içerik akışına doğal görünümlü yerleşir. E-ticaret reklam ağları (Trendyol, Amazon) satıcıların kendi platformlarında öne çıkmasını sağlar.`,why:`Ajansda müşteriler 'sepete ekliyorlar ama almıyorlar, ne yapabiliriz?' diye sorar. Cevap retargeting. Ya da 'Trendyol'da rakipler önümüze geçiyor, çözüm?' — Trendyol Ads. Bunları bilmeden müşteri sorunlarına çözüm üretemezsin.`,realExample:`Bir ayakkabı e-ticaret sitesi şu senaryoyu yaşadı: 10.000 kişi siteydi, 3.000'i ürün sayfasına girdi, 500'ü sepete ekledi, 150'si satın aldı. 350 kişi sepette bıraktı. Criteo ile bu 350 kişiye retargeting yapıldı — 3 gün boyunca baktıkları ürün ve benzerlerini gösterdiler. Sonuç: 90 ekstra satış, CPA 45 TL. Retargeting olmadan bu 90 satış kayıp giderdi.`,howItWorks:`Retargeting üç katmanda çalışır: Pixel/Tag kurulumu (kullanıcı sitenize gelince etiketlenir), Audience oluşturma (siteyi ziyaret edenler, belirli ürünü görünler, sepete ekleyenler), Reklam gösterimi (etiketlenen kullanıcı başka bir sitede gezinirken o ürünü görür). Native reklamlar Taboola/Outbrain üzerinden haber sitelerinin 'bunları da okuyun' alanlarında çıkar — içerikle aynı formatta göründüğü için reklam gibi hissettirmez. E-ticaret reklamları ise kendi platformunda (Trendyol, Amazon) arama sonuçlarında veya önerilen ürünlerde öne çıkma sağlar.`,comparisonTable:{headers:[`Platform`,`Hedeflediği Kişi`,`Güçlü Yön`,`Zayıf Yön`],rows:[{label:`Criteo`,values:[`Siteyi ziyaret edenler`,`AI ile ürün önerisi`,`Yeni kitle kazanamaz`]},{label:`RTB House`,values:[`E-ticaret ziyaretçileri`,`Türkiye'de güçlü`,`Criteo kadar geniş ağ yok`]},{label:`Taboola`,values:[`İçerik okuyucuları`,`Geniş kitleye ucuz erişim`,`Dönüşüm niyeti düşük`]},{label:`Trendyol Ads`,values:[`Trendyol'da alışveriş yapanlar`,`Satın alma niyeti çok yüksek`,`Sadece Trendyol içinde çalışır`]}]},levelDiff:{junior:`Retargeting kampanyaları kurabilir. Audience segmentasyonu ve kişiselleştirme stratejilerini öğreniyor.`,mid:`Sepete ekleme, ürün görüntüleme, siteyi ziyaret etme gibi farklı segment için farklı mesaj kurgular.`,senior:`Retargeting sürelerini, frekansı ve mesajı dönüşüm hunisinin aşamasına göre optimize eder. 'Sepette 3 gün bırakanlar' ile '7 gün bırakanlar' farklı mesaj alır.`},keyPoints:[`Sepeti terk edenlerin %70'i doğru retargeting ile geri kazanılabilir — bu ciddi bir fırsattır.`,`Retargeting pixel'siz çalışmaz — tracking kurulumu olmadan audience oluşturulamaz.`,`Native reklamlarda başarı metriği CTR değil scroll-depth ve sayfa süresidir — içerik kalitesi şart.`,`Trendyol Ads'te ürün listeleme optimizasyonu (başlık, görsel, fiyat) reklam kadar kritiktir.`,`Retargeting'de frequency cap (kaç kez gösterileceği limiti) olmazsa kullanıcı rahatsız olur — markanıza zarar verir.`],quiz:[{id:`q-p1-3-2-1`,type:`scenario`,question:`Müşterinin sitesine ayda 50.000 kişi geliyor, 1.000'i alışveriş yapıyor. Retargeting ile kimi hedeflersin?`,options:[`1.000 satın alanları`,`49.000 satın almayanları`,`Sadece yeni ziyaretçileri`,`Google'da marka arıyanlara`],correct:1,explanation:`Retargeting'in hedefi sitenize gelmiş ama dönüşüm yapmamış kişilerdir. 49.000 kişi potansiyel müşteri — özellikle sepete ekleyip terk edenler en sıcak fırsattır.`},{id:`q-p1-3-2-2`,type:`concept`,question:`Retargeting pixel'i ne işe yarar?`,options:[`Reklam oluşturup yayınlar`,`Siteye gelen kullanıcıyı`,`Dönüşüm sayısını hesaplar`,`Kampanya bütçesini yönetir`],correct:1,explanation:`Pixel (veya tag) sitenize yerleştirilen küçük bir kod parçasıdır. Kullanıcı siteye girince bu kod çalışır ve kullanıcıyı tanımlar. Criteo veya Meta bu tanıma sayesinde kullanıcıyı başka platformlarda bulup reklam gösterir.`},{id:`q-p1-3-2-3`,type:`comparison`,question:`Trendyol Ads ile Meta Ads arasındaki temel niyet farkı nedir?`,options:[`Trendyol'da CPM daha ucuz olduğu için tercih edilmeli`,`Trendyol: kullanıcı aktif alışveriş niyetiyle geliyor`,`Meta her zaman daha yüksek dönüşüm oranı sağlar`,`İkisi de aynı satın alma niyetine sahip kitleye ulaşır`],correct:1,explanation:`Trendyol kullanıcısı 'alışveriş yapayım' niyetiyle açmış. Meta kullanıcısı arkadaş postlarını gezerken reklamla karşılaşıyor. Niyet farkı dönüşüm oranını doğrudan etkiler.`},{id:`q-p1-3-2-4`,type:`scenario`,question:`Retargeting kampanyasında aynı kullanıcıya günde 20 kez aynı reklam gösteriliyor. Sonuç ne olur?`,options:[`Daha çok satış olarak değerlendir`,`Kullanıcı rahatsız olur`,`CTR artar değeri kullan`,`Hiçbir şey olmaz`],correct:1,explanation:`Yüksek frekans 'banner blindness' ve marka yorgunluğu yaratır. Kullanıcı reklamı görmezden gelir veya aktif olarak kaçınır. Frequency cap (örn: günde max 3 gösterim) koymak şarttır.`},{id:`q-p1-3-2-5`,type:`concept`,question:`Native reklam neden 'native' (yerli) adını alır?`,options:[`Türk platformlarında çalıştığı için`,`İçerik akışına organik görünümlü yerleştiği için`,`Yerel hedefleme yaptığı için`,`Ücretsiz olması tek avantajı olan, başka kullanım amacı olmayan araç`],correct:1,explanation:`Native = yerli, doğal. Reklam bulunduğu platformun içerik formatını taklit eder. Haber sitesindeki 'Bunları da okuyun' bölümünde çıkan Taboola reklamı makale gibi görünür — bu yüzden native denir.`}]}]},{id:`module-p1-4`,phase:1,icon:`🏛️`,title:`Ajans Kültürü & Müşteri İletişimi`,description:`Ajansda hayatta kalmak: deadline yönetimi, iç iletişim, müşteri toplantısı ve zor soruları yönetme`,xpReward:90,practicalAssignment:{title:`Toplantı Simülasyonu`,scenario:`Müşteri toplantısında yöneticinin yoktu, sen ve bir müşteri temsilcisi vardı. Müşteri 'geçen ayın ROAS'ı neden düştü?' diye sordu. Elinde sadece temel veriler var. Bu soruya nasıl yanıt verirsin? E-posta ile toplantı özetini ve aksiyon maddelerini yaz.`,deliverables:[`Toplantıda söyleyeceğin 3 cümle (savunmacı değil, çözüm odaklı)`,`Aksiyon maddeli toplantı özeti e-postası`,`Hangi konuyu escalate edersin, nasıl?`]},lessons:[{id:`lesson-p1-4-1`,title:`Ajans İçi Dinamikler — Nasıl Çalışılır?`,duration:`13 dk`,what:`Ajans kültürü deadline odaklı, çok müşterili ve hızlı değişen bir ortamdır. Birden fazla müşteri hesabı aynı anda yönetilir, öncelikler sürekli değişir. İç iletişim, zaman yönetimi ve kimi ne zaman bilgilendireceğini bilmek teknik bilgi kadar değerlidir.`,why:`Teknik olarak iyi ama iletişim becerileri zayıf çok junior var. Yöneticiye 'bitti mi?' sorusu gelmeden işi teslim etmek, hata yaptığında saklamadan bildirmek, toplantı notunu düzgün tutmak — bunlar seni ajanda görünür kılar ve terfi hızlandırır.`,realExample:`Yeni bir stajyer Google Ads hesabında yanlışlıkla bir kampanyayı duraklattı, fark etmedi. Müşteri 2 gün sonra 'neden harcama durdu?' diye aradı. Yönetici durumdan habersiz çıktı — müşteri güveni sarsıldı. Doğru senaryo: Fark eder etmez yöneticiye Slack'te 'XYZ kampanyası yanlışlıkla durdu, şimdi aktifleştirdim, 2 saatlik veri kaybı var, müşteriye bildirmeli miyiz?' yazar. Şeffaflık hatadan daha değerlidir.`,howItWorks:`Ajans içi iletişimin 5 kuralı: 1. Deadline'dan önce bitir veya gecikme olacaksa önceden haber ver — sürpriz gecikme kabul edilmez. 2. Her toplantıdan çıktıktan sonra aksiyon maddeleri yazılı iletilir — sözlü onay yok. 3. Hata fark edildiğinde saklamadan bildirmek hem seni hem müşteriyi korur. 4. Hangi kararı kendin vereceksin, hangi kararı escalate edeceksin — bunu bilmek kritik. 5. 'Anladım' demeden önce gerçekten anladığından emin ol — belirsizliği yutma.`,comparisonTable:{headers:[`Durum`,`❌ Kaçınılan Tepki`,`✅ Doğru Tepki`],rows:[{label:`Hata yaptın`,values:[`Hatayı saklamak, geçer sanmak`,`Hemen bildir, çözümle birlikte sun`]},{label:`Deadline kaçacak`,values:[`Son dakikaya kadar bekleyip haber vermek`,`Önceden haber ver + yeni tarih öner`]},{label:`Sözlü talimat aldın`,values:[`Sadece zihinsel not almak`,`Yazılı özetle ve onay iste`]},{label:`Müşteri soru sordu, cevabın yok`,values:[`Cevabı uydurmak / tahmin etmek`,`'Kontrol edip döneceğim' de, kısa sürede dön`]},{label:`İki müşteri aynı anda acil dedi`,values:[`Panikleyip önceliklendirme yapmamak`,`Yöneticiye önceliklendirme sor`]}]},levelDiff:{junior:`Sorumluluklarını yerine getirir. Proaktif iletişim kurma ve deadline yönetimi becerilerini geliştiriyor.`,mid:`Proaktif iletişim kurar. Sorun çıkmadan önce uyarır. Toplantı notlarını eksiksiz gönderir.`,senior:`İletişimi bir sistem olarak yönetir. Müşteri beklentisini yönlendirir — sorun bile çıkmadan önlem alır.`},keyPoints:[`Ajansda itibar zaman içinde birikerek inşa edilir — her teslimatta güven ya kazanılır ya kaybedilir.`,`Hata saklamak hatadan daha büyük bir hata — şeffaflık güven inşa eder.`,`Yazılı iletişim sözlüden üstündür — her önemli konuşmanın mail veya Slack özeti olmalı.`,`Öncelikleri bilmemek iş yoğunluğuna mahal verebilir — 'bunların hepsini bugün mü bitireyim?' sormaktan çekinme.`,`Toplantı notu yazmak junior görevidir ama değerlidir — kim ne dedi, ne karar verildi, kim ne yapacak.`],quiz:[{id:`q-p1-4-1-1`,type:`scenario`,question:`Teslim etmen gereken rapor için veri eksik, deadline 2 saat sonra. Ne yaparsın?`,options:[`Eksik veriyle teslim et, notta belirt`,`2 saat önceden yöneticiye haber ver: 'X`,`Deadline'ı sessizce geç, kimse sormaz`,`Raporu tamamen iptal et, yeniden başla`],correct:1,explanation:`Sürpriz gecikme en kötü seçenek. 2 saat önceden haber vererek yöneticinin müşteriyle iletişim kurmasına fırsat tanırsın. Proaktif iletişim profesyonelliğin göstergesidir.`},{id:`q-p1-4-1-2`,type:`concept`,question:`Müşteri toplantısında 'bu soruyu cevaplamak için veriye ihtiyacım var' diyorsun. Bu...`,options:[`Zayıflık gösterir`,`Profesyoneldir —`,`Müşteriyi sinir eder`,`Yönetici kabul etmez`],correct:1,explanation:`Bilmediğin bir şeyi uydurmak kısa vadede kurtarabilir ama uzun vadede güven kaybettirir. 'Kontrol edip döneceğim' profesyonel ve güvenilir bir yanıttır.`},{id:`q-p1-4-1-3`,type:`scenario`,question:`Aşağıdaki durumların hangisinde yöneticiyi konuya dahil etmen gerekir?`,options:[`Kampanya optimizasyonu için negatif anahtar kelime eklemek`,`Haftalık performans raporunu hazırlamak`,`Reklam metninde yazım hatası düzeltmek`,`Bir hata nedeniyle müşteride ciddi bütçe aşımı yaşandı`],correct:3,explanation:`Rutin operasyonel işler (optimizasyon, raporlama, içerik düzeltme) senin sorumluluk alanında. Yönetici, kendi başına çözemediğin bir kriz anında devreye girer — ciddi bütçe aşımı hem müşteri ilişkisini hem ajans güvenilirliğini etkiler, bu durumu yöneticisiz yönetmek doğru olmaz.`},{id:`q-p1-4-1-4`,type:`scenario`,question:`Müşteri toplantısında sözlü olarak 'kampanyayı durdur' talimatı verildi. Ne yaparsın?`,options:[`Hemen kampanyayı durdur`,`Toplantıdan sonra 'anladığım`,`Yöneticiye sor, müşteriyle konuşma`,`Üç gün bekle olarak değerlendir`],correct:1,explanation:`Sözlü onay yeterli değil. Yazılı teyit almadan büyük aksiyonlar uygulanmaz. Özellikle kampanya durdurma gibi kritik kararlar e-posta ile belgelenmeli.`},{id:`q-p1-4-1-5`,type:`concept`,question:`Ajansda 'escalate etmek' ne demek?`,options:[`Müşteriyle tartışmak`,`Kendi çözme yetkin`,`Bütçeyi artırmak`,`Kampanyayı büyütmek`],correct:1,explanation:`Escalate = konuyu bir üst seviyeye taşımak. Her şeyi kendin çözmeye çalışmak değil — kendi yetkin dışındaki kararları doğru kişiye yönlendirmek de bir yetkinliktir.`}]},{id:`lesson-p1-4-2`,title:`Müşteri İletişimi — Sunum, Rapor ve Zor Sorular`,duration:`14 dk`,what:`Müşteri iletişimi ajans işinin görünür yüzüdür. Haftalık raporlar, aylık performans sunumları, acil durum bildirimleri ve zor soruların yönetimi — bunların hepsi farklı iletişim becerileri gerektirir. İyi bir kampanya kötü sunulursa değeri düşer; orta bir kampanya iyi hikayeleştirilirse daha değerli görünür.`,why:`Yöneticinin yokluğunda müşteri sorusu sana yönelecek. Ya da raporunu yönetici müşteriye iletecek. Her iki durumda da 'sayıları atan' değil 'sayıları anlatan' biri olman bekleniyor. Bu beceri seni sayıları değil hikayeleri anlatan, güven veren bir performans uzmanı yapar.`,realExample:`Aylık raporda CPA %20 arttı. Yalnızca sayıyı raporlamak yeterli değil — müşteri her zaman 'neden?' diye sorar. Doğru yaklaşım: Rapora şunu yaz: 'Ocak'ta CPA %20 artış gösterdi. Ana nedenler: (1) Rakip Marka X yoğun kampanyayla auction'a girdi, CPC'leri %15 yükseltti. (2) Sezon sonu stoğu azaldı, dönüşüm oranı düştü. Aksiyon: Şubat için B kelime grubunu duraklattık, C kelimelerinde bid düşürdük.' Müşteri cevabı anlamak istiyor, sadece sayıyı değil.`,howItWorks:`Müşteri raporunun anatomisi: 1. Özet bölümü (3 cümleyle ne oldu, iyi ve kötü). 2. KPI panosu (hedef vs gerçekleşen). 3. Analiz (neden bu sonuç, hangi faktörler). 4. Aksiyon (ne yapıldı, ne yapılacak). Zor sorular için çerçeve: Savunmaya geçme → kabul et → analiz et → çözüm öner. 'ROAS neden düştü?' sorusuna 'düşmedi ki' deme — 'evet düştü, nedeni şu, yapacağımız şu' de. E-posta yazımında: konu satırı net, önemli bilgi ilk paragrafta, aksiyon maddesi açık.`,comparisonTable:{headers:[`İletişim Türü`,`Amaç`,`Ton`,`Dikkat`],rows:[{label:`Haftalık rapor`,values:[`Güncelleme`,`Kısa, net`,`Sadece önemli değişiklikler vurgula`]},{label:`Aylık sunum`,values:[`Strateji değerlendirme`,`Analitik, önerilere açık`,`Hikaye anlat, sayı değil`]},{label:`Kriz bildirimi`,values:[`Hasar kontrolü`,`Şeffaf, çözüm odaklı`,`Hızlı ilet, geç kalma`]},{label:`E-posta onayı`,values:[`Yazılı kayıt`,`Resmi, net`,`Aksiyon maddeleri açık olsun`]}]},levelDiff:{junior:`Performans verilerini raporlar. Sayıların arkasındaki hikâyeyi ve yorumu öğreniyor.`,mid:`Sayıların arkasını anlatır. Neden düştü, neden yükseldi — bağlamıyla açıklar. Aksiyon önerir.`,senior:`Müşterinin beklentisini şekillendirir. Kötü haberi erken verir, çözümle birlikte sunar. Müşteri güvenini yönetir.`},keyPoints:[`Rapor 'ne oldu' değil 'ne anlama geliyor ve ne yapacağız' sorusunu cevaplar.`,`Kötü haberi geciktirme — erken ver, çözümle birlikte sun. Müşteri sürpriz seviemez.`,`Sunum başında 'bu ay şunu başardık, şu konuda geliştireceğiz' özeti yapıldıktan sonra detaya gir.`,`E-postada konu satırı net olmalı: 'Kampanya Güncelleme — Mart 2025' gibi — 'bir şey hakkında' yazma.`,`Müşteriyle ilk 3 ayda güven inşa edilir — bu dönemde her teslimatta bir adım öne çıkma fırsatı var.`],quiz:[{id:`q-p1-4-2-1`,type:`scenario`,question:`Aylık raporda ROAS hedefin 4'tü, gerçekleşen 2,8 oldu. Rapora ne yazarsın?`,options:[`ROAS 2,8 (hiçbir yorum yapmadan)`,`ROAS hedef 4'e karşı 2,8 geldi. Nedenler: [analiz]. Aksiyon: [plan]. Önümüzdeki ay hedef: [revize]`,`Bu ayı atlıyorum, önümüzdeki ayı yaz`,`Yöneticiye yaz, ben yazmam`],correct:1,explanation:`Eksik performansı saklamak güven kaybı. Analiz + aksiyon + revize hedefle birlikte sunmak profesyonelliğin göstergesi. Müşteri ne yapıldığını bilmek ister.`},{id:`q-p1-4-2-2`,type:`concept`,question:`Müşteri toplantısında 'sizi neden tutuyoruz ki?' dedi. İlk tepkin ne?`,options:[`Savunmaya geç, başarıları say`,`Sakin kal, 'beklentinizi tam`,`Toplantıyı terk et, başka aksiyon alma`,`Yöneticiyi ara olarak değerlendir`],correct:1,explanation:`Savunmacı tepki iletişimi kapatır. Önce müşteriyi anlamaya çalış — hangi beklenti karşılanmadı? Sonra verilerle yanıtla. Sakin ve çözüm odaklı ton güven verir.`},{id:`q-p1-4-2-3`,type:`comparison`,question:`İyi rapor ile kötü rapor arasındaki temel fark nedir?`,options:[`İyi rapor mümkün olduğunca fazla veri içermelidir`,`İyi rapor: sayıları bağlamla ve önerilerle anlatır`,`İkisi de aynı bilgiyi içerir, sadece görsel tasarım farkı vardır`,`Kötü rapor daha az veri içerdiği için yetersizdir`],correct:1,explanation:`Müşteri sayıyı görebilir — zaten platformdan bakabilir. Asıl değer o sayının ne anlama geldiğini ve bundan sonra ne yapılacağını anlatmaktan gelir.`},{id:`q-p1-4-2-4`,type:`scenario`,question:`Kampanyada teknik bir sorun çıktı, müşteri etkileniyor. Yönetici toplantıda. Ne yaparsın?`,options:[`Yöneticinin çıkmasını bekle`,`Hızlıca yöneticiye kısa`,`Müşteriye söyleme`,`Problemi çöz, kimseye söyleme`],correct:1,explanation:`Yöneticinin toplantıda olması durumu bekletme gerekçesi değil. Kısa mesaj yeter — hem sorunu çözmeye devam edersin hem yönetici haberdar olur. Şeffaf iletişim.`},{id:`q-p1-4-2-5`,type:`concept`,question:`Müşteriye e-posta atarken konu satırına ne yazmalısın?`,options:[`'Merhaba'`,`'Kampanya hakkında'`,`'[MüşteriAdı] — Mayıs Kampanya Güncelleme + Aksiyon Maddeleri'`,`'Acil'`],correct:2,explanation:`Net konu satırı e-postanın önceliğini ve içeriğini gösterir. Müşteri e-postayı arayacaksa da bulur. 'Merhaba' veya 'kampanya hakkında' bulanık — zamanla kaybolur.`}]}]}],p=[{id:`module-s1`,phase:4,icon:`🧠`,title:`Sistem Düşüncesi — Bütünü Görmek`,description:`Metrik izlemekten sistem analizine: her problemi 3 katmanda teşhis etme becerisi`,xpReward:150,practicalAssignment:{title:`Final Master Testi — Gerçek Senaryo`,scenario:`CTR artıyor, CPA artıyor, ROAS düşüyor, harcama artıyor. Bu 4 veriye bakarak: (1) İlk şüpheleneceğin layer nedir? (2) Hangi 2 veri kaynağını karşılaştırırsın? (3) Problem tracking'de olabilir mi, neden? (4) Kampanya kapatılır mı? (5) Aksiyon planın nedir?`,deliverables:[`3 olası kök neden`,`Kontrol listesi (debugging adımları)`,`Aksiyon planı ve öncelik sırası`,`Kampanyaya devam kararı + gerekçe`]},lessons:[{id:`lesson-s1-1`,title:`3 Katmanlı Analiz: Input → Process → Output`,duration:`16 dk`,what:`Senior düşünce sistemi metriklere değil sistemlere bakar. Her kampanya problemi 3 katmanda incelenir: Input (girdi: trafik kalitesi, audience, keyword), Process (süreç: tracking doğru mu, attribution doğru mu, algoritma çalışıyor mu), Output (çıktı: satış, ROAS, CPA). Output kötüyse önce process kontrol edilir — giriş sorununa atlamak yanıltır.`,why:`Junior 'CPA arttı → bütçeyi kestim' der ve yanlış karar verir. Senior 'CPA neden arttı?' der ve önce tracking'i kontrol eder. Çünkü tracking bozuksa tüm optimizasyon yanlış zemin üzerinde yapılır. Bu fark bir kampanyayı kurtarabilir veya batırabilir.`,realExample:`Bir e-ticaret hesabında CPA aniden %40 arttı. Junior: 'Kreatifler eskidi, değiştirelim' dedi ve 3 yeni kreatif hazırladı. Sonuç: değişmedi. Senior geri döndü: Tracking kontrol etti. Meta Pixel'de Purchase eventi çift ateşliyordu (duplicate) — her satışı 2 kez sayıyordu. Gerçek CPA normal, sadece sistem hatalıydı. Junior 3 hafta boşa kaybetti. Senior 2 saatte buldu.`,howItWorks:`Her problem için şu sırayı takip et: 1. Output'u tanımla — 'CPA %40 arttı.' 2. Process'i kontrol et — tracking doğru mu? Event geliyor mu? Attribution değişti mi? Platform herhangi bir politika güncellemesi yaptı mı? 3. Input'u incele — trafik kalitesi düştü mü? Yanlış audience mı geliyor? Keyword değişti mi? 4. Dışsal faktörler — rakip girdisi, sezonalite, ekonomik koşul. Junior sıralaması tersine yapar: önce kreatif değiştirir, sonra bütçe keser, en son tracking'e bakar. Senior önce process'i teyit eder.`,comparisonTable:{headers:[`Katman`,`Kontrol Edilecekler`,`Araçlar`,`Junior Hatası`],rows:[{label:`Process (Önce!)`,values:[`Tracking, pixel, event, attribution`,`GTM Debug, Meta Events Manager, GA4`,`Bunu atlar, direkt kreatife geçer`]},{label:`Input`,values:[`Audience kalitesi, keyword, trafik kaynağı`,`Search Terms, Audience Insights`,`Yanlış kitleyi hedefler ama fark etmez`]},{label:`Output`,values:[`ROAS, CPA, CVR, AOV`,`Platform dashboard, Looker Studio`,`Sadece burayı görür, nedenini aramaz`]}]},levelDiff:{junior:`Performans değişikliklerine hızlı tepki verir. Kök neden analizi ve sistematik yaklaşımı öğreniyor.`,mid:`3 katmanı bilir, sırayla kontrol eder. Dışsal faktörleri (rakip, sezonalite) analize dahil etmeyi öğreniyor.`,senior:`Problemi katmanlandırır, her katmanı sistematik kontrol eder, birden fazla hipotezi aynı anda test eder. Kök neden bulunmadan aksiyon almaz.`},keyPoints:[`'Metrik kötü' semptomdan başla, kök nedene ulaş — semptom tedavi edilmez, hastalık tedavi edilir.`,`Tracking bozuksa tüm optimizasyonun temeli çürük — her şeyden önce tracking kontrol edilir.`,`Output → Process → Input sırası kritik. Tersi yanlış teşhise götürür.`,`Dışsal faktörler (rakip kampanya, sezon, ekonomi) göz ardı edilirse iç problemmiş gibi aksiyonlar alınır.`,`Hipotez kur, test et, doğrula — 'sanırım kreatif sorunu' değil 'kreatif sorununu şu veriyle test ediyorum'.`],quiz:[{id:`q-s1-1-1`,type:`scenario`,question:`ROAS düştü. İlk kontrol ettiğin şey ne?`,options:[`Yeni kreatif olarak değerlendir`,`Kampanya bütçesini tamamen kesmek gerekir`,`Tracking ve conversion flow'u kontrol et`,`Audience değiştir`],correct:2,explanation:`ROAS düşüşünün en sık gözden kaçan nedeni tracking sorunudur. Conversion az görünüyorsa gerçekten az mı, yoksa pixel mi bozuk? Önce process katmanı kontrol edilir.`},{id:`q-s1-1-2`,type:`comparison`,question:`Junior ve Senior aynı problemi görüyor: CPA %30 arttı. Fark ne?`,options:[`Senior daha hızlı çözüm üretir, fark bu`,`Deneyimli çalışan: kök nedeni arar (neden`,`Yeni başlayan daha çok çalışır, bu farkı kapatır`,`İkisi de aynı analitik süreçle ilerler`],correct:1,explanation:`Junior tepkisel, senior analitiktir. Junior 'sayı kötü → değiştir' der. Senior 'sayı neden kötü → hangi katmanda sorun → kök neden → çözüm' der. Bu fark karar kalitesini belirler.`},{id:`q-s1-1-3`,type:`scenario`,question:`Meta 150 satış, GA4 80 satış gösteriyor. Ne yaparsın?`,options:[`Meta daha büyük bir platform olduğu için hep daha güvenilir`,`GA4'e güven, daha doğru`,`Attribution modeli ve overlap analiz et`,`Bütçeyi ortala olarak değerlendir`],correct:2,explanation:`Her platform kendi attribution modeliyle çalışır. Meta last-click'te de olsa view-through conversion sayabilir. Gerçeği anlamak için incrementality testi veya overlap analizi gerekir.`},{id:`q-s1-1-4`,type:`concept`,question:`Campaign learning phase nedir ve neden erken müdahale tehlikelidir?`,options:[`Algoritmanın ilk 3 günü reklam göstermediği dönem`,`Algoritmanın veri toplayarak optimize`,`Bütçenin hızlı harcandığı dönem`,`Yeni krealife geçiş dönemi`],correct:1,explanation:`Learning phase'de algoritma hangi kullanıcıların dönüşüm yapacağını öğreniyor. Erken müdahale (bid değişimi, hedefleme değişimi) bu öğrenmeyi sıfırlar ve süreç başa döner. Sabır şart.`},{id:`q-s1-1-5`,type:`scenario`,question:`CTR artıyor ama CPA da artıyor. Bu ne anlama gelir?`,options:[`Her şey iyi gidiyor`,`Reklam tıklanıyor ama satın alma yok`,`Bütçe yetersizliği kaynaklı performans sorunu`,`Kreatifi değiştir`],correct:1,explanation:`CTR artışı reklamın iyi çalıştığını, CPA artışı dönüşümün düştüğünü gösterir. Reklam ilgi çekiyor ama site satamıyor. Landing page kalitesi, fiyat rekabetçiliği veya yanlış kitle bu problemi yaratır. Tracking de kontrol edilmeli.`}]},{id:`lesson-s1-2`,title:`Debug Mindset — Semptom Değil, Kök Neden`,duration:`14 dk`,what:`Debug mindset problemi semptomdan kök nedene doğru katmanlı sorgulama yaparak çözme yöntemidir. Her performans sorunu 4 katmandan birinden kaynaklanır: Tracking layer (veri doğru mu?), Audience layer (doğru kişiye mi ulaşıyoruz?), Creative layer (mesaj doğru mu?), Market layer (dışsal koşullar değişti mi?).`,why:`Ajansda 'kampanya neden kötü gidiyor?' sorusu her ay gelir. Cevap 'bilmiyorum' değil, sistematik bir teşhis süreci olmalı. Debug mindset'ini geliştiren kişi hem daha hızlı çözer hem yönetici önünde güvenilir görünür hem de aynı hatayı tekrar yapmaz.`,realExample:`Google Ads hesabında conversion %60 düştü. Debugging süreci: 1. Tracking Layer: GTM'de conversion tag kontrol edildi — tetikleniyor ama eski URL'ye bakıyor. Yeni landing page'e tag güncellenmemişti. Sorun 20 dakikada bulundu ve düzeltildi. Eğer tracking'i atlanıp direkt audience veya kreatife gidilseydi, sorun hiçbir zaman bulunmayabilirdi. Process önce gelir.`,howItWorks:`Debug checklist 4 katmanda: 1. Tracking Layer — GTM trigger çalışıyor mu? Pixel / Tag doğru sayfada mı? Consent mode sorun çıkarıyor mu? Event duplicate mı? 2. Audience Layer — Hedefleme değişti mi? Audience saturation var mı (aynı kişilere çok kez gösterildi)? Lookalike source güncel mi? 3. Creative Layer — CTR düştü mü? Reklam yorgunluğu var mı (frequency 8+)? Mesaj hâlâ uyumlu mu? 4. Market Layer — Rakip yoğun kampanya açtı mı? Sezon mu bitti? Ekonomik koşul değişti mi? Sıra önemli: 1 → 2 → 3 → 4.`,comparisonTable:{headers:[`Katman`,`Semptomlar`,`Kontrol Soruları`,`Araç`],rows:[{label:`Tracking`,values:[`CPA aniden arttı, conversion düştü`,`Event geliyor mu? Duplicate var mı?`,`GTM Debugger, Events Manager`]},{label:`Audience`,values:[`CTR düştü, frequency yüksek`,`Kitle doydu mu? Yanlış segment mi?`,`Audience Insights, Frequency raporu`]},{label:`Creative`,values:[`CTR düşük, engagement yok`,`Reklam yoruldu mu? Hook zayıf mı?`,`Creative reporting, A/B test`]},{label:`Market`,values:[`CPC arttı, impression düştü`,`Rakip girdisi? Sezon mü?`,`Auction Insights, Seasonality raporu`]}]},levelDiff:{junior:`Sorunları fark eder ve çözüm arar. Yapılandırılmış troubleshooting ve tracking doğrulamasını öğreniyor.`,mid:`Sistematik kontrol yapar, tüm katmanları gözden geçirir. Debug öncelik sıralamasını ve hızını geliştiriyor.`,senior:`Debug sürecini otomatik çalıştırır. Tracking önce, sonra diğerleri. 30 dakikada teşhis koyar, yöneticiye net rapor verir.`},keyPoints:[`Her problem teşhisle başlar — teşhis olmadan tedavi kördür.`,`Tracking her zaman önce gelir — bozuk data üzerinde kuru gürültü optimizasyondur.`,`Audience saturation gerçektir — aynı 10.000 kişiye 20 kez reklam göstermek verimsizdir.`,`Creative fatigue CTR'da görünür — frequency 7+ olduğunda genellikle performans düşer.`,`Market koşulları senin kontrolünde değil ama fark etmek stratejini değiştirmeni sağlar.`],quiz:[{id:`q-s1-2-1`,type:`scenario`,question:`Google Ads'te conversion aniden %60 düştü. İlk 3 adımın ne?`,options:[`Kreatif değiştir, audience genişlet, bütçe artır`,`GTM trigger kontrol et, conversion`,`Kampanyayı tamamen kapatarak dur`,`Yöneticiye sor, bekle`],correct:1,explanation:`Ani conversion düşüşünde önce tracking kontrol edilir. Tag bozulmuş, URL değişmiş veya consent mode sorunu olabilir. Bu 20 dakikada çözülür. Tracking sağlıklıysa sonra diğer katmanlara geçilir.`},{id:`q-s1-2-2`,type:`concept`,question:`Frequency 12'ye çıktı, CTR düştü. Hangi katmanda sorun?`,options:[`Dönüşüm takibinin yapıldığı ölçüm katmanı`,`Market layer olarak değerlendir`,`Audience layer — kitle doydu`,`Bütçe sorunu olarak değerlendir`],correct:2,explanation:`Yüksek frequency + düşen CTR = audience saturation. Aynı kişilere çok kez reklam gösterildi, artık tıklamıyorlar. Yeni audience veya frequency cap gerekiyor.`},{id:`q-s1-2-3`,type:`comparison`,question:`CPC arttı ama sen hiçbir şeyi değiştirmedin. Hangi katman?`,options:[`Reklam kreatifinin yer aldığı içerik katmanı`,`Dönüşüm takibinin yapıldığı ölçüm katmanı`,`Market layer — rakip artmış`,`Hedef kitle tanımlamasının yapıldığı segment katmanı`],correct:2,explanation:`Senin değişiklik yapmadan CPC artışı dışsal faktör işareti. Rakip güçlü kampanya açmış olabilir, sezon gelmiş olabilir. Auction Insights raporu rakip yoğunluğunu gösterir.`},{id:`q-s1-2-4`,type:`scenario`,question:`Meta Events Manager'da Purchase eventi geliyor, ama bir tanesi 0 value ile geliyor. Sorun ne?`,options:[`Pixel yanlış kurulmuş`,`Purchase eventi`,`Normal, önemseme`,`Audience yanlış`],correct:1,explanation:`Event geliyor ama 0 value = conversion sayılıyor ama gelir bilinmiyor. ROAS hesabı bozuk. Gelir parametresi (value) eksiksiz iletilmeli. Bu düzeltilmeden ROAS optimizasyonu anlamsız.`},{id:`q-s1-2-5`,type:`concept`,question:`Debug süreci neden tracking layer'dan başlar?`,options:[`En kolay katman olduğu için`,`Bozuk tracking üzerine`,`En önemli KPI olduğu için`,`Yönetici böyle istiyor`],correct:1,explanation:`Tracking bozuksa gördüğün tüm sayılar yanlış. Yanlış veriye göre optimizasyon = yanlış karar. Sağlam veri olmadan hiçbir analiz güvenilir değil. Bu yüzden her debug tracking'den başlar.`}]}]},{id:`module-s2`,phase:4,icon:`📈`,title:`Optimization & Scaling Sistemi`,description:`Performance drop analizi, scaling kararı ve learning phase yönetimi — senior'ın günlük işi`,xpReward:150,practicalAssignment:{title:`Scaling Karar Simülasyonu`,scenario:`Kampanya 10 gündür çalışıyor: CPA 80 TL (hedef 100 TL), ROAS 4.2, günlük harcama 500 TL, günde 6 dönüşüm. Yönetici 'bütçeyi 2x yap' diyor. Yapmalı mısın? Cevabını 5 soruyla savun.`,deliverables:[`Scaling yapılabilir mi? — karar ve gerekçe`,`Hangi 5 soruyu sormalısın?`,`Hangi riskler var?`,`Alternatif önerin nedir?`]},lessons:[{id:`lesson-s2-1`,title:`Performance Drop Analizi ve CPA Debuglama`,duration:`15 dk`,what:`Performance drop (performans düşüşü) analizi bir kampanya veya hesap seviyesinde neyin kötüleştiğini, neden kötüleştiğini ve nasıl düzeltileceğini sistematik olarak belirleme sürecidir. CPA artışı en sık karşılaşılan sorundur ve çoğunlukla birden fazla faktörün birleşiminden kaynaklanır.`,why:`Yöneticinin 'CPA neden arttı?' sorusuna cevap vermen gerekiyor. 'Bilmiyorum' kabul edilmez. 'Analiz ettim, şu 3 neden var, şunu yapıyorum' cevabı seni senior yapan şeydir. Bu beceri müşteri güveni kadar yönetici güveni de kazandırır.`,realExample:`E-ticaret hesabında Nisan'da CPA 45 TL'den 78 TL'ye çıktı. Analiz: 1. Tracking kontrol: Sağlıklı, sorun yok. 2. Audience: Retargeting audience küçüldü — site trafiği düştüğü için retargeting havuzu daraldı. 3. Creative: Frequency 9'a çıktı, CTR düşmüş. 4. Market: Rakip X aynı dönemde büyük kampanya açmış, CPC %25 arttı. Sonuç: CPA artışının %60'ı creative fatigue + audience daralmadan, %40'ı rakip baskısından. Aksiyon: Yeni kreatif seti + Lookalike audience genişletme + rakip geçene kadar bid düşürme.`,howItWorks:`CPA arttığında checklist: Adım 1 — Tracking sağlıklı mı? (Events Manager, GTM debug). Adım 2 — Conversion rate düştü mü? (tıklama aynı ama satın alma azaldı → landing page veya ürün sorunu). Adım 3 — Traffic quality değişti mi? (Search Terms, placements — istenmeyen trafik geldi mi?). Adım 4 — Auction rekabeti arttı mı? (Auction Insights, CPC trendi). Adım 5 — Sezonalite etkisi var mı? (Geçen yıl aynı dönem kötü müydü?). Her adımda cevap net değilse bir sonraki adıma geç. Kök neden birden fazla olabilir.`,comparisonTable:{headers:[`CPA Artış Nedeni`,`Belirtisi`,`Çözüm`],rows:[{label:`Tracking sorunu`,values:[`Ani, sert düşüş`,`GTM debug, pixel kontrol`]},{label:`Creative fatigue`,values:[`Frequency 7+, CTR düşük`,`Yeni kreatif seti`]},{label:`Audience doyması`,values:[`Frequency yüksek, reach düştü`,`Yeni audience, Lookalike genişlet`]},{label:`Rakip baskısı`,values:[`CPC arttı, impression düştü`,`Bid stratejisi gözden geçir`]},{label:`Sezonalite`,values:[`Yıllık döngüsel düşüş`,`Geçen yıl veriyle karşılaştır, bütçeyi azalt`]}]},levelDiff:{junior:`Metrik değişimlerine aksiyon alır. Tek değişkenin ötesinde sistemik etkileri görmeyi öğreniyor.`,mid:`Checklist ile sistematik ilerler, birden fazla nedeni tespit eder. Önceliklendirme ve hız dengesini geliştiriyor.`,senior:`Analizi hızlı yapar, öncelikleri belirler, yöneticiye kök neden + aksiyon planıyla gelir. Çözüm bulmadan rapor sunmaz.`},keyPoints:[`CPA artışının en yaygın gizli nedeni tracking sorunudur — her analizde önce kontrol et.`,`Creative fatigue frekansla ölçülür — frequency 7 üzerine çıktığında yeni kreatif hazır olmalı.`,`Audience saturation ve creative fatigue çoğu zaman aynı anda gelir — ikisi birbirini tetikler.`,`Rakip kampanya analizi için Auction Insights raporu güçlü bir sinyal verir.`,`Sezonalite gerçektir — geçen yılın aynı dönemi ile karşılaştırma yapmadan yorum yapma.`],quiz:[{id:`q-s2-1-1`,type:`scenario`,question:`CPA arttı, CTR da düştü, frequency 10. En olası sorun ne?`,options:[`Tracking bozuk olarak değerlendir`,`Creative fatigue ve audience saturation`,`Bütçe yetersizliği kaynaklı performans sorunu`,`Landing page sorunu`],correct:1,explanation:`Yüksek frequency + düşen CTR = reklam yorgunluğu sinyali. Aynı kişilere tekrar tekrar gösterildi, dikkat çekmiyor. Yeni kreatif ve audience genişletme gerekiyor.`},{id:`q-s2-1-2`,type:`concept`,question:`CPA analizi yaparken conversion rate'in düştüğünü görüyorsun. Bu hangi katmanı işaret eder?`,options:[`Dönüşüm takibinin yapıldığı ölçüm katmanı`,`Hedef kitle tanımlamasının yapıldığı segment katmanı`,`Landing page, ürün fiyatı veya stok sorunu`,`Reklam kreatifinin yer aldığı içerik katmanı`],correct:2,explanation:`Conversion rate = tıklayanlar arasından satın alanlar. Düşüyorsa sorun reklamda değil, sonrasında. Landing page yavaş mı? Fiyat değişti mi? Stok bitti mi? Ödeme sayfasında sorun mu var?`},{id:`q-s2-1-3`,type:`comparison`,question:`Auction Insights raporu ne için kullanılır?`,options:[`Kendi kampanyanın performansı için`,`Rakiplerin aynı açık artırmada ne sıklıkla ve ne`,`Anahtar kelime önerisi için`,`Yalnızca kampanya bütçesi tahmin etmek için kullanılır`],correct:1,explanation:`Auction Insights, aynı anahtar kelimelerde kim senin karşında yarışıyor, ne sıklıkla görünüyor ve ortalama pozisyonu ne gösterir. Rakip baskısını anlamak için kritik.`},{id:`q-s2-1-4`,type:`scenario`,question:`Her yıl Ağustos'ta CPA artıyor. Bu yıl da arttı. Önce ne kontrol edersin?`,options:[`Tracking, değerlendir`,`Geçen yıl Ağustos verisini`,`Kreatif değiştir`,`Kampanya bütçesini tamamen kesmek gerekir`],correct:1,explanation:`Döngüsel pattern sezonaliteyi işaret eder. Geçen yıl aynı dönem nasıldı? Eğer her yıl Ağustos'ta artıyorsa bu beklenen bir durum. Önce normali anla, sonra normalin dışında bir şey var mı bak.`},{id:`q-s2-1-5`,type:`concept`,question:`Yöneticinin 'CPA neden arttı?' sorusuna en profesyonel cevap ne?`,options:[`'Bilmiyorum, bakacağım'`,`'Rakip kampanya açmış, normal'`,`'Analiz ettim: ana neden`,`'Sistem sorunu vardı, düzeldi'`],correct:2,explanation:`Senior yanıt: tanı + kanıt + aksiyon. 'Bilmiyorum' zayıflık. 'Rakip, normal' sorumluluktan kaçış. Kök neden + veri + aksiyon planı yöneticinin güvenini kazandırır.`}]},{id:`lesson-s2-2`,title:`Scaling Kararı — Risk Yönetimi ve Learning Phase`,duration:`13 dk`,what:`Scaling (ölçeklendirme) bir kampanyanın bütçesini, kitlesini veya kanallarını büyütme kararıdır. En kritik senior becerilerinden biridir çünkü erken scaling kampanyayı öldürebilir, geç scaling fırsatı kaçırır. Doğru zamanlama veri kalitesine bağlıdır.`,why:`Müşteri veya yönetici 'bütçeyi 2 katına çıkaralım' dediğinde 'tamam' demek kolay ama yanlış olabilir. Neden yanlış olabileceğini, hangi koşullarda doğru olduğunu ve nasıl yapılacağını bilmek seni güvenilir kılar.`,realExample:`Bir e-ticaret kampanyası 3. günde çok iyi sonuç verdi. Müşteri heyecanlandı: 'Bütçeyi 5x yapalım!' dedi. Akıllı karar: Hayır. 3 günlük veri yeterli değil, learning phase tamamlanmadı. 5x scaling learning phase'i öldürür. Doğru yaklaşım: 14. günde, 50+ dönüşüm toplandıktan, CPA stabil hale geldiğinde, önce 1.5x artışla başlamak. Müşteriye bu açıklandı, 2 hafta bekledi. 15. günde 1.5x yapıldı — CPA korundu. 3 hafta sonra 2x yapıldı. Aynı CPA'da 4x harcama.`,howItWorks:`Scaling öncesi 5 soru: 1. CPA stabil mi? (son 7 gün tutarlı mı, ani dalgalanma var mı?) 2. Yeterli dönüşüm verisi var mı? (en az 30-50 dönüşüm) 3. Tracking sağlıklı mı? (bozuk tracking üzerine scaling yapılmaz) 4. Audience genişlemeye hazır mı? (mevcut audience doymuş mu?) 5. Margin sağlıklı mı? (CPA iyidir ama ürün zaten düşük marjlıysa scaling zarar büyütür). Scaling yöntemi: Bütçeyi 1 günde 5x yapma. %20-30 artışla başla, 3-5 gün izle, stabil ise tekrar artır. Learning phase'i korumak için ani büyük değişiklikler yapılmaz.`,comparisonTable:{headers:[`Durum`,`Scaling Kararı`,`Gerekçe`],rows:[{label:`3. gün, harika sonuç`,values:[`Hayır`,`Veri yetersiz, learning phase bitmedi`]},{label:`14. gün, 50 dönüşüm, stabil CPA`,values:[`Evet, kademeli`,`Veri yeterli, %20-30 ile başla`]},{label:`CPA dalgalı, her gün farklı`,values:[`Hayır`,`Stabilite şart, önce sabit dönem bekle`]},{label:`Margin düşük, CPA iyi görünüyor`,values:[`Hayır`,`ROAS iyi ama kâr yok — scaling zarar büyütür`]}]},levelDiff:{junior:`İyi performansı fark eder ve büyüme fırsatlarını araştırır. Veri olgunluğuna dayalı scaling kararlarını öğreniyor.`,mid:`Learning phase'i bilir, sabır gösterir. Scaling sonrası monitoring disiplinini ve sürekli takibi geliştiriyor.`,senior:`Scaling kararını veriye bağlar. Kademeli artış yapar, her adımda CPA'yı izler. Gerekirse geri çeker.`},keyPoints:[`Learning phase (7-14 gün, 30-50 dönüşüm) tamamlanmadan scaling yapılmaz — kural bu.`,`Bütçeyi %20-30'dan fazla artırmak learning phase'i yeniden başlatabilir.`,`Scaling = fırsat, ama yanlış zamanlama = kaybedilen bütçe ve sıfırlanan algoritma.`,`Scaling sonrası ilk 3 gün kritik — performansı saatlik izle, sapma varsa hemen müdahale.`,`Müşteri 'hemen yap' dese bile veri hazır değilse hayır diyebilmek senior özelliğidir.`],quiz:[{id:`q-s2-2-1`,type:`scenario`,question:`Kampanya 5. günde. CPA hedefin altında, müşteri 3x bütçe istiyor. Ne yaparsın?`,options:[`Hemen yap — müşteri istiyor`,`Hayır — learning phase bitmedi`,`Bütçeyi 1.5x olarak değerlendir`,`Yöneticiye sor, sen karar verme`],correct:1,explanation:`5 günlük mükemmel sonuç aldatıcı olabilir. Learning phase tamamlanmadan büyük bütçe artışı algoritmayı sıfırlar. 14 gün ve 30+ dönüşüm sonrası kademeli artış doğru yaklaşım.`},{id:`q-s2-2-2`,type:`concept`,question:`Scaling yaparken neden ani büyük artış değil kademeli artış önerilir?`,options:[`Bütçeden tasarruf etmek amacıyla tercih edilir`,`Büyük ani artış learning phase'i`,`Müşteri böyle istiyor`,`Google böyle zorunlu kılıyor`],correct:1,explanation:`Ani büyük bütçe değişikliği algoritmanın öğrendiklerini bozar. %20-30 kademeli artışlar learning phase'i korur ve performansın stabil kalmasını sağlar.`},{id:`q-s2-2-3`,type:`comparison`,question:`ROAS 5, ama ürünün margin'i %10. Scaling yapılmalı mı?`,options:[`Evet, ROAS harika`,`Hayır — margin %10 ile`,`Evet, ROAS 5 her zaman kârlıdır`,`ROAS ile margin ilgisiz`],correct:1,explanation:`ROAS gelir/harcama oranıdır, kârlılığı göstermez. %10 margin = 100 TL ürün sattığında 10 TL kâr. Reklam maliyetleri, kargo ve iade eklenince zarar olabilir. Scaling bu zararı büyütür.`},{id:`q-s2-2-4`,type:`scenario`,question:`Scaling yaptın, bütçeyi 2x ettin. Sonraki 3 günde ne yaparsın?`,options:[`Tatile git, otomatik çalışır`,`CPA'yı saatlik takip et`,`Bir hafta sonra bak`,`Kararı tamamen yöneticiye bırak, bekle`],correct:1,explanation:`Scaling sonrası ilk 72 saat kritik izleme dönemi. Algoritma yeni bütçeye uyum sağlarken CPA dalgalanabilir. Saatlik monitoring ve hızlı müdahale hazırlığı şart.`},{id:`q-s2-2-5`,type:`concept`,question:`Scaling kararı vermeden önce sorman gereken 5 sorudan ilki nedir?`,options:[`Müşteri istedi mi?`,`CPA stabil mi?`,`Kreatif hazır mı?`,`Rakip ne yapıyor?`],correct:1,explanation:`CPA stabilitesi scaling'in ön koşuludur. Dalgalanan CPA üzerine bütçe artışı belirsizliği büyütür. Stabil, tekrarlanabilir performans scaling'in güvenli zeminidir.`}]}]},{id:`module-s3`,phase:4,icon:`💰`,title:`Business Thinking — Reklamın Ötesi`,description:`ROAS yanılsaması, contribution margin gerçeği ve 'bu kampanya para kazandırıyor mu?' sorusu`,xpReward:160,practicalAssignment:{title:`Kârlılık Analizi — Gerçek Hesaplama`,scenario:`Müşteri: e-ticaret, moda. Aylık 50.000 TL reklam harcaması. Gelir: 200.000 TL. ROAS: 4. Ürün maliyeti: gelirin %55'i. Kargo + iade: gelirin %8'i. Operasyon: aylık 15.000 TL sabit. Bu kampanya kârlı mı? Gerçek kâr/zarar hesapla.`,deliverables:[`Contribution margin hesabı`,`Gerçek kâr/zarar rakamı`,`Break-even ROAS nedir?`,`Bütçe önerin nedir ve neden?`]},lessons:[{id:`lesson-s3-1`,title:`ROAS Yanılsaması ve Contribution Margin`,duration:`15 dk`,what:`ROAS (Return on Ad Spend) reklam harcamasına karşılık elde edilen gelir oranıdır. ROAS 4 = 100 TL harcama → 400 TL gelir. Ama bu kâr mı? Ürün maliyeti, kargo, iade, operasyon giderleri hesaba katıldığında ROAS 4 bile zararlı olabilir. Contribution margin bu maliyetler düşüldükten sonra kalan gerçek katkı payıdır.`,why:`Müşteriye 'ROAS 5, harika gidiyor' derken şirket zarar ediyorsa ciddi bir sorun var. Bu senin fark etmen gereken şey. Senior, ROAS'ı değil kârlılığı yönetir. 'Reklamlar para kazandırıyor mu?' sorusu 'ROAS iyi mi?' sorusundan farklıdır.`,realExample:`Bir ayakkabı markası. ROAS: 5. Gelir: 500.000 TL. Reklam harcaması: 100.000 TL. İyi görünüyor. Ama: Ürün maliyeti %60 = 300.000 TL. Kargo + iade %10 = 50.000 TL. Operasyon 30.000 TL. Toplam maliyet: 480.000 TL. Gerçek kâr: 500.000 - 480.000 = 20.000 TL. ROAS 5 ama kâr marjı %4. Bu ölçeklenebilir bir iş mi? Bütçeyi 2x yapsalar ne olur? Reklam 200.000 TL → Gelir yaklaşık 1.000.000 TL → Maliyet 980.000 TL → Kâr 20.000 TL (aynı). Revenue büyüdü, kâr büyümedi.`,howItWorks:`Contribution margin hesabı: Gelir - Değişken Maliyetler (ürün maliyeti + kargo + iade + reklam). Bu rakam pozitifse kampanya katkı sağlıyor. Sabit maliyetler çıkarıldıktan sonra gerçek kâr kalır. Break-even ROAS = Toplam Maliyet / Reklam Harcaması. Eğer ROAS bu eşiğin altındaysa zarar ediliyor. Formül: Break-even ROAS = 1 / (1 - toplam maliyet oranı). Örnek: Maliyet oranı %80 ise break-even ROAS = 1 / 0.20 = 5. Yani ROAS 5'in altında zarar.`,comparisonTable:{headers:[`Metrik`,`Ne Gösterir`,`Ne Göstermez`,`Tek Başına Yeterli mi?`],rows:[{label:`ROAS`,values:[`Reklam verimliliği`,`Gerçek kârlılık`,`Hayır — margin'siz anlamsız`]},{label:`CPA`,values:[`Dönüşüm maliyeti`,`Ürün kârlılığı`,`Hayır — ürün marjıyla birlikte değerlendir`]},{label:`Contribution Margin`,values:[`Gerçek katkı payı`,`Sabit giderleri içermez`,`Daha iyi — ama tam değil`]},{label:`Net Kâr`,values:[`Gerçek kâr/zarar`,`Kanal bazlı breakdown`,`Evet — ama ajans her zaman göremez`]}]},levelDiff:{junior:`ROAS odaklı performans değerlendirmesi yapar. Margin ve iş modeli perspektifini kazanmaya başlıyor.`,mid:`Break-even ROAS'ı hesaplar, ürün maliyetini sorar. Contribution margin analizini raporlara yansıtmayı öğreniyor.`,senior:`Müşteriyle birlikte unit economics'i çalışır. 'Bu ROAS sizi kârlı kılıyor mu?' sorusunu sorar ve cevabını sayısal gösterir. Kârlılığa göre strateji önerir.`},keyPoints:[`ROAS yüksek ama kâr düşükse problem reklamda değil iş modelindedir — bunu fark etmek senin değerin.`,`Break-even ROAS hesaplaması her müşteri için yapılmalı — strateji buna göre kurulur.`,`Contribution margin = gelir - değişken maliyetler. Bu rakam negatifse kampanya zarara katkı yapıyor.`,`Revenue büyümesi kâr büyümesi demek değildir — ölçekleme kararları bu farkı göz önünde bulundurmalı.`,`Müşterinin iş modelini anlamak reklam optimizasyonundan önemli olabilir — bütünü gören senior değerlidir.`],quiz:[{id:`q-s3-1-1`,type:`scenario`,question:`ROAS 6, ama ürün maliyeti gelirin %85'i. Kampanya kârlı mı?`,options:[`Evet, ROAS 6 harika`,`Muhtemelen hayır`,`ROAS ile maliyet ilgisiz`,`Daha fazla veri gerek, şimdi söylenemez`],correct:1,explanation:`Break-even ROAS = 1 / (1 - 0.85) = 1 / 0.15 = 6.67. ROAS 6 bu eşiğin altında, yani zarar. ROAS yüksek görünse de margin çok düşük.`},{id:`q-s3-1-2`,type:`concept`,question:`Contribution margin nedir?`,options:[`Reklam kârlılığı`,`Gelir eksi değişken`,`ROAS'ın başka adı`,`Platform commission'ı`],correct:1,explanation:`Contribution margin = Gelir - (Ürün maliyeti + Kargo + İade + Reklam maliyeti). Bu rakam kampanyanın sabit giderlere katkısını gösterir. Negatifse kampanya zarar ettiriyor.`},{id:`q-s3-1-3`,type:`scenario`,question:`Müşteri 'ROAS 4, her ay bütçeyi artırıyoruz ama kâr artmıyor' dedi. Ne söylersin?`,options:[`'Normal, zaman alır'`,`'Break-even ROAS'ınızı`,`'Daha fazla bütçe gerekiyor'`,`'Reklam değiştirelim'`],correct:1,explanation:`ROAS 4 ile bütçe artışı kâr artışı sağlamıyorsa margin sorunu var. Önce break-even ROAS hesaplanmalı. Reklam daha verimli yapılmak yerine iş modeli gözden geçirilmeli olabilir.`},{id:`q-s3-1-4`,type:`comparison`,question:`Revenue 1.000.000 TL, reklam harcaması 200.000 TL, ROAS 5. Ürün maliyeti %70, kargo %5, operasyon 50.000 TL. Gerçek kâr nedir?`,options:[`800.000 TL — sadece COGS düşüldü`,`250.000 TL — bazı giderler atlandı`,`0 TL — tüm giderler düşünce net sıfır`,`100.000 TL — yanlış hesaplama`],correct:2,explanation:`Gelir: 1.000.000. Çıkanlar: Ürün %70=700.000 + Kargo %5=50.000 + Reklam=200.000 + Operasyon=50.000 = 1.000.000. Kâr = 0. ROAS 5 bu iş modelinde break-even eşiği.`},{id:`q-s3-1-5`,type:`concept`,question:`Müşteri 'reklam harcamasını 2x yapalım' diyor. Break-even ROAS analizi yapmadan ne söylersin?`,options:[`Hemen değeri kullan`,`Önce break-even ROAS'ı hesaplayalım`,`Tabii ki yaparsın, ROAS iyi`,`Kararı tamamen yöneticiye bırak, bekle`],correct:1,explanation:`2x bütçe = 2x harcama. Ama gelir ve margin aynı oranda büyüyecek mi? Break-even altındaki ROAS ile büyüme zararı büyütür. Önce kârlılık analizi, sonra karar.`}]},{id:`lesson-s3-2`,title:`Attribution Gerçeği — Hangi Kanal Neye Değer?`,duration:`13 dk`,what:`Attribution (atıf) bir dönüşümün hangi reklam kanalına veya temas noktasına yazılacağını belirleme modelidir. Meta 100 satış sayarken Google 70, GA4 ise 55 sayabilir. Bunların üçü de aynı satışları farklı modellerle sayıyor. Gerçek sayı tartışmalı. Senior bu gerçekle çalışmayı bilir.`,why:`Müşteri 'Meta mı Google mı daha iyi?' diye sorar. Platforma bakarak karar vermek yanıltıcı çünkü her platform kendi başarısını en yüksek gösterecek şekilde raporlar. Bu soruya doğru cevap vermek için attribution'ın nasıl çalıştığını anlamak şart.`,realExample:`Bir kullanıcı yolculuğu: Pazartesi Instagram'da reklamı gördü (Meta). Çarşamba Google'da marka arattı ve tıkladı (Google). Cuma doğrudan siteye girip satın aldı (organic). Meta bu satışı kendine yazdı (view-through). Google yazdı (last-click). GA4 'organic' dedi. Kim haklı? Hepsi kısmen haklı. Hiçbiri tek başına doğru değil. Gerçek şu: kullanıcı 3 temas noktasından geçti, satış bu yolculuğun sonucunda oldu.`,howItWorks:`Attribution modelleri: Last Click — son tıklanan kanal alır her şeyi (Google genellikle favori). First Click — ilk temas noktası alır (awareness kanalları favori). Linear — tüm temas noktaları eşit paylaşır. Data-driven — algoritma her kanalın gerçek katkısını tahmin eder (en gelişmiş). Platform-based — her platform kendi modelini kullanır ve genellikle kendini ödüllendirir. Senior için 3 pratik soru: 1. Incrementality — bu kanal olmasaydı bu satış olur muydu? 2. Overlap — kanallar aynı kullanıcıyı mı sayıyor? 3. Bias — platform kendi başarısını şişiriyor mu?`,comparisonTable:{headers:[`Platform`,`Favori Modeli`,`Neden Kendi Başarısını Şişirir`,`Gerçeği Nasıl Bulursun`],rows:[{label:`Meta`,values:[`View-through dahil`,`Reklamı gören ama tıklamayan kullanıcıyı bile sayar`,`View-through'u kapat, sadece click sayar`]},{label:`Google`,values:[`Data-driven (last-click etkili)`,`Arama intent'ini kendine yazma eğilimi`,`GA4 ile karşılaştır`]},{label:`GA4`,values:[`Data-driven veya last-click`,`Paid'i organikle karıştırabilir`,`UTM parametreleri ile kontrol et`]}]},levelDiff:{junior:`Platform çakışmalarını fark eder ve doğru soruyu sorar. Attribution çözümleme yöntemlerini öğreniyor.`,mid:`Attribution modellerini anlar, platformlar arası farkı açıklayabilir. Müşteriye sade ve ikna edici sunum yapmayı geliştiriyor.`,senior:`'Hangisi doğru?' değil 'hangi model hangi kararı destekler?' sorusunu sorar. Incrementality testi önerir. Müşteriye gerçekçi bir çerçeve sunar.`},keyPoints:[`Her platform kendi başarısını maximize eden attribution modelini varsayılan kullanır — bu çıkar çatışmasıdır.`,`Gerçek attribution olmaz — sadece daha iyi veya daha kötü modeller vardır.`,`Incrementality testi en sağlıklı ölçüm yöntemidir ama zaman ve bütçe gerektirir.`,`Overlap analizi — Meta ve Google aynı kullanıcıyı sayıyorsa toplam 170 satış değil, gerçek satış daha az.`,`Attribution kararları bütçe dağılımını doğrudan etkiler — yanlış attribution yanlış bütçeye yol açar.`],quiz:[{id:`q-s3-2-1`,type:`scenario`,question:`Meta 150, Google 80 satış sayıyor, ama gerçek satış 120. Ne oldu?`,options:[`Meta yanlış, Google doğru`,`Overlap — her iki platform aynı`,`Google yanlış olarak değerlendir`,`Sistem hatası olarak değerlendir`],correct:1,explanation:`Attribution overlap: Bir kullanıcı hem Meta'dan hem Google'dan reklam gördüyse, her iki platform o satışı kendine yazabilir. Bu 'double counting' gerçek satışı şişirir. Gerçek sayı platformların toplamından az.`},{id:`q-s3-2-2`,type:`concept`,question:`Incrementality testi ne işe yarar?`,options:[`Conversion sayısını artırır`,`Bu kanal olmasaydı bu satış`,`Attribution modelini değiştirir`,`ROAS'ı iyileştirir`],correct:1,explanation:`Incrementality testi bir kanalı durdurarak veya test/kontrol grubu oluşturarak o kanalın gerçek katkısını ölçer. 'Bu reklam olmasaydı bu kullanıcı almaz mıydı?' sorusunu yanıtlar.`},{id:`q-s3-2-3`,type:`comparison`,question:`Last-click attribution'ın zayıflığı nedir?`,options:[`Çok karmaşık`,`Son tıklamaya kredi verir`,`Çok pahalı değeri kullan`,`Sadece Google kullanır`],correct:1,explanation:`Last-click modeli son reklamı tıklayana %100 kredi verir. Ama kullanıcı daha önce 5 farklı reklamdan etkilenmiş olabilir. Bu modelde awareness kanalları (Meta, TikTok) değersiz görünür, arama (Google) hep kazanır.`},{id:`q-s3-2-4`,type:`scenario`,question:`Müşteri 'Meta işe yaramıyor, keselim' diyor, sadece Meta raporuna bakarak. Ne yaparsın?`,options:[`Tamam, kes değeri kullan`,`Önce Meta'yı kesmenin etkisini analiz et`,`Kes ama bütçeyi Google'a ver`,`Her adımda yöneticine danışarak ilerle`],correct:1,explanation:`Meta'nın kendi raporunda kötü görünmesi onu gereksiz kılmaz. Awareness kanalları last-click'te her zaman zayıf görünür. Meta kesilirse Google ve organic'e gelen trafik de düşebilir. Önce impact analizi.`},{id:`q-s3-2-5`,type:`concept`,question:`Data-driven attribution neden diğer modellerden daha iyi kabul edilir?`,options:[`Rakibinden her koşulda daha düşük maliyetli`,`Google böyle dedi`,`Algoritmik olarak her temas`,`Daha az zaman alır`],correct:2,explanation:`Data-driven model kullanıcı yolculuklarını analiz ederek hangi temas noktasının dönüşüme gerçekten katkı yaptığını hesaplar. Last-click veya first-click gibi keyfi değil, istatistiksel — ama yine de mükemmel değil.`}]}]}],m=[{id:`module-excel`,phase:1,icon:`📊`,title:`Spreadsheet & Veri Analizi`,description:`Performance pazarlamacının günlük silahı: Excel/Google Sheets. Kampanya verisiyle hikaye anlatımı.`,category:`foundation`,xpReward:180,lessons:[{id:`lesson-excel-1`,title:`Excel/Sheets Temelleri — VLOOKUP, Pivot, Kampanya Verisi`,duration:`35 dk`,levelDiff:{junior:`Temel formülleri etkin kullanır. Performans verisiyle entegre analiz yapmayı geliştiriyor.`,mid:`VLOOKUP ve pivot kullanır, veri analizini hızlandırır. Otomatik ve dinamik dashboard kurmayı öğreniyor.`,senior:`Dinamik dashboard kurar, veriyi cross-platform birleştirir, template paylaşır.`},what:`Ham kampanya raporunu (platform, kampanya adı, gösterim, tıklama, maliyet, conversion) seçip Insert → Pivot Table ile özetleme. Satırda 'Platform', değerlerde 'Toplam Maliyet' ve 'Toplam Conversion' — dakikada müşteri sunumuna hazır özet çıkar.`,why:`Ajans hayatında reklam platformlarından indirilen ham veri doğrudan kullanılamaz. VLOOKUP ile farklı dosyaları birleştirmek, pivot ile özet çıkarmak, grafik oluşturmak — bunlar her hafta yapılan işler. Platforma bakabilmek yetmez, veriyi işleyebilmek gerekir.`,howItWorks:`1) CTR: =Tıklama/Gösterim  2) CPC: =Maliyet/Tıklama  3) CVR: =Conversion/Tıklama  4) CPA: =Maliyet/Conversion  5) ROAS: =Gelir/Maliyet. Bunları sütun olarak ekle, formatla (% veya ₺), koşullu biçimlendirme ile kötü değerleri kırmızı yap.`,realExample:`Ajans hayatında reklam platformlarından indirilen ham veri doğrudan kullanılamaz. VLOOKUP ile farklı dosyaları birleştirmek, pivot ile özet çıkarmak, grafik oluşturmak — bunlar her hafta yapılan işler. Platforma bakabilmek yetmez, veriyi işleyebilmek gerekir.`,keyPoints:[`VLOOKUP/XLOOKUP ile farklı dosyaları kampanya ID üzerinden birleştir`,`Pivot table ile platform/kampanya bazında hızlı özet çıkar`,`CTR, CPC, CVR, CPA, ROAS formüllerini bir kez yaz, tüm tabloya sürükle`,`Koşullu biçimlendirme ile kötü performansı saniyede gör`,`Google Sheets'in QUERY() fonksiyonu gerçek zamanlı filtreleme yapar`],quiz:[{id:`q-excel-1-1`,type:`concept`,question:`VLOOKUP ne işe yarar?`,options:[`Grafik oluşturur`,`İki farklı tablodaki`,`Verileri otomatik günceller`,`E-posta gönderir`],correct:1,explanation:`VLOOKUP (veya XLOOKUP), bir anahtar değere (örn. kampanya ID) göre başka bir tablodan ilgili veriyi getirir. Farklı kaynaklardan indirilen iki raporu birleştirmek için kullanılır.`},{id:`q-excel-1-2`,type:`scenario`,question:`Google Ads ve Meta'dan indirdiğin raporları birleştirmek istiyorsun. En hızlı yöntem hangisi?`,options:[`Manuel kopyala yapıştır`,`VLOOKUP ile ortak`,`Sadece birini kullan`,`Yeni bir tablo oluştur`],correct:1,explanation:`Her iki raporda da 'Kampanya Adı' veya ID varsa VLOOKUP ile Meta verisini Google tablosuna çekebilirsin. Manuel kopyala-yapıştır hem yavaş hem hataya açık.`},{id:`q-excel-1-3`,type:`concept`,question:`Pivot table'ın faydası nedir?`,options:[`Formülleri otomatik hesaplar`,`Ham veriyi satır ve sütunlara`,`Grafik çizer olarak değerlendir`,`Veri doğrular olarak değerlendir`],correct:1,explanation:`Pivot table, yüzlerce satır ham veriyi birkaç tıkla özetlemenizi sağlar. 'Platform bazında toplam harcama' veya 'aylık conversion trendi' gibi görünümler pivot olmadan saatler alırdı.`},{id:`q-excel-1-4`,type:`scenario`,question:`CPA hedefin 150₺ ama tablonda hangi kampanyaların üstünde olduğunu bulmak istiyorsun. En verimli yöntem?`,options:[`Her satırı tek tek bak`,`CPA sütununa koşullu`,`Sadece en pahalı kampanyaya bak`,`Pivot table kullan`],correct:1,explanation:`Koşullu biçimlendirme (conditional formatting) ile CPA>150 olan hücreleri kırmızı, altını yeşil yapabilirsin. 100 satırlık raporda sorunlu kampanyalar anında görünür.`},{id:`q-excel-1-5`,type:`concept`,question:`CVR (Conversion Rate) formülü nedir?`,options:[`Maliyet / Tıklama`,`Conversion / Tıklama`,`Gelir / Maliyet`,`Tıklama / Gösterim`],correct:1,explanation:`CVR = Conversion sayısı / Tıklama sayısı. Örnek: 1000 tıklama, 50 conversion → CVR = %5. Bu metrik açılış sayfası kalitesini ve hedef kitle uyumunu gösterir.`}]},{id:`lesson-excel-2`,title:`Kampanya Verisiyle Hikaye Anlatımı — Dashboard & Sunum`,duration:`30 dk`,levelDiff:{junior:`Veri toplar ve raporlar. Etkili veri sunumu ve görselleştirmeyi öğreniyor.`,mid:`Grafik ekler ve raporu görselleştirir. Hangi metriğin hikayeyi en iyi anlattığını belirlemeyi öğreniyor.`,senior:`Her müşteri için özelleştirilmiş dashboard kurar, trend ve insight'ı ön plana alır.`},what:`'CPC 4.20₺' bir veri. 'CPC geçen aya göre %18 düştü, çünkü negative keyword eklendi' bir insight. Müşteri veriyi zaten görebilir — senin değerin veriyi yorumlamakta. Her raporda 3 şey olmalı: ne oldu, neden oldu, sırada ne var.`,why:`Zaman trendi → Çizgi grafik. Karşılaştırma (platform A vs B) → Sütun grafik. Oran/pay → Halka grafik. Dağılım → Scatter plot. Yanlış grafik tipi veriyi gizler. Örn: 12 ayın CPA trendini pasta grafik ile anlatmak anlamsız.`,howItWorks:`Çok fazla metrik sunmak. 20 tablo, 15 grafik — müşteri bunalır, asıl mesaj kaybolur. Kural: Her sunum için max 5 ana metrik seç. Kalanları ek tablo olarak hazır tut, soru gelirse göster.`,realExample:`Google Sheets'i Looker Studio'ya veri kaynağı olarak bağlayabilirsin. Sheets'i güncellediğinde dashboard otomatik yenilenir. Müşteriye 'canlı rapor linki' gönderirsin, her sabah manuel export gerekmez.`,keyPoints:[`Veri ve insight farklı şeyler — her raporda 'neden' ve 'sırada ne var' olmalı`,`Doğru grafik tipi: trend için çizgi, karşılaştırma için sütun, oran için halka`,`Looker Studio + Google Sheets bağlantısı ile canlı otomatik dashboard`,`Executive Summary: Hedef → Sonuç → İyi giden → Gelişim → Önümüzdeki adım`,`Maksimum 5 ana metrik — geri kalanını soru gelirse göster`],quiz:[{id:`q-excel-2-1`,type:`concept`,question:`Müşteriye 'CPC bu ay 4.20₺ oldu' demek ne tür bir bilgi verir?`,options:[`Insight — neden olduğunu açıklar`,`Veri — yorumsuz bir sayı, bağlam yok`,`Öneri — ne yapılacağını anlatır`,`Hedef — ulaşılmak istenen seviye`],correct:1,explanation:`Bu sadece bir veri noktası. Insight olması için 'neden 4.20₺ oldu, bir önceki aya göre ne değişti ve bu iyi mi kötü mü' açıklaması gerekir. Müşterinin asıl beklediği yorumdur.`},{id:`q-excel-2-2`,type:`concept`,question:`12 aylık CPA trendini göstermek için hangi grafik türü kullanılır?`,options:[`Pasta grafik`,`Çizgi grafik`,`Radar grafik`,`Scatter plot`],correct:1,explanation:`Zaman içindeki değişimi (trend) göstermek için çizgi grafik en uygunudur. Pasta grafik oran/dağılım, scatter dağılım için kullanılır. 12 aylık trendi pasta grafikle anlatmak anlamsız olur.`},{id:`q-excel-2-3`,type:`scenario`,question:`Müşteri her sabah güncel dashboard görmek istiyor, manuel export istemiyorsun. Ne yaparsın?`,options:[`Her sabah manuel Excel gönder`,`Looker Studio'yu Google`,`PDF
