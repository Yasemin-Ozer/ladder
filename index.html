tasıdır. Ajansın süreçleri, müşterileri, araçları ve ekip dinamiklerini anlamak önce gelir. İnisiyatif değerlidir ama bağlam olmadan alınan kararlar hata üretir. Soru sormak güçlü bir öğrenme aracıdır.`},{id:`q-final-41`,type:`concept`,question:`Programmatic garantili satın alma (Programmatic Guaranteed) ile açık artırma (Open Auction) farkı nedir?`,options:[`İkisi de aynı fiyat mekanizmasıyla çalışır`,`Programmatic Guaranteed: önceden anlaşılan fiyat ve garantili impression; Open Auction: gerçek zamanlı rekabetçi açık artırma`,`Open Auction daha pahalıdır, Programmatic Guaranteed daha ucuzdur`,`Programmatic Guaranteed yalnızca video için, Open Auction display için`],correct:1,explanation:`Programmatic Guaranteed, yayıncı ile reklamveren arasında önceden sabit fiyat ve garantili impression hacmi belirlenir. Open Auction'da ise gerçek zamanlı RTB ile en yüksek teklif sahibi kazanır; fiyat değişkendir.`},{id:`q-final-42`,type:`scenario`,question:`Meta piksel, purchase eventi gönderiyor ama GA4'te farklı sayı görünüyor. Sebebi ne olabilir?`,options:[`İki platform da tamamen aynı sayıyı göstermelidir`,`Attribution window, cross-device takip ve modelleme farklılıkları; Meta view-through içerebilir, GA4 last-click bazlı çalışır`,`Piksel bozuk, yeniden kurulmalı`,`GA4 her zaman yanlış sayar, Meta'ya güven`],correct:1,explanation:`Meta ve GA4 farklı attribution modelleri kullanır. Meta view-through conversion'ı sayabilir; GA4 genellikle session bazlı last-click değerlendirir. Cross-device journey'de de ayrışmalar olur. Bu normal ve beklenen bir durumdur.`},{id:`q-final-43`,type:`concept`,question:`Microsoft Advertising'in Google Ads'e kıyasla avantajı nedir?`,options:[`Microsoft tamamen aynı özelliklere sahip, fark yok`,`Genellikle daha düşük CPC, daha yaşlı ve yüksek gelirli B2B kitlesi ve LinkedIn entegrasyonu`,`Microsoft sadece ABD'de etkili, Türkiye'de kullanılmaz`,`Microsoft her zaman daha iyi dönüşüm oranı sağlar`],correct:1,explanation:`Bing/Microsoft Ads genellikle Google'a kıyasla %20-40 daha düşük CPC sunar. Kullanıcı tabanı daha yaşlı ve yüksek gelirlidir, B2B için değerlidir. LinkedIn profil hedeflemesi ekstra güçtür.`},{id:`q-final-44`,type:`scenario`,question:`Bir influencer kampanyasının ROI'sini nasıl ölçersin?`,options:[`Beğeni ve yorum sayısına göre değerlendirirsin`,`UTM linkler, özel indirim kodları, referral traffic, direct attribution ve brand search artışı ile ölçersin`,`Influencer'ın follower sayısına göre hesaplarsın`,`ROI ölçülemez, qualitative değerlendirme yapılır`],correct:1,explanation:`Influencer ROI ölçümü için: UTM parametreli linklerle trafik, özel indirim kodlarıyla satış, Google Analytics referral raporu, marka aramasındaki artış ve eğer bütçe varsa brand lift araştırması kullanılır.`},{id:`q-final-45`,type:`concept`,question:`Customer Lifetime Value (CLV) neden CAC ile birlikte değerlendirilmelidir?`,options:[`İkisi bağımsız metriklerdir, birlikte değerlendirilmez`,`CLV/CAC oranı, müşteri kazanmanın karlı olup olmadığını gösterir; CLV > 3x CAC sürdürülebilir büyüme için ideal`,`CAC düşük olduğunda CLV önemli değildir`,`CLV yalnızca abonelik modelli işletmeler için hesaplanır`],correct:1,explanation:`CAC: müşteri kazanma maliyeti. CLV: müşterinin ömür boyu getirisi. CLV/CAC = 3x ideal orandır. Bu oran 1'in altındaysa her kazanılan müşteri zarar ettiriyor demektir. Pazarlama yatırımının sürdürülebilirliğini bu oran belirler.`},{id:`q-final-46`,type:`scenario`,question:`Bir e-ticaret sitesinin mobil dönüşüm oranı desktop'ın 3 katı altında. Önce neye bakarsın?`,options:[`Mobil bütçeyi artır, daha fazla trafik getir`,`Mobil UX: sayfa hızı, form deneyimi, ödeme akışı ve responsive tasarım sorunlarını incele`,`Mobil audience'ı hariç tut, desktop'a odaklan`,`Fiyatları düşür, mobil kullanıcılar fiyat hassasiyetine sahip`],correct:1,explanation:`Mobil CVR düşüklüğü çoğunlukla UX kaynaklıdır. PageSpeed Insights ile hız ölçümü, session replay ile kullanıcı davranışı izleme, ödeme flow'unda friction noktaları belirleme ve responsive form tasarımı öncelikli adımlardır.`},{id:`q-final-47`,type:`concept`,question:`Sosyal medya raporlamasında vanity metrics ile actionable metrics arasındaki fark nedir?`,options:[`İkisi de aynı derecede önemlidir, ayrım yapılmaz`,`Vanity metrics (beğeni, follower) iyi görünür ama iş kararlarını etkilemez; actionable metrics (CVR, CPL, ROAS) gerçek performansı gösterir`,`Follower sayısı her zaman en önemli metriktir`,`Actionable metrics sadece e-ticaret için geçerlidir`],correct:1,explanation:`Beğeni ve takipçi sayısı ego tatmini verir ama satışı açıklamaz. CVR, CPL, ROAS ve revenue attribution iş kararlarını destekler. Müşteriye sunarken vanity metrics güzel görünse de actionable metrics kararları değiştirir.`},{id:`q-final-48`,type:`scenario`,question:`Rakip markanın Google'da kendi marka adını hedeflemekte. Nasıl yaklaşırsın?`,options:[`Hukuki işlem başlat, bu yasadışıdır`,`Kendi marka keyword'lerinde kampanya aç, bid ver; rakibi kendi adında dışarı itme ve mesajı net tut`,`Rakibe misilleme olarak onların brand keyword'lerini hedefle`,`Durumu görmezden gel, organik sonuçlar zaten ilk sıradadır`],correct:1,explanation:`Rakip brand targeting yasal ve yaygındır (ticari marka ihlali yoksa). Savunma için kendi brand kampanyanı aç ve yüksek QS ile rakibi üst sıralardan sıkıştır. Offensive olarak rakip brand keyword'lerini hedeflemek de meşru bir stratejidir.`},{id:`q-final-49`,type:`concept`,question:`Marketing mix modeling (MMM) ile multi-touch attribution arasındaki temel fark nedir?`,options:[`İkisi de aynı sonucu verir, tercih meselesidir`,`MMM makro seviyede kanalların satışa katkısını istatistiksel modeller; MTA bireysel kullanıcı yolculuğunda touchpoint'lere kredi dağıtır`,`MTA daha gelişmiş, MMM eski bir yöntemdir`,`MMM yalnızca offline kanallar için, MTA yalnızca dijital için`],correct:1,explanation:`MMM regresyon ve istatistiksel modelleme ile hangi kanalın satışa katkı yaptığını cookie olmadan ölçer, privacy-safe. MTA ise bireysel kulla
