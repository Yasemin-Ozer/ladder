saniye`,`15-30 saniye optimal`,`5 saniye, değerlendir`,`2 dakika, değerlendir`],correct:1,explanation:`TikTok completion rate'i önemser. Kısa video = yüksek completion rate = algoritma destekler. Uzun format için içerik çok güçlü olmalı.`},{id:`q-8-2-2`,type:`scenario`,question:`Puma için TikTok creator brief'i hazırlıyorsun. En önemli üç unsur nedir?`,options:[`Logo, renk, slogan`,`Hook (ilk 3 saniye`,`Sadece ürünü göster`,`Uzun açıklama`],correct:1,explanation:`İyi TikTok brief = hook fikri + ses yönlendirmesi + stil (authentic vs polished) + CTA. Creator'a net yön vermek içerik kalitesini ve marka uyumunu garanti eder.`},{id:`q-8-2-3`,type:`comparison`,question:`Stüdyo videosu vs UGC style TikTok'ta hangisi genellikle daha iyi performans gösterir?`,options:[`Stüdyo videosu her zaman daha profesyonel göründüğü için üstündür`,`UGC style: native ve organik hisseder, algoritma tarafından tercih edilir`,`İkisi de aynı performansı gösterir, format fark etmez`,`UGC style yalnızca küçük markalar için uygun, büyük markalar stüdyo kullanmalı`],correct:1,explanation:`UGC style genelde kazanır ama premium markalarda marka değeriyle dengelenmeli. 'Kaliteli ama authentic görünen' ideal kombinasyon.`},{id:`q-8-2-4`,type:`concept`,question:`TikTok Creative Center hangi bilgileri verir?`,options:[`Takipçi listesi`,`Trending ses, hashtag ve`,`Pixel kurulum kılavuzu`,`Kampanya bütçesini hesaplamak için kullanılır`],correct:1,explanation:`Creative Center ücretsiz rekabet istihbaratı verir. Haftalık bakış alışkanlığı, brief'leri ve creative kararları besler.`},{id:`q-8-2-5`,type:`scenario`,question:`H&M TikTok kampanyasında A ve B creative test ediyorsun. A (stüdyo) hook rate %7, B (UGC) hook rate %31. Ne yaparsın?`,options:[`İkisini eşit dağıt`,`B'ye bütçeyi kaydır`,`A'ya bütçe ver`,`Her ikisini de kapat`],correct:1,explanation:`Veri konuşuyor. %31 vs %7 hook rate — B açık kazanan. Bütçeyi kaydır, bulguyu marka ekibiyle paylaş, strateji değişikliği öner.`}]}]},{id:`module-9`,phase:2,icon:`📌`,title:`Pinterest Ads`,description:`Pinterest discovery funnel'ı, Shopping Ads, Product Pins, lifestyle marka stratejisi ve save rate analizi`,xpReward:150,lessons:[{id:`lesson-9-1`,title:`Pinterest Kullanıcı Davranışı ve Shopping Ads`,duration:`15 dk`,what:`Pinterest, kullanıcıların ürün ve fikir keşfettiği inspiration-first platformdur. Satın alma niyeti yüksek ama döngüsü uzun. Shopping Ads, ürün katalog feed'i üzerinden dinamik reklam gösterir. Product Pins, fiyat ve stok bilgisini doğrudan pin üzerinde gösterir.`,why:`Levi's, Maje, Sandro gibi lifestyle ve fashion markaları için Pinterest kritik bir kanal. Kullanıcı Pinterest'e 'nasıl giyineyim', 'ev dekorasyonu nasıl olsun' diye gelir — purchase intent yüksek ama sabırlı. Bu uzun döngüyü anlamayan kampanyacı erken yorulur ve yanlış karar verir.`,realExample:`Maje sonbahar koleksiyonu. Pinterest kampanyası başlatıldı. 4 hafta sonra müşteri: 'ROAS 0.6x, Google'a geçelim.' Senior'ın yanıtı: 'Pinterest attribution penceresi 30 gündür. Kullanıcı bugün pin'e save yapıyor, 3 hafta sonra alıyor. 6. haftada ROAS 2.8x'e çıktı. Pinterest long-cycle kanal — attribution window uzat, sabırlı ol.' Doğru — 8. haftada ROAS 3.4x'e ulaştı. Müşteri Pinterest bütçesini artırdı.`,howItWorks:`1. Pinterest kampanya tipleri: Awareness (video/static), Consideration (traffic), Conversion (Purchase). 2. Shopping Ads: Ürün katalog feed'i bağla (Shopify entegrasyonu veya CSV). Otomatik ürün pin'leri. Product Pins: Fiyat, stok bilgisi, direkt ürün sayfası linki. 3. Audience: Interest targeting (Fashion, Home, DIY), Keyword targeting (Pinterest search), Actalike audiences (Lookalike), Customer list upload, Visitor remarketing. 4. Pinterest Tag: Web sitesine kur, View, Add to Cart, Checkout event'lerini track et. 5. Attribution: Varsayılan 30 gün click + 30 gün engagement. Uzun döngü için 30 günlük attribution şart. 6. Catalog feed optimizasyonu: Title'da keyword (Pinterest search bazlı), güçlü lifestyle görsel, doğru fiyat ve stok.`,levelDiff:{junior:`Pinterest'i keşfeder. Platformun reklam potansiyeli ve e-ticaret entegrasyonunu öğrenme aşamasında.`,mid:`Pinterest kampanyaları kurar ve optimize eder. Attribution döngüsünü ve sabırlı karar almayı geliştiriyor.`,senior:`Pinterest attribution window'u doğru ayarlar, long-cycle müşteri journey'i müşteriye açıklar, catalog feed'i optimize eder, lifestyle markaların Pinterest stratejisini kurar.`},keyPoints:[`Pinterest = uzun satın alma döngüsü. 30 günlük attribution penceresi standart. Kısa attribution ile Pinterest başarısız görünür ama aslında seed veriyor.`,`Save rate Pinterest'in en değerli metriği. Save = 'ileride buna ihtiyacım olacak' sinyali. Yüksek save rate = yüksek future purchase intent.`,`Pinterest SEO önemli. Pin title ve description'da keyword kullan — Pinterest kendi içinde bir arama motorudur. 'Maje sonbahar elbise' → doğru keyword = organik keşif.`,`Lifestyle görsel zorunlu. Ürün beyaz arka plan değil, gerçek ortamda, modelliyle gösterilmeli. Pinterest estetiği = aspiration + authenticity.`,`Pinterest'te 65% kullanıcı cep telefonunda ama satın almalar desktop'ta daha yüksek. Mobile-first tasarım ama desktop conversion'ı takip et.`],quiz:[{id:`q-9-1-1`,type:`concept`,question:`Pinterest'te 'save' metriği neden önemlidir?`,options:[`Beğeni gibi anlamı var`,`Kullanıcının 'ileride`,`Anlamsız bir eylem`,`Reklam maliyetini etkiler`],correct:1,explanation:`Save = bookmark. Kullanıcı ürünü/fikri 'hatırlamak' istiyor. Bu, future purchase için güçlü sinyal. Save oranı yüksek campaign = uzun vadede conversion getirecek.`},{id:`q-9-1-2`,type:`scenario`,question:`Levi's Pinterest kampanyası 3. haftada ROAS 0.4x. Müşteri 'keselim' diyor. Ne yaparsın?`,options:[`Müşteri haklı, kes`,`Pinterest attribution döngüsü 30 gün ve daha fazla`,`Nedeni araştırmadan direkt bütçeyi artır`,`Farklı audience segmenti deneyerek hedeflemeyi değiştir`],correct:1,explanation:`Pinterest'te erken kesim en büyük hata. Kullanıcı bugün pin'i save ediyor, 2-3 hafta sonra satın alıyor. 30 günlük attribution bunu yakalar.`},{id:`q-9-1-3`,type:`comparison`,question:`Pinterest Shopping Ads vs Google Shopping farkı?`,options:[`İkisi de aynı kullanıcı niyetine hitap eder`,`Google Shopping: aktif satın alma niyeti`,`Pinterest Shopping her platformdan üstün dönüşüm sağlar`,`Google Shopping her durumda üstün performans gösterir`],correct:1,explanation:`Google Shopping BOFU, Pinterest Shopping TOFU-MOFU güçlü. Fashion markaları için ikisi birlikte: Pinterest ilham verir, Google convert eder.`},{id:`q-9-1-4`,type:`concept`,question:`Pinterest'te hangi görsel format en iyi performans gösterir?`,options:[`Beyaz arka plan ürün fotoğrafı`,`Lifestyle bağlamında`,`Siyah beyaz görsel`,`Animasyonlu banner`],correct:1,explanation:`Pinterest kullanıcısı ilham arıyor. Ürünü gerçek hayata entegre gösteren görsel (lifestyle) daha yüksek save rate ve engagement getirir.`},{id:`q-9-1-5`,type:`scenario`,question:`Sandro için Pinterest catalog feed kuruyorsun. En önemli optimizasyon adımı?`,options:[`Sadece ürün adı yaz`,`Title'a Pinterest`,`Feed'i olduğu gibi bırak`,`Sadece bütçeyi artır`],correct:1,explanation:`Pinterest feed optimizasyonu hem paid hem organic performansı etkiler. Keyword başlık, kaliteli görsel ve güncel bilgi Pinterest'in algoritması tarafından ödüllendirilir.`}]},{id:`lesson-9-2`,title:`Pinterest Analytics ve Lifestyle Marka Stratejisi`,duration:`14 dk`,what:`Pinterest Analytics, pin performansı, audience demografisi, top performing içerik ve sezonluk trend verisi sunar. Maje, Levi's gibi lifestyle markaların Pinterest stratejisi discovery odaklı, inspiration-first ve uzun vadeli içerik planlamasına dayanır.`,why:`Pinterest'te 'ne kadar para harcadım, ne kadar sattım' lineer değerlendirme yetersiz. Uzun döngüyü ve marka building etkisini anlamak için analytics derinlemesine okunmalı. Doğru strateji = marka değerini hem koruyup hem satış getirir.`,realExample:`Levi's denim. Pinterest analytics: 5 pin kategorisi analizi — Klasik mavi 501 = 10K impression, %2 save rate. Vintage siyah = 50K impression, %3.1 save rate. Trend model = 30K impression, %0.9 save rate. Insight: Vintage stil + aspirational ama ulaşılabilir görsel = en yüksek engagement. Karar: Vintage stiline 3x bütçe, trend model format Pinterest'te değil TikTok için uygun. Kanal-spesifik creative strateji netleşti.`,howItWorks:`1. Pinterest Analytics dashboard: Overview, Audience insights, Conversion insights. 2. Pin metrikleri: Impressions, Saves, Outbound clicks, Pin clicks. Save rate = (saves / impressions) × 100. 3. Audience insights: Demografi (yaş, cinsiyet, konum), interest kategorileri, device. 4. Top pins raporu: Save ve outbound click bazlı sort. En iyi performing format ve stili tanımla. 5. Seasonality: Pinterest'te sezonluk planlama kritik. Yaz koleksiyonu pinleri 8-10 hafta önceden yayınlanmalı. 6. Organic + Paid sinerji: Organik pin performansı iyi olanı paid ile destekle (Spark Ads gibi mantık). 7. Lifestyle marka stratejisi: Sadece ürün değil, yaşam tarzı sat. 'Maje giyen kadın' değil 'bu hayatı yaşayan kadın' anlatısı.`,levelDiff:{junior:`Pinterest'te içerik yayınlar. Analytics ve optimizasyon araçlarını kullanmayı geliştiriyor.`,mid:`Top pin raporuna bakar, iyi performanslı pini boost eder. Sezonluk içerik planlamasını ve long-cycle attribution'ı geliştiriyor.`,senior:`Save rate analizinden creative brief üretir, sezonluk içerik takvimi kurar, organic-paid sinerjiyi yönetir, lifestyle brand narrative'ini Pinterest formatına uyarlar.`},keyPoints:[`Save rate = Pinterest'in en değerli engagement metriği. Impression'dan, tıklamadan daha anlamlı. Yüksek save rate = uzun vadeli conversion pipeline.`,`Sezonluk planlama Pinterest'te kritik. Kullanıcılar 2-3 ay önceden arama yapmaya başlar. Yaz koleksiyonunu mart ayında pin'lemek zorundasın.`,`Pinterest organik keşif güçlü. Paid campaign açmadan önce organik performansı test et — iyi organik performans paid'in ROI'unu artırır.`,`Lifestyle narrative ürün listesinden güçlüdür. 'Maje elbise 1200 TL' değil, 'Paris'te sabah kahvesi, o hissi giy.' İlham sat, ürün kendiliğinden gelir.`,`Pinterest'te 'keywords' kritik çünkü arama bazlı keşif var. Her pin için Pinterest search keyword araştırması yap (Pinterest search bar öneri aracı).`],quiz:[{id:`q-9-2-1`,type:`concept`,question:`Pinterest'te sezonluk kampanya ne kadar önceden başlamalı?`,options:[`1 hafta önce olarak değerlendir`,`8-12 hafta önce. Pinterest`,`1 ay önce değeri kullan`,`Gün başlamadan olarak değerlendir`],correct:1,explanation:`Pinterest uzun planlama platformudur. Kullanıcılar yaz modasını nisanda araştırmaya başlar. Marka olarak mart sonunda yayında olmalısın.`},{id:`q-9-2-2`,type:`scenario`,question:`Maje için 3 farklı pin stili test ettin. A: ürün close-up (save rate %0.8), B: model lifestyle (save rate %2.9), C: flat lay (save rate %1.4). Ne yaparsın?`,options:[`Üçünü eşit dağıt`,`B'ye bütçeyi kaydır`,`A en güvenli, onu seç`,`C ortada, onu seç`],correct:1,explanation:`Save rate data açık konuşuyor. Lifestyle model = Maje audience'ının beklentisi. Bu insight brief'i ve creative yönü belirler.`},{id:`q-9-2-3`,type:`comparison`,question:`Pinterest organik vs Pinterest Paid — nasıl birlikte kullanılır?`,options:[`Organik ve paid birbirini olumsuz etkiler, ayrı tutulmalıdır`,`Organik: ücretsiz test ortamı; Paid: kazanan formatları`,`Paid her zaman organikten daha iyi sonuç verir`,`Pinterest'te organik etkisi yoktur, sadece paid kampanyalar işe yarar`],correct:1,explanation:`Organik test = sıfır maliyetle brief geliştirme. En iyi organik performer paid'de de başarılı olur. Bu kombinasyon ROI'u artırır.`},{id:`q-9-2-4`,type:`concept`,question:`Pinterest'te 'lifestyle narrative' neden ürün odaklı içerikten üstündür?`,options:[`Lifestyle narrative aslında dönüşümü düşürür`,`Pinterest kullanıcısı inspirasyon arıyor; ürün kataloğu`,`Lifestyle içerik yalnızca lüks markalar için işe yarar`,`Lifestyle üretimi pahalı olduğu için maliyet avantajı yok`],correct:1,explanation:`Pinterest'in doğası discovery ve aspiration. Kullanıcı ürünü değil, hayali satın alıyor. Lifestyle narrative bu psikolojiye hitap eder.`},{id:`q-9-2-5`,type:`scenario`,question:`Levi's Pinterest kampanyasında keyword hedefleme kullanmıyorsun. Müşteri 'organik reach düşük' diyor. Ne yaparsın?`,options:[`Nedeni araştırmadan direkt bütçeyi artır`,`Keyword hedefleme ekle: Pinterest`,`Kampanyayı tamamen kapatarak dur`,`Daha fazla pin paylaş`],correct:1,explanation:`Pinterest keyword targeting hem organic hem paid keşfi artırır. Pin açıklamalarına ve board adlarına keyword eklenmesi organic reach'i güçlendirir.`}]}]},{id:`module-10`,phase:3,icon:`⚡`,title:`Programmatic & Retargeting`,description:`RTB ekosistemi, DSP/SSP/DMP, Criteo, RTB House dinamik retargeting, fraud tespiti ve mobil attribution`,xpReward:200,lessons:[{id:`lesson-10-1`,title:`RTB Ekosistemi, DSP/SSP/DMP ve Header Bidding`,duration:`18 dk`,what:`Real-Time Bidding (RTB), web sayfası yüklenirken reklam alanı için milisaniyeler içinde gerçekleşen otomatik açık artırma sistemidir. DSP (Demand-Side Platform) reklamverenin, SSP (Supply-Side Platform) yayıncının, DMP (Data Management Platform) ise veri yönetiminin aracıdır.`,why:`Programatik satın alma dijital reklam harcamalarının büyük çoğunluğunu oluşturuyor. UM gibi global ajanlarda DV360 veya The Trade Desk üzerinden programatik kampanya yönetmek standart. 'Programatik nedir' diye soran biri değil, RTB'yi anlatan ve optimize eden biri olman gerekiyor.`,realExample:`Lexus display kampanyası. Yayıncı (Hürriyet.com) sayfa yüklenir. SSP (Google Ad Manager) reklam alanını müzayedeye çıkarır. DSP'ler (DV360, The Trade Desk) milisaniyeler içinde teklif verir — Lexus DV360'ı bağlamsal hedefle (otomobil kategorisi) teklif veriyor. Kazanan: DV360, 45ms içinde. Lexus reklamı görünür. Bu süreç 100ms'den az. Her gün milyarlarca kez tekrarlanır.`,howItWorks:`1. RTB akışı: Kullanıcı → Yayıncı site → SSP müzayede açar → DSP'ler teklif verir → Kazanan reklam gösterilir. Tüm süreç <100ms. 2. DSP: DV360, The Trade Desk, Xandr. Reklamverenin satın alma platformu. Audience targeting, bidding, analytics. 3. SSP: Google Ad Manager, Magnite, PubMatic. Yayıncının inventory monetizasyon platformu. 4. DMP: Krux, Oracle BlueKai, Adobe Audience Manager. 3rd party veri segmentleri. 5. Header Bidding: SSP'nin teklif çağrısını aynı anda birden fazla DSP'ye göndermesi — daha yüksek rekabet, yayıncıya daha iyi fiyat. Waterfall'ın yerini aldı. 6. Deal types: Open auction (RTB), PMP, Preferred deal, Programmatic guaranteed.`,levelDiff:{junior:`Programatik reklamcılığa giriş yapıyor. DSP/SSP/DMP ekosistemini öğreniyor.`,mid:`DSP üzerinden kampanya kurar, RTB mantığını açıklayabilir. Header bidding ve ileri programatik konuları öğreniyor.`,senior:`Deal type kararı verir (open vs PMP), inventory kalitesini değerlendirir, viewability ve fraud metrikleri yönetir, DMP ile audience enrichment yapar.`},keyPoints:[`RTB milisaniyeler içinde çalışır — her impression ayrı açık artırma. Bu granülerlik hedeflemeyi çok güçlü kılar.`,`DSP seçimi önemli. DV360 GMP entegrasyonu için ideal. The Trade Desk bağımsızlık ve geniş inventory için. Her birinin güçlü yanları var.`,`Header bidding yayıncı için daha yüksek gelir, reklamveren için daha şeffaf rekabet ortamı. Waterfall'ın yerini büyük ölçüde aldı.`,`3rd party cookie'ler bitiyor. DMP verileri zayıflayacak. 1st party data stratejisi şimdiden kurulmalı.`,`Programatik garantili (PG) deals: Fiyat ve inventory önceden belirlenir, RTB müzayedesi yok. Premium placement + garantili reach = PG ideal senaryosu.`],quiz:[{id:`q-10-1-1`,type:`concept`,question:`RTB'de bir impression satın alma süreci ne kadar sürer?`,options:[`1 dakika, değerlendir`,`100 milisaniyeden az`,`1 saniye, değerlendir`,`10 saniye`],correct:1,explanation:`RTB'nin mükemmelliği bu hızdadır. Gerçek zamanlı, kullanıcı bazlı hedefleme ile her impression ayrı ayrı değerlendirilir.`},{id:`q-10-1-2`,type:`scenario`,question:`Maje için premium Türk yayıncılarında guaranteed placement istiyorsun. Hangi deal type seçersin?`,options:[`Open auction`,`Programmatic`,`Preferred deal`,`Header bidding`],correct:1,explanation:`PG, marka kampanyası için güvenlik sağlar. Lansman tarihinde garantili görünürlük gerekiyorsa open auction yetersiz.`},{id:`q-10-1-3`,type:`comparison`,question:`Header Bidding vs Waterfall farkı ve neden Header Bidding daha iyi?`,options:[`Waterfall her zaman daha güvenilir ve stabil sonuç verir`,`Waterfall: SSP'ler sırayla sorulur, yavaş ve verimsiz`,`İkisi de aynı CPM'i üretir, sadece teknik kurulum farkı vardır`,`Header Bidding yalnızca büyük yayıncılar için uygundur`],correct:1,explanation:`Header bidding programatikte devrim yarattı. Yayıncılar daha yüksek doluluk oranı ve CPM alır, reklamverenler gerçek rekabetçi ortamda teklif verir.`},{id:`q-10-1-4`,type:`concept`,question:`DMP (Data Management Platform) ne işe yarar?`,options:[`Reklam kreatifi oluşturma`,`3rd party veri segmentler`,`Video player işlevi`,`Fatura ve ödeme sistemi`],correct:1,explanation:`DMP 3rd party cookie'ye bağımlıydı. Cookie'lerin bitmesiyle 1st party data (CRM, site davranışı) daha kritik hale geliyor. Senior bu geçişi yönetmeli.`},{id:`q-10-1-5`,type:`scenario`,question:`DV360 kampanyasında viewability rate %28. Standart %50 altında. Ne yaparsın?`,options:[`Frekans normal aralıkta, değiştirme gerek yok`,`Viewability filter'ı aktive et (min %50 viewability`,`Nedeni araştırmadan direkt bütçeyi artır`,`Farklı audience segmenti deneyerek hedeflemeyi değiştir`],correct:1,explanation:`Viewability görünmez impression için para ödememeni sağlar. IAB standardı: display %50 px, 1 sn. Filter olmadan bütçenin önemli kısmı boşa gider.`}]},{id:`lesson-10-2`,title:`Criteo, RTB House ve Mobil Attribution`,duration:`16 dk`,what:`Criteo ve RTB House, dinamik ürün reklamlarıyla retargeting yapan uzmanlaşmış platformlardır. Ürün kataloğu feed'i üzerinden kişiselleştirilmiş reklam gösterirler. Mobil attribution ise AppsFlyer, Adjust gibi MMP'ler (Mobile Measurement Partners) üzerinden yapılır.`,why:`E-ticaret sitelerini ziyaret edip satın almadan gidenlerin %70'i retargeting ile geri kazanılabilir. Criteo ve RTB House bunu otomatik dinamik reklamlarla yapar. Levi's, H&M gibi e-ticaret ağırlıklı markalarda bu araçlar performansın kritik parçası. Mobil app reklamcılığında ise AppsFlyer olmadan fraud'dan korunmak ve gerçek attribution yapmak imkansız.`,realExample:`H&M Türkiye sitesi: Günlük 50.000 ziyaretçi, satın alma oranı %2.1. 49.000 kişi sepete bile eklemeden veya ekleyip terk ediyor. Criteo kampanyası: Bu kullanıcılara baktıkları ürünlerin dinamik reklamı gösterildi. 30 günlük retargeting: 3.200 ek conversion, CPA 28 TL (genel kampanya CPA 65 TL'nin çok altında). Dinamik reklam 'Bu elbiseye baktın, hâlâ burada' mesajı verdi. RTB House ise 'similar product' yaklaşımıyla farklı bir segment kazandı.`,howItWorks:`1. Criteo kurulumu: Ürün kataloğu feed'i (GMC ile aynı format veya Criteo formatı), OneTag (piksel), Event tracking (ViewProduct, AddToCart, Purchase). 2. Criteo algoritması: Shopper Graph — 750M aktif alıcı profili, geçmiş davranış + bağlam + ürün eşleştirmesi. Dinamik creative otomatik oluşturulur. 3. RTB House: Deep learning bazlı algoritma, open internet retargeting. Criteo'ya alternatif veya tamamlayıcı. 4. Retargeting segmentleri: Product viewers (ürün sayfasını görenler), Cart abandoners (sepete ekleyip terk), Past buyers (geçmiş alıcılar — upsell/cross-sell). 5. AppsFlyer/Adjust: Mobil app kampanyasında her install, event ve in-app conversion hangi kaynaktan geldi — MMP atfeder. Fraud detection: Click injection, SDK spoofing tespiti. 6. SKAdNetwork (iOS): Apple'ın privacy framework'ü — aggregate attribution, gerçek zamanlı veri yok.`,levelDiff:{junior:`Temel retargeting mantığını kavramış. Segmentasyon stratejileri ve MMP araçlarını öğreniyor.`,mid:`Criteo kurar, retargeting segmentleri oluşturur. Mobil attribution ve cross-device ölçümü öğreniyor.`,senior:`Criteo + RTB House A/B testini yönetir, retargeting frekansı optimize eder, AppsFlyer fraud raporunu yorumlar, SKAdNetwork kısıtlamalarını müşteriye açıklar.`},keyPoints:[`Cart abandoner retargeting en yüksek ROI'lu segment. Sepete eklemiş ama almamış = en güçlü satın alma niyeti. Criteo bunu otomatik yakalar.`,`Retargeting frekansını kontrol et. Aşırı retargeting (günde 20+ impression) kullanıcıyı rahatsız eder, marka algısını zedeler.`,`Criteo vs RTB House: İkisini test et. Farklı algoritma = farklı audience yakalanır. Çoğu e-ticaret hesabında ikisi birlikte daha iyi performans verir.`,`AppsFlyer olmadan mobil kampanyada fraud körlüğü. Tıklama injection ve SDK spoofing bütçeni tüketir. MMP fraud raporu düzenli kontrol edilmeli.`,`Post-iOS 14 ve SKAdNetwork dünyasında mobil attribution sınırlı. Aggregate data ile karar vermeyi öğren, gerçek zamanlı granüler veri artık yok.`],quiz:[{id:`q-10-2-1`,type:`concept`,question:`Criteo'nun temel çalışma prensibi nedir?`,options:[`Manuel reklam oluşturma`,`Kullanıcının site davranışın`,`Sadece Google'da yayınlanır`,`Sosyal medya retargeting`],correct:1,explanation:`Criteo'nun gücü kişiselleştirme + geniş erişim kombinasyonundan gelir. Kullanıcının tam baktığı ürün = en ilgili mesaj.`},{id:`q-10-2-2`,type:`scenario`,question:`H&M sitesinden ayrılan kullanıcıları retarget ediyorsun. Hangi segment en yüksek ROAS getirir?`,options:[`Tüm site ziyaretçileri`,`Cart abandoners — sepete`,`Sadece yeni ziyaretçiler`,`Tüm internet kullanıcıları`],correct:1,explanation:`Cart abandoner = neredeyse almak üzere olan kullanıcı. Bu segmentin conversion rate'i genel audience'ın 3-5 katı olabilir.`},{id:`q-10-2-3`,type:`comparison`,question:`AppsFlyer vs Adjust — farkları ve kullanım senaryosu?`,options:[`AppsFlyer yalnızca iOS, Adjust yalnızca Android için çalışır`,`İkisi de MMP; AppsFlyer: büyük ecosystem ve güçlü fraud koruması`,`İkisi de tamamen aynı özellikleri sunduğu için fark yoktur`,`MMP kullanmak yerine platform native attribution yeterlidir`],correct:1,explanation:`Her iki MMP de güvenilir seçenek. Önemli olan birini kullanmak — MMP olmadan mobil kampanyada fraud görünmez, attribution imkansız.`},{id:`q-10-2-4`,type:`concept`,question:`Click injection fraud nedir?`,options:[`Sahte tıklama sayısı`,`Kötü niyetli app, gerçek`,`Yüksek CPC değeri kullan`,`Reklam platformunun kendi teknik hatası`],correct:1,explanation:`Click injection mobil ekosistemde yaygın fraud türü. MMP olmadan her install için ödeme yaparsın, gerçekte reklam olmadan install olan kullanıcı için bile.`},{id:`q-10-2-5`,type:`scenario`,question:`Levi's retargeting kampanyasında kullanıcı başına günde 12 impression gözlemliyorsun. Ne yaparsın?`,options:[`Normal görünüyor, devam et`,`Frekans kap koy: kullanıcı`,`Frekansı daha da artır`,`Kampanyayı hemen kapat`],correct:1,explanation:`Retargeting frekansı optimize edilmeli. 12 impression/gün aşırı. 3-5 arası genellikle optimal — hatırlatmak için yeterli, rahatsız etmeyecek kadar az.`}]}]},{id:`module-11`,phase:3,icon:`🎨`,title:`Creative Strategy & Test Döngüsü`,description:`Hook rate, hold rate, video creative anatomisi, bulk copy üretimi, A/B test framework ve fatigue yönetimi`,xpReward:200,lessons:[{id:`lesson-11-1`,title:`Hook Rate, Hold Rate ve Video Creative Anatomisi`,duration:`17 dk`,what:`Video creative anatomisi: Hook (ilk 3 saniye), Body (mesaj ve değer önerisi), CTA (eylem çağrısı). Hook rate ve hold rate bu yapının performansını ölçen metriklerdir. Her platform için hook farklı çalışır — TikTok, Meta, YouTube'un beklentileri farklıdır.`,why:`Performance marketingde en büyük değişken içeriktir. Bütçe, hedefleme ve bidding optimize edilmiş olabilir — ama creative zayıfsa kampanya yavaş yanar. Creative ekibiyle konuşabilen, veri bazlı brief verebilen performance marketingciler directörün gözünde çok değerlidir.`,realExample:`Sandro kampanyası. A/B test: Video A — marka logosu açılışta, stil sahneleri, sonunda CTA. Video B — kadın ayna karşısında 'Bu sezonu nasıl giyineceğimi burada buldum' sorusuyla açılıyor, ürünleri gösteriyor, CTA. Hook rate: A %18, B %54. Hold rate: A %9, B %28. ROAS: A 1.8x, B 4.1x. Insight: Empati hook + soru formatı = izleyiciyi içine çekiyor. Logo ile başlamak değer yaratmıyor.`,howItWorks:`1. Hook tasarımı: İlk kare çarpıcı + İlk cümle merak uyandırıcı. Formatlar: Soru ('Bu hatayı yapıyor musun?'), Claim ('Bunu bilmeden alışveriş yapma'), Problem-solution ('X sorunu var mı? Çözümü bulduk'), Empati ('Ben de bunu merak ediyordum'). 2. Body yapısı: Değer önerisi → Ürün/hizmet → Sosyal kanıt (varsa) → Fayda. 3. CTA: Net, acil, ilgili. 'Hemen Keşfet', 'Sınırlı Stok', 'Linke Tıkla'. 4. Platform adaptation: Meta 9:16 story, 1:1 feed, 4:5 feed. TikTok 9:16. YouTube 16:9. Her platform için ayrı resize ve hook uyarlaması. 5. Video retention tool: Meta'da video retention curve, YouTube Analytics'te watch time raporu. 6. Creative scoring matrix: Hook rate + Hold rate + CTR + Conversion Rate → weighted score → creative ranking.`,levelDiff:{junior:`Creative'leri platforma yükler ve yayına alır. Hook rate ve hold rate gibi metrikleri öğreniyor.`,mid:`Hook rate bakar, düşük performanslıyı pause eder. Veri destekli creative brief yazmayı öğreniyor.`,senior:`Creative brief yazarken hook formatını önerir, body yapısını belirler, A/B test kurar, data bazlı creative scoring yapar, ekibe spesifik 'neden başarısız' geri bildirimi verir.`},keyPoints:[`Creative = performance marketing'in en büyük değişkeni. Aynı audience, aynı bütçe, farklı creative → ROAS 3 kat farklılık normal.`,`Hook format testi: Aynı video içeriğini 3 farklı hook ile test et. Hangi hook'un daha yüksek rate verdiği belirlendikten sonra içerik üretimine yatırım yap.`,`Video retention curve'ü oku. Her dakika veya saniyede izleyici kaybı nerede? Bu kayıp noktaları creative revizyon önceliğini gösterir.`,`Platform-specific creative zorunlu. Instagram'a uygun polished video TikTok'ta batarken, TikTok için çekilmiş UGC YouTube'da düşük kalite algısı yaratır.`,`Creative scoring matrix kur: Hook rate + Hold rate + CTR + Conversion rate puanlandır. Sübjektif 'bu güzel görünüyor' yerine objective 'score 8/10' kararı ver.`],quiz:[{id:`q-11-1-1`,type:`concept`,question:`Video creative'de 'Body' bölümünün temel amacı nedir?`,options:[`Marka logosu göstermek`,`Hook'un yarattığı`,`Fiyatı açıklamak`,`Rakipleri eleştirmek`],correct:1,explanation:`Body = değer iletimi. Hook ilgiyi çekti, body neden önemli olduğunu gösterir, CTA eyleme geçirir. Bu üç yapı birlikte çalışmalı.`},{id:`q-11-1-2`,type:`scenario`,question:`Puma video: Hook rate %42 iyi, hold rate %7 çok düşük. Creative ekibine ne brieflersin?`,options:[`'Hook kötü, değiştir'`,`'Hook güçlü, ilk 3`,`'Tüm videoyu yeniden çek'`,`'CTA'yı değiştir'`],correct:1,explanation:`Spesifik feedback daha değerli. 'Kötü değil, hook çalışıyor ama body vaat ettiğini veremiyor' — creative ekibi neyi değiştireceğini bilir.`},{id:`q-11-1-3`,type:`comparison`,question:`Meta video vs TikTok video creative farkı nedir?`,options:[`Meta ve TikTok için aynı video kullanılabilir, format fark etmez`,`Meta: 1:1/4:5/9:16 formatlar, polished içerik; TikTok: 9:16 zorunlu`,`TikTok'ta polished stüdyo videosu her zaman daha iyi performans verir`,`Meta'da ses önemlidir, TikTok'ta ise görsele odaklanılır`],correct:1,explanation:`Tek video tüm platformlarda kullanmak hiçbirinde iyi çalışmaz. Platform-specific üretim maliyet artırır ama ROI genellikle hakkını verir.`},{id:`q-11-1-4`,type:`concept`,question:`Creative scoring matrix ne sağlar?`,options:[`Güzel creative'i bulmak`,`Sübjektif estetik değerlendirme`,`Tasarım rehberi`,`Kampanya bütçesini hesaplamak için kullanılır`],correct:1,explanation:`'Bu güzel görünüyor' yerine 'skor 8.2/10' kararı — sübjektifliği uzaklaştırır, veri odaklı creative karar sağlar.`},{id:`q-11-1-5`,type:`scenario`,question:`Maje için video yeni geldi, daha yayınlanmadı. Nasıl tahmin edersin hangi hook formatı işe yarayacağını?`,options:[`Sadece sezgine göre karar ver`,`Geçmiş hook rate datana göre`,`Tüm formatları aynı anda dene`,`Yöneticinden format iste`],correct:1,explanation:`Geçmiş veri + sektör benchmarkı = tahmin bazı. Test ile doğrula. Data olmadan karar vermek kör, test etmeden hiçbir şey yapmamak da kayıp.`}]},{id:`lesson-11-2`,title:`A/B Test Framework ve Creative Fatigue Yönetimi`,duration:`16 dk`,what:`A/B test framework, kampanyada değişkenleri sistematik olarak karşılaştırmak için kullanılan bilimsel yaklaşımdır. Tek değişken prensibi, istatistiksel anlamlılık ve minimum örneklem büyüklüğü kritik kavramlardır. Creative fatigue ise aynı kitleye aynı içeriğin tekrarlanmasından kaynaklanan performans düşüşü.`,why:`Sistematik test olmadan optimizasyon şanstır. 'Bu creative daha iyiydi' demek için istatistiksel güven gerekir. Yanlış test kurulumu (birden fazla değişken aynı anda) yanlış sonuç verir ve yanlış karar aldırır. Bu hatadan kaçınmak seni reliability açısından güçlü kılar.`,realExample:`H&M kampanyasında 3 şeyi aynı anda değiştirdik: audience, creative ve CTA. A grubu: geniş audience + video + 'Hemen Al'. B grubu: dar audience + statik görsel + 'Keşfet'. B daha iyi çıktı. Ama neden? Audience mı, creative mi, CTA mi? Bilinmiyor. Doğru test: Sadece creative değiştir (audience ve CTA sabit). Sonra sadece CTA. Sonra audience. Her test net bir öğrenme verir.`,howItWorks:`1. Test kurulumu: A/B test = sadece 1 değişken (creative, audience, placement, CTA). Her şeyi aynı tut, sadece test ettiğini değiştir. 2. Örneklem ve süre: Min 1000 impression / test grubu, min 50 conversion / grup, min 7 gün (haftanın her günü dahil). 3. İstatistiksel anlamlılık: %90-95 confidence level hedefle. Araçlar: A/B test calculator (Neil Patel, Optimizely). 4. Winning criteria: CTR, CPA, ROAS. Primary metric önceden belirlenmeli. 5. Creative refresh schedule: Her 2-3 haftada yeni creative devreye al. Fatigue sinyalleri: frequency 5+, CTR düşüşü, CPM artışı. 6. Winner scale: Kazanan creative'e bütçeyi kaydır. Kaybeden 2 hafta daha izle (data stabilize), sonra pause.`,levelDiff:{junior:`A/B test kurulumlarını yapabilir. Test tasarımı ve istatistiksel anlamlılık kavramlarını öğreniyor.`,mid:`Tek değişken prensibini bilir ve uygular. İstatistiksel anlamlılığı bekleyerek sabırlı karar vermeyi geliştiriyor.`,senior:`Test kurulumunu doğru yapar, istatistiksel anlamlılığı bekler, winning criteria'yı önceden belirler, test learninglerini belgeleyerek ekiple paylaşır.`},keyPoints:[`Tek değişken altın kural. Aynı anda birden fazla değişken = net öğrenme yok. Sistematik test = sistematik öğrenme.`,`Yeterli veri olmadan karar verme. 100 impression'dan karar vermek rastgele karar vermekten farklı değil. Min 50 conversion bekle.`,`Fatigue yönetimi proaktif olmalı. Frekans 5'e gelmeden yeni creative hazırla. Reaktif olmak = birkaç günlük performans kaybı.`,`Test learninglerini kaydet. Her testten ne öğrenildi? Bu bilgi birikimi zamanla brief kalitesini ve intuitionu artırır.`,`Otomatik kampanya optimizasyon (Meta'nın Dynamic Creative) ile manuel A/B test farklı. Dynamic Creative AI optimize eder ama 'neden' sorusunu cevaplamaz. Öğrenmek istiyorsan manuel test yap.`],quiz:[{id:`q-11-2-1`,type:`concept`,question:`A/B testte 'tek değişken prensibi' neden kritiktir?`,options:[`Daha ucuz değeri kullan`,`Aynı anda birden fazla`,`Daha hızlı değeri kullan`,`Platform şart koşuyor`],correct:1,explanation:`Birden fazla değişken = karışık sonuç. 'B daha iyi çıktı ama neden?' sorusu yanıtsız kalır. Öğrenmek istiyorsan tek değişken şart.`},{id:`q-11-2-2`,type:`scenario`,question:`Puma için A/B test başlattın, 3. günde A açıkça kazanıyor. Testi sonlandırıp A'ya geçmeli misin?`,options:[`Evet, hemen geç`,`Hayır — 3 gün yeterli`,`Testi bir ay sürdür`,`A'yı sil değeri kullan`],correct:1,explanation:`Erken kazanan yanıltabilir. Hafta sonu ve hafta içi davranış farklıdır. 7 günden kısa test sonuçları unreliable.`},{id:`q-11-2-3`,type:`comparison`,question:`Meta Dynamic Creative Optimization vs Manuel A/B test farkı?`,options:[`Manuel A/B test artık geçerliliğini yitirdi, Dynamic Creative her zaman üstündür`,`Dynamic Creative: AI tüm kombinasyonları otomatik test eder, hızlı`,`Dynamic Creative yalnızca büyük bütçeli hesaplarda çalışır`,`İkisi de aynı sonucu üretir, sadece otomasyon düzeyi farklıdır`],correct:1,explanation:`İkisinin amacı farklı. Dynamic Creative = performans optimizasyonu. Manuel A/B = öğrenme. Her ikisini farklı amaçlar için kullan.`},{id:`q-11-2-4`,type:`concept`,question:`Creative fatigue sinyalleri nelerdir?`,options:[`Yeni müşteri gelmiyor`,`Frekans 5+ artışı`,`Sadece düşen ROAS`,`Sadece düşen CTR`],correct:1,explanation:`Fatigue kademeli gelişir. Tek bir sinyali beklemek yerine frekans + CTR + CPM trendini birlikte izle. Önceden hazırlık yapmak kayıptan korur.`},{id:`q-11-2-5`,type:`scenario`,question:`Levi's kampanyasında test learninglerini nerede tutarsın?`,options:[`Yazılı kayıt tutmadan yalnızca aklında tut`,`Paylaşımlı bir dokümanda (Notion`,`E-posta üzerinden not olarak takip et`,`Reklam platformunun kendi not bölümüne yaz`],correct:1,explanation:`Bilgi birikimi = kurumsal öğrenme. Test learninglerini yazmayan ekip aynı hatayı tekrarlar. Knowledge base senior'ın değer katma araçlarından biridir.`}]}]},{id:`module-12`,phase:3,icon:`🗺️`,title:`Full-Funnel & Budget Architecture`,description:`Brand vs performance dengesi, cross-channel sinerji, scaling kararları ve hesap mimarisi`,xpReward:200,lessons:[{id:`lesson-12-1`,title:`Brand vs Performance Split ve Cross-Channel Sinerji`,duration:`18 dk`,what:`Brand bütçesi marka bilinirliği ve algısına yatırım yaparken, performance bütçesi doğrudan ölçülebilir sonuç (satış, lead, install) hedefler. Cross-channel sinerji, farklı platformların birbirini beslemesiyle genel kampanya etkinliğinin artmasıdır.`,why:`Sadece performance kanallarına yatırım yapan marka zamanla tükenir — yeni müşteri havuzu kurumaz, marka bilinirliği düşer, conversion maliyeti artar. Sadece brand kanallarına yatırım yapan marka satışa dönüştüremez. Dengeyi kurmak senior'ın işidir.`,realExample:`Lexus Türkiye. Sadece Search kampanyası yapılan dönem: ROAS yüksek ama arama hacmi yavaş düşüyor. Analiz: Marka bilinirliği azaldı, yeni kullanıcılar Lexus'u aramıyor. Çözüm: Bütçenin %30'u brand (YouTube TrueView + DV360 premium inventory), %70 performance (Search + Shopping + retargeting). 6 ay sonra: Lexus brand aramaları %23 arttı, Search campaign'ın conversion oranı %18 iyileşti. Neden? Brand kampanya yeni kullanıcıları huniye çekti, performance onları yakaladı.`,howItWorks:`1. Brand-performance split belirleme: Marka bilinirliği ne? Lansman mı, olgun marka mı? Yeni marka = %60 brand, olgun marka = %30 brand (genel kural, sektöre göre değişir). 2. Kanal rolleri: Brand: YouTube, DV360, TikTok (awareness), Pinterest (inspiration). Performance: Google Search, Shopping, Meta Conversion, retargeting. 3. Cross-channel sinerji: YouTube izleyeni Google Search'te hedefle. Meta trafik audience'ını Google Ads remarketing'e aktar. TikTok viewer'ı Meta'da retarget et. 4. Mesaj tutarlılığı: Her kanalda marka mesajı tutarlı olmalı. Farklı kanalda farklı CTA ve mesaj = marka karmaşası. 5. Cross-channel measurement: CM360 veya Supermetrics ile kanallar arası performans birlikte rapor et. 6. Incrementality test: Bir kanalı geçici kapat, diğer kanalların performansına bak — sinerji etkisini ölç.`,levelDiff:{junior:`ROAS odaklı değerlendirme yapar. Farklı kampanya türlerinin birbirini nasıl tamamladığını keşfediyor.`,mid:`Brand-performance ayrımını bilir ve uygular. Split kararlarını veriye dayalı alıp savunmayı geliştiriyor.`,senior:`Marka durumuna göre optimal split belirler, cross-channel audience akışını tasarlar, sinerji etkisini incrementality test ile ölçer, müşteriyle uzun vadeli marka stratejisini tartışır.`},keyPoints:[`Sadece performance bir bataklık. Yeni kullanıcı girmezse mevcut audience yorulur, CAC artar. Brand yatırımı yeni kullanıcı havuzu oluşturur.`,`Brand kampanya ROI'u uzun vadede görülür. Müşteriye 6-12 aylık bakış açısı sun, sadece bu ayki ROAS değil.`,`Cross-channel sinerji kanallar arasında audience transfer ile güçlenir. GA4'ten segment oluştur → Google Ads'e aktar → Meta custom audience'a yükle.`,`Mesaj tutarlılığı brand equity için kritik. Kullanıcı YouTube'da bir mesaj, Instagram'da başka bir mesaj görürse marka algısı zedelenir.`,`Incrementality test en güçlü sinerji kanıtı. Bir kanalı kapat ve diğerlerindeki düşüşü izle. 'Bu kanal olmadan ne kaybederiz?' sorusunu cevaplar.`],quiz:[{id:`q-12-1-1`,type:`concept`,question:`Sadece performance kanallarına yatırım yapmanın uzun vadeli riski nedir?`,options:[`Hiçbir riski yok`,`Yeni kullanıcı havuzu`,`ROAS düşer değeri kullan`,`CPC artar değeri kullan`],correct:1,explanation:`Performance kampanyalar mevcut ilgiyi yakalar. Brand kampanya yeni ilgi oluşturur. İkincisi olmadan birincisi kurur.`},{id:`q-12-1-2`,type:`scenario`,question:`Yeni kurulan Lila Kağıt markası için brand-performance split nasıl olmalı?`,options:[`Tüm bütçeyi yalnızca performance kampanyalara ver`,`Başlangıçta %60-70 brand`,`Eşit oranda %50 brand, %50 performance dağıt`,`Tüm bütçeyi yalnızca marka bilinirliğine ver`],correct:1,explanation:`Yeni marka = bilinirlik önce. Kimse aramıyorsa Search kampanya verimsiz. Önce brand, sonra performance. Olgun markada oran tersine döner.`},{id:`q-12-1-3`,type:`comparison`,question:`Cross-channel sinerji ölçmek için en güçlü yöntem?`,options:[`Her kanalı ayrı ölç`,`Incrementality test:`,`Attribution modeli`,`ROAS karşılaştırma`],correct:1,explanation:`Incrementality test en az bias içeren ölçüm yöntemidir. Attribution model tahmin yapar, incrementality test gerçekten ölçer.`},{id:`q-12-1-4`,type:`scenario`,question:`H&M YouTube kampanyası ROAS 0.2x. Müşteri 'YouTube para yakmıyor mu?' diye soruyor. Yanıtın?`,options:[`Haklı, YouTube keselim`,`YouTube awareness kanalı`,`YouTube'u keselim`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`YouTube ROAS ile değil, downstream impact ile ölçülmeli. YouTube audience'ının diğer kanallardaki conversion performansı gerçek değeri gösterir.`},{id:`q-12-1-5`,type:`concept`,question:`Mesaj tutarlılığı neden önemlidir?`,options:[`Yalnızca estetik amaçlı kullanılan görsel bir araçtır`,`Kullanıcı farklı kanallarda farklı mesaj görürse`,`SEO için, değerlendir`,`Bütçeden tasarruf etmek amacıyla tercih edilir`],correct:1,explanation:`Marka bir karakter gibidir. Farklı platformlarda farklı kişilik gösterirse güvenilmez görünür. Mesaj tutarlılığı brand equity'nin temelidir.`}]},{id:`lesson-12-2`,title:`Scaling Framework ve Budget Optimizasyon Kararları`,duration:`17 dk`,what:`Scaling, başarılı kampanyayı büyütme sürecidir. Horizontal scaling (yeni audience, kanal, creative), vertical scaling (mevcut kampanyada bütçe artışı) olmak üzere iki türdür. Budget optimizasyonu ise bütçeyi en verimli kanallara ve dönemlere yönlendirme sanatıdır.`,why:`Başarılı bir kampanyayı büyütmek başlatmaktan zordur. Bütçeyi 2x yapınca ROAS 2x olmaz — çoğu zaman düşer. Neden? Audience tükeniyor, bid artıyor, impression kalitesi düşüyor. Bunu bilerek akıllı scale etmek senior'ın fark yarattığı alandır.`,realExample:`Sandro Meta kampanyası. ROAS 5.2x, günlük bütçe 1000 TL. Müşteri 'bütçeyi 5000 TL'ye çıkar' istedi. Junior yaklaşımı: Direkt 5x bütçe. Sonuç: ROAS 1.8x'e düştü. Doğru yaklaşım: Horizontal + vertical hybrid. Önce %20 bütçe artışı (ROAS korunuyor mu kontrol), yeni audience segment ekle (lookalike 2%), yeni creative devreye al. 3 haftada kademeli 3000 TL'ye çıkıldı. ROAS 4.1x'te stabilize oldu. Scale sonrası 4.1x, acele scale sonrası 1.8x — fark büyük.`,howItWorks:`1. Scaling karar kriterleri: ROAS hedefin üstünde mü? (>2 haftalık veri). Impression share kısıtı var mı? (lost IS budget). Audience tükenme var mı? (frequency yüksek mi?). 2. Vertical scaling: Bütçeyi max %20-30 haftalık artır. Büyük ani artış = Smart Bidding learning phase tetiklenir. 3. Horizontal scaling: Yeni audience (lookalike farklı %, benzer interest), yeni kanal (Meta varsa TikTok test), yeni creative, yeni placement. 4. Budget pacing: Kampanya başında daha agresif harca (holiday season, lansman), bitiş döneminde koru. Dayparting ile dönüşüm saatlerinde bütçe yoğunlaştır. 5. ROAS curve: Bütçe arttıkça ROAS genelde düşer (diminishing returns). Optimal bütçe = ROAS minimum hedefin üstünde olduğu maksimum harcama. 6. Portföy yönetimi: Tüm kanalları birlikte bakarak kanal karması optimize et.`,levelDiff:{junior:`Bütçe değişikliklerini uygular. Scaling kararlarının arkasındaki dinamikleri öğreniyor.`,mid:`Kademeli artış yapar ve scaling sürecini takip eder. Horizontal ve vertical scaling kararını veriye dayalı almayı öğreniyor.`,senior:`Scaling karar ağacı kullanır, kademeli artış + horizontal expansion kombine eder, ROAS curve'ü müşteriyle paylaşır, optimal bütçe noktasını belirler.`},keyPoints:[`Ani büyük bütçe artışı = ROAS katliyatı. Max %20-30 haftalık artış ile Smart Bidding'in öğrenmeyi bozma riskini minimize et.`,`Horizontal scaling vertical'dan genellikle daha sağlıklı büyüme sağlar. Yeni audience = taze sinyal = daha sağlıklı ROAS.`,`ROAS diminishing returns gerçektir. Her ek 1000 TL harcama bir öncekinden daha az verimlidir. Optimal noktayı bul.`,`Dayparting ile bütçe verimliliği. Conversion saatlerinde (akşam 20-23) daha fazla harca, düşük conversion saatlerinde (sabah 04-08) azalt.`,`Holiday season için bütçe koru. Ücretler artar (CPM spike) ama conversion oranı da artar. Net analiz: Rakip baskısına rağmen karlı mı? Varsa tam gaz, yoksa bütçeyi sezon sonrasına sakla.`],quiz:[{id:`q-12-2-1`,type:`concept`,question:`Horizontal scaling nedir?`,options:[`Bütçeyi artırma`,`Yeni audience,`,`Bütçeyi azaltma`,`Kampanyayı kopyalama`],correct:1,explanation:`Horizontal scaling tükenen audience'tan kaçınmak için güçlü yöntem. Yeni lookalike segment, yeni platform, yeni creative — her biri taze büyüme kaynağı.`},{id:`q-12-2-2`,type:`scenario`,question:`Puma Meta kampanyası ROAS 4.8x. Müşteri bütçeyi 1000'den 5000 TL'ye çıkarmak istiyor. Nasıl yaparsın?`,options:[`Direkt 5.000 TL'ye çık`,`Kademeli artış: 1.000 →`,`500 TL'ye düşür önce`,`Bütçeyi hiç değiştirme`],correct:1,explanation:`Kademeli artış + horizontal expansion = sürdürülebilir scale. Ani büyük artış Smart Bidding'i bozar, ROAS düşer, müşteri hayal kırıklığı yaşar.`},{id:`q-12-2-3`,type:`comparison`,question:`Vertical vs Horizontal scaling hangisi daha güvenli?`,options:[`Vertical her zaman daha verimli çünkü kanıtlanmış audience kullanılır`,`Horizontal: yeni audience ile taze sinyal, daha güvenli; Vertical: aynı`,`İkisi de eşit risk taşır, hangisinin daha güvenli olduğu kanıtlanmamıştır`,`Horizontal scaling yalnızca küçük bütçeli hesaplarda uygulanabilir`],correct:1,explanation:`Horizontal scaling taze audience bulur, ROAS'ı daha uzun korur. Vertical scaling hız için iyi ama ROAS risk daha yüksek. İkisini birlikte kullan.`},{id:`q-12-2-4`,type:`concept`,question:`ROAS diminishing returns ne anlama gelir?`,options:[`ROAS daha fazla harcamayla sürekli düşer`,`Her ek harcama biriminden giderek daha az return gelir`,`ROAS daha fazla harcamayla sürekli artar`,`Her harcama biriminden sabit return gelir`],correct:1,explanation:`Büyüdükçe audience kalitesi düşer, CPM artar. Bu normal economics. Optimal bütçe noktasını bilmek müşteriyle honest konuşmayı sağlar.`},{id:`q-12-2-5`,type:`scenario`,question:`H&M yılbaşı kampanyasında CPM %80 arttı. Bütçeyi kesmeli misin?`,options:[`Evet, CPM çok yüksek`,`Conversion oranını kontrol et`,`Hayır, devam olarak değerlendir`,`Kampanyayı analiz etmeden tamamen durdur`],correct:1,explanation:`Yüksek CPM tek başına kes sinyali değil. Sezon döneminde CVR da artar. Net CPA ve ROAS karlılığı belirler. Her iki metriği birlikte değerlendir.`}]}]},{id:`module-13`,phase:2,icon:`📋`,title:`Raporlama & Dashboard Tasarımı`,description:`Supermetrics, Funnel.io ile veri otomasyonu, Looker Studio dashboard, Similarweb/Semrush rakip analizi ve executive summary`,xpReward:250,lessons:[{id:`lesson-13-1`,title:`Supermetrics, Funnel.io ve Looker Studio Dashboard`,duration:`17 dk`,what:`Supermetrics ve Funnel.io, farklı reklam platformlarının (Meta, Google, TikTok, DV360) verilerini tek bir yere otomatik toplayan araçlardır. Looker Studio (eski adıyla Google Data Studio), bu verileri görsel, etkileşimli dashboard'a dönüştürür.`,why:`Haftalık raporu manuel hazırlamak: Her platformdan export, Excel'de birleştirme, hesaplama, format — 3-4 saat. Supermetrics + Looker Studio: Bir kez kur, her hafta 15 dakika. Kazanılan 3 saat strateji ve analiz için kullanılır. Bu produktivite farkı yöneticinin seni nasıl değerlendirdiğini etkiler.`,realExample:`UM Worldwide'da Lexus hesabı: Meta, Google Ads, DV360, SA360 ve GA4 verisi her hafta ayrı export, Excel'de birleştiriliyordu — 4 saat. Supermetrics kuruldu: Tüm veri otomatik Google Sheets'e çekiliyor. Looker Studio'da hesap bazlı dashboard oluşturuldu: KPI cards (ROAS, CPA, CTR), kanal bazlı performance trend, haftalık yorum alanı. Müşteriyle haftalık Zoom'da direkt dashboard paylaşılıyor. Rapor hazırlık süresi 4 saattan 20 dakikaya düştü.`,howItWorks:`1. Supermetrics kurulumu: Google Workspace Marketplace'ten kur. Data source: Meta Ads, Google Ads, TikTok Ads, DV360, GA4. Destination: Google Sheets veya Looker Studio. Güncelleme sıklığı: Günlük veya saatlik. 2. Funnel.io: Supermetrics alternatifi, daha gelişmiş transformation. Enterprise ölçek için. 3. Looker Studio dashboard yapısı: KPI cards (ana metrikler), trend grafikleri (haftalık/aylık), kanal karşılaştırma (bar chart), coğrafya (map). 4. Marka bazlı template: Her marka için özelleştirilmiş dashboard. Lexus: Showroom form + brand awareness. H&M: ROAS + revenue. 5. Canlı yorum alanı: Her dashboard'a haftalık 'Bu Hafta Ne Oldu' metin alanı ekle. AI destekli otomatik yorum da mümkün. 6. Dashboard erişim: Client link paylaş — PDF yerine canlı link. Müşteri istediği zaman bakabilir.`,levelDiff:{junior:`Platform raporlarını takip eder. Otomasyon ve dashboard oluşturmayı öğreniyor.`,mid:`Supermetrics kurar, temel dashboard oluşturur. Marka bazlı özelleştirilmiş dashboard tasarımını geliştiriyor.`,senior:`Marka bazlı dashboard template oluşturur, otomasyonu kurar, canlı link paylaşır, dashboard'u müşteriyle birlikte yorumlar. Rapor = iletişim aracı.`},keyPoints:[`Otomasyon = zaman kazanımı = strateji zamanı. Raporlama otomasyonu senior'ın yapması gereken bir investmandır.`,`Looker Studio dashboard müşteriyle iletişimi değiştirir. PDF rapor tek yönlü, canlı dashboard iki yönlü konuşmayı sağlar.`,`KPI cards üst kısımda, trengler ortada, detay altta. Dashboard hiyerarşisi = bilgi önceliklendirme. Müşteri önce özeti, sonra detayı görmeli.`,`Yorum alanı dashboardu daha değerli kılar. Veri + yorum = insight. Sadece veri = karışıklık. 'Bu hafta ROAS düştü çünkü X' cümlesi veriyi anlamlandırır.`,`Supermetrics bağlantısı kopunca veri güncellenmez. Bağlantı sağlığını kontrol et. Müşteri toplantısından önce dashboard'ın çalıştığını doğrula.`],quiz:[{id:`q-13-1-1`,type:`concept`,question:`Supermetrics ne işe yarar?`,options:[`Reklam kreatiflerini otomatik oluşturur`,`Farklı reklam platformlarının verilerini (Meta`,`Keyword araştırması yapar`,`Rakip kampanyalarını doğrudan takip eder`],correct:1,explanation:`Supermetrics veri toplama otomasyonudur. Bir kez kur, sürekli güncel veri. Haftalarca manuel iş birkaç dakikaya iner.`},{id:`q-13-1-2`,type:`scenario`,question:`Müşteri her toplantıda 'son hafta nasıl gitti?' diye soruyor. En verimli çözüm?`,options:[`Her toplantıda sözlü anlat`,`Canlı Looker Studio`,`Excel dosyası e-postayla gönder`,`PDF rapor gönder`],correct:1,explanation:`Canlı dashboard = şeffaflık + verimlilik. Müşteri anlık durumu görür, sen veri toplamak yerine strateji düşünürsün.`},{id:`q-13-1-3`,type:`comparison`,question:`PDF rapor vs Looker Studio canlı dashboard farkı?`,options:[`İkisi de aynı içgörüyü eşit verimlilikle verir`,`PDF: statik ve manuel hazırlık; Looker Studio: canlı`,`PDF her durumda en güvenilir ve tercih edilmesi gereken formattır`,`Looker Studio yalnızca büyük bütçeli şirketlere uygun`],correct:1,explanation:`Dashboard modern client relationship'in standardı olmaya başlıyor. PDF'i hazırlamak yerine dashboard'ı yorumlamak için zaman kullanmak çok daha değerli.`},{id:`q-13-1-4`,type:`concept`,question:`Looker Studio dashboard yapısında ideal hiyerarşi nedir?`,options:[`En detaylı veri en üste koy`,`KPI özet kartlar üstte →`,`Grafikleri hep en üste al`,`Verileri alfabetik sırala`],correct:1,explanation:`Bilgi hiyerarşisi = iletişim verimliliği. Müşteri önce özet görmek ister (ROAS bu hafta ne oldu?), sonra neden, sonra detay.`},{id:`q-13-1-5`,type:`scenario`,question:`Müşteriyle pazartesi toplantısı var. Pazar günü Supermetrics bağlantısının koptuğunu fark ettin. Ne yaparsın?`,options:[`Pazartesi toplantıda söyle`,`Hemen düzelt: Supermetrics`,`Toplantıyı ertele`,`Bağlantı kopukluğunu görmezden gel`],correct:1,explanation:`Proaktif problem çözme = ownership. Müşteri toplantısında 'veri gelmiyor' demek professionalism zedelenmiştir. Önceden kontrol etmek bunu önler.`}]},{id:`lesson-13-2`,title:`Rakip Analizi: Similarweb, Semrush ve Executive Summary`,duration:`15 dk`,what:`Similarweb rakiplerin trafik kaynaklarını, kanal dağılımını ve harcama tahminlerini gösterir. Semrush ise SEO ve SEM rakip analizi için güçlüdür. Executive summary, üst yönetim için hazırlanan özet rapordur — veri değil insight sunar.`,why:`Yönetici veya müşteri üst yönetimi 'rakip ne yapıyor?' sorusunu sorar. Bu soruyu cevaplamak için Similarweb ve Semrush kullanmak seni hızlı ve güvenilir yapan araçlardır. Executive summary ise tüm verileri bir sayfada özetleme becerisidir — C-suite bu sayfayla karar alır.`,realExample:`Lexus rakip analizi. Müşteri: 'BMW son çeyrekte çok agresif pazarlama yaptı, ne yapıyorlar?' Similarweb açıldı: BMW Türkiye sitesi trafiği %34 arttı, search trafiği %58 arttı. Semrush: BMW 'lüks araba' keyword'inde impression share artışı. Tahmin: Yeni model lansmanı ve agresif Google Ads kampanyası. Executive summary: 'BMW agresif search büyümesi. Öneri: Lexus impression share'ini koruyacak bid artışı ve 'Lexus vs BMW' comparison landing page.' 3 slaytta üst yönetime sunuldu, onay verildi.`,howItWorks:`1. Similarweb kullanımı: Rakip URL gir → Traffic overview (monthly visits, traffic sources), Channel mix (search, social, direct), Top keywords, Audience geography. 2. Semrush competitor analysis: Domain Overview → Traffic, keywords, backlinks. Advertising Research → rakibin paid keywords ve ad copy. Position Tracking → keyword ranking takibi. 3. Executive summary yapısı: 1 sayfa (max 2). Bölümler: Bu hafta/ay ne oldu? (3-5 madde). Neden? (kısa analiz). Önerilen aksiyon (3 seçenek). 4. Veri → insight → aksiyon: Ham veri değil çıkarım sun. 'CTR %15 düştü' değil, 'CTR düştü çünkü rakip aynı keyword'de agresif bid açtı, öneri: bid artışı veya creative değişimi.' 5. Görsel > metin: Executive summary'de grafik, tablo, vurgu renkleri. Sayfalarca metin okumak istemiyorlar.`,levelDiff:{junior:`Kendi kampanyalarına odaklanır. Rakip analizi ve executive summary hazırlamayı öğreniyor.`,mid:`Similarweb kullanır, temel rakip trafiğini analiz eder. Veriden stratejik insight çıkarıp aksiyona dönüştürmeyi geliştiriyor.`,senior:`Similarweb + Semrush kombinasyonu ile rakip stratejisini okur, executive summary 1 sayfada sunar, üst yönetim için aksiyon öneriyle biter.`},keyPoints:[`Similarweb trafik tahmini gösterir, kesin veri değil. %15-20 sapma normal. Trend doğrultusunu okumak için kullan, kesin sayı değil.`,`Executive summary 1 sayfada bitmeli. Üst yönetim her detayı okumaz. Önemli olan: ne oldu, neden, ne yapılacak.`,`Veri → insight → aksiyon yapısı executive summary'nin çekirdeği. Sadece veri sunmak değer üretmez. 'Bu demek ki şunu yapmalıyız' cümlesi değerdir.`,`Rakip harcama tahmini Semrush'ta 'Advertising Research' ile tahmin edilebilir. Kesin değil ama trend ve keyword yoğunluğu görünür.`,`Düzenli rakip takibi sürpriz önler. Ayda bir kez Similarweb ve Semrush ile rakiplere bak. Yöneticiye proaktif 'rakip şunu yapıyor' bilgisi vermek güven inşa eder.`],quiz:[{id:`q-13-2-1`,type:`concept`,question:`Similarweb ne tür veriler sunar?`,options:[`Gerçek zamanlı reklam harcaması`,`Tahmini trafik verisi: aylık`,`Sosyal medya takipçi sayısı`,`Ürün fiyat karşılaştırması`],correct:1,explanation:`Similarweb rakip dijital varlığının görünür olmayan kısmını gösterir. Trafik kaynağı, kanal mix, keyword — bunlar rakip stratejisini okumaya yardımcı olur.`},{id:`q-13-2-2`,type:`scenario`,question:`Yönetici 'rakip neden bizden önde?' diye soruyor. Nasıl hazırlıklı olursun?`,options:[`Veriye dayanmadan geçmiş deneyiminle tahmin et`,`Similarweb ile rakip trafik kaynağını`,`Müşteriye doğrudan 'bilmiyorum' de ve geç`,`O konuyu geçerek farklı bir başlığa geç`],correct:1,explanation:`Veri bazlı rakip analizi reaktiflik yerine proaktiflik gösterir. Yönetici sormadan önce sen bulmuş olsan çok daha güçlüsün.`},{id:`q-13-2-3`,type:`comparison`,question:`Similarweb vs Semrush — farkları ve ne zaman hangisi?`,options:[`Semrush her iki işi de yapar, Similarweb gereksizdir`,`Similarweb: genel trafik ve kanal analizi; Semrush: keyword`,`İkisi de tamamen aynı veriyi farklı arayüzle sunar`,`Similarweb yalnızca büyük marka sitelerinde güvenilir veri gösterir`],correct:1,explanation:`İkisi tamamlayıcı. Genel bakış için Similarweb, keyword ve paid detail için Semrush. İkisini birlikte kullanmak rakip resmini netleştirir.`},{id:`q-13-2-4`,type:`concept`,question:`Executive summary'de 'veri → insight → aksiyon' yapısı neden önemlidir?`,options:[`Daha uzun rapor yazmak için`,`Üst yönetim veriyi değil, ne yapılacağını bilmek`,`Yalnızca teknik detayları takip etmek amacıyla kullanılır`,`Daha kısa raporlar hazırlamak amacıyla kullanılan araçtır`],correct:1,explanation:`C-suite'in zamanı kısıtlı. Veriyi analiz etmek senin işin, onların işi karar almak. Sen veri + insight + aksiyon önerisi sun, onlar karar versin.`},{id:`q-13-2-5`,type:`scenario`,question:`Executive summary hazırlıyorsun, 3 sayfa oldu. Ne yaparsın?`,options:[`3 sayfa detaylandırılmış, kabul edilebilir uzunluk`,`İçerik eksik kalacak olsa da 1 sayfaya sıkıştır`,`Kapsamlı bilgi için sayfa sayısını artır`,`Uzunluğu azaltmak için grafikleri çıkar`],correct:1,explanation:`Executive summary 1 sayfada bitmeli. Uzun rapor = okumayan üst yönetim = değersiz rapor. Kısalık becerisi ayrı bir skill — en önemlisini seç, gerisini bırak.`}]}]},{id:`module-14`,phase:4,icon:`💰`,title:`Business Intelligence & Kârlılık`,description:`Unit economics, CAC, LTV, gerçek ROAS hesabı, CLV modelleme ve marka P&L okuma`,xpReward:250,lessons:[{id:`lesson-14-1`,title:`Unit Economics: CAC, LTV ve Gerçek ROAS Hesabı`,duration:`18 dk`,what:`Unit economics, tek bir müşteri kazanımının ve elde tutulmasının finansal modelidir. CAC (Customer Acquisition Cost) müşteri kazanma maliyeti, LTV (Lifetime Value) müşterinin ömür boyu değeri, ROAS ise reklam harcama getirisidir. Gerçek ROAS, platform'un gösterdiği ROAS'tan farklı olabilir.`,why:`ROAS 5x gösteriyor ama şirket zararda. Bu nasıl mümkün? Çünkü platform ROAS sadece reklam maliyetini görür — ürün maliyeti, kargo, iade, ajans fee'si hariç. Senior bu farkı bilir ve müşteriyle gerçek kârlılığı konuşabilir.`,realExample:`Lila Kağıt e-ticaret. Platform ROAS 4.2x (1000 TL harca, 4200 TL gelir). Müşteri mutlu. Ama gerçek hesap: Ürün COGS %55 (2310 TL), kargo 210 TL, iade %12 (504 TL kayıp), ajans fee 150 TL. Net gelir: 4200 - 2310 - 210 - 504 - 1000 (reklam) - 150 = -774 TL. Her satışta zarar! Çözüm: AOV artışı, COGS iyileştirme veya hedef ROAS'ı 8x'e yükseltmek. Platform ROAS = vanity metric. Net kâr = gerçek başarı.`,howItWorks:`1. CAC hesaplama: Toplam pazarlama harcaması / Yeni müşteri sayısı. Dikkat: Organik gelen müşteriler dahil edilmemeli — sadece ücretli kanallardan gelenler. 2. LTV hesaplama: Ortalama sipariş değeri × Yıllık satın alma sıklığı × Müşteri ömrü (yıl). 3. LTV/CAC oranı: 3x üstü = sağlıklı büyüme. 1x altı = her müşteri için zarar. 4. Gerçek ROAS hesabı: (Revenue - COGS - kargo - iade) / Reklam harcaması. Platform ROAS ile gerçek ROAS arasındaki farkı müşteriyle konuş. 5. Payback period: CAC'ı kaç ayda geri alıyorsun? 12 aydan uzun = büyüme sancılı. 6. Contribution margin: Revenue - variable costs (COGS + kargo + iade) = contribution margin. Eğer negatifse hiçbir marketing bunu kurtaramaz.`,levelDiff:{junior:`Platform metriklerini takip eder. Unit economics ve iş etkisi arasındaki bağı öğreniyor.`,mid:`CAC hesaplar ve bütçe verimliliğini değerlendirir. LTV hesaplama ve unit economics'i müşteriyle konuşmayı geliştiriyor.`,senior:`Unit economics modelini müşteriyle kurar, gerçek ROAS hesaplar, LTV/CAC rasyosunu yorumlar, 'bütçeyi artırmak için önce margin'i düzeltmemiz gerekiyor' diyebilir.`},keyPoints:[`Platform ROAS yanıltıcı olabilir. Her zaman COGS, kargo, iade ve ajans fee'sini çıkardıktan sonraki net kârlılığı hesapla.`,`LTV/CAC 3x altındaysa büyüme sağlıklı değil. Müşteriyi kazanmak için çok pahalı ödüyorsun veya müşteri çok az alışveriş yapıyor.`,`Payback period 12 aydan uzunsa cash flow sorunu. Her yeni müşteri için upfront harcama yapılıyor ama gelir yavaş geliyor.`,`Contribution margin negatifse pazarlama problemi değil, iş modeli problemi. Bu durumu müşteriyle açıkça konuşmak gerekir.`,`CAC kanallar arası farklılık gösterir. Google Search CAC 50 TL, TikTok CAC 180 TL olabilir. Ama TikTok müşterisinin LTV yüksekse TikTok daha kârlı.`],quiz:[{id:`q-14-1-1`,type:`concept`,question:`Gerçek ROAS ile platform ROAS farkı nedir?`,options:[`İkisi her zaman aynı sonucu üretir, aralarında fark yoktur`,`Platform ROAS: last-click ölçer, kanallar arası katkıyı görmez`,`Gerçek ROAS her zaman platform ROAS'tan daha düşük çıkar`,`Platform ROAS daha doğrudur çünkü direkt platformdan alınır`],correct:1,explanation:`Platform ROAS bir vanity metric olabilir. Net kârlılık için tüm değişken maliyetleri çıkarmak gerekir. Sadece reklam maliyetiyle kârlılık ölçülmez.`},{id:`q-14-1-2`,type:`scenario`,question:`Müşteri ROAS 4x'te mutlu. Ama ürün margin %20, kargo %8, iade %15. Net kârlı mı?`,options:[`ROAS hedefin üstünde, devam et`,`Hesapla: 1000 TL harca → 4000 TL gelir`,`Nedeni araştırmadan direkt bütçeyi artır`,`ROAS hedefi karşılıyor, yeterli`],correct:1,explanation:`Unit economics hesabı her senior'ın yapabilmesi gereken temel beceri. Müşteriye ROAS rakamının arkasındaki gerçeği göstermek değer yaratır.`},{id:`q-14-1-3`,type:`comparison`,question:`LTV/CAC oranı 1.5x vs 4x — yorumu nedir?`,options:[`İkisi de aynı iş sağlığını gösterir`,`1.5x kârlı ama sınırda; 4x güçlü — agresif`,`1.5x oranı her zaman 4x'ten daha avantajlıdır`,`4x oranı ulaşılması imkânsız bir hedeftir`],correct:1,explanation:`LTV/CAC 3x+ = sağlıklı büyüme benchmark'ı. 1x altı = her müşteri için zarar. Bu oran pazarlama kararlarını doğrudan yönlendirir.`},{id:`q-14-1-4`,type:`concept`,question:`Payback period nedir ve neden önemlidir?`,options:[`Reklam geri dönüş süresi`,`CAC'ı contribution`,`Kampanya süresi`,`Return on Ad Spend`],correct:1,explanation:`Payback period cash flow yönetimi için kritik. Hızlı büyüyen şirket bile uzun payback period ile likidite krizine girebilir.`},{id:`q-14-1-5`,type:`scenario`,question:`H&M Türkiye için TikTok CAC 180 TL, Google Search CAC 50 TL. Yönetici 'TikTok çok pahalı, keselim' diyor. Yanıtın?`,options:[`Haklı, TikTok keselim`,`TikTok müşterisinin LTV'sini kontrol et`,`Nedeni araştırmadan direkt bütçeyi artır`,`Google'a geç olarak değerlendir`],correct:1,explanation:`CAC tek başına anlamsız. LTV/CAC oranı doğru metrik. Yüksek CAC + çok yüksek LTV = kârlı. Bu nuansı yöneticiyle paylaşmak senior'ın değer katkısıdır.`}]},{id:`lesson-14-2`,title:`CLV Modelleme, Marka P&L ve Müşteri Kârlılığı`,duration:`17 dk`,what:`CLV (Customer Lifetime Value), bir müşterinin işletmeyle ilişkisi boyunca üreteceği toplam değerin bugünkü değeridir. Marka P&L (Profit & Loss), bir markanın gelir ve gider tablosudur. Müşteri kârlılık analizi, hangi segmentin en değerli olduğunu gösterir.`,why:`Senior performance marketingci sadece reklam kampanyası değil, müşteri değeri üretir. CLV'yi anlayan kişi 'hangi müşteri segmentine daha fazla bütçe vermeliyiz?' sorusunu cevaplar. Marka P&L'ini okumak ise müşteriyle gerçek bir iş ortağı olarak konuşmana imkan verir.`,realExample:`Levi's müşteri segmenti analizi. GA4 + CRM verisi: Segment A (18-24) — AOV 180 TL, yılda 1.2 alışveriş, 2 yıl kalma = CLV 432 TL. Segment B (28-38) — AOV 320 TL, yılda 2.1 alışveriş, 4 yıl kalma = CLV 2688 TL. CAC her ikisi için 90 TL. LTV/CAC: A = 4.8x, B = 29.8x. Karar: B segmentine 3x daha fazla bütçe ver. Pinterest ve Google Display'de B segmentine odaklan. Bu analizle bütçe dağılımı değişti, genel CLV %31 arttı.`,howItWorks:`1. CLV hesaplama: Simple CLV = AOV × Satın alma sıklığı (yıl) × Müşteri ömrü (yıl). Discounted CLV = gelecek değeri bugünkü değere indirgeme (daha karmaşık, CFO ile yapılır). 2. Cohort analizi: Belirli dönemde gelen müşterilerin zaman içindeki davranışı — retention, repeat purchase, revenue per cohort. GA4'te cohort raporu mevcut. 3. Segment değerlendirme: Her segment için CLV hesapla, CAC ile böl. En yüksek LTV/CAC segmentine bütçe yoğunlaştır. 4. Marka P&L okuma: Revenue — COGS = Gross Profit. Gross Profit — Operating Expenses (pazarlama, personel, genel gider) = EBIT. Pazarlama bütçesi operating expense içinde. 5. Pazarlama ROI marka P&L içinde: Pazarlama harcaması revenue'yu ne kadar artırdı? Bu soru müşterinin CFO'suyla konuşulur.`,levelDiff:{junior:`Kampanya performansını raporlar. CLV ve P&L metriklerini öğrenme aşamasında.`,mid:`CLV formülünü bilir, basit hesap yapar. P&L okumaz.`,senior:`Cohort analizi ile CLV modelini kurar, segment bazlı bütçe önerir, marka P&L içinde pazarlama bütçesini yorumlar, CFO diliyle konuşabilir.`},keyPoints:[`CLV sadece mevcut değer değil, gelecek değer. Bugünkü düşük AOV müşterisi 3 yıl sonra en sadık müşteri olabilir. Cohort analizi bunu gösterir.`,`Marka P&L'ini okumak müşteriyle daha derin ilişki kurmayı sağlar. 'Pazarlama bütçesi kârlılığı nasıl etkiliyor?' sorusunu cevaplamak CFO diline konuşmaktır.`,`Repeat purchase oranı CLV'nin en önemli belirleyicisi. Müşteri bir kez alıp gidiyorsa CLV düşük — retention stratejisi pazarlama kadar önemli.`,`Cohort analizi yatırımın gerçek ROI'unu gösterir. Bu ay gelen müşteri 12 ay sonra ne kadar değer üretecek? Bu soru performance marketing kararlarını değiştirir.`,`Segment bazlı bütçe optimizasyonu CLV analizinin pratik çıktısı. En değerli segment kim? Onlara daha fazla harca. Bu sıradan reklam yönetimini stratejik yatırım kararına dönüştürür.`],quiz:[{id:`q-14-2-1`,type:`concept`,question:`CLV hesaplamasındaki temel değişkenler nelerdir?`,options:[`Sadece reklam bütçesi`,`Ortalama sipariş değeri`,`Sadece AOV değeri kullan`,`Sadece müşteri sayısı`],correct:1,explanation:`CLV üç değişkenin çarpımı. AOV'yi artırmak (upsell), sıklığı artırmak (retargeting, email) ve ömrü uzatmak (retention) CLV'yi büyütür.`},{id:`q-14-2-2`,type:`scenario`,question:`Maje için 2 segment: A (25-30 yaş, AOV 800 TL, yılda 1 kez alışveriş, 2 yıl) ve B (35-45 yaş, AOV 1200 TL, yılda 2 kez, 5 yıl). CAC her ikisi için 200 TL. Bütçeyi nasıl dağıtırsın?`,options:[`Eşit dağıt değeri kullan`,`CLV hesapla: A = 800×1×2 = 1600 TL`,`A daha genç, ona ver, başka aksiyon alma`,`B yaşlı, A'ya ver, başka aksiyon alma`],correct:1,explanation:`LTV/CAC analizi bütçe kararını netleştirir. B segmeni açık kazanan. Duygusal değil veri bazlı bütçe dağılımı — senior'ın değeri burada.`},{id:`q-14-2-3`,type:`comparison`,question:`Simple CLV vs Cohort analizi farkı?`,options:[`Simple CLV her zaman daha doğru sonuç verir`,`Simple CLV: ortalama değeri hızlı tahmin eder; Cohort analizi:`,`Cohort analizi yalnızca subscription iş modellerinde kullanılır`,`İkisi de aynı müşteri değerini hesaplar, sadece isim farkı vardır`],correct:1,explanation:`Cohort analizi gerçek müşteri değerini ortaya koyar. Kanal bazlı cohort: Google müşterisi mi Meta müşterisi mi daha uzun süre kalıyor?`},{id:`q-14-2-4`,type:`concept`,question:`Marka P&L'inde pazarlama bütçesi nerede görünür?`,options:[`Üretim maliyetleri (COGS) kalemi içinde yer alır`,`Operating Expenses içinde`,`Vergiler bölümünde ayrı bir kalem olarak görünür`,`P&L'de ayrı gösterilmez, diğer kalemlere dağılır`],correct:1,explanation:`P&L okumak pazarlama kararlarını finansal perspektifle değerlendirmeyi sağlar. Bütçe artışının kâra etkisini bu yapıda görmek mümkün.`},{id:`q-14-2-5`,type:`scenario`,question:`H&M müşterilerinin repeat purchase oranı %18. Yönetici 'bu iyi mi?' diye soruyor. Yorumun?`,options:[`Sonucu olumlu kabul edip değişiklik yapma`,`Sektör benchmark'ı kontrol et`,`Kötü sonuç, bütçeyi hemen artır`,`Frekansı normal say, herhangi bir aksiyon alma`],correct:1,explanation:`Benchmark olmadan oran anlamlandırılamaz. Sektör ortalamasının altındaysa retention stratejisi önerilemez. Veriyi bağlama oturtmak insight üretir.`}]}]},{id:`module-15`,phase:4,icon:`👑`,title:`Leadership, AI Araçları & Ownership`,description:`Ownership mindset, proaktif karar alma, junior mentoring, ChatGPT ile bulk copy, Midjourney ve verimlilik sistemleri`,xpReward:250,lessons:[{id:`lesson-15-1`,title:`Ownership Mindset, Proaktif Karar ve Junior Mentoring`,duration:`18 dk`,what:`Ownership mindset, sorumluluğun tam alınması ve proaktif hareket edilmesidir. Yöneticinin söylemeden önce sen görüyorsun, yöneticinin sorarına kadar sen çözmüşsün. Junior mentoring ise ekibi bağımlı değil bağımsız kılmak için yönlendirme becerisidir.`,why:`Senior olmak kampanya açmak değil, sorumluluğu tam almak demektir. Yöneticinin sana en çok baktığı an problem çıktığında — sen onu bulmuş musun yoksa yönetici mi söylemek zorunda kaldı? Ownership mindset bu farkı belirler.`,realExample:`Lexus kampanyasında ROAS düştü. Junior tepkisi: 'Bütçe bitti, ne yapayım?' Mid tepkisi: 'ROAS düştü, optimizasyon yapıyorum.' Senior tepkisi: 'ROAS düştü, sebebi rekabet artışı ve creative fatigue. 3 seçenek: 1) Bütçeyi koru ama creative yenile 2) DV360'a kaydır 3) Kısa vadeli bütçe azalt. Ben 1. seçeneği öneriyorum çünkü Lexus lansman döneminde reach kesmek marka zararı. Bu konuyu yöneticiye haber verdim, kreativ ekibine talep açtım.' İşte ownership budur.`,howItWorks:`1. Proaktif problem tespiti: Google Ads Scripts ile alert kur (CPA spike, CTR düşüşü). Haftalık Looker Studio dashboard önceden kontrol et. Sorun sana gelmeden önce sen gör. 2. Stakeholder güncelleme ritmi: Müşteriye perşembe sabahı 'bu hafta X yaptık, önümüzdeki hafta Y yapacağız' emaili. Sorun çıkınca ilk sen yaz. 3. Junior mentoring çerçevesi: Balık verme, balık tutmayı öğret. 'Bunu neden yapıyoruz?' sorusunu sor, cevap verdirmeye çalış. 4. C-suite iletişimi: Data değil insight sun. 'CPC %15 arttı' değil, 'Rakip sezon agresif girdi, impression share kaybetmeden önce bid strategy değiştirdik, reach koruduk.' 5. Meeting hazırlığı: Toplantıya 3 seçenekle git. 6. Hata yönetimi: Hata yaptığında kabul et, sebebini açıkla, önlemi söyle. Cover-up kariyer sonu.`,levelDiff:{junior:`Verilen görevi eksiksiz tamamlar ve süreci yöneticiye raporlar. Proaktif iletişim becerilerini geliştiriyor.`,mid:`Proaktif takip eder, çözüm önerisiyle gelir. Büyük kararları bağımsız sahiplenmeyi ve savunmayı geliştiriyor.`,senior:`Sorunu daha oluşmadan görür, üç seçenekle yöneticiye gider, kararı sahiplenir ve junior'ları yönlendirir.`},keyPoints:[`Ownership = problemi sen bulmak. Yönetici sana 'bu ne?' diye sormadan önce sen 'şunu fark ettim' diyebiliyorsan senior seviyesindir.`,`Stakeholder güncellemesi = güven binası. Haber verme sıklığı = güven seviyesi. Sessiz kalmak = güvensizlik yaratır.`,`Junior mentoring = senin büyümen. Bir şeyi başkasına öğretmek, onu gerçekten anladığının kanıtıdır.`,`C-suite iletişiminde: data → insight → aksiyon. Sadece sayı söyleme, ne anlama geldiğini ve ne yapacağını söyle.`,`Hata kültürü = psikolojik güvenlik. Hatayı kabul edip önlemi almak, hatayı gizlemekten 100 kat daha değerlidir.`],quiz:[{id:`q-15-1-1`,type:`concept`,question:`Ownership mindset ile execution mindset arasındaki temel fark nedir?`,options:[`Ownership daha fazla saat çalışmak anlamına gelir`,`Ownership: sonuçtan tam sorumluluk almak`,`Execution mindset daha sürdürülebilir ve sağlıklıdır`,`İkisi aynı sonucu farklı isimle tanımlar`],correct:1,explanation:`Senior'lar execution yapar ama ownership mindset ile: 'Bu benim işim, ben çözüyorum.' Yönetici söylemeden önce sen görüyorsun.`},{id:`q-15-1-2`,type:`scenario`,question:`Lexus kampanyasında ROAS beklenenin %30 altında. Yöneticiden henüz bir şey gelmedi. Ne yaparsın?`,options:[`Yönetici sorana kadar bekle`,`Durumu kendim analiz et, sebebini bul, 2-3 çözüm`,`Kampanyayı analiz etmeden tamamen durdur`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Proaktif bilgilendirme = ownership. Yöneticinin soracağını beklemek = reactive. Senior olmak = problemi yöneticiden önce görmek ve çözüm önerileriyle gelmek.`},{id:`q-15-1-3`,type:`comparison`,question:`Junior mentoring'de 'balık ver' vs 'balık tutmayı öğret' yaklaşımı?`,options:[`Balık vermek her zaman daha verimlidir, zaman kaybettirilmemeli`,`Balık ver: hızlı çözer ama bağımlılık yaratır; Balık tutmayı öğret:`,`İkisi de aynı sonucu üretir, tercih yöneticinin tarzına bağlıdır`,`Balık tutmayı öğretmek yalnızca senior ekip üyeleri için uygun`],correct:1,explanation:`Senior'ın görevi ekibi bağımlı değil bağımsız kılmaktır. Direktif vermek kısa vadeli çözüm, düşünmeyi öğretmek uzun vadeli yatırım.`},{id:`q-15-1-4`,type:`concept`,question:`C-suite toplantısında 'CPC %20 arttı' demek yerine ne söylemelisin?`,options:[`Hiçbir şey söyleme`,`Rakip sezon agresif`,`Daha fazla bütçe isteyin`,`Kampanyayı durdurun`],correct:1,explanation:`C-suite data değil insight ister: ne oldu → neden → ne yaptık → sırada ne var. Sayıyı bağlama oturtmadan söylemek değer üretmez.`},{id:`q-15-1-5`,type:`scenario`,question:`Bir hata yaptın: yanlış hedefleme 3 gün boyunca yayında kaldı. Ne yaparsın?`,options:[`Sessizce düzelt, söyleme`,`Yöneticiyi hemen bilgilendir:`,`Başkasının hatasıymış gibi göster`,`İstifa et değeri kullan`],correct:1,explanation:`Hata kaçınılmaz, cover-up affedilemez. Dürüstçe bildirmek + önlem almak = profesyonellik. Yöneticiler hatayı değil, hatayı saklamayı affetmez.`}]},{id:`lesson-15-2`,title:`AI Araçları & Verimlilik Sistemleri`,duration:`16 dk`,what:`ChatGPT ile bulk reklam metni üretimi, Midjourney ile hızlı creative concept testi, Supermetrics ile raporlama otomasyonu ve kişisel verimlilik sistemleri. AI araçları senior'ın zamanını düşük değerli işlerden yüksek değerli işlere kaydırır.`,why:`Senior'lar daha az zamanda daha fazla iş üretir. 50 reklam metni yazacaksın: manuel 4 saat, ChatGPT ile 20 dakika. Kalan 3.5 saatte strateji düşünürsün. Bu zaman tasarrufu + strateji zamanı kombinasyonu senior'ın farkıdır.`,realExample:`Puma yeni ürün lansmanı. 5 audience segmenti için 10'ar reklam metni = 50 metin. Junior manuel: 2 gün. Senior: ChatGPT'ye brief girer — 'Puma yeni running shoe, audience 18-25 sporcu, tone enerjik, 10 farklı hook öner, max 90 karakter, CTA: hemen al.' Çıktıyı review eder, brand voice'a uyarlar, 45 dakikada 50 metin hazır. Midjourney ile 5 farklı visual konsept 20 dakikada mockup — müşteriye önce concept sun, sonra gerçek prodüksiyon yap. 2 günlük iş = 1.5 saat.`,howItWorks:`1. ChatGPT prompt framework: [Marka] + [Ürün] + [Audience] + [Tone] + [Format] + [CTA] + [Kısıt]. 2. Bulk copy workflow: ChatGPT 20 varyant üret → brand guideline filtresi → en iyi 5 seç → platforma yükle. 3. Midjourney kullanımı: Concept mockup için — 'hızlı brief fikri göster', prodüksiyon değil. Brief: '/imagine luxurious woman wearing Maje dress in Paris cafe, editorial photography style, warm tones.' 4. Canva + AI: Hızlı template adaptasyonu, marka renkleri ve font ile. 5. Supermetrics workflow: Tüm platform verileri → otomatik Google Sheet → Looker Studio. Haftalık raporun sadece yorum kısmı sana kaldı. 6. Verimlilik sistemi: Haftalık review ritmi kur (pazartesi brief → çarşamba mid-week check → cuma rapor). Template kütüphanesi oluştur.`,levelDiff:{junior:`AI araçlarını keşfetmeye başlıyor. İş akışına entegre etme pratiklerini öğreniyor.`,mid:`ChatGPT ile copy dener ve AI araçlarını iş akışına entegre etmeyi öğreniyor.`,senior:`AI araçları iş akışının vazgeçilmez parçası: brieften rapora tüm süreçte AI acceleration, kazanılan zamanı stratejiye yatırır.`},keyPoints:[`ChatGPT prompt kalitesi = output kalitesi. Vague prompt = vague output. Brief gibi yaz: marka + audience + tone + format + kısıt.`,`AI = accelerator, replacement değil. ChatGPT copy üretir, sen brand voice filtresi uygularsın. Final karar her zaman sende.`,`Supermetrics veri toplama zamanını %80 azaltır. Bu kazanılan zamanı analize yatır.`,`Midjourney sadece mockup ve konsept testi için. Prodüksiyon kalitesi için profesyonel kreatif ajansla çalış.`,`Verimlilik sistemi kur: haftalık ritim, template kütüphanesi, AI araçları — bunlar tekrarlayan işleri otomatize eder, sen yüksek değerli işe odaklanırsın.`],quiz:[{id:`q-15-2-1`,type:`concept`,question:`ChatGPT ile etkili reklam metni için prompt nasıl olmalı?`,options:[`Kısa ve belirsiz`,`Marka + ürün +`,`Sadece ürün adı`,`Türkçe kelimeler ekle`],correct:1,explanation:`ChatGPT'nin output kalitesi doğrudan prompt kalitesiyle orantılı. Vague prompt → generic output. Detaylı brief prompt → brand-aligned, audience-specific output.`},{id:`q-15-2-2`,type:`scenario`,question:`Puma için 50 reklam metni, deadline 2 gün. AI araçlarını nasıl kullanırsın?`,options:[`AI kullanma, manuel yaz`,`ChatGPT'ye segment bazlı`,`Sadece 10 metin yaz`,`Görevi reddet, başka aksiyon alma`],correct:1,explanation:`AI ile bulk production → insan filtresi → hızlı delivery. Senior'ın değeri: daha az zamanda daha fazla ve daha kaliteli iş.`},{id:`q-15-2-3`,type:`comparison`,question:`Supermetrics ile manuel veri toplama karşılaştırması?`,options:[`Manuel toplama her zaman daha doğru veri sağlar`,`Supermetrics: otomatik, tüm kanallar tek dashboard`,`İkisi de aynı verimliliği ve doğruluğu sağlar`,`Supermetrics çok pahalı, küçük bütçelere uygun değil`],correct:1,explanation:`Senior'ın zamanı kıymetli. Manuel veri toplama = düşük değerli iş. Supermetrics = otomasyon = zaman kazanımı = stratejiye yatırım.`},{id:`q-15-2-4`,type:`concept`,question:`Midjourney'i reklam prodüksiyonunda nasıl kullanmalısın?`,options:[`Final reklam görseli olarak yayına al`,`Sadece konsept mockup için: müşteriye 'bu tarzda`,`Tüm görselleri Midjourney ile üret`,`Bu yöntemi hiç kullanma, devre dışı bırak`],correct:1,explanation:`Midjourney = rapid prototyping. Konsept onaylatmak için hızlı mockup. Prodüksiyon kalitesi ve marka uyumu için profesyonel prodüksiyon şart.`},{id:`q-15-2-5`,type:`scenario`,question:`Haftalık rapor hazırlaman 3 saat sürüyor. Nasıl optimize edersin?`,options:[`Raporu kısalt`,`Supermetrics ile`,`Raporu ayda bire düşür`,`Junior'a yaptır`],correct:1,explanation:`Sistem kurma = senior değer. Tekrarlayan manuel işi otomatize et, kazanılan zamanı yüksek değerli işe yatır.`}]}]}],f=[{id:`module-p1-1`,phase:1,icon:`🌐`,title:`Dijital Pazarlamaya Giriş`,description:`Funnel nedir, temel metrikler ne anlama gelir, dijital dünyada nasıl düşünülür — her şeyin başlangıcı`,xpReward:80,practicalAssignment:{title:`Hayali Marka Kampanya Planı`,scenario:`Bir arkadaşın el yapımı mum satıyor ve senden dijital pazarlama tavsiyesi istiyor. Bütçesi 500 TL, hedefi 20 satış. Hangi platformu seçersin, neden? CTR, CPA ve ROAS hedeflerini say.`,deliverables:[`Platform seçimi ve gerekçesi`,`Hedef CTR / CPA / ROAS rakamları`,`Funnel'ın hangi aşamasına odaklanırsın?`]},lessons:[{id:`lesson-p1-1-1`,title:`Funnel Mantığı ve Temel Metrikler`,duration:`14 dk`,what:`Dijital pazarlama; hedef kitleye dijital kanallar üzerinden ulaşarak ölçülebilir, optimize edilebilir ve dönüşüm odaklı pazarlama yapma sürecidir. Geleneksel pazarlamadan farkı: her şey ölçülebilir, hedeflenebilir ve anlık optimize edilebilir.`,why:`Ajansa ilk girdiğinde yöneticinin sana 'CTR'ı neden düşük?' diye soracak. Bu soruyu cevaplayabilmek için önce funnel'ın ne olduğunu, CTR'ın nerede durduğunu bilmen lazım. Temel metrikler bilmeden kampanya takip edemezsin, optimizasyon öneremezsin.`,realExample:`Bir moda markası Instagram'da reklam yayınladı. 50.000 kişiye gösterdiler (Impression). 1.500 kişi tıkladı (CTR: %3). 1.500'den 60'ı satın aldı (CVR: %4). Toplam harcama 3.000 TL → CPA: 50 TL, ROAS: 4. Bu rakamlar sana ne anlatıyor? CTR iyiydi, ürün sayfası dönüşüm sağladı, CPA makul — kampanya tekrarlanabilir.`,howItWorks:`Funnel 5 aşamadan oluşur: Awareness (reklam görüldü) → Interest (siteye tıklandı) → Consideration (ürün incelendi, sepete eklendi) → Conversion (satın alındı) → Loyalty (tekrar alım, tavsiye). Her aşamanın farklı başarı metriği var. Awareness'ta Impression ve Reach, Interest'te CTR, Consideration'da Add-to-Cart Rate, Conversion'da CPA ve ROAS, Loyalty'de tekrar satın alma oranı. Reklam bütçesi funnel'ın hangi aşamasına gittiğine göre farklı metrikle ölçülür.`,comparisonTable:{headers:[`Metrik`,`Açıklama`,`İyi Olduğu Durum`,`Örnek`],rows:[{label:`CTR`,values:[`Tıklama / Gösterim × 100`,`Reklam ilgi çekiyor`,`1.000 gösterim → 30 tık = %3 CTR`]},{label:`CPA`,values:[`Harcama / Dönüşüm`,`Maliyet düşük`,`300 TL harcama → 10 satış = 30 TL CPA`]},{label:`ROAS`,values:[`Gelir / Harcama`,`4+ genellikle iyi`,`500 TL harcama → 2.000 TL gelir = ROAS 4`]},{label:`CVR`,values:[`Dönüşüm / Tıklama × 100`,`Landing page iyi`,`100 tık → 5 satış = %5 CVR`]},{label:`CPM`,values:[`1.000 gösterim başı maliyet`,`Bilinirlik ucuz`,`100 TL → 10.000 gösterim = 10 TL CPM`]}]},levelDiff:{junior:`Metrikleri takip eder ve aksiyona geçer. Büyük resmi görerek sistematik değerlendirme yapmayı öğreniyor.`,mid:`Metrikleri birlikte yorumlar. 'CTR yüksek ama CVR düşük — sorun reklamda değil landing page'de' diyebilir.`,senior:`Metrikleri semptom olarak görür. 'Bu sayılar neden böyle?' sorusunu sorar. Kök nedeni bulduktan sonra optimizasyon yapar.`},keyPoints:[`Dijital pazarlamanın gücü ölçülebilirliğinden gelir — neyin işe yaradığını anlık görürsün.`,`Funnel lineer değildir. Kullanıcı aynı gün 3 farklı cihazdan 5 farklı reklamı görüp sonunda satın alabilir.`,`CTR reklamın kalitesini, CVR landing page'in kalitesini, CPA kampanyanın verimliliğini gösterir.`,`ROAS tek başına yeterli değildir — margin düşükse ROAS 5 olsa bile zarar edilebilir (bunu Phase 4'te derinlemesine göreceğiz).`,`Her metrik bir sorudur: 'Neden bu kadar?' sorusunu sormazsan sayılar anlamsızlaşır.`],quiz:[{id:`q-p1-1-1-1`,type:`concept`,question:`1.000 gösterimden 40 tıklama aldın. CTR nedir?`,options:[`%2`,`%4`,`%0,4`,`%40`],correct:1,explanation:`CTR = (Tıklama / Gösterim) × 100 = (40 / 1.000) × 100 = %4.`},{id:`q-p1-1-1-2`,type:`scenario`,question:`500 TL harcadın, 10 satış aldın, her satıştan 80 TL gelir elde ettin. ROAS nedir?`,options:[`1,`,`0,8`,`50`,`8`],correct:0,explanation:`ROAS = Gelir / Harcama = (10 × 80) / 500 = 800 / 500 = 1,6. Bu ROAS düşük — kampanyayı optimize etmek gerekiyor.`},{id:`q-p1-1-1-3`,type:`comparison`,question:`CTR yüksek ama CPA çok yüksek. Sorun muhtemelen nerede?`,options:[`Reklam kötü — kimse tıklamıyor`,`Landing page veya ürün sayfası`,`Bütçe yetersizliği kaynaklı performans sorunu`,`Hedefleme kurulumunda yapılan yanlış bir ayar`],correct:1,explanation:`CTR yüksek = reklam ilgi çekiyor. Ama dönüşüm düşük = kullanıcı siteye geliyor, alım yapmıyor. Sorun landing page'de veya fiyatta.`},{id:`q-p1-1-1-4`,type:`concept`,question:`Awareness kampanyasında hangi metrik birincil başarı göstergesidir?`,options:[`CPA (maliyet/dönüşüm)`,`ROAS (harcama getirisi)`,`CVR (dönüşüm oranı)`,`Impression ve Reach`],correct:3,explanation:`Awareness = farkındalık yaratmak. Burada başarı ne kadar kişiye ulaştığınla ölçülür. CPA ve ROAS conversion kampanyasının metrikleridir.`},{id:`q-p1-1-1-5`,type:`scenario`,question:`Yöneticinin 'ROAS 6 ama kâr etmiyoruz' dedi. Bu nasıl mümkün?`,options:[`ROAS hesabı yanlış yapılmış`,`Ürünün margin'i düşükse yüksek`,`Mümkün değil, ROAS 6 her zaman kârlıdır`,`Bütçe aşılmış olabilir`],correct:1,explanation:`ROAS gelir/harcama oranıdır, kârı ölçmez. Ürün maliyeti + operasyon + kargo
