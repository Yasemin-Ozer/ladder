rapor hazırla`,`Sadece platformdan göster`],correct:1,explanation:`Looker Studio'yu Google Sheets veri kaynağıyla bağladığında, Sheets güncellendiğinde dashboard otomatik yenilenir. Müşteriye bir kez link gönderirsin, her gün canlı veri görürler.`},{id:`q-excel-2-4`,type:`concept`,question:`Executive Summary'de kaç ana metrik olmalı?`,options:[`En az 15 farklı metrik gösterilmeli`,`Maksimum 5 temel metrik yeterlidir`,`Her reklam platformu için 10 metrik ekle`,`Tüm önemli metrikleri eksiksiz listele`],correct:1,explanation:`5'ten fazla ana metrik sunmak odağı dağıtır. Müşteri 'nereye bakayım?' diye kaybolur. Ana metrikleri 5 ile sınırla, detayları ek tablolara at ve soru gelirse göster.`},{id:`q-excel-2-5`,type:`scenario`,question:`Raporu gönderdin, müşteri 'çok kalabalık, anlamıyorum' dedi. Ana sorun ne?`,options:[`Veri yanlış`,`Çok fazla metrik`,`Platform seçimi yanlış`,`Excel formatı hatalı`],correct:1,explanation:`En yaygın sunum hatası: her şeyi koymak. 20 tablo 15 grafik — müşteri bunalır. Rapor yazarken kendinize sorun: 'Müşteri bu raporu 3 dakikada okursa ne anlamalı?' O 1-3 mesajı öne çıkar, geri kalanı arka planda bırak.`}]}]},{id:`module-linkedin`,phase:2,icon:`💼`,title:`LinkedIn Ads — B2B Performance`,description:`B2B müşterileri olan ajansların vazgeçilmezi: LinkedIn'de doğru hedefleme, lead gen ve ölçüm.`,category:`execution`,xpReward:200,lessons:[{id:`lesson-linkedin-1`,title:`LinkedIn Kampanya Yöneticisi, Hedefleme & Reklam Formatları`,duration:`35 dk`,levelDiff:{junior:`LinkedIn'in B2B potansiyelini kavramış. Kampanya kurulum ve optimizasyon süreçlerini öğreniyor.`,mid:`Temel kampanya kurar. Job title hedefleme yapabilir.`,senior:`Account-based marketing (ABM) kurar, matched audiences ve Lead Gen Forms optimize eder.`},what:`LinkedIn B2C'de pahalı ve verimsizdir. Ama B2B'de rakipsiz: iş unvanı, şirket büyüklüğü, sektör, kıdem seviyesi ile hedefleme yapılabilir. SaaS, profesyonel hizmetler, kurumsal yazılım — karar verici kitleye ulaşmanın en doğrudan yolu.`,why:`LinkedIn B2C'de pahalı ve verimsizdir. Ama B2B'de rakipsiz: iş unvanı, şirket büyüklüğü, sektör, kıdem seviyesi ile hedefleme yapılabilir. SaaS, profesyonel hizmetler, kurumsal yazılım — karar verici kitleye ulaşmanın en doğrudan yolu.`,howItWorks:`Job Title (Pozisyon): 'Marketing Manager', 'CTO'. Job Function: 'Marketing', 'IT'. Seniority: Director, VP, C-suite. Company Size: 50-200, 200-1000. Industry: 'Software', 'Finance'. Skills: 'Performance Marketing', 'Google Analytics'. Şirket Listesi: Matched Audiences ile kendi müşteri veya hedef firma listeni yükleyebilirsin.`,realExample:`Single Image Ad: En yaygın. Video Ad: Engagement iyi ama pahalı. Carousel: Ürün veya case study için. Message Ad: LinkedIn inbox'a direkt mesaj — GDPR dikkat. Conversation Ad: Ağaç yapısında interaktif. Lead Gen Form: En değerli — LinkedIn profil bilgisiyle otomatik doldurulan form, dönüşüm oranı yüksek.`,keyPoints:[`LinkedIn B2B'de eşsiz — iş unvanı, sektör, şirket büyüklüğü ile hassas hedefleme`,`Lead Gen Form en değerli format — profil bilgisi otomatik, friction düşük`,`CPC pahalı görünür ama B2B lead kalitesiyle değerlendir`,`Matched Audiences ile kendi müşteri veya hedef firma listeni yükleyebilirsin`,`ABM: satış ekibinin hedef listesindeki şirketlerde karar vericilere reklam göster`],quiz:[{id:`q-linkedin-1-1`,type:`concept`,question:`LinkedIn Ads hangi tür işletmeler için en değerlidir?`,options:[`E-ticaret ve fast fashion`,`B2B — kurumsal karar`,`Yerel restoran ve kafeler`,`B2C tüketici markaları`],correct:1,explanation:`LinkedIn'in gücü profesyonel hedefleme kapasitesinden gelir. B2B SaaS, profesyonel hizmetler, kurumsal çözümler için ideal — iş unvanı, kıdem, sektör, şirket büyüklüğü ile karar vericilere ulaşılır.`},{id:`q-linkedin-1-2`,type:`concept`,question:`Lead Gen Form'un diğer reklam formatlarına göre avantajı nedir?`,options:[`Rakibinden her koşulda daha düşük maliyetli`,`LinkedIn profil bilgisiyle`,`Daha fazla görünüm alır`,`Video içerik destekler`],correct:1,explanation:`Lead Gen Form açıldığında kullanıcının LinkedIn profil bilgileri (isim, e-posta, şirket, unvan) otomatik dolar. Kullanıcı sadece 'Gönder' der. Harici sayfaya yönlendirmeye gerek yok, mobilde özellikle etkili.`},{id:`q-linkedin-1-3`,type:`scenario`,question:`Müşteri 'LinkedIn CPC'si çok pahalı, Meta'ya geçelim' diyor. Ne söylersin?`,options:[`Haklı, geçelim olarak değerlendir`,`LinkedIn B2B karar verici kitleye ulaşıyor`,`LinkedIn kapat olarak değerlendir`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`CPC'yi tek başına karşılaştırmak yanıltıcı. LinkedIn'den gelen bir lead ile Meta'dan gelen lead aynı kalitede olmayabilir. Satış sürecine giren, kapanan lead başına maliyet karşılaştırması daha anlamlı.`},{id:`q-linkedin-1-4`,type:`concept`,question:`Account-Based Marketing (ABM) LinkedIn'de nasıl uygulanır?`,options:[`Sadece iş unvanı hedefle`,`Hedef şirket listesi yükle`,`Herkese göster, algoritma seçer`,`Sadece retargeting kullan`],correct:1,explanation:`ABM'de satış ekibinin hedeflediği belirli şirketlere ulaşmak istersin. Matched Audiences → Company List ile 500 hedef şirketi yükler, bu şirketlerde çalışan Director+ seviyedeki kişilere reklam gösterirsin.`},{id:`q-linkedin-1-5`,type:`comparison`,question:`LinkedIn Seniority hedeflemesinde 'Director' seçmek ne anlama gelir?`,options:[`Çalışma süresine göre filtreler`,`LinkedIn'deki iş unvanı`,`Şirket büyüklüğüne göre filtreler`,`Sektöre göre filtreler`],correct:1,explanation:`LinkedIn Seniority filtresi kullanıcıların profil unvanını analiz ederek kıdem seviyesini tahmin eder. Director seçince orta-üst yönetim, VP seçince üst yönetim, C-Suite seçince CEO/CFO/CTO seviyesine ulaşırsın.`}]},{id:`lesson-linkedin-2`,title:`B2B Lead Funnel, Ölçüm & Campaign Optimizasyonu`,duration:`30 dk`,levelDiff:{junior:`LinkedIn kampanyaları kurabilir. Lead kalitesi ölçümü ve SQL takibini öğreniyor.`,mid:`Lead hacmini takip eder. Satışa geçişini ölçmüyor.`,senior:`CRM entegrasyonu kurar, SQLa (Sales Qualified Lead) başına maliyet hesaplar, satış döngüsüyle align eder.`},what:`MQL (Marketing Qualified Lead): Forma dolduran herkes. SQL (Sales Qualified Lead): Satış ekibinin değerli bulduğu lead. Closed Won: Gerçek müşteri. Performance pazarlamacı sadece lead sayısına bakamaz — CRM'de kaç MQL'in SQL'e, kaçının müşteriye döndüğünü takip etmek gerekir.`,why:`LinkedIn Insight Tag web sitene koyulan bir piksel. Ziyaretçilerin %85'ine kadar firma ve iş unvanı bilgisi sağlar. Hangi şirketlerden ziyaretçi geldiğini görürsün. Conversion tracking için de zorunlu. Tag Manager ile kurulabilir.`,howItWorks:`CPL (Cost Per Lead): Toplam harcama / Lead sayısı. Lead Quality Score: CRM'den gelen SQL oranı. CPLQL (Cost Per Lead Qualified Lead): Gerçekten değerli lead başına maliyet. CTR LinkedIn'de düşük görünebilir (%0.3-0.5 normal) — B2C metriklerle karşılaştırma.`,realExample:`LinkedIn'de tek değişken test et: Görsel vs görsel, başlık vs başlık, hedefleme seti A vs B. LinkedIn'in test aracı 'Campaign Group' düzeyinde çalışır. Her test için yeterli bütçe ayır — az bütçeyle istatistiksel anlamlılık zordur.`,keyPoints:[`MQL değil SQL sayısına bak — CRM'de lead kalitesini takip et`,`LinkedIn Insight Tag zorunlu: web ziyaretçilerini firma bazında görürsün`,`CPL değil CPLQL (Cost per Qualified Lead) gerçek KPI`,`B2C CTR benchmarkları LinkedIn için geçersiz — %0.3-0.5 normal`,`Web ve video retargeting ile warm audience'a daha ucuz ulaş`],quiz:[{id:`q-linkedin-2-1`,type:`concept`,question:`B2B kampanyasında 'lead' demek yeterli değil — gerçek ölçüm birimi ne olmalı?`,options:[`Tıklama sayısı`,`SQL (Sales Qualifi`,`Gösterim sayısı`,`Form açılma sayısı`],correct:1,explanation:`Bir form dolduran herkes MQL'dir. Ama satış ekibi bunların sadece bir kısmını gerçekten takip eder (SQL). Kampanya başarısı için MQL sayısı değil, MQL→SQL dönüşüm oranı ve maliyet-per-SQL önemli.`},{id:`q-linkedin-2-2`,type:`concept`,question:`LinkedIn Insight Tag ne sağlar?`,options:[`Sadece reklam gösterimi artırır`,`Web sitesi ziyaretçilerinin`,`LinkedIn iç analitiklerini açar`,`Otomatik lead toplar`],correct:1,explanation:`Insight Tag bir piksel. Yüklendikten sonra LinkedIn sana 'bu ay web siteni hangi şirketlerden kaç kişi ziyaret etti' gibi B2B-özel insight verir. Aynı zamanda conversion tracking için zorunlu.`},{id:`q-linkedin-2-3`,type:`scenario`,question:`LinkedIn kampanyanın CTR'ı %0.3. Müşteri 'bu çok düşük, Meta'da %1.5 alıyoruz' diyor. Ne dersin?`,options:[`Haklı, LinkedIn yetersiz`,`LinkedIn B2B kitlesi farklı`,`Reklam görseli değiştir`,`Hedeflemeyi genişlet, başka aksiyon alma`],correct:1,explanation:`LinkedIn kullanıcıları profesyonel içerik tüketiyor, reklama tıklama eğilimleri Meta'dan düşük. Ama tıklayan kişi kalitesi çok daha yüksek. Platform bazlı benchmark kullanmak gerekir.`},{id:`q-linkedin-2-4`,type:`concept`,question:`LinkedIn retargeting listesi oluşturmak için ne gerekir?`,options:[`Sadece kampanya ID'si`,`LinkedIn Insight Tag`,`Meta pixel değeri kullan`,`Google Analytics entegrasyonu`],correct:1,explanation:`LinkedIn, Insight Tag ile web siteni ziyaret eden kullanıcıları tanımlayabilir ve bunları retargeting listesi oluşturmak için kullanabilir. Minimum 300 LinkedIn üyesinin listeye girmesi gerekir.`},{id:`q-linkedin-2-5`,type:`scenario`,question:`Aylık 50.000₺ LinkedIn bütçen var, 200 lead geldi ama satış ekibi 'bunların %10'u işe yarıyor' diyor. CPL nedir, CPLQL nedir?`,options:[`CPL 250₺, CPLQL 250₺`,`CPL 250₺ (50.000/200)`,`CPL 2.500₺, CPLQL 250₺`,`Her ikisi de 500₺`],correct:1,explanation:`CPL = 50.000 / 200 = 250₺. Ama 200 leadden sadece 20'si qualified (10%). Yani gerçekten değerli lead başına maliyet: 50.000 / 20 = 2.500₺. Bu rakam CRM ile satış ekibine gösterilmeli.`}]}]},{id:`module-cro`,phase:2,icon:`🎯`,title:`Landing Page & Conversion Rate Optimization`,description:`Reklamdan gelen trafik dönüşmüyorsa sorun reklamda değil sayfada. CRO temellerini öğren.`,category:`execution`,xpReward:190,lessons:[{id:`lesson-cro-1`,title:`Landing Page Anatomisi — UX, Mesaj Uyumu ve Teknik`,duration:`30 dk`,levelDiff:{junior:`Reklam kurulumuna odaklanır. Açılış sayfası optimizasyonunun dönüşüme etkisini keşfediyor.`,mid:`Düşük performanslı sayfaları tespit eder. Neyin değiştirileceğini test hipotezleriyle belirlemeyi öğreniyor.`,senior:`Reklam-sayfa mesaj uyumunu sağlar, CRO önerileri üretir, müşteriyle sayfa testini koordine eder.`},what:`Kullanıcı 'ücretsiz deneme' yazan reklamı tıklayıp sayfada fiyatlandırma tablosuyla karşılaşırsa bounce rate fırlar. Message match (mesaj uyumu): Reklamdaki teklif, görsel ve dil sayfada da devam etmeli. Reklam 'kış indirimi' diyorsa sayfa da kış temalı ve indirimli olmalı.`,why:`Kullanıcı sayfaya girince kaydırmadan görebildiği alan (above the fold) çok kritik. Burada şunlar olmalı: Net bir başlık (ne sunuyorsun?), alt başlık (kime, nasıl?), güçlü CTA butonu, sosyal kanıt (logo, sayı, puan). 3 saniyede 'ben doğru yerde miyim?' sorusunu yanıtlama.`,howItWorks:`'Gönder' veya 'Tıkla' zayıf CTA. 'Ücretsiz Dene', 'Demo İste', 'Hemen Başla' spesifik ve aksiyon odaklı. CTA butonu görsel olarak öne çıkmalı (kontrast renk), sayfada birden fazla yerde olmalı (en az yukarı ve aşağı), mobile büyük ve tıklanabilir.`,realExample:`Her ek form alanı dönüşüm oranını düşürür. Sadece gerçekten gerekli alanları sor. E-ticaret için: Ad, e-posta yeter. B2B lead gen için: Ad, e-posta, şirket adı, telefon makul. 10 alan doldurması gereken form çoğu kullanıcıyı kaçırır.`,keyPoints:[`Reklam-sayfa mesaj uyumu: reklamdaki teklif ve dil sayfada da devam etmeli`,`İlk 3 saniye: başlık, alt başlık, CTA ve sosyal kanıt above the fold'da olmalı`,`CTA spesifik olmalı: 'Gönder' değil 'Ücretsiz Dene' veya 'Demo İste'`,`Her ek form alanı dönüşümü düşürür — sadece zorunlu olanı sor`,`Sayfa 3+ saniye yükleniyorsa ziyaretçilerin yarısı terk eder`],quiz:[{id:`q-cro-1-1`,type:`scenario`,question:`'%30 indirim — şimdi al' yazan reklamı tıklayan kullanıcı ana ürün sayfasına düşüyor. Sorun ne?`,options:[`Reklam bütçesi yetersiz`,`Message match yok`,`Hedefleme kurulumunda yapılan yanlış bir ayar`,`Reklam metni zayıf`],correct:1,explanation:`Reklam-sayfa mesaj uyumu (message match) kritik. Kullanıcı belirli bir teklife tıkladıysa, tıkladıktan sonra gördüğü sayfa da o teklifi yansıtmalı. Genel sayfaya düşmek kullanıcıyı 'yanlış yere mi geldim?' düşündürür.`},{id:`q-cro-1-2`,type:`concept`,question:`Above the fold nedir ve neden önemlidir?`,options:[`Sayfanın altındaki footer`,`Kaydırmadan görülebilen ilk alan`,`Reklam görseli olarak değerlendir`,`Mobil optimizasyon`],correct:1,explanation:`Above the fold kullanıcının scroll yapmadan gördüğü kısım. İlk 3-5 saniyede kullanıcı sayfanın değerini anlayamazsa bounce eder. Bu alanda net başlık, değer önerisi ve CTA olmalı.`},{id:`q-cro-1-3`,type:`comparison`,question:`Hangi CTA daha iyi dönüşüm sağlar?`,options:[`Gönder, değerlendir`,`Ücretsiz Dene — Kredi`,`Devam Et, değerlendir`,`Tamam, değerlendir`],correct:1,explanation:`Spesifik ve endişeyi gideren CTA'lar daha iyi dönüşür. 'Ücretsiz Dene' ne olacağını anlatır, 'Kredi Kartı Gerektirmez' ise kullanıcının 'ücretlendirilecek miyim?' korkusunu ortadan kaldırır.`},{id:`q-cro-1-4`,type:`scenario`,question:`B2B form doldurma oranın çok düşük. Formda 12 alan var. İlk yapman gereken nedir?`,options:[`Daha fazla trafik getir`,`Formu kısalt — sadece`,`Renk değiştir olarak değerlendir`,`Başlık güncelle`],correct:1,explanation:`Her ek form alanı dönüşümü düşürür. 12 alanlı form kullanıcıyı yorar ve veri gizliliği endişesi yaratır. Minimum alanla başla (ad + e-posta + şirket), satış sürecinde eksik bilgileri tamamla.`},{id:`q-cro-1-5`,type:`concept`,question:`Sayfa yüklenme hızı neden performance pazarlamacıyı ilgilendirir?`,options:[`SEO için gerekli`,`Sayfa 3+ saniye yüklenirse`,`Müşteri ister olarak değerlendir`,`Google algoritması değişti`],correct:1,explanation:`Reklam tıklandıktan sonra sayfa yavaş açılırsa, ödediğin CPC boşa gider. Reklam bütçesini optimize etmekle uğraşırken sayfanın kullanıcıyı kaçırmasına izin vermek büyük kayıp.`}]},{id:`lesson-cro-2`,title:`A/B Test, Heatmap ve CVR Optimizasyonu`,duration:`35 dk`,levelDiff:{junior:`A/B test kavramını biliyor. Doğru test tasarımı ve uygulama adımlarını öğreniyor.`,mid:`A/B test tool'larını kullanır ve testleri başlatabilir. Güçlü test hipotezi kurmayı ve sonuçları yorumlamayı öğreniyor.`,senior:`Test backlog'u yönetir, istatistiksel anlamlılık hesaplar, öğrenimleri sistematize eder.`},what:`Kontrol (A) ile varyant (B) aynı anda, aynı trafikle test edilir. Tek değişken: başlık veya görsel veya CTA veya form uzunluğu. İki şeyi aynı anda değiştirme — hangisinin etki yarattığını bilemezsin. Yeterli örneklem olmadan (genellikle 1000+ dönüşüm) sonuç anlamlı değil.`,why:`Hotjar ve Microsoft Clarity ücretsiz/uygun fiyatlı. Heatmap gösterir: kullanıcılar nereye tıklıyor, nereye scroll edip duraklıyor, nereye hiç bakmıyor. Scroll map gösterir: ziyaretçilerin %80'i sayfanın yarısına kadar kaydırıyor, sonrasına bakmıyor — o bölümü yukarı taşı.`,howItWorks:`Hotjar/Clarity ile gerçek kullanıcıların sayfa üzerindeki fare hareketlerini ve tıklamalarını kaydedebilirsin. 'Kullanıcılar nerede takılıyor?' sorusunu çözmek için form kayıtlarını izle. Birçok kullanıcı telefon alanında takılıyorsa o alanı kaldır veya opsiyonel yap.`,realExample:`CVR = Conversion / Ziyaretçi. Sektöre göre değişir: E-ticaret %1-3 normal, lead gen %3-10 normal, SaaS trial %5-15 normal. Düşük CVR analizi: Trafik kalitesi mi? (Yanlış kitle) Sayfa mı? (UX/mesaj sorunu) Teklif mi? (Yetersiz değer önerisi)`,keyPoints:[`A/B testte tek değişken — başlık, görsel veya CTA'yı ayrı ayrı test et`,`Heatmap ile kullanıcıların gerçekte nereye baktığını ve tıkladığını gör`,`Session recording ile 'kullanıcılar nerede takılıyor?' sorusuna cevap bul`,`Sektöre göre CVR benchmarkı farklı — e-ticaret %1-3, lead gen %3-10`,`En az %95 istatistiksel güven olmadan test sonucuna göre karar verme`],quiz:[{id:`q-cro-2-1`,type:`concept`,question:`A/B testte kaç değişken aynı anda test edilmeli?`,options:[`Ne kadar çok olursa o kadar iyi`,`Tek değişken — iki şeyi`,`En az 3, değerlendir`,`Platform sayısı kadar`],correct:1,explanation:`A/B testin temel kuralı: tek değişken. Başlığı ve görseli aynı anda değiştirirsen, sonuç iyileşse bile neyin işe yaradığını bilemezsin. Öğrenim değeri sıfıra düşer.`},{id:`q-cro-2-2`,type:`concept`,question:`Heatmap'in kullanım amacı nedir?`,options:[`Reklamın gösterildiği alanları gösterir`,`Kullanıcıların sayfa üzerinde`,`Sayfa hızını ölçer`,`SEO skorunu hesaplar`],correct:1,explanation:`Heatmap, kullanıcıların gerçek davranışını görselleştirir: hangi alan çok tıklanıyor, hangi içeriğe hiç bakılmıyor, scroll ne kadar iniyor. Bu verilere göre sayfa düzeni optimize edilir.`},{id:`q-cro-2-3`,type:`scenario`,question:`Landing page'e 5.000 ziyaretçi geldi, 75 conversion oldu. CVR nedir ve e-ticaret için normal mi?`,options:[`%15 — normalin çok üstünde`,`%1.5 — e-ticaret için normal`,`%7.5 — olağanüstü iyi`,`%0.15 — kritik derecede düşük`],correct:1,explanation:`CVR = 75/5.000 = %1.5. E-ticaret için genel benchmark %1-3 aralığında. Bu değer normalin içinde ama optimizasyon payı var. Kategori ve trafik kalitesine göre yorum değişebilir.`},{id:`q-cro-2-4`,type:`scenario`,question:`A/B testinde varyant B %8 daha fazla dönüşüm sağlıyor ama test 2 gün oldu ve sadece 150 ziyaretçi var. Ne yaparsın?`,options:[`B'ye geç, hemen sonuç almak istiyoruz`,`Testi sürdür — %95 güven`,`A'ya dön, değerlendir`,`İkisini de kapat`],correct:1,explanation:`150 ziyaretçiyle gözlemlenen %8 fark istatistiksel olarak anlamlı olmayabilir. Şans eseri oluşmuş olabilir. Erken karar vermek yanlış değişikliği kalıcı yapar ve gerçek potansiyeli kaçırır.`},{id:`q-cro-2-5`,type:`concept`,question:`Session recording ne için kullanılır?`,options:[`Kampanya performansı ölçmek için`,`Kullanıcıların sayfa üzerindeki fare ve tıklama`,`Yalnızca A/B testleri kurmak amacıyla kullanılan araçtır`,`Reklam gösterimi takip etmek için`],correct:1,explanation:`Session recording (Hotjar, Clarity) gerçek kullanıcıların sayfa üzerindeki davranışını kaydeder. 'Neden form tamamlanmıyor?' gibi soruları yanıtlamak için birçok kaydı izleyerek ortak takılma noktalarını bulabilirsin.`}]}]},{id:`module-competitor`,phase:2,icon:`🔭`,title:`Rekabet Analizi & Benchmark Araçları`,description:`Rakiplerin ne yapıyor, nasıl büyüdükleri ve sana karşı ne oynadıklarını anla.`,category:`execution`,xpReward:170,lessons:[{id:`lesson-competitor-1`,title:`Facebook Ad Library, Google Ads Transparency & Creative İstihbarat`,duration:`25 dk`,levelDiff:{junior:`Kendi kampanyalarını yönetir. Rakip analizi araçlarını ve benchmark süreçlerini keşfediyor.`,mid:`Ad Library kullanır ve rakip reklamları inceler. Sistematik creative analiz ve pattern çıkarımını geliştiriyor.`,senior:`Rakip creative stratejisini analiz eder, müşteriye benchmark raporu sunar, briefi buradan besler.`},what:`facebook.com/ads/library — Herhangi bir markanın yayınladığı aktif Facebook ve Instagram reklamlarını görebilirsin. Rakibin kullandığı görseller, video, metinler, CTA'lar herkese açık. Ülke bazında filtrele, 'aktif' reklamlara bak. Bir markanın çok sayıda benzer varyant test etmesi creative testing yaptığına işaret eder.`,why:`adstransparency.google.com — Herhangi bir reklamverenin Google'daki aktif reklamlarını görürsün. Arama, Display ve YouTube reklamlarını filtrele. Özellikle arama rakiplerinin anahtar kelime stratejisini tahmin etmek için kullanışlı.`,howItWorks:`1) 3-5 ana rakibi belirle. 2) Her birinin Ad Library'deki format ve mesaj stratejisini not al. 3) SpyFu ile keyword çakışmasını gör. 4) Similarweb ile trafik ve kanal karışımını karşılaştır. 5) Özet: rakipler nereden trafik alıyor, hangi angle'ları kullanıyor, kendi fırsatın nerede?`,realExample:`Uzun süredir yayında kalan reklam iyi performans gösteriyor demektir (yoksa durdururlardı). Çok sayıda benzer versiyonu olan reklam aktif test ediliyor. Sürekli değişen format → creative fatigue var. Rakibin en başarılı angle'larını not al: fiyat mı, convenience mi, duygusal bağ mı öne çıkıyor?`,keyPoints:[`Facebook Ad Library ile rakibin tüm aktif Meta reklamlarını ücretsiz görebilirsin`,`Uzun süredir yayındaki reklam iyi perform ediyor demektir — analiz et`,`Google Ads Transparency Center ile rakibin arama reklamlarını izle`,`SpyFu ile rakibin anahtar kelimeleri ve CPC'lerini tahmin et`,`Benchmark raporu: rakiplerin mesaj stratejisi ve trafik kaynakları karşılaştırması`],quiz:[{id:`q-competitor-1-1`,type:`concept`,question:`Facebook Ad Library'ye erişmek için ne gerekir?`,options:[`Meta Business hesabı ve ödeme`,`Herhangi bir hesap gerekmez`,`Sadece ajans hesapları erişebilir`,`Meta sertifikası gerekir`],correct:1,explanation:`facebook.com/ads/library herkese açık, ücretsiz bir araç. Hesap gerekmez. Herhangi bir markanın aktif Meta reklamlarını ülke bazında filtreleyerek görebilirsin.`},{id:`q-competitor-1-2`,type:`scenario`,question:`Rakibin aynı reklamı 3 aydır yayında ve 15 farklı varyantı var. Bu ne anlama gelir?`,options:[`Bütçeleri bitti, yayında kaldı`,`İyi performans gösteriyor`,`Ekip unutup kapatmadı`,`Yanlışlıkla yayında bırakıldı`],correct:1,explanation:`Uzun süre yayında kalan reklam genellikle performanslıdır — kötü performanslı reklamlar durdurulur. 15 varyant ise aktif A/B testing işareti. Hangi angle veya formata odaklandıklarını analiz et.`},{id:`q-competitor-1-3`,type:`concept`,question:`SpyFu'nun performance pazarlamacı için temel kullanım amacı nedir?`,options:[`Sosyal medya takibi`,`Rakibin Google Ads`,`E-posta pazarlama analizi`,`SEO sıralama takibi`],correct:1,explanation:`SpyFu rakibin Google Ads'teki anahtar kelimelerini, tahminî CPC'lerini ve aylık tıklama hacmini gösterir. 'Keyword Gap' ile rakibin sahip olduğu ama senin olmadığın keyword'leri bulursun.`},{id:`q-competitor-1-4`,type:`scenario`,question:`Müşteri 'rakipler ne yapıyor bilmiyorum' diyor. Hızlıca ne yaparsın?`,options:[`Google'da ara olarak değerlendir`,`Facebook Ad Library + Google Ads`,`Rakiplerin sitesine gir`,`Her adımda yöneticine danışarak ilerle`],correct:1,explanation:`Competitive audit için ilk adım Ad Library (Meta) ve Google Ads Transparency (Google). Aktif reklamları gör, ne tür mesajlar kullandıklarını, hangi formatları tercih ettiklerini not et. SpyFu ekleyince keyword strategy de ortaya çıkar.`},{id:`q-competitor-1-5`,type:`concept`,question:`Google Ads Transparency Center'da hangi reklam türleri görülebilir?`,options:[`Sadece arama reklamları`,`Arama, Display ve YouTube`,`Sadece video reklamlar`,`Sadece retargeting reklamları`],correct:1,explanation:`Google Ads Transparency Center'da bir reklamverenin aktif Arama, Display ve YouTube reklamlarını filtreleyerek görebilirsin. Bu özellikle rakibin hangi anahtar kelimelerde aktif olduğunu tahmin etmek için kullanışlı.`}]},{id:`lesson-competitor-2`,title:`Similarweb ile Trafik Analizi ve Benchmark`,duration:`25 dk`,levelDiff:{junior:`Similarweb'i keşfetmeye başlıyor. Rekabet analizi araçlarını iş akışına entegre etmeyi öğreniyor.`,mid:`Trafik tahminlerini okur ve temel rakip metriklerini takip eder. Kapsamlı rakip karşılaştırması yapmayı öğreniyor.`,senior:`Kanal miksi karşılaştırması yapıyor, müşteriye 'rakip bu kanaldan bu kadar gelir alıyor' diyebiliyor.`},what:`Similarweb herhangi bir web sitesinin tahmini trafik verilerini sunar: aylık ziyaret, ortalama süre, bounce rate, trafik kaynakları (organik, paid, direkt, sosyal, referral, e-posta). Veriler tahmini (%100 doğru değil) ama trend ve karşılaştırma için değerli.`,why:`Similarweb herhangi bir web sitesinin tahmini trafik verilerini sunar: aylık ziyaret, ortalama süre, bounce rate, trafik kaynakları (organik, paid, direkt, sosyal, referral, e-posta). Veriler tahmini (%100 doğru değil) ama trend ve karşılaştırma için değerli.`,howItWorks:`Sayfa sayfa veri dökmek değil, 3 insight çıkar: 1) Rakip A organik büyüyor, paid azalıyor — SEO'ya yatırım yapmış. 2) Rakip B sosyal trafiği patlıyor — influencer veya viral content var. 3) Bizim paid payımız rakibin 2x'i — bütçe dezavantajı ama conversion daha iyi, CPL'i karşılaştır.`,realExample:`Rakibin paid trafik payı yüksekse performance pazarlama ağırlıklı büyüyor. Organik oranı yüksekse SEO yatırımı var. Sosyal kanalı güçlüyse içerik/influencer stratejisi var. Müşterinin rakibi organik kanaldan %60 trafik alıyorsa, sadece paid yatırımla yakalamak güç — bu bilgiyi yöneticiye ve müşteriye taşı.`,keyPoints:[`Similarweb trafik tahmini yapar — veriler kesin değil ama trend ve karşılaştırma için değerli`,`Kanal miksi: rakibin paid, organik, sosyal trafik oranlarını karşılaştır`,`Paid trafik tahminiyle rakibin hangi keyword grubuna yatırım yaptığını anla`,`Audience cross-visit analizi yeni hedefleme fikirleri verir`,`Müşteriye veri değil insight sun: 3 net çıkarım, karşılaştırmalı pozisyon`],quiz:[{id:`q-competitor-2-1`,type:`concept`,question:`Similarweb verilerini kullanırken ne göz önünde bulundurulmalı?`,options:[`Veriler %100 doğrudur`,`Veriler tahminidir`,`Sadece büyük siteler için çalışır`,`Aylık ücret ödenmeden kullanılamaz`],correct:1,explanation:`Similarweb çeşitli veri kaynaklarından tahmin üretir. Veriler gerçeği yansıtır ama kesin değil. Küçük siteler için hata payı daha yüksek. 'Rakip kesinlikle X ziyaret alıyor' değil, 'tahminen bu seviyede' diyerek kullan.`},{id:`q-competitor-2-2`,type:`scenario`,question:`Rakibin Similarweb'de organic trafik payı %65, paid %10. Bu ne anlama gelir?`,options:[`Bütçeleri az olarak değerlendir`,`SEO'ya yatırım yapmışlar`,`Performans kampanyaları zayıf`,`Sosyal medya iyi`],correct:1,explanation:`Organik trafik SEO yatırımının meyvesi. %65 organik demek uzun vadeli içerik ve SEO çalışması var demek. Bu avantaj kısa vadede paid ile telafi edilemez — müşteriye uzun vadeli organik strateji de önermek gerekir.`},{id:`q-competitor-2-3`,type:`concept`,question:`Similarweb'de 'cross-visit' analizi ne gösterir?`,options:[`Rakibin reklam bütçesi`,`Rakibin ziyaretçilerini`,`Sayfa hız skoru`,`Anahtar kelime sıralaması`],correct:1,explanation:`Cross-visit analizi rakibinin kitlesinin ilgilendiği diğer siteleri gösterir. Bu veriden yeni hedefleme veya influencer/ortaklık fikirleri çıkarılabilir.`},{id:`q-competitor-2-4`,type:`scenario`,question:`Müşteri seni rakip analizi raporu için çağırdı. Similarweb'den 10 sayfa ekran görüntüsü koyacak mısın?`,options:[`Evet, ne kadar çok veri o kadar iyi`,`Hayır — 3-5 kritik insight çıkar`,`Sadece trafik tablosunu koy`,`Rapor gerekmez, Similarweb linkini gönder`],correct:1,explanation:`Müşteri ham veriyi görmek değil, 'ne yapmalıyım?' sorusunu yanıtlamak istiyor. 10 sayfa ekran görüntüsü yerine: 'Rakip A organik büyüyor, biz paid'e odaklıyız — kısa vadede avantajlıyız ama orta vadede SEO yatırımı gerekiyor' gibi net öneri.`},{id:`q-competitor-2-5`,type:`concept`,question:`Rakibin paid trafik payının yüksek olması ne anlama gelir?`,options:[`Organik arama motoru optimizasyonları iyi`,`Performance pazarlama ağırlıkl`,`Sosyal medyası güçlü`,`Site trafiği düşük`],correct:1,explanation:`Yüksek paid trafik oranı, rakibin büyümesini büyük ölçüde ücretli reklamlara dayandırdığını gösterir. Bu hem güçlü bir sinyal (işe yarıyor) hem de bir kırılganlık (bütçe kesilirse trafik düşer).`}]}]},{id:`module-privacy`,phase:3,icon:`🔐`,title:`Privacy-First Reklamcılık`,description:`Çerezler gidiyor, iOS kısıtlıyor, GDPR sıkılaşıyor. Ölçüm artık farklı çalışıyor — adapte ol.`,category:`strategy`,xpReward:220,lessons:[{id:`lesson-privacy-1`,title:`Cookie Deprecation, Consent Mode v2 ve iOS14+ Sonrası Dünya`,duration:`35 dk`,levelDiff:{junior:`Privacy gündemini takip ediyor. Bu değişikliklerin kampanya ölçümüne etkisini öğrenme aşamasında.`,mid:`Consent Mode kurmuş, privacy tracking temeline sahip. iOS 14 etkisini ve modeled conversion kavramını derinleştiriyor.`,senior:`Privacy-first mimariyi müşteriye anlatır, SKAN/PCM'yi bilir, first-party data stratejisi kurar.`},what:`2021'de Apple'ın ATT (App Tracking Transparency) ile iOS14+ için ücretli onay zorunluluğu getirmesi Meta ve mobil kampanyaları sarstı. Üçüncü taraf çerezlerin Chrome'da kaldırılması (2024-2025) web attribution'ı değiştiriyor. Bu değişikliklere adapte olmayan ajanslar müşteri kayıplarını açıklayamıyor.`,why:`2021'de Apple'ın ATT (App Tracking Transparency) ile iOS14+ için ücretli onay zorunluluğu getirmesi Meta ve mobil kampanyaları sarstı. Üçüncü taraf çerezlerin Chrome'da kaldırılması (2024-2025) web attribution'ı değiştiriyor. Bu değişikliklere adapte olmayan ajanslar müşteri kayıplarını açıklayamıyor.`,howItWorks:`ATT ile kullanıcılar 'izlenmek istiyorum' seçeneğini kabul etmezse Meta o kullanıcının conversion'ını göremez. Çözüm: Meta'nın 'modeled conversions' sistemi — gerçek veriye istatistiksel model ekler. Raporlarda 'estimated' ibaresi gören conversion sayıları budur. Kampanya analizi yaparken bu farkı bilmek gerekir.`,realExample:`Google'ın AB gereksinimleri için geliştirdiği sistem. Kullanıcı cookie onayı vermezse conversion izlenemez. Consent Mode v2 ile onay vermemiş kullanıcılar için Google istatistiksel model kullanır (modeled conversions). GTM üzerinden kurulur. 2024'ten itibaren Avrupa'da zorunlu. Kurulmamışsa kampanya verisi hatalı.`,keyPoints:[`iOS14+ ve ATT: Meta raporları artık modeled conversion içeriyor, gerçek sayı daha az`,`Consent Mode v2: cookie onayı olmayan kullanıcılar için Google istatistiksel model ekler`,`3rd party cookie'ler gidiyor — first-party data ve server-side tracking öne çıkıyor`,`Raporlarda 'estimated' veya 'modeled' yazan conversion değerleri artık normal`,`Müşterinin CRM ve e-posta verisi giderek daha değerli — Customer Match ve Custom Audiences`],quiz:[{id:`q-privacy-1-1`,type:`concept`,question:`iOS14 ATT güncellemesi Meta kampanyalarını nasıl etkiledi?`,options:[`Hedeflemeyi iyileştirdi`,`Kullanıcı izin vermezse`,`CPC'leri düşürdü`,`Reklam gösterimini artırdı`],correct:1,explanation:`ATT ile kullanıcılar 'izleme izni ver' popup'ına büyük çoğunlukla 'hayır' dedi. İzin vermeyenlerin conversion'ları Meta'ya iletilmiyor. Meta modeled conversion ile boşluğu istatistiksel olarak dolduruyor ama gerçek veriden az.`},{id:`q-privacy-1-2`,type:`concept`,question:`Consent Mode v2 ne zaman ve neden gerekli?`,options:[`Her zaman isteğe bağlı`,`AB'de 2024'ten itibaren zorunlu`,`Sadece e-ticaret siteleri için`,`Google Analytics 4 kullanıyorsan`],correct:1,explanation:`Consent Mode v2 AB'de GDPR gereksinimlerini karşılamak için Google'ın geliştirdiği sistem. Kurmayan reklamverenlerin AB trafiğinden gelen conversion verisi eksik ve yanıltıcı görünüyor.`},{id:`q-privacy-1-3`,type:`scenario`,question:`Meta raporunda conversion sayısının altında 'estimated' yazıyor. Müşteri 'bu sayıları kullanabilir miyiz?' diye soruyor. Ne dersin?`,options:[`Hayır, veriler yanlış, reklam kapat`,`Evet, Meta'nın modeled conversion`,`Nedeni araştırmadan direkt bütçeyi artır`,`Platformu değiştir`],correct:1,explanation:`Modeled conversion, gerçek conversion verisinin yetersiz olduğu durumlarda istatistiksel model kullanan Meta'nın sistemi. Verileri trend analizi ve karar verme için kullanmak mantıklı, ancak kesin rakam gibi muamele etmemeli.`},{id:`q-privacy-1-4`,type:`concept`,question:`3rd party cookie'ler kaldırılınca en sağlıklı attribution yöntemi ne olur?`,options:[`Last-click attribution`,`First-party data, server-si`,`Sadece view-through conversion`,`Attribution ölçülemez`],correct:1,explanation:`Cookie'siz dünyada: kendi domaininden topladığın first-party cookie, sunucu tarafı (server-side) tracking ve platformların modeled attribution sistemleri birlikte kullanılmalı. Hiçbiri tek başına yeterli değil.`},{id:`q-privacy-1-5`,type:`concept`,question:`First-party data neden giderek daha değerli hale geliyor?`,options:[`Yasal zorunluluk oldu`,`3rd party tracking`,`Daha ucuz değeri kullan`,`Google öneriyor`],correct:1,explanation:`Cookie kısıtlamaları ve privacy yasaları 3rd party veriye bağımlılığı riskli kılıyor. Kendi müşteri verisi (CRM, satın alma geçmişi, e-posta) ise her zaman kullanılabilir. Customer Match ve Custom Audiences bu veriyle çalışır.`}]},{id:`lesson-privacy-2`,title:`Server-Side Tagging ve First-Party Data Stratejisi`,duration:`35 dk`,levelDiff:{junior:`Client-side tagging ile çalışır. Server-side tagging ve modern ölçüm altyapısını keşfediyor.`,mid:`Server-side tagging'i kavramış. Kurulum ve entegrasyon adımlarını öğreniyor.`,senior:`Google Cloud veya Stape üzerinde sGTM kurar, müşteriye maliyet-fayda analizi sunar.`},what:`Client-side: Kullanıcının tarayıcısından veri doğrudan Google/Meta'ya gönderilir. Adblocker veya cookie kısıtlamaları bu veriyi keser. Server-side: Veri önce senin sunucuna gelir, sonra oradan platformlara iletilir. Adblocker bu akışı kesemez. Veri kalitesi artar.`,why:`Google Cloud, AWS veya Stape.io üzerinde bir container kurulur. Web sitesi eventi önce bu container'a gelir, sonra GA4, Meta CAPI, LinkedIn'e iletilir. Avantajlar: adblocker bypass, daha az page load ağırlığı, veri güvenliği (kullanıcı IP'si maskelenir), GDPR uyumu kolaylaşır.`,howItWorks:`Meta pixel client-side'dır. CAPI sunucu tarafından conversion verisi gönderir. İkisini birlikte kullan (deduplication ile). Meta, CAPI + Pixel kombinasyonu ile veri kalitesini ölçmek için 'Event Match Quality' skoru sunar — bu skoru takip et ve 7+ hedefle.`,realExample:`Müşterinin e-posta listesini veya satın alma geçmişini Google Customer Match / Meta Custom Audiences'a yükle. Hashlenerek iletilir (privacy korumalı). Bu listelerden lookalike audience oluştur. Kendi verinden beslenen lookalike, 3rd party veriden daha kaliteli.`,keyPoints:[`Server-side tracking: veri önce kendi sunucundan geçer — adblocker ve cookie kısıtlamalarını bypass eder`,`sGTM: Stape.io veya Google Cloud üzerinde kurulur, tüm platformlara oradan veri iletilir`,`Meta CAPI + Pixel birlikte kullanılmalı — Event Match Quality skoru 7+ hedeflenmeli`,`CRM e-posta listesi → Customer Match / Custom Audiences → lookalike → en kaliteli hedefleme`,`Privacy Sandbox ve Topics API: cookie sonrası Google'ın önerdiği cohort tabanlı hedefleme`],quiz:[{id:`q-privacy-2-1`,type:`comparison`,question:`Server-side tracking'in client-side'a göre temel avantajı nedir?`,options:[`Daha ucuz değeri kullan`,`Veri adblocker ve cookie`,`Daha hızlı kurulur`,`Daha fazla platform destekler`],correct:1,explanation:`Client-side tracking tarayıcıda çalışır — adblocker, iOS kısıtlamaları ve cookie engelleri veriyi keser. Server-side tracking verinin kendi sunucundan geçmesi demek. Bu akışı kullanıcı tarafından engellemek mümkün değil.`},{id:`q-privacy-2-2`,type:`concept`,question:`Meta Conversions API (CAPI) kullanılırken pixel'i kaldırmak doğru mudur?`,options:[`Evet, CAPI pixel'i gereksiz kılıyor`,`Hayır — CAPI ve pixel birlikte`,`Sadece mobil için pixel kalsın`,`Müşteriye bırak kararı`],correct:1,explanation:`CAPI ve pixel farklı durumları yakalar. Pixel bazı eventleri CAPI'nin kaçırabileceği anlarda izler, CAPI de pixel'in kaçırdıklarını yakalar. Deduplication (event_id eşleştirme) ile çift sayım önlenir. İkisi birlikte kullanılınca veri kalitesi en yüksek.`},{id:`q-privacy-2-3`,type:`scenario`,question:`Müşteri 'Meta Event Match Quality skorumuz 4, düşük mü?' diye soruyor. Ne dersin?`,options:[`Normal, merak etme`,`Evet düşük — 7+`,`Skoru yok say`,`Pixel kaldır`],correct:1,explanation:`Event Match Quality (EMQ) Meta'nın conversion eventlerini profillere ne kadar iyi eşleştirebildiğini gösteren skor. 4 düşük — Meta eventi kimin yaptığını tam tespit edemiyor. CAPI + daha fazla hashed customer data (e-posta, telefon) eklemek skoru artırır.`},{id:`q-privacy-2-4`,type:`concept`,question:`Google Customer Match ne için kullanılır?`,options:[`Yeni kitlelere ulaşmak için`,`Müşterinin e-posta listesini`,`Arama anahtar kelimeleri bulmak için`,`Reklam bütçesi tahmin etmek için`],correct:1,explanation:`Customer Match, müşterinin sahip olduğu e-posta veya CRM listesini (hashlenerek) Google'a yüklemeye yarar. Google bu listedeki kullanıcıları tanır ve onlara reklam gösterir veya benzer profil (lookalike) oluşturur.`},{id:`q-privacy-2-5`,type:`concept`,question:`Google'ın Topics API'si cookie'lerin yerine ne öneriyor?`,options:[`Bireysel kullanıcı takibi`,`Tarayıcı geçmişinden ilgi`,`IP bazlı takip olarak değerlendir`,`Sadece arama geçmişi`],correct:1,explanation:`Topics API kullanıcının tarayıcı geçmişini analiz ederek ilgi alanı kategorileri (spor, teknoloji, seyahat gibi) oluşturur. Sitelerle bu kategoriler paylaşılır — kim olduğun değil, neyle ilgilendiğin. Cookie'den daha az hassas ama privacy-safe.`}]}]},{id:`module-ai-automation`,phase:3,icon:`🤖`,title:`AI & Otomasyon ile Kampanya Yönetimi`,description:`Smart Bidding'in sırları, otomatik kurallar, script kullanımı ve AI creative araçları.`,category:`strategy`,xpReward:230,lessons:[{id:`lesson-ai-1`,title:`Smart Bidding Derinlemesine — Learning Phase, Sinyal Yönetimi & Portfolio Stratejisi`,duration:`40 dk`,levelDiff:{junior:`Smart Bidding stratejilerini kullanabilir. Learning phase ve optimizasyon mantığını öğreniyor.`,mid:`Target CPA ve ROAS kurar. Learning phase'i kısaltma ve sinyal kalitesini artırma yöntemlerini öğreniyor.`,senior:`Portfolio bidding, conversion value kuralları ve seasonality adjustment ile tam kontrol sağlar.`},what:`Google Smart Bidding, her açık artırma anında cihaz, konum, saat, kullanıcı geçmişi, arama terimi, tarayıcı vb. 70+ sinyali analiz ederek en uygun teklifi belirler. Manuel CPC ile bunu insan yapamaz. Ama algoritmanın iyi çalışması için yeterli conversion verisi şart: Target CPA için min. 30-50 conversion/ay önerilir.`,why:`Bidding stratejisi değiştiğinde, bütçe %20+ değiştiğinde veya kampanya yapısı büyük değişime uğradığında learning phase başlar (genellikle 1-2 hafta). Bu sürede performans dalgalanır. Kural: Learning phase'de sabırlı ol, küçük günlük değişikliklerle veriyi bozma. Acil müdahale gerekmiyorsa dokunma.`,howItWorks:`Google Smart Bidding, her açık artırma anında cihaz, konum, saat, kullanıcı geçmişi, arama terimi, tarayıcı vb. 70+ sinyali analiz ederek en uygun teklifi belirler. Manuel CPC ile bunu insan yapamaz. Ama algoritmanın iyi çalışması için yeterli conversion verisi şart: Target CPA için min. 30-50 conversion/ay önerilir.`,realExample:`Bazı sektörlerde kullanıcı reklamı tıklayıp günler sonra dönüşüm yapabilir (B2B, sigorta, gayrimenkul). Smart Bidding bu gecikmeli conversion'ları beklemeden karar verir. 'Conversion window' ayarını iş modeline göre optimize et. Çok kısa window = algoritma eksik veriyle çalışır.`,keyPoints:[`Smart Bidding min. 30-50 conversion/ay ister — altında performans tutarsız olur`,`Learning phase'de büyük değişiklik yapma — algoritmayı yeniden sıfırlarsın`,`Conversion window'u iş modeline göre ayarla — B2B için daha uzun window`,`Seasonality adjustment ile bayram ve kampanya dönemlerini Google'a önceden bildir`,`Düşük hacimli kampanyaları portfolio bidding'de birleştirerek veri gücünü artır`],quiz:[{id:`q-ai-1-1`,type:`concept`,question:`Smart Bidding'in iyi çalışması için minimum kaç conversion/ay önerilir?`,options:[`5-10 conversion/ay yeterlidir`,`30-50 conversion/ay ideal eşiktir`,`100'den fazla conversion zorunludur`,`Conversion sayısının önemi yoktur`],correct:1,explanation:`Google, Target CPA için kampanya başına ayda en az 30-50 conversion önerir. Bu altında algoritma yeterli veri biriktiremez, performans tutarsız olur. Düşük hacimli kampanyalarda manuel veya Enhanced CPC daha güvenli olabilir.`},{id:`q-ai-1-2`,type:`scenario`,question:`Target CPA kampanyan learning phase'de ve müşteri 'neden bu kadar kötü?' diye sorguluyor. Ne yaparsın?`,options:[`Hemen bidding stratejisini değiştir`,`Durumu açıkla: Learning phase 1-2 hafta sürer`,`Kampanyayı tamamen kapatarak dur`,`Nedeni araştırmadan direkt bütçeyi artır`],correct:1,explanation:`Learning phase algoritmanın yeni duruma uyum sağladığı dönem. Panikle yapılan değişiklikler süreci uzatır. Müşteriye süreci açıklamak ve sabır istemek doğru yaklaşım.`},{id:`q-ai-1-3`,type:`concept`,question:`Seasonality adjustment ne zaman kullanılır?`,options:[`Her ay otomatik ayarlanır`,`Black Friday veya özel`,`Bütçe artışında`,`Yeni kampanya kurarken`],correct:1,explanation:`Seasonality adjustment, bilinen CVR değişimlerini (bayram, indirim, lansman) önceden Google'a bildirme aracı. Algoritma bu bilgiyle hazırlanır ve geçici dalgalanmalara daha hızlı adapte olur.`},{id:`q-ai-1-4`,type:`scenario`,question:`5 kampanyanın her biri aylık 8 conversion alıyor. Target CPA ne kadar etkili çalışır?`,options:[`Çok iyi, 40 toplam conversion var`,`Yetersiz — her kampanya bireysel`,`Sorun yok, sürdür`,`Tüm aktif kampanyaları kapatarak bekle`],correct:1,explanation:`Bireysel 8 conversion/ay Smart Bidding için yetersiz. Ama portfolio bidding ile 5 kampanyayı birleştirince 40 conversion/ay elde edilir — bu eşiğe yakın ve algoritma daha güvenilir çalışmaya başlar.`},{id:`q-ai-1-5`,type:`concept`,question:`Conversion window'un çok kısa ayarlanması nasıl bir sonuç doğurur?`,options:[`Daha hızlı optimizasyon`,`Algoritma geç gerçekleşen`,`Maliyeti düşürür`,`Daha fazla conversion sayar`],correct:1,explanation:`B2B veya yüksek değerli satışlarda kullanıcı tıklayıp haftalarca sonra dönüşüm yapabilir. Window çok kısa ayarlanırsa bu gecikmeli conversion'lar sayılmaz. Algoritma düşük CVR gördüğü için yanlış teklif verir.`}]},{id:`lesson-ai-2`,title:`Otomatik Kurallar, Scripts ve AI Creative Araçları`,duration:`35 dk`,levelDiff:{junior:`Kampanyaları manuel yönetir. Otomasyon araçlarını ve script kullanımını keşfediyor.`,mid:`Basit otomatik kural kurmuş. Script yazmıyor.`,senior:`Özel script yönetiyor, AI creative araçlarını test-döngüsüne entegre ediyor, ekibe template sağlıyor.`},what:`Google Ads ve Meta'da kampanya otomasyonu için basit if-then kuralları. Örnekler: 'CPA > 200₺ ise bütçeyi %20 azalt', 'CTR < %0.5 ise reklamı duraklat', 'Gün sonunda harcama < hedefin %80'i ise teklifi artır'. Sabah kontrol yerine sistem otomatik yapıyor. Kural oluştururken yanlış yapılandırmak bütçeyi patlatabilir — dikkatli test et.`,why:`JavaScript tabanlı, Google Ads içinde çalışan kod parçaları. Örnek kullanımlar: Düşük kalite skoru olan keyword'leri otomatik raporla, bütçe bitmek üzere olan kampanyaları e-posta ile bildir, rakip fiyat değişiminde teklif güncelle. Script yazmak zorunda değilsin — hazır script kütüphanesi var (freeaddontools.com, optmyzr.com).`,howItWorks:`Google Ads ve Meta'da kampanya otomasyonu için basit if-then kuralları. Örnekler: 'CPA > 200₺ ise bütçeyi %20 azalt', 'CTR < %0.5 ise reklamı duraklat', 'Gün sonunda harcama < hedefin %80'i ise teklifi artır'. Sabah kontrol yerine sistem otomatik yapıyor. Kural oluştururken yanlış yapılandırmak bütçeyi patlatabilir — dikkatli test et.`,realExample:`Meta Advantage+ Shopping, Advantage+ Audience — meta creative ve hedeflemeyi AI ile otomatize ediyor. Varlıkları (görseller, başlıklar, metinler) sisteme ver, AI kombinasyon oluşturuyor. Tam kontrol azalıyor ama ölçek ve test hacmi artıyor. Performans çoğunlukla manuel'i geçiyor — ama neden işe yaradığını açıklamak zorlaşıyor.`,keyPoints:[`Otomatik kurallar: basit if-then mantığı ile manuel kontrol süresini kısalt`,`Google Ads Scripts: hazır script kütüphanesi kullan, sıfırdan yazmak zorunda değilsin`,`Meta Advantage+: AI'ya creative ve hedefleme kontrolü ver, ölçek ve test hacmi artar`,`AI creative araçları üretimi hızlandırır ama strateji ve kalite kontrolü insan gerektirir`,`Otomasyon kurulunca 'set and forget' yapma — haftalık kontrol zorunlu`],quiz:[{id:`q-ai-2-1`,type:`scenario`,question:`Her sabah CPA 200₺ üstündeki kampanyaları manuel kontrol ediyorsun. Zaman tasarrufu için ne yaparsın?`,options:[`Daha az kontrol et, başka aksiyon alma`,`Otomatik kural kur: 'Son 7 günde CPA > 200₺ ise`,`Tüm aktif kampanyaları kapatarak bekle`,`Daha fazla bütçe ver, başka aksiyon alma`],correct:1,explanation:`Otomatik kurallar tam da bu durumlar için tasarlandı. Kural bir kez kurulunca sistem sürekli kontrol eder ve tetiklenince hem aksiyonu alır hem e-posta gönderir. Manuel sabah rutini gereksiz hale gelir.`},{id:`q-ai-2-2`,type:`concept`,question:`Google Ads Scripts için JavaScript bilmek zorunlu mudur?`,options:[`Evet, sıfırdan yazman gerekiyor`,`Hayır — freeaddontools.com ve`,`Sadece senior kullanabilir`,`Google reklam politikaları buna izin vermiyor`],correct:1,explanation:`Script yazmayı bilmek avantaj ama zorunlu değil. Hazır script kütüphaneleri en yaygın kullanım senaryolarını kapsıyor. Kopyala-yapıştır ve Google Ads Script editörüne yükle.`},{id:`q-ai-2-3`,type:`concept`,question:`Meta Advantage+ Audience kullanmanın temel avantajı nedir?`,options:[`Daha ucuz CPM sağlar`,`Meta'nın AI'ına geniş`,`Daha az bütçe gerekir`,`Manuel hedefleme daha iyidir`],correct:1,explanation:`Advantage+ Audience ile manuel hedefleme kısıtlamaları kaldırılır, Meta algoritması çok daha geniş bir alanda test yapar. Başlangıçta pahalı görünebilir ama ML sinyali biriktikçe performans genellikle manuel hedeflemeyi geçer.`},{id:`q-ai-2-4`,type:`scenario`,question:`AI araçla 50 başlık varyantı oluşturdun. Sırada ne var?`,options:[`Hepsini aynı anda yayınla`,`Kalite kontrolü yap: marka sesi`,`Hiçbirini kullanma, AI güvenilmez`,`Yöneticiye gönder`],correct:1,explanation:`AI metin üretimini hızlandırır ama filtre insan. 50 başlıktan bazıları marka tonuna uymaz, hatalı bilgi içerebilir veya rakip ürün andırabilir. Kalite kontrolden geçen en iyi varyantları test et.`},{id:`q-ai-2-5`,type:`concept`,question:`Smart Bidding + otomatik kural + script aynı anda aktifken performans bozuldu. Ana zorluk nedir?`,options:[`Çok fazla otomasyon pahalı`,`Hangi katmanın ne yaptığını`,`Google reklam politikaları buna izin vermiyor`,`Script çalışmaz`],correct:1,explanation:`Çok fazla otomasyon katmanı şeffaflığı azaltır. Smart Bidding teklif verirken kural bütçeyi düşürüyor, script başka bir şey yapıyorsa nedenselliği izlemek imkansız hale gelir. Az katman, net izleme prensibi.`}]}]}],h={id:`module-amazon`,phase:2,icon:`🛒`,title:`Amazon Ads — E-Ticaret & Marketplace`,description:`Sponsored Products, Sponsored Brands ve DSP ile Amazon ekosisteminde performans yönetimi.`,category:`platform`,xpReward:160,lessons:[{id:`lesson-amazon-1`,title:`Amazon Advertising Ekosistemi — Sponsored Ads Temelleri`,duration:`25 dk`,what:`Amazon Ads, kullanıcının aktif satın alma niyetiyle platformda gezinirken reklam gösterir. Sponsored Products (ürün bazlı, arama sonuçlarında), Sponsored Brands (marka logosu + 3 ürün, üst bant) ve Sponsored Display (Amazon dışı retargeting) ana format tipleridir. ACOS (Advertising Cost of Sales) temel başarı metriğidir: reklam harcaması / reklam kaynaklı satış.`,why:`Amazon kullanıcıları Google'dan farklı: platforma girdiğinde zaten satın almak istiyor. Bu niyet farkı dönüşüm oranlarını 3-5x yükseltir. E-ticaret yapan her marka için Amazon Ads, Google ve Meta'ya ek olarak müfredatta yer almalıdır — özellikle Trendyol ve Hepsiburada gibi Türk pazaryerlerinde aynı mantık geçerlidir.`,howItWorks:`Kampanya yapısı: Campaign → Ad Group → Ad. Sponsored Products için manuel veya otomatik hedefleme seçilir. Manuel: kendi belirlediğin keyword'lerle (exact/phrase/broad match). Otomatik: Amazon'un kendi hedefleme önerilerini kullandığı mod — keşif için iyidir, optimize etmek için Search Term raporunu kullan. ACOS hesabı: 100 TL harcayıp 400 TL satış yaptıysan ACOS = %25. Hedef ACOS sektöre göre değişir: margin'ine göre belirle.`,realExample:`Bir ev tekstili markası Sponsored Products kampanyası açtı. İlk hafta otomatik hedefleme ile Search Term raporu toplandı — hangi keyword'lerin satış getirdiği görüldü. İkinci haftada bu keyword'ler manuel kampanyaya taşındı, düşük performanslılar negative keyword yapıldı. ACOS %42'den %28'e düştü. Bu optimizasyon döngüsü Amazon'da haftalık rutin haline geldi.`,keyPoints:[`ACOS = Reklam harcaması / Reklam kaynaklı satış — hedef ACOS marjına göre belirlenir`,`Otomatik kampanya keşif, manuel kampanya optimizasyon içindir — ikisini birlikte kullan`,`Search Term raporu negative keyword listesinin temelidir — haftada bir incele`,`Sponsored Brands marka bilinirliği için, Sponsored Products dönüşüm için önceliklidir`,`Trendyol ve Hepsiburada'da da aynı mantık geçerli: sponsored listing = Amazon Ads eşdeğeri`],levelDiff:{junior:`Sponsored Products kampanyası kurar. ACOS hesabını ve Search Term raporunu öğreniyor.`,mid:`Manuel ve otomatik kampanyaları birlikte yönetir. Negative keyword optimizasyonu yapar.`,senior:`Tüm Amazon Ads formatlarını stratejiyle kullanır. Margin'e göre hedef ACOS belirler, DSP entegrasyonu yapar.`},quiz:[{id:`q-amazon-1-1`,type:`concept`,question:`ACOS nedir ve nasıl hesaplanır?`,options:[`Toplam satış / toplam ziyaretçi`,`Reklam harcaması / reklam kaynaklı`,`Toplam harcama / toplam sipariş`,`Tıklama başı maliyet / dönüşüm oranı`],correct:1,explanation:`ACOS = Advertising Cost of Sales. 100 TL harcayıp 500 TL satış yaptıysan ACOS = %20. Ne kadar düşükse o kadar kârlı — ama kategori marjına göre hedef ACOS değişir.`},{id:`q-amazon-1-2`,type:`comparison`,question:`Otomatik ve manuel Amazon kampanyaları arasındaki temel fark nedir?`,options:[`Manuel her zaman daha iyi dönüşüm sağlar`,`Otomatik: Amazon hedefler, keşif için ideal`,`İkisi de aynı şekilde çalışır, sadece kurulum farkı vardır`,`Otomatik yalnızca Sponsored Brands için kullanılabilir`],correct:1,explanation:`Otomatik kampanyalar Amazon'un algoritmasının kendi keyword önerilerini test etmesini sağlar — yeni keyword keşfi için güçlüdür. Manuel kampanyalar kendi belirlediğin keyword'lerle tam kontrol sağlar. En iyi strateji ikisini birlikte kullanmaktır.`},{id:`q-amazon-1-3`,type:`scenario`,question:`Search Term raporunda 'koltuk örtüsü' keyword'ü %2 ACOS ile harika sonuç veriyor ama manuel kampanyanda yok. Ne yaparsın?`,options:[`Raporu kapat, otomatik devam etsin`,`Bu keyword'ü manuel kampanyaya`,`Otomatik kampanyayı kapat`,`Bütçeyi artır, daha fazla görünürsün`],correct:1,explanation:`Kazanan keyword'leri otomatik kampanyadan manuel'e taşımak Amazon optimizasyonunun temel döngüsüdür. Hem daha fazla kontrol sağlar hem de otomatik kampanyanın bütçesini gerçek keşfe ayırmış olursun.`},{id:`q-amazon-1-4`,type:`concept`,question:`Sponsored Products ile Sponsored Brands arasındaki kullanım farkı nedir?`,options:[`Sponsored Brands daha ucuzdur, her zaman tercih edilmeli`,`Sponsored Products: bireysel ürün dönüşümü; Sponsored Brands:`,`İkisi de aynı amaca hizmet eder, format farkı yoktur`,`Sponsored Brands yalnızca büyük markalar için kullanılabilir`],correct:1,explanation:`Sponsored Products arama sonuçlarında bireysel ürün kartı gösterir — dönüşüm odaklıdır. Sponsored Brands sayfanın üstünde marka logosu + 3 ürün gösterir — marka bilinirliği ve kategori dominansı için kullanılır.`},{id:`q-amazon-1-5`,type:`scenario`,question:`ACOS hedefin %30 ama kampanyanın ACOS'u %48. İlk aksiyonun ne?`,options:[`Kampanyayı hemen kapat`,`Search Term raporunda yüksek`,`Bütçeyi azalt, oran kendiliğinden düzelir`,`Ürün fiyatını artır`],correct:1,explanation:`Yüksek ACOS'u düşürmenin en etkili yolu waste eden keyword'leri negatif listeye almaktır. Search Term raporunda çok harcayıp az veya hiç satış getirmeyen keyword'leri bul ve negative keyword olarak ekle.`}]},{id:`q-amazon-1-6`,type:`concept`,question:`Sponsored Brands ile marka bilinirliği oluşturmanın temel avantajı nedir?`,options:[`Daha düşük ACOS sağlar, cost-efficient en iyi format`,`Arama tepesinde logo, başlık ve ürün galerisiyle marka görünürlüğü yaratır`,`Organik sıralamayı doğrudan artırır, reklam gibi çalışmaz`,`Yalnızca Amazon Prime üyelerine ulaşır, segment dar ama değerli`],correct:1,explanation:`Sponsored Brands arama sonuçlarının tepesinde marka logosu, başlık ve ürün seçkisi gösterir. ACOS yüksek olabilir ama marka bilinirliği ve halo etkisi yaratır.`},{id:`q-amazon-1-7`,type:`scenario`,question:`Yeni ürün listeliyorsun, hiç yorum yok ve organik sıralama düşük. İlk hafta stratejin ne?`,options:[`Sadece Sponsored Brands aç, görünürlük için marka öne çıksın`,`Otomatik kampanya aç, agresif bid ver, ilk satışları ve yorumları kazan`,`Reklam açmadan organik sıralamayı bekle, organik daha sürdürülebilir`,`Yalnızca exact match hedefle, bütçeyi minimumda tut başlangıçta`],correct:1,explanation:`Yeni üründe amaç satış hızı ve yorum kazanmak. Otomatik kampanya hangi keyword'lerin işe yaradığını öğretir. Agresif bid görünürlük sağlar, ilk yorumlar organik büyümeyi başlatır.`},{id:`q-amazon-1-8`,type:`comparison`,question:`Amazon DSP ile Sponsored Products arasındaki temel fark nedir?`,options:[`DSP daha ucuz, Sponsored Products daha pahalıdır genel olarak`,`DSP Amazon dışında da reklam gösterir ve intent-based audience kullanır; Sponsored Products yalnızca Amazon içindedir`,`İkisi de aynı kitleye aynı placement'larla ulaşır`,`Sponsored Products video destekler, DSP yalnızca display formatındadır`],correct:1,explanation:`Amazon DSP birinci taraf verilerle Amazon dışı sitelerde reklam gösterir. Sponsored Products yalnızca Amazon arama ve ürün sayfalarında çalışır. Farklı funnel aşamalarını hedefler.`},{id:`q-amazon-1-9`,type:`concept`,question:`A+ Content nedir ve satışa etkisi nedir?`,options:[`Amazon'un reklam platformunun premium versiyonu, ücretli abonelik gerektirir`,`Ürün sayfasında zengin görsel ve metin blokları; dönüşüm oranını artırabilir`,`Sponsored Brands'in gelişmiş bir versiyonu, arama sayfasında gösterilir`,`Yalnızca Prime üyelere gösterilen özel içerik formatıdır`],correct:1,explanation:`A+ Content ürün detay sayfasına infografik, karşılaştırma tablosu ve zengin görsel ekleme imkanı verir. Amazon verilerine göre iyi A+ Content dönüşüm oranını %3-10 artırabilir.`},{id:`q-amazon-1-10`,type:`scenario`,question:`Kampanyanın ROAS'ı 8x ama stok tükenmek üzere. Ne yaparsın?`,options:[`Kampanyayı durdur, stok bitene kadar tüm reklamları kapat`,`Bid'leri düşür, satış hızını yavaşlat; stok yenilenince eski seviyeye çek`,`Bütçeyi artır, ROAS yüksekken maksimum satış yap`,`Fiyatı düşür, daha fazla satış yapmak için fırsatı kullan`],correct:1,explanation:`Stok bittiğinde organik sıralama düşer ve yeniden oluşturmak zaman alır. Bid azaltarak satış hızını yönetmek stok tükenmesini erteler. Agresif satış stok bitimini hızlandırır ve uzun vadeli sıralamaya zarar verir.`}]},g=[...f,...d,...p,...m,h,{id:`module-final-exam`,phase:5,icon:`🎓`,title:`Sertifikasyon Sınavı`,description:`Tüm modülleri kapsayan 50 soruluk final sınavı. %70 başarı oranı gereklidir.`,xpReward:500,isFinalExam:true,lessons:[{id:`lesson-final`,title:`Final Sınavı`,duration:`45 dk`,objectives:[`Tüm modüllerde yetkinliğini kanıtla`,`%70 ve üzeri başarı ile sertifikaya hak kazan`],content:`Bu sınav tüm öğrendiğin konuları kapsar. Her soruyu dikkatlice oku.`,keyPoints:[`Sınava başlamadan önce tüm modülleri tamamladığından emin ol`,`Her soru için en doğru cevabı seç`,`%70 ve üzeri puan sertifika için yeterlidir`],levelDiff:{junior:`Temel kavramları ve standart süreçleri bilmek yeterli`,mid:`Platform özelliklerini ve optimizasyon kararlarını açıklayabilmek gerekir`,senior:`Stratejik kararlar ve senaryo bazlı sorularda tam puan beklenir`}}],passingScore:70,quiz:[{id:`q-final-1`,type:`concept`,question:`Attribution modeli olarak Data-Driven (DDA) kullanmanın en büyük avantajı nedir?`,options:[`Her conversion için eşit kredi dağıtır, yorumlaması kolay`,`Gerçek dönüşüm yolculuğuna göre makine öğrenimiyle kredi dağıtır`,`Yalnızca son tıklamayı dikkate alır, en basit modeldir`,`First-click'e %100 kredi verir, awareness ölçümü için idealdir`],correct:1,explanation:`DDA, her hesabın kendi conversion verilerini kullanarak gerçek dönüşüm yolculuğunu analiz eder. Hangi touchpoint'in ne kadar katkı yaptığını makine öğrenimiyle belirler.`},{id:`q-final-2`,type:`scenario`,question:`Meta kampanyanın ROAS'ı 3x ama hedef 5x. Frequency 8.2, CTR 0.4%. Önce ne yaparsın?`,options:[`Bütçeyi hemen artır, daha fazla harcayarak ROAS'ı artır`,`Creative yorgunluğu var; yeni creative test et, frequency'yi düşür`,`Hedef kitleyi daralt, daha küçük audience daha iyi dönüşür`,`Kampanyayı durdur, yeni strateji kur sıfırdan`],correct:1,explanation:`Frequency 8+ ve düşük CTR, creative fatigue'in net göstergesidir. Aynı kişilere aynı reklamı çok göstermek dönüşümü düşürür. Yeni creative ile refresh gerekir.`},{id:`q-final-3`,type:`concept`,question:`Google Ads'de Quality Score'u etkileyen 3 ana faktör nedir?`,options:[`Bütçe büyüklüğü, kampanya yaşı ve hesap geçmişi`,`Expected CTR, ad relevance ve landing page experience`,`Keyword match type, bid amount ve competitor score`,`Campaign type, targeting ve conversion history`],correct:1,explanation:`Quality Score = Expected CTR + Ad Relevance + Landing Page Experience. Bu 3 faktör 1-10 arası puan belirler ve CPC'yi doğrudan etkiler. Yüksek QS düşük CPC demektir.`},{id:`q-final-4`,type:`comparison`,question:`GA4'te session-based ve user-based metrikler arasındaki temel fark nedir?`,options:[`İkisi de aynı şeyi ölçer, farklı isimle gösterilir`,`Session: tek ziyareti ölçer; User: kişiyi farklı oturumlarda takip eder`,`User metrikleri gerçek zamanlı, session metrikleri gecikmeli çalışır`,`Session metrikleri yalnızca mobil için, user metrikleri masaüstü için`],correct:1,explanation:`Session, bir kullanıcının tek bir ziyarette gerçekleştirdiği etkileşimleri ölçer. User metrikleri ise kişiyi farklı oturumlarda ve cihazlarda takip ederek gerçek müşteri yolculuğunu gösterir.`},{id:`q-final-5`,type:`scenario`,question:`TikTok kampanyasında ilk 3 saniye izlenme oranı %18. Bu ne anlama gelir?`,options:[`Mükemmel; %18 endüstri ortalamasının üzerindedir`,`Hook zayıf; ilk 3 saniye yeterince dikkat çekmiyor, creative yenilenmeli`,`Normal; TikTok algoritması zaten ilk 3 saniyeyi göstermez`,`Hedef kitle yanlış; doğru kişilere ulaşılmıyor demektir`],correct:1,explanation:`TikTok'ta sağlıklı hook rate %25+ olmalıdır. %18 hook rate, videonun ilk saniyelerinin yeterince ilgi çekmediğini gösterir. Hook'u güçlendirmek — sürpriz açılış, soru veya bold statement — izlenmeyi artırır.`},{id:`q-final-6`,type:`concept`,question:`Programmatic reklamcılıkta RTB (Real-Time Bidding) nasıl çalışır?`,options:[`Reklamverenler bir hafta önceden sabit fiyatla yer satın alır`,`Kullanıcı sayfayı açtığında milisaniyeler içinde açık artırma gerçekleşir, en yüksek teklif kazanır`,`Google ve Meta'nın kendi sistemleri arasında fiyat anlaşması yapılır`,`Yayıncı siteler günlük sabit fiyat listesi yayınlar, ajanslar seçer`],correct:1,explanation:`RTB'de kullanıcı bir web sayfasını açtığı anda DSP'ler SSP aracılığıyla gerçek zamanlı açık artırmaya katılır. Tüm süreç 100ms'den kısa sürer. Kazanan teklif reklamı gösterir.`},{id:`q-final-7`,type:`scenario`,question:`E-ticaret sitesinde sepet abandonment rate %78. GA4 funnel raporunda en büyük düşüş ödeme sayfasında. Neye bakarsın?`,options:[`Sadece reklam bütçesini artır, daha fazla trafik getir`,`Ödeme adımındaki UX sorunlarına, form uzunluğuna, güven elementlerine ve ödeme seçeneklerine bak`,`Hedef kitleyi değiştir, ödeme sayfasına kadar gelen kişi kalitesi düşük`,`Meta pikselini kontrol et, tracking hatası olabilir`],correct:1,explanation:`Ödeme sayfasındaki yüksek drop, teknik veya UX kaynaklıdır. Uzun form, zorunlu üyelik, az ödeme seçeneği, güven eksikliği (SSL göstergesi, iade politikası) başlıca nedenlerdir. Session replay ile kullanıcı davranışı izlenebilir.`},{id:`q-final-8`,type:`concept`,question:`DV360'ın Google Display Network'ten (GDN) temel farkı nedir?`,options:[`DV360 daha ucuz, GDN premium inventory'ye erişir`,`DV360 premium exchange'lere, cross-channel ölçüme ve gelişmiş audience segmentlerine erişir; GDN Google ağıyla sınırlıdır`,`İkisi de aynı inventory'ye erişir, sadece arayüz farklıdır`,`GDN video destekler, DV360 yalnızca display formatındadır`],correct:1,explanation:`DV360 bağımsız DSP olarak Google, AppNexus, Rubicon gibi onlarca exchange'e erişir. GDN yalnızca Google Display ağıyla sınırlıdır. DV360 daha gelişmiş frekans yönetimi ve cross-channel attribution sunar.`},{id:`q-final-9`,type:`comparison`,question:`First-click ve last-click attribution modellerinin kullanım alanı farkı nedir?`,options:[`İkisi de aynı kanalı optimize eder, tercih meselesidir`,`First-click awareness kanallarını değerler; last-click conversion kanallarını öne çıkarır`,`Last-click her zaman daha doğru sonuç verir, first-click eski bir modeldir`,`First-click yalnızca Google için, last-click Meta için uygundur`],correct:1,explanation:`First-click, yolculuğu başlatan kanalı (genellikle awareness — display, sosyal) ödüllendirir. Last-click, satışı kapatan kanalı (genellikle search, retargeting) öne çıkarır. Hangisini kullandığın bütçe dağılım kararlarını doğrudan etkiler.`},{id:`q-final-10`,type:`scenario`,question:`Marka direktörü 'Instagram reklamları işe yaramıyor, ROAS çok düşük' diyor. Nasıl yanıt verirsin?`,options:[`Haklılar, Instagram awareness kanalıdır, kesin kapat`,`ROAS tek metrik değil; Instagram'ın view-through, assisted conversion ve uzun vadeli brand lift katkısını göster`,`Bütçeyi Google'a aktar, Instagram'dan çık`,`Instagram kampanyasını daha agresif yap, daha fazla harca`],correct:1,explanation:`Instagram gibi awareness kanallarını yalnızca ROAS'la değerlendirmek yanıltıcıdır. View-through conversion, assisted conversion raporu ve marka arama hacmindeki artış gibi metrikleri sunarak kanalın gerçek katkısını göstermek gerekir.`},{id:`q-final-11`,type:`concept`,question:`GTM'de DataLayer neden kullanılır?`,options:[`Site hızını artırmak için JavaScript'i optimize eder`,`Sayfa koduna dokunmadan dinamik değerleri (fiyat, ürün ID, kullanıcı tipi) tag'lere iletmek için`,`Google Analytics ile Meta Pixel arasında veri senkronizasyonu sağlar`,`Yalnızca e-ticaret sitelerinde zorunlu, diğer sitelerde kullanılmaz`],correct:1,explanation:`DataLayer, geliştirici ile dijital pazarlamacı arasında bir köprüdür. Ürün fiyatı, sepet tutarı, kullanıcı ID gibi dinamik değerleri GTM'e ileterek GTM'in bu verileri tag'lerde kullanmasını sağlar.`},{id:`q-final-12`,type:`scenario`,question:`Google Shopping kampanyasında impression çok yüksek ama CTR %0.3. Sorun ne olabilir?`,options:[`CTR çok iyi, endişelenme`,`Ürün başlığı, görseli veya fiyatı rakiplerle kıyaslandığında çekici değil; listeleme optimize edilmeli`,`Hedef kitle yanlış seçilmiş, demographic düzelt`,`Bütçe çok düşük, artırırsan CTR otomatik yükselir`],correct:1,explanation:`Shopping'de CTR listeleme kalitesine bağlıdır. %0.3 çok düşük. Ürün görseli, başlık (en önemli keyword'ler öne), fiyat rekabetçiliği ve yıldız puanı CTR'ı doğrudan etkiler. Başlık ve görsel A/B testi yapılabilir.`},{id:`q-final-13`,type:`concept`,question:`Meta Advantage+ Shopping kampanyasının standart kampanyadan farkı nedir?`,options:[`Daha ucuz, aynı performansı daha az harcamayla sunar`,`Yaratıcı, hedefleme ve placement optimizasyonunu otomatikleştirir; geniş audience'a yayılır`,`Yalnızca Reels formatında çalışır, feed'de görünmez`,`Küçük bütçeli kampanyalar için tasarlanmıştır özellikle`],correct:1,explanation:`Advantage+ Shopping, Meta'nın AI'ını kullanarak hedefleme, teklif ve creative rotasyonu otomatik yönetir. Manuel segmentasyon yerine algoritma en verimli kombinasyonu bulur. Büyük e-ticaret hesaplarında güçlü sonuçlar verebilir.`},{id:`q-final-14`,type:`comparison`,question:`CPC ile CPM stratejileri ne zaman tercih edilir?`,options:[`Her zaman CPC daha iyidir, tıklama garantili olduğu için`,`CPC dönüşüm odaklı kampanyalar için; CPM geniş awareness ve düşük maliyetli görünürlük için tercih edilir`,`CPM her zaman CPC'den pahalıdır bu yüzden kaçınılmalı`,`İkisi arasında performans farkı yoktur, sadece fatura şekli değişir`],correct:1,explanation:`CPC, tıklama başı ödeme yaptığından dönüşüm odaklı kampanyalar için verimlidir. CPM, bin gösterim başı ödeme olduğundan awareness ve reach kampanyalarında maliyet avantajı sağlar. Hedef belirleme modeli seçimini yönlendirir.`},{id:`q-final-15`,type:`scenario`,question:`SA360 cross-engine kampanya yönetiminde en kritik avantaj nedir?`,options:[`Her platformu ayrı ayrı yönetmek zorunda kalırsın`,`Google, Microsoft ve diğer arama motorlarını tek dashboard'dan yönetmek ve unified bidding uygulamak`,`Yalnızca Google Ads için kullanılır, diğer motorları kapsamaz`,`SA360 yalnızca raporlama aracıdır, bid yönetimi yapmaz`],correct:1,explanation:`SA360'ın temel değeri cross-engine yönetimdir. Google Ads, Microsoft Ads ve diğer motorları tek yerden yönetmek, unified bidding stratejisi uygulamak ve cross-engine attribution görmek operasyonel verimliliği artırır.`},{id:`q-final-16`,type:`concept`,question:`CAPI (Conversions API) neden sadece piksel kullanmaktan üstündür?`,options:[`CAPI daha hızlı çalışır, piksel yavaştır`,`Tarayıcı kısıtlamaları ve ad blocker'lardan etkilenmez; server-side veriyle sinyal kalitesini artırır`,`CAPI ücretsiz, piksel ücretlidir`,`CAPI yalnızca iOS kullanıcıları için zorunludur`],correct:1,explanation:`iOS 14.5+ ve ad blocker'lar piksel tabanlı izlemeyi kısıtlar. CAPI server-side çalıştığından bu kısıtlamalardan etkilenmez. Piksel + CAPI kombinasyonu event match quality'yi maksimize eder.`},{id:`q-final-17`,type:`scenario`,question:`YouTube kampanyasında TrueView in-stream reklamların skip rate %75. Bu ne anlama gelir?`,options:[`Mükemmel; kullanıcılar 5 saniye sonra skip edebilir, %75 normal`,`Hook yeterince güçlü değil; ilk 5 saniye mesajını netleştirmeli veya creative yenilemeli`,`Hedefleme yanlış; demografi değiştir`,`Skip rate YouTube için önemli değil, view-through sayılır`],correct:1,explanation:`Yüksek skip rate, ilk 5 saniyenin yeterince dikkat çekmediğini gösterir. İlk 5 saniyede marka adı, güçlü bir hook veya net bir değer önerisi gerekir. Skip edemeyen bumper reklamlar awareness için alternatif olabilir.`},{id:`q-final-18`,type:`concept`,question:`Performance Max kampanyasında asset group nedir?`,options:[`Bütçe gruplama sistemi, her asset group ayrı bütçe alır`,`Aynı kampanya altında farklı creative ve audience kombinasyonlarını test etmek için kullanılan yapı`,`Google'ın otomatik olarak oluşturduğu, değiştirilemez gruplar`,`Yalnızca Shopping ürünleri için kullanılan kategori sistemi`],correct:1,explanation:`Asset group, PMax içinde farklı creative setleri (başlık, görsel, video) ve audience signals'ı bir araya getiren yapıdır. Farklı ürün kategorileri veya mesajlar için ayrı asset group oluşturmak performans optimizasyonunu kolaylaştırır.`},{id:`q-final-19`,type:`comparison`,question:`Criteo ile RTB House'un temel fark ve kullanım alanı nedir?`,options:[`İkisi de aynı teknolojiyi kullanır, sadece fiyatları farklıdır`,`Criteo geniş e-ticaret retargeting network'ü; RTB House deep learning tabanlı retargeting ile daha granüler optimizasyon sunar`,`Criteo yalnızca Türkiye'de, RTB House küresel çalışır`,`RTB House daha eski teknolojidir, Criteo daha yenidir`],correct:1,explanation:`Criteo geniş publisher networküyle e-ticaret retargeting'de köklü bir oyuncudur. RTB House deep learning algoritmalarıyla kişiselleştirilmiş retargeting optimizasyonu yapar. Her ikisi de e-ticaret için güçlüdür ama yaklaşımları farklıdır.`},{id:`q-final-20`,type:`scenario`,question:`Müşteri 'bütçemizin %80'ini Google'a ver' diyor. Nasıl yaklaşırsın?`,options:[`Müşterinin dediğini yap, karar onların`,`Hedef ve kanal verilerini analiz et; audience'ın nerede olduğuna göre mix öner, kararı verilerle savun`,`Google her zaman en iyi kanal, %80 mantıklı`,`Tüm bütçeyi Meta'ya ver, daha iyi dönüşür`],correct:1,explanation:`Kanal kararları veriyle alınmalıdır. Hedef kitleyi hangi kanalda, hangi intent seviyesinde yakaladığın belirleyicidir. Müşterinin kanalına değil, verinin söylediği kanalına git — ama kararı net gerekçelerle savun.`},{id:`q-final-21`,type:`concept`,question:`Lookalike audience ile interest-based targeting arasındaki fark nedir?`,options:[`Lookalike daha ucuzdur, interest targeting daha pahalıdır`,`Lookalike mevcut müşterilere benzer kişileri bulur; interest targeting belirlenen ilgi alanlarına sahip kişileri hedefler`,`İkisi de aynı sonucu verir, sadece kurulum farkı vardır`,`Interest targeting yalnızca awareness, lookalike yalnızca conversion için kullanılır`],correct:1,explanation:`Lookalike, seed audience (müşteri listesi, piksel verisi) üzerinden benzer profilli yeni kullanıcılar bulur. Intent ve davranış bazlıdır. Interest targeting ise platforma beyan edilen ilgi alanlarına dayanır ve daha geniş, less precise bir yaklaşımdır.`},{id:`q-final-22`,type:`scenario`,question:`Google Ads hesabında conversion tracking kurulu değil. Smart Bidding (Target ROAS) kullanıyor musun?`,options:[`Evet, Smart Bidding conversion olmadan da çalışır`,`Hayır; Smart Bidding dönüşüm verisi olmadan öğrenemez, manuel CPC veya Enhanced CPC ile başla`,`Evet, Google algoritması zaten veriyi tahmin eder`,`Conversion tracking önemli değil, impression ve CTR yeterli`],correct:1,explanation:`Smart Bidding, dönüşüm verisiyle öğrenen makine öğrenimi algoritmalarına dayanır. Veri olmadan tROAS veya tCPA uygulamak anlamsızdır. Önce conversion tracking kur, yeterli veri biriktir (30+ conversion/ay), sonra Smart Bidding'e geç.`},{id:`q-final-23`,type:`concept`,question:`Hook Rate ve Hold Rate video reklamlarda ne ölçer?`,options:[`Hook Rate toplam izlenmeyi, Hold Rate tıklama oranını ölçer`,`Hook Rate ilk 3 saniyelik izlenme oranını; Hold Rate videonun tamamını izleme oranını ölçer`,`İkisi de aynı metriği farklı isimle ifade eder`,`Hook Rate yalnızca TikTok, Hold Rate yalnızca YouTube için kullanılır`],correct:1,explanation:`Hook Rate = 3 saniyelik izlenme / gösterim. Hold Rate = tamamlanan izlenme / 3 saniyelik izlenme. Hook zayıfsa kullanıcı ilk saniyede çıkar. Hook güçlü ama Hold düşükse video uzun veya sıkıcıdır.`},{id:`q-final-24`,type:`scenario`,question:`Ajans olarak müşterinin kampanyası 2. haftada hedefin %40 altında. Müşteriye nasıl iletirsin?`,options:[`Müşteriyi bilgilendirme, 4. haftaya kadar bekle`,`Proaktif ilet: mevcut durum + analiz + neden olduğu + aksiyon planı ile ulaş`,`Hatayı kabul et ve özür dile, sorumluluk al`,`Kötü performansı iyi göstermek için metrikleri değiştir`],correct:1,explanation:`Kötü haber geciktirme güven yıkar. Proaktif iletişim — ne oldu, neden, ne yapıyoruz — müşteri-ajans ilişkisini güçlendirir. Analiz ve aksiyon planı sunmak sorunun farkında olduğunu ve çözüm odaklı olduğunu gösterir.`},{id:`q-final-25`,type:`concept`,question:`Pinterest reklamlarında 'buyable pins' ile standart promoted pins farkı nedir?`,options:[`Buyable pins daha pahalıdır, promoted pins ücretsizdir`,`Buyable pins doğrudan satın alma imkanı verir; promoted pins kullanıcıyı siteye yönlendirir`,`İkisi de aynıdır, isim değişikliği yapılmıştır`,`Buyable pins yalnızca ABD'de, promoted pins küreselde çalışır`],correct:1,explanation:`Buyable (Product) Pins, Pinterest içinden doğrudan satın alma imkanı tanır. Promoted Pins ise kullanıcıyı markanın web sitesine yönlendirir. Her ikisi de e-ticaret için kullanılır ama farklı funnel aşamalarına hitap eder.`},{id:`q-final-26`,type:`comparison`,question:`Prospecting ve retargeting kampanyaları arasındaki temel strateji farkı nedir?`,options:[`Prospecting her zaman daha pahalıdır, retargeting daha ucuzdur`,`Prospecting yeni kitleye ulaşır (awareness/consideration); retargeting mevcut etkileşimcileri dönüştürür (conversion)`,`Retargeting yeni audience için, prospecting geri dönenler için kullanılır`,`İkisi de aynı kitleyi hedefler, sadece mesaj farklıdır`],correct:1,explanation:`Prospecting yeni kullanıcılara ulaşarak funnel'a giriş sağlar. Retargeting ise siteyi ziyaret etmiş, sepete eklemiş veya içerik tüketmiş kullanıcıları hedefleyerek dönüşümü tamamlar. ROAS genellikle retargeting'de daha yüksektir.`},{id:`q-final-27`,type:`scenario`,question:`GA4'te 'direct / none' trafiği anormal şekilde yüksek. Ne anlama gelir?`,options:[`Marka çok güçlü, herkes doğrudan geliyor`,`UTM parametresi eksik veya yanlış; tracking boşlukları direct trafiği şişiriyor olabilir`,`SEO çalışmaları başarılı, organik trafik direct olarak görünür`,`Bu normal bir durum, endişelenme`],correct:1,explanation:`Yüksek direct trafik çoğunlukla UTM eksikliğinin işaretidir. E-posta, sosyal medya veya partner sitelerden gelen trafik UTM olmadan direct olarak görünür. Campaign URL Builder ile tüm kanallar etiketlenmeli.`},{id:`q-final-28`,type:`concept`,question:`Frequency capping neden önemlidir ve optimal frekans nedir?`,options:[`Frekans ne kadar yüksek olursa o kadar iyi, tekrar satışı artırır`,`Aşırı frekans negatif marka algısı ve audience fatigue yaratır; haftalık 3-5 gösterim optimal kabul edilir`,`Frekans yalnızca video kampanyaları için önemlidir`,`Frequency capping bütçeyi azaltır, kullanmamak daha iyi`],correct:1,explanation:`Aynı kişiye haftada 6+ kez aynı reklamı göstermek brand dislike, hide ad ve unfollow'a yol açar. Optimal frekans kategori ve kampanya tipine göre değişse de haftalık 3-5 gösterim genel kabul gören aralıktır.`},{id:`q-final-29`,type:`scenario`,question:`TikTok Spark Ads ile normal TikTok reklamlarının farkı ve hangi durumda kullanılır?`,options:[`Spark Ads daha ucuzdur, her zaman tercih edilmeli`,`Spark Ads organik içerikleri reklam olarak boost eder; sosyal kanıt (beğeni, yorum) korunur ve güvenilirlik artar`,`Spark Ads yalnızca influencer hesapları için kullanılabilir`,`Normal reklamlar daha geniş kitleye ulaşır, Spark Ads niş kitleye`],correct:1,explanation:`Spark Ads mevcut organik bir postu boost eder; bu sayede kullanıcılar reklamı gerçek bir içerik gibi algılar, sosyal kanıt (yorum, beğeni) görünür kalır. UGC ve influencer içeriklerini amplify etmek için idealdir.`},{id:`q-final-30`,type:`concept`,question:`SWOT analizinde 'fırsatlar' ve 'tehditler' hangi perspektiften değerlendirilir?`,options:[`Şirketin iç süreçleri ve ekip yapısı`,`Dış çevre: pazar trendleri, rakipler, teknoloji değişimleri ve regülasyonlar`,`Yalnızca finansal göstergeler ve kârlılık`,`Müşteri şikayetleri ve NPS skorları`],correct:1,explanation:`Opportunities ve Threats dış çevreden gelir: ekonomik değişimler, rakip hareketleri, yeni teknoloji, yasal düzenlemeler. Strengths ve Weaknesses ise iç faktörlerdir. SWOT'un değeri bu iki perspektifi birlikte değerlendirmesidir.`},{id:`q-final-31`,type:`scenario`,question:`E-posta pazarlama kampanyasında open rate %12. Sektör ortalaması %22. Önce ne yaparsın?`,options:[`Daha fazla e-posta gönder, hacim artışı open rate'i artırır`,`Subject line A/B testi yap; gönderim zamanını ve liste kalitesini kontrol et`,`E-posta pazarlamayı bırak, sosyal medyaya geç`,`Unsubscribe listesini temizle, sorun bu`],correct:1,explanation:`Open rate düşüklüğünün başlıca nedenleri: zayıf subject line, yanlış gönderim zamanı veya list quality sorunudur. Subject line A/B testi en hızlı etki yaratır. Ek olarak domain reputation ve spam filtresi kontrol edilmeli.`},{id:`q-final-32`,type:`concept`,question:`Search Impression Share nedir ve nasıl yorumlanır?`,options:[`Toplam tıklama sayısının sektör ortalamasıyla karşılaştırması`,`Reklamın gösterildiği arama sayısının, gösterilebileceği toplam arama sayısına oranı`,`Marka aramalarındaki görünürlük yüzdesi`,`Rakiplere kıyasla kazanılan açık artırma oranı`],correct:1,explanation:`Search IS = Gerçek gösterim / Uygun toplam arama. %60 IS, hak ettiğin gösterimlerin %40'ını kaçırdığın anlamına gelir. Lost IS (budget) veya Lost IS (rank) ile kaybın nedenini bulabilirsin.`},{id:`q-final-33`,type:`scenario`,question:`Performance Max kampanyası açtın, 3 hafta sonra Search kampanyanın trafiği düştü. Neden?`,options:[`Aynı anda iki kampanya çalışmaz, sistem engeller`,`PMax Search kampanyasının trafiğini yiyor olabilir; Asset group'ları ve arama terimi raporunu incele, exclusion ekle`,`Search kampanyasının bütçesi tükendi`,`Algoritma değişikliği oldu, Google'ı bekle`],correct:1,explanation:`PMax, Search kampanyasıyla aynı keyword'leri hedefleyerek trafiği çekebilir. PMax genellikle öncelik alır. Search kampanya koruması için brand keyword exclusion ve negatif keyword listesi kullanılmalı. Asset group'lar kontrol edilmeli.`},{id:`q-final-34`,type:`concept`,question:`TACOS metriği neden ACOS'tan daha kapsamlı bir Amazon performans göstergesidir?`,options:[`TACOS daha kolay hesaplanır, ACOS zordur`,`TACOS toplam satışı (reklam+organik) böler; reklamın organik büyümeye katkısını da ölçer`,`ACOS eski bir metrik, TACOS yeni standarttır`,`İkisi de aynı şeyi ölçer, isim farkı vardır`],correct:1,explanation:`ACOS = Harcama / Reklam satışı. TACOS = Harcama / Toplam satış. Düşük ACOS + düşük TACOS ideal. Yüksek ACOS + düşük TACOS = reklam organik satışı da büyütüyor. Bu durum agresif reklam harcamasını meşrulaştırabilir.`},{id:`q-final-35`,type:`scenario`,question:`Müşteri brief'i çok geniş: 'herkese ulaş, her şeyi sat.' Nasıl yaklaşırsın?`,options:[`Brief'i olduğu gibi kabul et, geniş hedefleme yap`,`Brief'i netleştir: en değerli müşteri kim, öncelikli ürün/kategori ne, başarı nasıl ölçülecek?`,`Bütçeyi tüm kanallara eşit dağıt`,`Kampanyaya başla, verilerle brief'i sonradan şekillendir`],correct:1,explanation:`Geniş brief, odaksız kampanya ve boşa harcanan bütçe demektir. Hedef kitle daraltması (en değerli segment), öncelikli ürün/kategori ve net KPI belirlenmeden kampanya başlatmak verimsizdir. Brief netleştirme ajansın sorumluluğudur.`},{id:`q-final-36`,type:`concept`,question:`Incrementality testi nedir ve neden önemlidir?`,options:[`A/B testi ile aynı şeydir, başka isimle kullanılır`,`Reklamın olmadığı senaryoya kıyasla gerçek artışsal etkiyi ölçer; hangi satışların reklamsız gerçekleşeceğini ayırt eder`,`Yalnızca büyük bütçeli kampanyalar için uygulanır`,`Platform içi attribution raporuyla aynı bilgiyi verir`],correct:1,explanation:`Incrementality testi, holdout grubu (reklam görmeyenler) ile test grubu (reklam görenler) arasındaki conversion farkını ölçer. Platform attribution'ın 'credit' verdiği dönüşümlerin gerçekten reklama bağlı olup olmadığını doğrular.`},{id:`q-final-37`,type:`scenario`,question:`Google Ads Search kampanyasında CTR %8 ama conversion rate %0.5. Sorun nerede?`,options:[`CTR düşük, reklam metni değiştirilmeli`,`Reklam metni ilgi çekiyor ama landing page dönüştürmüyor; UX, hız veya mesaj uyumu sorun olabilir`,`Keyword match type yanlış, broad match kullanılıyor`,`Bütçe yetersiz, artırınca conversion artar`],correct:1,explanation:`Yüksek CTR + düşük CVR, kullanıcıyı çektiğini ama landing page'in dönüştürmediğini gösterir. Reklam vadeti ile landing page içeriği uyumsuz olabilir; sayfa hızı, form uzunluğu veya güven elementleri eksik olabilir.`},{id:`q-final-38`,type:`concept`,question:`BigQuery ile GA4 entegrasyonunun temel faydası nedir?`,options:[`GA4 raporlarını daha güzel göstermek için kullanılır`,`Ham event verilerine SQL ile erişim sağlar; GA4 arayüzünde mümkün olmayan özel analizler yapılabilir`,`Google Analytics'i yavaşlatır, büyük siteler için gerekli değil`,`Yalnızca geliştiriciler için, pazarlamacılar kullanmaz`],correct:1,explanation:`GA4 arayüzü sampled data ve sınırlı boyut kombinasyonu sunar. BigQuery entegrasyonu ham event verisine tam erişim sağlar. Özel cohort analizi, kullanıcı yolculuğu ve çapraz tablo analizleri için güçlü bir araçtır.`},{id:`q-final-39`,type:`comparison`,question:`Managed placement ile audience targeting'in Display kampanyalarındaki farkı nedir?`,options:[`İkisi de aynı hedefleme yöntemini kullanır`,`Managed placement belirli siteleri/uygulamaları hedefler; audience targeting belirli özelliklere sahip kullanıcıları hedefler`,`Audience targeting daha ucuzdur her zaman`,`Managed placement yalnızca B2B kampanyalar için uygundur`],correct:1,explanation:`Managed placement = 'bu sitenin kullanıcılarını hedefle'. Audience targeting = 'bu özelliklere sahip kullanıcıları nerede olurlarsa olsun hedefle'. Biri context-based, diğeri people-based hedeflemedir.`},{id:`q-final-40`,type:`scenario`,question:`Yeni bir ajansa başlayan junior olarak ilk haftanda ne yapmalısın?`,options:[`Hemen kampanya önerileri sunmaya başla, inisiyatif önemli`,`Dinle, gözlemle, mevcut süreçleri ve müşterileri tanı; soru sor ama talimat bekle`,`Direktörden bağımsız çalış, kendi yöntemlerini uygula`,`Sosyal medya hesaplarını hemen yönetmeye başla`],correct:1,explanation:`Junior için ilk hafta öğrenme haf
